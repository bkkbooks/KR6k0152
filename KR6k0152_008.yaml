body:
  text: 清金陵寶華山律學沙門德基輯第二十販賣戒總釋此是共戒尼犯亦同大乘同制如前律攝云因販賣事制斯學處緣起處佛在給孤獨園起緣人跋難陀在拘薩羅國道路行往一無住處以生薑易食食已去時舍利弗亦在此國乞食至賣飯家默然住賣飯人見已問言大德何所求欲報言居士我須食彼人言持價來報言居士勿作此言我等所不應彼人言向者跋難陀以生薑易食食已去大德何故不應舍利弗慚愧無言又舍衛城中有外道得一貴價衣持至僧伽藍貿易跋難陀語言明日來即其夜浣故衣搗治光澤如新晨朝易之外道得衣還所止園中示諸外道中有智慧者語言汝為他所欺此外道即持衣欲相還跋難陀不允外道譏嫌諸比丘聞白佛呵責結戒所立戒相若比丘種種販賣尼薩耆波逸提釋義種種販賣者以時易時以時易非時以時易七日以時易盡形壽以時易波利迦羅以非時易非時以非時易七日以非時易盡形壽以非時易波利迦羅以非時易時如是互相貿易准知賣者價直一錢數數上下增賣者價直一錢言直三錢重增賣者價直一錢言直五錢買亦如是律攝云言種種者謂作多種販賣或賤處賤時多聚財貨貴時貴處轉賣規求或瞻相時宜預知豐儉乘時射利以求活命故曰種種販賣也犯緣此戒具足三緣方成本罪一有販賣心二決作販賣三賣已得利定罪此中犯者種種販賣得者捨墮不得突吉羅捨懺不還等得罪同前僧祇云若肆上物先有定價比丘持直來買置地時應語物主言此直知是若不語默持去越毗尼罪若彼物應直五十而索百錢比丘言我以五十知是不名為下若比丘知前人欲買物不得抄買買者越毗尼罪若作是念此後穀當貴糴時越毗尼罪糶時捨墮若恐某時穀貴我今糴此穀依是得誦經坐禪行道到時穀大貴食長與二師或作功德餘者糶得利無罪買鉢買藥等亦爾五分云若欲貿易應使淨人語言為我以此物易彼物又應心念寧使彼得我利我不得彼利若自貿易應於五衆中若與白衣貿易突吉羅根本云若為利買不為利賣買時惡作賣時無犯若不為利買為利故賣買時無犯賣時捨墮若向餘方買物而去元不求利到處賣時雖得利無犯律攝云若賣買時不依實說或以僞濫斗稱欺誑於他得妄語罪獲物之時犯盜凡持財物欲賣買時先須定意無求利心隨處獲利悉皆無犯尼陀那云苾芻不應為他俗人斷價不應酬價高下若無俗人代酬應可二三得自酬價過此得惡作罪薩婆多云此販賣罪於一切波逸提中最是重者寧作屠兒不為販賣何以故屠兒正害畜生販賣一切欺害不問道俗賢愚持戒毀戒無住不欺又懷惡心設若居穀心恆悕望天下荒餓霜雹災疫若居鹽貯積餘物意常企望四遠反亂王路隔塞夫販賣者有如是惡此販賣物設與衆僧作食衆僧不應食若作四方僧房不得住中若作塔作像不應向禮又云但佛作意禮凡持戒比丘不應受用此物若此比丘死此物僧應羯磨分問曰不死時不受用此物何故死便羯磨答曰此販賣業罪過深重若生在時衆僧食用此物者雖復犯戒有僧福田中故與受用以受用故續作不斷故僧福田中不聽受用今世無福後得重罪以此因緣不敢更作比丘既死更無販賣因故是故聽羯磨取物若販賣物作食噉口口波逸提若作衣著著波逸提若作蓐敷臥上轉轉波逸提比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者與五衆出家人貿易自審定不相高下如市易法不與餘人貿易若使淨人貿易若悔者應還若以酥易油以油易酥無犯不犯者最初未制戒等會詳薩婆多論云為佛法增上故為止鬬諍故為成聖種故為長信敬故而結此戒第二十一畜長鉢戒總釋此是共不共戒僧十尼一大乘為利益衆生故不同制律攝云情貪積聚既不自用復不施人增長煩惱妨修正業為遮斷故制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人六群畜鉢好者持不好者置畜鉢遂多諸居士譏嫌沙門釋子求欲無厭諸比丘聞白佛呵責結戒不得畜長鉢時阿難得蘇摩國貴價鉢欲奉大迦葉以大迦葉常畜此鉢而迦葉不在白佛佛問大迦葉何時當還答言却後十日當還佛言自今以去當如是說戒所立戒相若比丘畜長鉢不淨施得齊十日過者尼薩耆波逸提釋義鉢者六種鐵鉢蘇摩國鉢烏伽羅國鉢優伽賒國鉢黑鉢赤鉢大要有二種鐵鉢瓦鉢大鉢三斗小者斗半斗字恐傳寫之訛或是升字也薩婆多云鉢者三種上中下上鉢受秦升三升下鉢受秦升一升半上下兩間是名中鉢若大於大鉢小於小鉢不名為鉢也根本云上鉢受二升米飯中鉢升半下鉢一升此是鉢量如是應持應淨施謂是應量鉢應受持若有餘應作淨施也畜長鉢者律攝云謂除受持之外所有鉢也鉢者此異外道縫葉為器或手內立拱而食難養難供非福田相世尊許一非多非少異俗人外道故俗人多有畜積外道無器而食比丘惟持一鉢善順中道資身修業也不淨施下違制成犯犯緣此戒具足三緣方成本罪一有心貪畜二鉢是應量三過十日不淨施定罪此中犯者一日得鉢乃至十日得鉢畜至十一日明相出十日中所得鉢盡犯捨墮餘如長衣戒中不異若犯捨墮鉢不捨更貿餘鉢一捨墮二突吉羅捨懺不還等得罪同前律攝云若減量若過量若擬與餘人出家近圓濟其所用雖不分別無犯第三分云鍵𨩲小鉢次鉢聽不作淨施畜薩婆多云若畜長白鐵鉢瓦鉢未燒一切不應量鉢突吉羅比丘尼捨墮小三衆突吉羅是謂為犯開緣不犯者十日內淨施若遣與人若劫奪想失想若破想漂想若奪鉢失鉢燒鉢漂鉢取用若他與用若受寄鉢比丘死遠行休道被賊惡獸害等不遣與人無犯不犯者最初未制戒等第二十二畜鉢求好戒總釋此是共戒尼犯亦同大乘同制少欲知足息世譏嫌律攝云情貪好故增長煩惱招物譏嫌制斯學處緣起處佛在給孤獨園起緣人跋難陀鉢破入城從諸居士乞鉢彼破一鉢求衆多鉢畜諸居士於異時一處集各自言我今獲福無量各各相問皆共譏嫌少欲比丘白佛訶責結戒所立戒相若比丘畜鉢減五綴不漏更求新鉢為好故尼薩耆波逸提彼比丘應往僧中捨展轉取最下鉢與之令持乃至破應持此是時釋義五綴者相去兩指間一綴綴者聯絡也僧祗云減五綴者若有一綴量減五是名減若有二綴乃至有五綴量減五是名減滿五綴者已有五綴量亦滿是名滿若四三二一綴若無綴量滿五是名滿五綴量者破處綴間相去足一大指不漏者謂綴量不滿又無滲漏也十誦云聽用若鐵若銅綴根本云若鉢難得隨意修理若易得處可棄之更覓好者更求新鉢為好故僧祇云或嫌此鉢太大太小太重太輕若粗若澀故云為好故犯緣此戒具足四緣方成本罪一有心貪好二從非親居士乞二減量不漏四乞求已得定罪此中犯者鉢破減五綴不漏更求新鉢捨墮若滿五綴不漏更求新鉢突吉羅此應捨是中捨者於此住處僧中捨摩得勒伽云若乞得衆多鉢應捨一意所貪樂者餘者應與同意捨已懺罪竟僧應還彼比丘鉢此鉢若貴價好者應留置取最下不如者與之捨懺不還等得罪同前僧祇云是比丘應請持律知羯磨者乃至五法成就僧當羯磨作行鉢人何等五不愛不恚不怖不癡知與不與是名五應羯磨差作如是說大德僧聽某甲比丘五法成就若僧時到僧差某甲比丘作行鉢人如是白羯磨准此羯磨者應僧中唱大德僧聽所受持鉢一切持來若不唱者犯越毗尼罪諸比丘應各各賫己所受持鉢來若有比丘捨先所受持鉢更受下鉢持來者得越毗尼罪律云彼比丘鉢應作白已問僧作如是白大德僧聽若僧時到僧忍聽以此鉢次第問上座白如是作此白已當持與上座若上座欲取此鉢與之應取上座鉢與次座若與彼比丘彼比丘應取不應護衆僧故不取亦不應以此因緣受持最下鉢若受突吉羅若第二上座取此鉢應取第二上座鉢與第三上座若與彼比丘彼比丘應受不應護衆僧故不受亦不應以此因緣受持最下鉢若受突吉羅如是展轉乃至下座若持此比丘鉢還此比丘若持最下座鉢與與時應作白二羯磨如是與大德僧聽若僧時到僧忍聽僧今以此最下座鉢與某甲比丘受持乃至破白如是羯磨准此彼比丘守護此鉢不得著瓦石落處不得著倚杖下及著倚刀下不得著懸物下不得著道中不得著石上不得著果樹下不得著不平地不得一手捉兩鉢除指隔中央不得一手捉鉢兩開戶除用心不得著戶閾內戶扉下不得持鉢著繩牀木牀下除暫著不得著繩牀木牀間不得著繩牀木牀角頭除暫著不得立蕩鉢乃至足令鉢破彼比丘不應故壞鉢不應故令失若故壞不應作非鉢用根本云此鉢不應守持不應分別亦不與人應畜二鉢袋好者安長鉢不好者安舊鉢乞食時應將二鉢得乾飯著長鉢中得濕飯著舊鉢中應於舊鉢中食先洗長鉢晒曝安置皆以長鉢為先安龕及火熏時皆於好處先安長鉢若道行時舊鉢遣人持長鉢自持無人為擎者長鉢安左畔舊鉢安右畔自持而去此之治罰乃至盡形或破來應好護持違者得越法罪僧祇云是持綴鉢比丘若故打破波逸提或二師知識等憫其洗鉢妨道藏去不見已更乞無罪比丘尼捨墮小三衆突吉羅是謂為犯開緣不犯者五綴漏若減五綴漏更求新鉢若從親里索若從出家人索若為他索他為己索若不求而得若施僧得鉢時當次得若自有價買畜一切無犯不犯者最初未制戒等第二十三使非親織衣戒總釋此是共戒尼結亦同大乘為衆生故不同學律攝云惱物生譏制斯學處緣起處佛在給孤獨園跋難陀欲縫僧伽黎入城至諸居士家乞得線遂多作是念言我可更於異處索線縫僧伽黎比丘云衣服難得應辦三衣我今寧可織作三衣即持線往與織師彼手自作繀自看織諸居士譏嫌少欲比丘聞白佛訶責結戒所立戒相若比丘自乞縷線使非親里織師織作三衣者尼薩耆波逸提釋義自乞者在在處處自乞縷線者有十種如上十種衣線也織師非親里與線者非親里犯織師非親里與線者是親里或織師是親里與線者非親里或與線者非親里織師是親里皆犯犯緣此戒具足三緣方成本罪一貪心自乞二非親與織三織衣已成定罪此中犯者自乞縷線使織師織作衣捨墮若看織若自手作繀盡突吉羅捨懺不還等得罪同前僧祇云自行乞縷越毗尼心悔得者越毗尼罪織成者捨墮根本云若酬價織者無犯薩婆多云若自織令五衆織皆突吉羅若為無衣故從非親里乞縷欲作衣亦突吉羅若少衣正應乞衣不應乞縷作衣若須縷縫作帶無犯比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者織師是親里與線者是親里若自織作鉢囊針氈若作禪帶十誦云佛聽腰病比丘畜禪帶如為舍利弗故聽畜三種帶繩織帶辮帶毳繩帶五分云廣作不聽過人八指狹作不應減五指應一種色作不應雜色作母論云除錦上色白皮革餘一切得用作帶坐時當用自束作帶法廣一磔手長短隨身量亦名倚帶若作腰帶若作帽若作襪若作鑷熟巾褁革屣巾無犯不犯者最初未制戒等會詳薩婆多論云為除惡法故為止誹謗故為成聖種故而結此戒第二十四求織好衣戒總釋此是共戒尼犯亦同大乘同制即是惡求多求律攝云招世譏嫌制斯學處此戒二緣合結緣起處佛在給孤獨園有一居士是跋難陀知識出好線令織師織作如是衣與起緣人織師語跋難陀跋難陀言若與我織者廣大極好堅緻中我受持織師言線少跋難陀至居士家更乞線居士婦出線箱恣意擇取好者持與織師織師言價少報言但與我織我當更與價居士從他處還見非我先所敕織衣問知其故便生譏嫌少欲比丘聞白佛訶責結戒戒文如後唯無自恣請之句有居士自恣請與比丘衣疑不敢答居士欲與比丘貴價衣比丘少欲知足欲得不如者疑不敢索佛言先受自恣請者不犯當如是說戒所立戒相若比丘居士居士婦使織師為比丘織作衣彼比丘先不受自恣請便往織師所語言此衣為我作與我極好織令廣大堅緻我當少多與汝價是比丘與價乃至一食直若得衣尼薩耆波逸提釋義居士居士婦使織作衣下明施主背後發心彼比丘先不受自恣請下明愛好多欲此衣為我作與我極好織令廣大堅緻極好織者謂更要精細光澤廣大織時極打令其堅緻牢密也極好織是總標廣大堅緻是別釋我當少多與汝價少多者一錢乃至十百價者謂金銀錢寶等乃至一食直是極少之義乃至最少與其一餐之工價也犯緣此戒具足四緣方成本罪一多欲貪好二非親居士三勸織許直四得衣入手定罪此中犯者先不受自恣請便往求衣若得者捨墮不得者突吉羅捨懺不還等得罪同前僧祇云若但往勸不許價得衣者越毗尼罪比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者先受自恣請往求知足減少求若從親里索從出家人索或為他或他為己或不索而得無犯不犯者最初未制戒等第二十五瞋奪衣戒總釋此是共戒尼亦同犯大乘同制三賢以捨心為首十地以檀度為先律攝云因取衣事不忍廢闕譏嫌煩惱制斯學處緣起處佛在給孤獨園起緣人難陀弟子善能勸化難陀是跋難陀之兄有一共住弟子名曰達摩常懷慚恥追悔為心於諸學處愛樂尊重善能勸化跋難陀欲共人間遊行即先與彼衣餘比丘語言跋難陀癡人不知誦戒不知說戒不知布薩羯磨後餘時跋難陀欲共人間行即不隨行乃索先所與衣不復相還跋難陀瞋恚強奪取衣比丘高聲言莫爾比房比丘聞來集問知其故白佛呵責結戒所立戒相若比丘先與比丘衣後瞋恚若自奪若教人奪取還我衣來不與汝若比丘還衣彼取衣尼薩耆波逸提釋義瞋恚者僧祇云瞋恚不喜九惱事也若自奪若教人奪取還我衣來不與汝奪者強取也或手奪或口奪或手口俱奪謂本有希望而與衣情既不遂而返奪之也若比丘還衣彼取衣衣入手成犯犯緣此戒具足三緣方成本罪一情非折伏二瞋恚奪取三衣離彼身藏舉已定罪此中犯者若自奪若教人奪取藏舉者捨墮若奪而不藏舉者突吉羅若著樹上墻下籬上橛上龍牙杙上衣架上繩牀上木牀上若小褥大褥上若機上若地上敷取離處捨墮不離處者突吉羅捨懺不還等得罪同前僧祇云合與別奪別與合奪合與合奪別與別奪別奪者得衆多波夜提合奪者得一波夜提若比丘與比丘衣時作是言汝住我邊者與若不住者奪若汝適我意者與不適意者還奪為受經者與不受經者還奪一切無犯若比丘賣衣未取直若錢直未畢還取衣者無罪若奪俗人衣者越毗尼心悔薩婆多論云奪四衆衣突吉羅此戒體比丘先根本與他衣後為惱故暫還奪取捨墮衣捨還他波逸提懺若先根本與他衣後根本奪應計錢成罪根本與者謂實意與彼衣非有希望而與也根本奪者表非折伏暫奪也計錢成罪者謂直滿五錢成盜罪也若先暫與他衣後便奪取無罪若和尚為折伏弟子令離惡法故暫奪衣無罪比丘尼捨墮餘三衆突吉羅是謂為犯開緣不犯者不瞋恚言我悔不與汝衣還我衣來若彼人亦知其人心悔即還衣若餘人語言此比丘欲悔還他衣若借他衣著無道理還奪取若恐失衣若恐壞若彼破戒破見破威儀若被舉若滅擯若應滅擯若命難梵行難如是一切奪取不藏舉不犯不犯者最初未制戒等第二十六過七日藥戒總釋此是共戒尼亦同犯大乘比丘同學此是制罪律攝云因病藥事貪煩惱故制斯學處緣起處佛在給孤獨園諸比丘秋月風病動形體枯燥又生惡瘡世尊聽諸比丘時與非時服五種藥當食當藥不令粗現起緣人畢陵伽婆蹉此云餘習大論云是長老常患眼痛乞食常度恆水到恆水邊彈指言小婢駐流水即兩斷得過乞食是恆水神往白佛佛弟子常罵我言小婢駐流佛言畢陵伽婆蹉懺謝恆神彼即合掌語恆神言小婢懺謝是時大衆笑之云何懺謝而復罵耶佛語恆神汝見彼合掌懺謝不懺謝無慢而有此言當知非惡此人五百世來常生婆羅門家常自憍貴輕賤餘人本來所習口言而已非心憍也具德經云能苦中善行悲行畢陵伽婆蹉是在羅閲城多有所識亦多徒衆大得酥油生酥蜜石蜜諸弟子積聚藏舉處處流漫房舍臭穢諸長者譏嫌比丘白佛訶責結戒所立戒相若比丘有病殘藥酥油生酥蜜石蜜齊七日得服若過七日服者尼薩耆波逸提釋義病者僧祇云病有二種一主病謂饑渴二種二客病有四百四病風大不調有一百一病火大不調有一百一病水大不調有一百一病雜症有一百一病若風病當油脂治熱病當用酥治水病當用蜜治雜病當盡和諸藥治殘藥酥油生酥蜜石蜜齊七口得服薩婆多云此戒體若病比丘須七日藥自無淨人求倩難得應從淨人手受從比丘口受已隨著一處七日內自取而食若病重口不受亦得服設看病比丘手受口受亦成受法如是受已聽共殘宿隨意而食故云殘藥也酥者是牛羊等酥油者是苣蕂蔓菁及木蜜等并五種脂如法澄漉而服蜜謂蜂蜜石蜜謂蔗糖中攝齊七日者謂聖制數極齊七日過此成犯犯緣此戒具足三緣方成本罪一有貪味心二是七日藥三過限不捨定罪此中犯者一日得藥畜乃至七日得藥畜八日明相出七日所得藥盡捨墮如長衣戒中不異唯七日之別爾若犯捨墮藥不捨更貿餘藥一捨墮一突吉羅捨已懺罪竟僧當還彼比丘藥彼比丘所有過七日酥油塗戶響蜜石蜜與守園人若至七日所捨與比丘食之若減七日應還此比丘作白二羯磨此比丘取已當用塗腳若然燈捨懺不還等得罪同前此五長戒中一事根本律云應在午前當淨洗手受取其藥一同梵行邊作如是說具壽存念我苾芻某甲有此病緣清淨醫藥我今守持於七日內自服及同梵行者如是三說若服一日即告同梵行者云此病藥已服一日餘有六日在我當服之乃至七日皆應告知過七日已尚有餘藥應捨與淨人或與求寂律攝云為好容儀或著滋味或求肥盛或詐僞心服食諸藥皆惡作罪五分云應捨與僧僧捨與白衣沙彌若用然燈塗足捨藥比丘不得用一切皆不得噉比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者本律如前捨懺中明十誦律云若重病不犯食四含消藥時應作是念我以治病故含不為美味四含消藥酥油蜜石蜜善見云若酥未滿七日布施沙彌至第八日若有急須用得就沙彌乞食無罪不犯者最初未制戒等第二十七雨浴衣求用非時戒總釋此是不共戒尼犯不同大乘同制律攝云貪求利養多乞雨衣違出離行故制斯學處緣起處佛在給孤獨園毗舍佉母請佛及僧明日食時至遣婢至僧伽藍中白時到時天大雨諸比丘盡雨中浴婢至遙見比丘盡裸形浴謂是裸形外道還白主母母復遣往白佛及比丘至受供訖母請八願願與客比丘食遠行比丘食病比丘食病比丘藥瞻病人食供給比丘粥供給比丘雨浴衣與比丘尼浴衣佛皆聽許起緣人六羣比丘聞佛聽畜雨浴衣即一切時春夏冬常求雨浴衣不捨雨衣便持餘用現有雨衣猶裸形浴諸比丘白佛訶責結戒所立戒相若比丘春殘一月在當求雨浴衣半月應用浴若比丘過一月前求雨浴衣過半月前用浴尼薩耆波逸提釋義春殘一月者謂西域國風以四月為一際以十二月十六日至四月十五日為春四月四月十六日至八月十五日為夏四月八月十六日至十二月十五日為冬四月而無秋分今云春殘一月在謂春際已過三月餘有一月在故云殘也一月者即三月後十五日四月前十五日是名春殘一月也常求雨浴衣當求者世尊聽許乞索勸化求時不應從小家處處來一尺二尺應從殷有大家中求若一人邊得衆多人邊得是名求雨浴衣者薩婆多云畜雨浴衣凡有二事天雨時以障四邊於中澡浴若天熱時亦以自障於中浴二以夏月多雨常褁三衣擔持行來半月應用浴謂三月十六日以去應求應作四月一日以去當用澡浴擔持行來若比丘過一月前求雨浴衣過半月前用浴過一月前求者即三月十六日以前求索過半月前用浴者謂四月一日以前浴是名前求前用也犯緣此戒具足二緣方成本罪一心貪過求二慢教過用定罪此中犯者三月十六前求四月一日前用捨墮捨懺不還等得罪同前僧祇云此衣不得受當三衣不得淨施不得著入河中池中浴不得小小雨時著浴當大雨時被浴若雨卒止垢液者著入餘水中浴無罪餘時亦不得裸身浴當著舍勒即短裙也或餘故衣不得著雨衣種種作事若食欲以油塗身若病時若多人行處得繫兩頭作障至八月十五日當捨一比丘僧中唱大德僧聽今日僧捨雨浴衣如是三說若至十六日捨者越毗尼罪捨己得用作三衣亦得說淨亦得入餘水中浴種種著作無罪薩婆多云比丘尼得畜浴衣不得畜雨浴衣以尼弱劣擔持為難是故不聽若閏三月不應前三月求作雨衣應後三月十六日求作雨衣比丘不畜雨浴衣無罪善見云雨時四月合春末十五日一百三十五日用若有雨浴衣不用裸形洗浴突吉羅比丘尼等四衆突吉羅是謂為犯開緣不犯者三月十六日求四月一日用若捨雨衣已乃更作餘用若著浴衣浴若無浴衣若作浴衣若浣染若舉處染該是深字誤寫染字無犯不犯者最初未制戒等第二十八過時受畜急施衣戒總釋此是共戒尼結同罪大乘為衆生故不同制亦須如法淨施律攝云於安居中共分衣利因生違惱為求衣事過限廢闕譏嫌煩惱制斯學處緣起處佛在毗蘭若受婆羅門請夏安居竟五分云毗蘭若邑有婆羅門名毗蘭若波斯匿王以此邑封之十誦云字阿耆達是婆羅門王薩婆多云阿耆達者以供養火故佛告阿難汝往語婆羅門我受汝夏安居訖今欲人間遊行阿難往告時婆羅門自責九十日中竟不供養佛僧佛九十日唯食馬麥佛言過去世時有比婆葉如來在槃頭摩跋㨔中與大比丘衆俱有槃頭王與諸臣民請佛供養及比丘僧爾時城中有婆羅門名山王教五百童子王設會先請佛默然許之王還具饌已畢即執香爐啓曰惟願屈尊來受我供佛敕大衆往詣王宮食畢各還時為病比丘請食而歸過婆羅門所時婆羅門見食香美便起妬意此髠頭沙門正應食馬麥不應食甘饌亦教童子言此等師主皆食馬麥時婆羅門者則我身是五百童子者五百阿羅漢是我時言他食馬麥故受諸苦報經歷地獄無數千歲今雖得佛由此殘緣我及衆等於毗蘭若邑食馬麥九十日以償殘報也往世尊所禮佛足已却坐一面善見云却者猶如日轉一面者在一邊智慧之人到宿德所坐避六法何謂六法一者極遠若欲共語言聲不及故二者太近觸忤宿德故三者上風身氣臭故四者高處不恭敬故五者當眼前瞻視難故六者在後宿德共語回轉難故言却坐一面離此六法也世尊為說妙法令心歡喜婆羅門設供并施衣佛聽比丘受夏衣起緣人六羣即一切時常乞衣安居未竟亦乞衣亦受衣跋難陀在一處安居竟聞異處安居比丘大得利養即往彼處處分衣分大得衣持來入祇洹精舍諸比丘聞嫌責白佛佛以無數方便訶責時舍衛國波斯匿王境內人民反叛波斯匿王晉言和悅西域記云正名鉢邏斯那唐言勝軍淨法師譯為勝光仁王經云是波斯匿王已於過去十千劫龍光佛法中王為四地菩薩梨師達多富那羅二大臣梨師達多此云仙授又云仙施又云仙與謂從仙人邊求得子故富那羅或云富蘭那此云故舊又翻宿舊是仙授之兄此兄弟二人是波斯匿王大臣於拘薩羅國錢財巨富無與等者而能於佛及四部衆等共受用不計我所雜阿含經彼自說言波斯匿王欲入園觀令我乘於大象載第一宮女一在我前一在我後我坐其中象下坂時前者抱我頸後者攀我背象上坂時後者抱我頸前者攀我矜彼諸婇女為娛樂王故衣繒綵衣著衆妙香瓔珞莊嚴我與同遊常護三事一者御象恐失正道二者自護心恐生染著三者自護持恐其顛墜我於爾時於王婇女無一剎那不正思惟佛讚長者善哉善哉能善護心然富蘭那專修梵行離欲清淨不著香華遠離凡鄙持戒為勝梨師達不專修梵行然其知足達四聖諦智慧為勝後時二俱命終佛記二人一持戒勝一智慧勝二俱同生一趣同一受生同於後世得斯陀含果生兜率天一來世間盡苦邊際王敕使征二大臣作是念我等往征未知得還否欲為僧設食并施衣諸比丘以安居未竟不敢受衣白佛佛言聽諸比丘受急施衣結戒所立戒相若比丘十日未竟夏三月諸比丘得急施衣比丘知是急施衣當受受已乃至衣時應畜若過畜者尼薩耆波逸提釋義十日未竟夏三月者謂自恣猶有十日在即七月初六日未至七月十五日故云十日未竟夏三月也急施衣者受便得不受便失薩婆多云若王施若王夫人施若王子施大官鬪將施以諸貴人善心難得又難可數見若女欲嫁時以至壻家不得自在故今得自在以物施僧若病人施以善心故以物施僧令存亡有益因急事施故名急施衣也衣時者自恣竟不受迦絺那衣一月受迦絺那衣五月自恣十日在若比丘得急施衣比丘知是急施衣應受受已即十日應畜到自恣竟不受迦絺那衣一月受迦絺那衣五月若自恣九日在得急施衣比丘知是急施衣應受受已即九日應畜到自恣竟不受迦絺那衣一月受迦絺那衣五月更增一日如是自恣八日七日六日五日四日三日二日若自恣一日在後更增九日准知若過畜謂過一月五月成犯犯緣此戒具足三緣方成本罪一有貪畜心二非急施衣三過前過後畜定罪此中犯者得急施衣若過前過後捨墮過前者謂七月初五日已前而輒受衣過後者謂一月五月竟不淨施等而仍畜捨懺不還等得罪同前五長中一事也薩婆多云除十日急施衣一切安居衣必待自恣時分若安居中分突吉羅根本云若在夏中或施主欲自手行施取亦無犯若差得藏衣苾芻或施主作是語我行還自手當施雖過時分畜亦無犯比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者得急施衣不過前不過後不犯若奪衣失衣燒衣漂衣過前不犯奪失燒漂想若險難道路不通乃至命難梵行難若彼受寄比丘或死或出行捨戒賊劫惡獸害等過後無犯不犯者最初未制戒等第二十九後月離衣過六夜戒總釋此是不共戒大乘比丘同學律攝云因不善護身離衣事故及慢教煩惱制斯學處緣起處佛在給孤獨園諸比丘夏安居訖後迦提一月滿在阿蘭若處住多有賊難劫奪衣鉢又打撲比丘比丘皆趨祇桓精舍聚住佛問知其故聽留一一衣置舍內起緣人六羣聞佛聽留衣置舍內便留衣置舍內囑親友比丘已出行受囑比丘出衣晒之諸比丘問知其故白佛訶責結戒所立戒相若比丘夏三月竟後迦提一月滿在阿蘭若有疑恐怖處住比丘在如是處住三衣中欲留一一衣置舍內諸比丘有因緣離衣宿乃至六夜若過者尼薩耆波逸提釋義夏三月竟謂前安居者坐夏三月已竟至七月十五日故云夏三月竟後迦提一月滿在阿蘭若按迦提翻功德又翻昴星昴星直此月故謂七月十六日至八月十五日是夏安居最後一月故云後迦提一月也言滿在阿蘭若者謂受後安居者雖同前安居者七月十五日自恣仍須住滿三月為期以終後安居之局故云滿在阿蘭若處也阿蘭若去村五百弓遮摩羅國弓長四肘用中肘量如離衣戒中釋有疑者疑有賊盜恐怖者中有恐怖賊盜留一一衣僧祇云一一衣者僧伽黎多羅僧安陀會不得寄僧伽黎安陀會得寄多羅僧文無僧伽黎不得入聚落乞食安陀會以著身故不得單著僧伽黎舍內者聚也有因緣者五分云若塔事和尚阿闍黎事及以他事六夜者薩婆多云從七月十六日次第六夜聽阿蘭若安居比丘離衣宿所以聽者外國此六夜中間是賊發時是故聽也彼六夜竟第七夜明相未出前若捨衣若手捉衣若至擲石所及處言擲石所及處者非蘭若界限乃是寄衣聚落之勢分也過者犯犯緣此戒具足三緣方成本罪一有慢教心二是離三衣三違制過限定罪此中犯者離衣六夜竟第七夜明相未出前不捨衣不手捉衣不至擲石所及處住第七夜明相出犯捨墮除三衣已離餘衣突吉羅捨懺不還等得罪同前五分云若一宿二宿乃至五宿事訖不還突吉羅律攝云至第七夜明相未出得惡作罪此謂故不作捨衣乃至擲石所及處心懷慢教是故先得惡作明相出時便得捨墮善見云寄衣已六夜一往看見衣已還阿蘭若處如是相續六夜往看不犯餘四衆突吉羅是謂為犯開緣不犯者已經六夜第七夜明相未出到衣所若捨衣若手捉衣若至擲石所及處不犯若奪失燒漂不捨衣不手捉衣不至擲石所及處不犯若船濟不通道路險難一切難緣等不捨衣不手捉衣不至擲石所及處一切不犯不犯者最初未制戒等第三十回僧物入己戒總釋此是共戒尼犯亦同大乘同制即取十方僧物入己律攝云由貪煩惱制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人有一居士欲飯佛及僧布施好衣跋難陀聞即往語言居士衆僧有大善利威力福德施僧者多汝今食施衆僧衣可施我居士聽之次日請僧至舍居士見長老比丘威儀具足發大聲悔比丘問知其故白佛呵責結戒斷僧物入己捨墮諸比丘不知是僧物非僧物為許僧不許僧後乃知是僧物已許僧或有作捨墮懺悔者或慚愧者佛言不知無犯當如是說戒所立戒相若比丘知是僧物自求入己者尼薩耆波逸提釋義僧物者為僧故作未許僧已許僧已捨與僧僧祇云僧有八種比丘僧比丘尼僧客僧去僧舊住僧安居僧和合僧不和合僧物者衣鉢坐具針筒下至飲水器僧祗云有八種物時分夜分七日終身隨物重物不淨物淨不淨物自求入己者自往來索以僧物攝歸入己犯緣此戒具足四緣方成本罪一心貪取二是僧物三作僧物想四物已入手定罪此中犯者知是僧物自求入己捨墮若物許僧轉與塔若許塔轉與僧許四方僧轉與現前僧許現前僧轉與四方僧許比丘僧轉與比丘尼僧許比丘尼僧轉與比丘僧許異處與異處皆突吉羅已許作許想捨墮已許疑突吉羅未許作許想突吉羅未許疑突吉羅捨懺不還等得罪同前僧祇云若有人欲布施問比丘言應施何處答言隨汝心所敬處復問何處果報多答言施僧果報多復問何等清淨持戒有功德僧答言僧無犯戒不清淨者若持物來施比丘應語言施僧得大果報若言我已曾施僧今正欲施尊者受之無罪若知物向僧回令向己捨墮是物僧不應還僧應受用若回與餘人波逸提知物向此畜生回與餘畜生越毗尼心悔五分云若施主自回欲與僧物與己不犯薩婆多云若物向僧與前人說法令物自入己捨墮物則還僧向三二一比丘突吉羅以物施此塔回向彼塔物即入彼塔不須還以福同故比丘作突吉羅懺以物施此僧祇回向餘僧祇物入餘僧祇不須還以僧祇同故比丘作突吉羅懺以自恣臘與此衆僧回向餘僧自恣物應還與此衆僧以自恣物所屬異故比丘作突吉羅懺若不還計錢成罪面門臘亦如是知物向一人回向餘人應還取此物已歸此物主作突吉羅懺若不還彼物計錢成罪律攝云見他將物施無恥衆自觀己身福勝施彼為益施主便回入己者無犯比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者若不知若已許作不許想若許少勸令與多若許少人勸與多人欲許惡勸與好者或戲笑語若誤語獨處語或眠中語欲說此乃錯說彼一切無犯不犯者最初未制戒等會詳法苑云貪有二種報一者多欲謂因前世縱恣貪欲心無止息故感今生業習不忘倍復增勝而生貪著也二者無厭謂因前世貪求不已展轉馳逐故感今生業習不忘欲心轉盛用之無度求之無厭也三結問諸大德我已說三十尼薩耆波逸提法今問諸大德是中清淨不三問四勸持諸大德是中清淨默然故是事如是持
