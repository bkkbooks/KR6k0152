body:
  text: 清金陵寶華山律學沙門德基輯將釋此律大科分二初釋題目二入文初釋題分二初釋律題二釋人題初釋律題分二初明四分次釋戒本今初所言四分者此律大部有六十卷分為四分第一分二十一卷其中所明比丘二百五十戒緣起開遮輕重等法第二分十五卷中明比丘尼三百四十八戒法及受戒犍度說戒犍度所言犍度者此云法聚謂以相類之法聚為一處故云法聚也善見名騫陀迦僧祗云䟦渠於諸經中名品名雖差別義無有二也第三分十三卷中明十六犍度法謂安居自恣皮革衣藥迦絺那衣拘睒彌瞻波呵責人覆藏遮破僧滅諍比丘尼法犍度等第四分十一卷其中所明六犍度法房舍雜法五百結集七百結集調部毗尼毗尼增一等法今此戒本即大部中第一分單明比丘二百五十戒法也即取其經冊數目為名故云四分次釋戒本言戒本者就於初分比丘戒中但明戒相兼續七佛略教誡經流通世間俾初學比丘誦習令知廣略教誡識相守持不虧戒體至於半月布薩誦此戒本以為恒規故將二百五十條章別集成本故云四分戒本也然有通別二名先明通次明別謂一大藏制教通名為律梵語毗尼或云毗柰耶此翻善治亦翻調伏謂調鍊三業制伏過非調鍊通於止作制伏唯明止惡或翻為滅滅有三義一滅業非謂不殺盜等故律中有犯毗尼有諍毗尼二滅煩惱律云調伏貪等令盡是故如來制增上戒學三得滅果經云戒淨有智慧便得第一道南山云毗尼翻調伏及滅者是從功用為名非正翻也正翻為律律者法也從教為名斷割輕重開遮持犯非法不定猶如王法科條之制翻彼柰耶之語名之為律戒因緣經云鼻柰耶鼻秦言去奈耶秦言真去若干非而就真故曰真也降伏此心息此心忍不起故曰真也降伏戒也息定也忍智也故知才舉一法三學全收若無戒善定慧不起又此戒法凡有三種一者律儀戒亦名波羅提木叉戒二者定共戒亦名禪戒三者道共戒亦名無漏戒律儀戒者律是遮止儀是形儀能止形上諸惡故稱為戒亦曰威儀威是清嚴可畏儀是軌範可則亦曰調御使心行調善也定是靜攝入定之時自然調善防止諸惡道是能通發真以後自無毀犯如初果耕地蟲離四寸是道共力此二戒法既是心上勝用力能發戒道定與律儀並起故稱為共今毗尼藏正詮律儀亦攝定道由持淨戒禪定智慧自然發生則律儀為因定道為果由禪無漏力性業遮業悉得清淨則木叉為果定道為緣薩婆多論云此波羅提木叉戒若佛在世則有佛不在世則無禪無漏戒一切時有波羅提木叉戒從教而得禪無漏戒不從教得乃至云波羅提木叉戒但佛弟子有禪戒外道俱有夫能維持佛法有七眾在世間三乘道果相續不斷盡以波羅提木叉為根本禪無漏戒不爾是故於三戒中最為殊勝善見云毗尼藏是佛法壽命毗尼藏住佛法亦住已釋通名竟次明別別者謂僧祇五分薩婆多十誦善見根本毗尼母戒因緣經等名之為別今此戒本通則同名為律別則名為四分已論通別竟復明經律立題義該單複而有七種謂單三複三具足一單三者以人立題如阿彌陀經以法為題者如般若涅槃以喻為題者如梵網經複三者人法為題如文殊問般若經等法喻立題者如妙法蓮華經等人喻為題者謂如來師子吼經等具足一者謂人法喻如大方廣佛華嚴經今此戒本則人法為題人名曇無德法名四分律亦可言單法為題謂略去人名但言四分戒本也本題釋竟次釋人題言姚秦者秦乃國號姚是姓也謂主姚興今言姚秦以別餘秦也言佛陀耶舍者此云覺明罽賓國人婆羅門種年十三出家常與師遠行曠野逢虎其師欲走避師曰此虎已飽必不侵人俄而虎去前行果有餘㱴音自其師密異之至年十五日誦經二三萬言常外分衛廢於誦習有羅漢重其聰明恒乞食供之嗣從舅氏習五明諸論一聲明二因明三醫方明四工巧明五內明世間法術靡不綜閑後受沙勒國太子供養待遇隆厚羅什後至從舍受學甚相尊敬什既隨母還龜茲耶舍留止頃之王薨太子即位時符堅遣呂光等西伐龜茲王急求救於沙勒沙勒王自率兵赴之救軍未至而龜茲已敗羅什為光所執舍乃歎曰我與羅什相遇雖久未盡懷抱其忽覊虜相見何期停十餘年乃東適龜茲法化甚盛什在姑臧遣信要師為國人留之欲行而不克復停歲許後語弟子云吾欲尋羅什可密裝夜發勿使人知弟子曰恐明日追至不免復還因命弟子取淨水以藥投中呪數十言與弟子洗足乘夜發行數百里始旦問弟子蚛何所覺耶曰惟問疾風耳國人追不及行達姑臧而什已入長安聞姚興勸為非法言非法者謂姚興愛其才識過人勸令罷道而什弗從乃歎曰羅什如好綿何使入棘林中什聞其至姑臧勸姚興迎之興未納頃之興命什譯出經藏什曰夫弘宣法教宜令文義圓通貧道雖誦其文未善其理唯佛陀耶舍深達幽致今在姑臧願詔徵之一言三詳然後著筆使微言不墜取信千載也興即遣使招迎厚加贈遺悉不受乃笑曰明旨既降便應載馳然檀越待士既厚脫如羅什見處則不敢聞命葢興媵妾逼什故也媵音孕凡女隨嫁曰媵使還覆之興歎其幾慎重信敦喻方至長安興自出候延於逍遙園中於時羅什出十住經一月餘日疑難猶豫尚未操筆耶舍既至共相徵決辭理方定并出長阿含等涼州沙門竺佛念譯為秦言道含筆受至十月解座緣佛陀耶舍先於本國誦四分律不賷梵本而來秦司𨽻校尉姚爽欲請譯出姚主以其無梵本疑其遺謬姚主即以藥方一卷民籍一卷可萬餘言令其誦之一日集僧執文覆之不謬一字眾服其強記由是耶舍口誦梵音佛念筆受成文即以弘始十二年譯出四分律為四十五卷今分作六十卷舍為人端雅赤髭善解毗婆沙時號曰赤髭毗婆沙既為什之師亦稱大毗婆沙後還外國至罽賓得虗空藏菩薩經一卷寄賈客傳與涼州諸僧後不知所按蓮宗七祖初祖中云尊者義熙八年先逝同佛來接遠公在佛之側前揖師曰師志在先何來之晚遠公義熙十二年八月六日逝也竺佛念涼州人弱年出家志業清堅外和內朗有通敏之鑒諷習眾經粗涉外典其蒼雅詁訓尤所明達少好遊方備貫風俗家世西河洞曉方語華梵音義莫不兼釋故義學之譽雖闕洽聞之聲甚著符氏建元中有僧伽䟦澄曇摩難提等入長安趙政請出諸經當時名德莫能傳譯眾咸推念於是澄執梵文念譯為晉言質斷疑義音字方明至建元二十年正月復請曇摩難提出增一阿含於長安城內集義學沙門請念為譯敷析研覈二載乃竟自世高支謙已後莫踰於念安息國沙門安清字世高東漢質帝時至雒譯經共九十五部月支國沙門支謙三國時至吳譯經共八十八部在符姚二代為譯人之宗故關中僧眾咸嘉焉後自出菩薩瓔珞十住斷結及曜胎中陰經等始就治定意多未盡遂爾遘疾卒於長安遠近黑白莫不歎惜釋題已竟二正人文義分三初釋戒序二釋戒相三結勸迴問初釋戒序又分為六初述讚頌二作前方便三秉白羯磨四說戒序五結問六勸持向初述讚頌分六初敬禮三寶三誡聽獲益三憑師傳說四戒足勿毀五戒顯全缺六讚戒勝喻初敬禮三寶稽首禮諸佛及法比丘僧釋作法之始必先敬禮三寶以求加被也稽首者以首至地表身業致敬也口稱聖號表口業致敬也心存觀想即意業致敬也此謂三業虔誠供養云何作法必先敬禮三寶耶此有七意一顯示吉祥故二令生信故三令知恩德故四為儀式故五表有稟承故六請威加護故七隨順先聖故有此勝益必先敬禮三寶問此三何故稱為寶耶答依寶性論有六義故名為寶一希有二明淨三勢力四莊嚴五最上六不變如此六義似世之寶故稱三寶也問三寶次第何故如是答約勝劣次第謂佛法僧能覺彼法所覺隨受有勝劣故若因果次第謂僧佛法由僧先修次佛圓滿後得法果若境行次第謂法僧佛以法為境僧修勝行佛果圓滿若師資次第謂法佛僧法是佛師法先佛次後說僧寶若隨信次第謂僧法佛見僧威儀次信所證然後師佛若示現次第謂佛僧法先本是佛次示為僧法說於後今約勝劣次第佛法僧名為三寶佛者梵語具云佛陀此云覺覺具三義謂自覺覺他覺行圓滿故華嚴云奇哉大導師自覺能覺他是也自覺者謂覺知過去未來現在三世一切諸法常與無常等悟性真空了惑虗妄功成妙智道證圓覺故名自覺二覺他者謂運無緣慈度有情界謂以平等智無心攀緣一切眾生而於一切眾生自然獲益故輔行云運此慈悲心徧覆法界故能任運救苦自然與樂是無緣慈也喻如龍王興雲霔雨平等普潤一切隨類各得生長也皆令離生死苦得涅槃樂故名覺他三覺行圓滿者謂三惑淨盡眾德悉備位證妙覺行滿果圓故名覺行圓滿三惑者見思塵沙無明之惑也是名佛也法者乃如來稱性隨機所說權實之法也若以義解有其二義一任持自體義二軌生物解義任持自體者謂本有自體真實不變非同依他從緣假立無有自性以從無始來任持不失故論云如實不空以有自體具足無量性功德故軌生物解者軌謂軌則物謂眾生解即智解謂諸眾生內有熏習之力於此法上而生智解物則生解故云軌生物解也比丘者淨名疏云或言有翻或言無翻言有翻者翻云除饉眾生薄福在因無法自資得報多所饉乏出家精持淨戒是良福田能生物善除因果之饉乏也言無翻者名含三義智論云一破惡二怖魔三乞士破惡者如初得戒時即名比丘以三羯磨發善律儀破惡律儀故云破惡若通就行解戒能防非定除心亂慧悟想虗能破見思之惡故名破惡二怖魔者既能破惡魔羅念言此人非但出我界域或可傳燈化我眷屬空我宮殿故生驚怖通而言之三魔亦怖三魔者一煩惱魔謂三界中一切妄惑也修行之人為此妄惑惱亂心神不能成就菩提是名煩惱魔五蘊魔亦攝其中二者天魔此魔即欲界第六天也若人勤修勝善欲超三界生死而此天魔為作障礙發起種種擾亂之事令修行人不得成就出世善根是名天魔三者死魔謂四大分散天喪殞沒也修行之人為此夭喪不能續延慧命是名死魔三乞士者乞是乞求之名士乃清雅之稱出家之人內修清雅之德必須遠離四邪一下口食謂種植田園和合湯藥以求衣食而自活命是名下口食也二仰口食謂仰觀星宿日月風雨雷電霹𮦷術數之學以求衣食而自活命是名仰口食也三方口食謂曲媚豪勢通使四方巧言多求以自活命是名方口食也四維口食維即四維也謂學種種呪術卜算吉凶以求衣食而自活命是名維口食也清淨自居福利眾生破憍慢心謙下自卑告求資身以成清雅之德故名乞士因中具此三義故於果上獲得三號一殺賊從破惡以得名二無生從怖魔而受稱三應供因乞士以成德故名比丘含多義不翻仍存梵語也言僧者半梵語具云僧伽此翻和合眾乃四比丘已上之稱和合有二義一理和謂同證擇滅擇即揀擇滅即寂滅謂諸有情用智揀擇四聖諦遠離見思繫縛即證寂滅真空之理是名擇滅如牛所駕車名曰牛車也二事和有六義一戒和同修二見和同解三身和同住四利和同均五口和無諍六意和同悅什師云欲令眾和要由六法一以慈心起身業二以慈心起口業三以慈心起意業四若得食時減中飯供養上座一人下座一人五持戒清淨六漏盡智慧群居必以六為體方顯僧寶之尊重為世福田也又十誦律中有五種僧一者無慚愧僧破戒諸比丘是二者羺羊僧凡夫鈍根無智慧如羺羊聚在一處不知布薩不知布薩羯磨不知法會法會者根本尼陀那云會坐如說戒自恣時有客比丘來應更說不應更說應次第聽不應次第聽先比丘應出界而出界客比丘亦爾或時客來少雖不應更說設客有重德若剛強能作鬪諍事應更說而不說如是比丘名不知法會也三別眾僧一界內別作羯磨四清淨僧凡夫持戒人及凡夫勝者凡夫勝者謂外凡內凡七賢人也一五停心二別相念三總相念名為外凡一煖位二頂位三忍位四世第一位名為內凡也五真實僧學無學人此中所禮正禮後二種由真實僧能令勝義正法久住謂三乘道果由清淨僧能令世俗正法久住故謂法律教誡彼前三種能作非法羯磨能令正法破壞故非所禮復有住持三寶一體三寶言住持三寶者謂範金合土紙素丹青名為佛寶黃卷赤牘大藏經文名為法寶剃髮染衣名為僧寶此三住世不絕故名住持三寶也言同體三寶者以實相慧覺了諸法非空非有亦空亦有雙忘雙照三智圓覺名為佛寶所覺法性之理三諦具足名為法寶如此覺慧與理事和合名為僧寶所言諸佛者即通指十方現坐道場一切大師以覺體遍故雖在他方能於此土而作良祐亦即通指三世次第出興一切世尊以覺性常故雖示過未能於現在而垂感應故云諸佛然諸字而通法僧亦云諸法諸僧也敬禮三寶竟二誡聽獲益今演毗尼法令正法久住釋今演者揀非已說未說謂正當說戒之時也演者謂宣布流通之義毗尼法者揀非經論二教令正法久住者正法謂出世無漏聖道也正法住世教理行果悉皆具足由秉羯磨半月布薩則戒身成就定慧發生沙門道果由是可期若廢布薩戒身穢染正法亡滅矣五分云毗尼是佛壽命毗尼住世則正法久住善見曰云何得知正法久住如說戒法不滅者是故云令正法久住也戒如海無涯釋說戒犍度云海水有八奇特法所以阿修羅娠樂住一者一切眾流皆往投之華嚴五十二卷云四天下有二萬五千河流入海中二者潮不失限華嚴云謂有二萬五千河及八十億諸龍王宮中水入大海湧出有時故潮不失限也三者五大河投而失本名雜阿含經云五大河合為一流一恒河二耶蒲那河三薩羅由四伊羅䟦提五摩醯是名五河也四者河及天雨盡歸而無增減華嚴五十一卷經云海有四大寶能消眾水海水無有增減一名日藏二名離潤三名火燄光四名盡無餘若無四寶從四天下乃至有頂悉皆漂沒五者同一鹹味六者不受死屍七者多出珍寶八者大形所居我法中亦有八奇特使諸弟子於中娛樂一者我諸弟子漸次學戒皆歸我法於中學善法二者我諸弟子住於戒中至死不犯三者四姓捨家皆稱沙門四姓者一剎帝利是王種二婆羅門是淨行如此方儒流華嚴鈔云婆羅門是白色類者謂婆羅門法七歲已上出家學四圍陀十五歲已去受婆羅門法遊方學問三十恐絕後嗣娶妻五十入山修道世俗之中可謂白淨三吠奢亦云毗舍即商賈姓也四首陀即農田為業者開元錄云秦晉以前出家者多隨師姓後彌天釋道安法師謂剃髮染衣紹釋迦種即無殊姓尊莫尊於釋迦乃以釋命姓後增一阿含至果云四河入海無復河名四姓出家皆捨本姓同稱釋子既符經律遂為永式皆稱沙門釋子也四者於我法中以信堅固捨家學道入無餘涅槃界而涅槃界無增無減五者同一解脫味六者犯戒惡法雖眾中坐常離眾僧遠眾僧亦離彼遠七者多出珍寶所謂四念處乃至八聖道八者受大形所謂四向四果又薩婆多論云比丘二百五十戒一切眾生上各得七戒以義分之有二十一戒如一眾生上起身口七惡凡起此惡以貪瞋癡三因緣故起以貪發於身口七支便成七惡嗔癡亦爾故成三七二十一惡反惡心得戒於一眾生上得三七二十一戒色於一切眾生上亦爾如有五種子中破一麥一粟斷一果摘一葉如是一麥一粟一果一葉上各得三七二十一惡如不掘地戒上至須彌山頂下至金剛地際橫徧法界處於一微塵上各得三七二十一戒故情非情境上反惡得戒得爾所戒色又於一一戒中而有十利功德及三千威儀八萬細行一一清淨戒色各徧法界又復於此念念中任運成就戒法善色悉徧法界不可窮盡故根本律云毗奈耶大海涯際淼難知差別相無窮豈我能詳悉大師律教海甚深難可測故曰戒如海無涯也如寶求無厭釋寶謂如意珠王此寶於念念中能雨滿閻浮提一切樂具而寶體終無損減戒亦如是於念念中出生一切念處正勤如意根力覺道等法乃至三乘聖果而戒體終無變易如彼珠王施求無厭也欲護聖法財眾集聽我說釋言聖法財者廣即念處正勤乃至覺道等三十七品助道法略則信戒聞捨慧慚愧七財者謂出世間之法財也如世財能養色身壽命法財能養法身慧命一切眾生行此七法資成道果故謂之財一信財信即信心謂信能決定受持正法以為成道之資故名信財二戒財戒即戒律謂戒為解脫之本能防身口意之非以為成道之資故名戒財三聞財聞為三慧之首聞佛聲教則開發妙解如說而行以為成道之資故名聞財四捨財捨即捨施謂若能運平等心無僧無愛身命資財隨求給施以為成道之資故名捨財五定慧財定慧即止觀也定則攝心不散止諸妄念慧則照了諸法破諸邪見以為成道之資故名定慧財六七慚愧財慚者慚天愧者愧人謂既能慚愧則不造作諸惡業以為成道之資故名慙愧財也然此法財非戒無能守護戒有防非止惡之功亦如強兵猛將能伏怨敵亦如堅城深塹能禦魔軍不令得便侵凌故也欲除四棄法及滅僧殘法障三十捨墮眾集聽我說釋所言棄者此中隨犯一戒即為三十七品助道法所棄為沙門四道果所棄為戒定慧解脫解脫知見一切善法所棄又如人犯死罪更無生路比丘犯波羅夷永無懺悔之路故名為棄此但消文正釋如後僧殘捨墮解在後文然戒有五篇今止言三者以重攝輕文略義足欲除四棄不犯永絕僧殘不干障隔捨墮無違眾集聽我說戒聽說之功實能離斯過也三憑師傳說毗婆尸式棄毗舍拘留孫拘那含牟尼迦葉釋迦文釋毗婆尸佛亦名維衛佛華言有四以其如月圓智滿則云徧見魄盡惑亡則云淨觀既圓且淨則云勝觀勝見梵語尸棄亦名式棄華言火又云持髻謂無分別智最為尊上處於心頂也無分別智者即根本智謂眾智之根本故梵語毗舍浮亦云隨葉亦云毗舍羅華言徧一切自在謂煩惱斷盡於一切處無不自在煩惱即無明也已上三佛乃莊嚴劫中最後三佛也劫是梵語具云劫波華言分別時節莊嚴劫者謂此劫中多所莊嚴梵語拘留孫亦云拘樓秦華言所應斷謂斷一切煩惱永盡無餘於賢劫中第九減劫人壽減至六萬歲時出世成佛為千佛首梵語拘那含牟尼華言金寂謂金則明現寂則無礙也大智度論又名迦那迦牟尼華言金仙人謂身金色故也人壽減至四萬歲時出世成佛迦葉梵語具云迦攝波華言飲光謂身光顯赫能飲一切光明故也人壽減至二萬歲時成等正覺梵語釋迦文此云能儒儒者和柔也亦云釋迦牟尼摭華云此翻能仁寂默寂默故不住生死能仁故不住涅槃悲智雙運立此嘉稱發軫云本起經翻釋迦為能仁本行經譯牟尼為寂默能仁是姓牟尼是字姓從慈悲利物字取智慧冥理以利物故不住涅槃以冥理故不住生死又寂者現相無相默者示說無說此謂即真之應也此理依釋又云我佛上代從劫初時立王至淨飯王共計八萬四千二百五十五王昔懿師摩王姓甘蔗氏次夫人有四子並皆聰慧大夫人有一子頑薄醜陋大夫人恐其四子奪其國祚以情惑王令驅四子出國王依言驅擯時四子奉命其母同生姊妹咸願同去一切人民多樂隨從至雪山北舍夷林中其地平廣遂築城居焉人慕德風歸者如雲成大國遂立小弟為王名尼樓數年之後王問四子所在傍臣具答王大歎曰我子釋迦因此命氏又云直林既於林立國即以林為姓此以釋迦翻為直林寂默是字本行經云謂諸釋種立性憍慢多言及見太子悉皆默然王云宜字牟尼稱讚淨土經名釋迦寂靜也此四如來在賢劫初次第出現於世言賢劫者此劫中多有賢人也所以處處說此七佛名者一謂在百小劫內淨居天人曾所見故二謂本師修相好業從毗婆尸佛為始故諸世尊大德為我說是事我今欲善說諸賢咸共聽釋世尊者謂十號具足九界同仰為天中天居聖中聖因圓果滿世出世間無與等者故名世尊言大德者謂等濟眾生具大慈德折攝教化具大威德故云大德也為我說是事者此謂憑師傳說顯非臆說也是事者即四事十三事乃至七滅諍事我今欲善說善說者謂如法如律如佛所教言詞明了文句不顛倒錯脫不干非法別眾眾具不缺名善說也諸賢咸共聽賢乃尊稱之詞從初近圓比丘乃至百臘老比丘皆應共聽始從戒序終至七佛略教誡經一一攝耳諦聽故云諸賢咸共聽四戒足勿毀譬如人毀足不堪有所涉毀戒亦如是不得生天人欲得生天上若生人中者常當護戒足勿令有毀損釋初一頌上二句設喻下二句以法合明障善道誡次一頌上二句示生善趣下二句法喻雙舉譬者比類也即以近事比類令深法得曉了故譬如人之有足意欲往而即至既毀於足豈有無足欲行無舟希渡而可得乎毀戒亦爾不得生天人天者謂欲界六天色界無色界色界十八梵天無色界四天共前六欲二十八天也人者謂四洲人趣既毀淨戒聖果難期人天絕分欲得生天及人中者常當護戒如足勿令毀損方可得生言持戒生天人中者略有二義一謂戒足不可毀毀則人天尚且無分何況涅槃二者對機而說語涅槃則怖語人天則樂如佛度難陀而難陀惟戀妻子於修梵行心無樂欲佛知彼意同遊天宮難陀見處處天子天女嬉戲快樂復見一處唯有天女而無天子難陀問天女曰何故此處無天子耶答言佛有弟號曰難陀出家修梵行當生此處受諸快樂以待彼生也難陀心生樂欲勤修梵行後從佛遊泥犁中始知天樂未就惡果已成心生恐怖佛為說法而證道果今說生天人然非聖意實為涅槃所謂先以欲鉤牽後令入佛智律攝云險途有二一是人天二是惡道雖復生天受諸勝樂報盡還墮惡趣是則人天非所當欲又復戒喻為足者無遠不屆若欲橫超淨域上品上生若欲高登三界永絕輪迴若欲承事諸佛聽聞妙法若欲性制虗融照用自在莫不以戒為基本也若約持戒具足釋者若持戒具足身心安樂後不憂悔故涅槃經十一卷云愛見羅剎全乞浮囊如犯棄乞半如犯殘三分之一如犯偷蘭手許如犯墮塵許如犯吉羅囊全能渡海戒全出生死海縱使定慧不生亦決不失人天之身也如御入險道失轄折軸憂毀戒亦如是死時懷恐懼釋此頌約生死為險道也轄是軸頭之鐵軸是車輪中轉軸運載全憑轄軸正入險道之中失轄折軸不堪運載至所至處毀戒亦爾戒有任運之功從生死險道運至涅槃令得安隱既毀淨戒道果絕分死時惟懷恐懼故將生死喻如險道戒法等於轄軸毀戒則死時惡趣相現猶如險道之中失轄折軸恐怖慞惶前後無救經云關閉一切諸惡趣門開示人天涅槃正路實由堅持淨戒之功也五顯戒全缺如人自照鏡好醜生欣慼說戒亦如是全毀生憂喜釋謂如人以鏡自照其面相貌嚴好則生欣喜醜陋則生憂慼故律云以戒自觀察如鏡照面像說戒亦爾當自返觀是染是淨戒若全淨則內懷欣喜外不愧人戒身染汙則內生憂慼外耻於僧也如兩陣共戰勇怯有進退說戒亦如是淨穢生安畏釋如兩陣交戰勇者前進怯者退敗持戒之士與煩惱魔軍共戰若守持之志勇猛則降伏魔軍故律云如有勇猛將善習鬪戰法降伏於彼敵沒死不顧命佛子亦如是善學於禁戒五陰散壞時終不畏命盡從佛戒所生爾乃是真生若持戒之心怯弱不能降伏煩惱魔軍反被煩惱魔軍所勝若聞說戒時戒身有穢則心生怖畏淨則心生安樂故云淨穢生安畏也六讚戒勝喻世間王為最眾流海為最眾星月為最眾聖佛為最一切眾律中戒經為上最釋前一頌舉喻歎德次半頌以法合喻凡受此比丘戒者名為大沙門梵語摩訶此云大天台四教儀云大含三義一者大天人中尊故二者多富有福慧故三者勝超諸外道故所以佛言於天人魔梵沙門婆羅門眾中釋子沙門最為第一而云一切眾律者謂世間國禁外道邪宗亦各有律薩婆多論云外道亦制四重一不婬師婦二不盜金三不殺婆羅門四不飲白酒不如佛法一切不婬一切不盜一切不殺一切酒不飲一切不妄語故云邪宗也又八戒五戒十戒亦不如比丘戒為最故又禪戒無漏戒亦不如波羅提木叉戒最為殊勝薩婆多論云夫能維持佛法有七眾住世間三乘道果不絕盡以波羅提木叉而為根本禪無漏戒不爾是故於三戒中最為殊勝故律云眾山須彌最眾流海為最眾經億百千戒經第一最非但眾律之中以戒經為上最即三藏十二部亦以戒經為最根本律云佛說三藏教毗柰耶為首佛遊於世間隨處說經法律教不如是故知難值遇諸佛證菩提獨覺身心靜及與阿羅漢咸由律藏成三世諸聖賢遠離有為縛皆以律為本能至安隱處合上四喻一眾律中最為其尊二最為深大三最為照明四經律中王若不堅持淨戒縱使多智禪定現前皆成魔道故云戒經為上最也如來立禁戒半月半月說釋如來者謂迷時背覺合塵是如去雖名為去而體性不動故受如稱即本覺也悟時背塵合覺名如來以如體上有淨用起反染歸淨名之為來即始覺義真如體來去隨緣故取本覺名如始覺名來始本不二名究竟覺究竟者即如與來合無始本異名曰如來復有法報化三身立禁戒者立謂創立也此顯戒法如來親口所說不通餘聖不同經論容五人說承佛印可大智度論云五人說者一佛說謂如來金口所宣二弟子說即聲聞緣覺菩薩諸大弟子承佛加被隨機演教化度眾生三仙人說即佛會中諸大仙人從佛入道助宣正法四諸天說即梵釋諸天處處經中助宣法義五化人說謂佛所化現或諸大菩薩所作化人隨機說法度有緣眾是為五人說也律則不爾唯佛金口自說如禮樂征伐自天子出臣下聽命若容他說萬姓不遵國家敗亡矣佛律亦爾或容他說羣生不奉法不久住故是以禁戒唯佛自立半月半月說者此謂楷定說戒之恒規也此借月表顯謂從十六日至三十日名黑半月初一日至十五日名白半月以此黑白二月用表善惡二業又表智斷二德故立半月布薩也梵語布薩大論翻善宿南山云淨住淨身口意如戒而住根本云褒洒陀即布薩也褒洒是長養義陀是清淨洗濯義意欲令其半月半月憶所作罪對清淨比丘披陳懺悔長養善法清淨戒身是褒洒陀義根本雜事云我令汝等每於半月半月說波羅提木叉當知此戒則汝大師是汝依處若我住世無有異也總述偈讚竟以上十二偈乃佛陀耶舍從廣撮略冠之於首戒本流通故也二作前方便分六一集僧二問和三簡眾是非四說欲五傳請教誡六問事端緒所言前方便者若欲作辦僧事秉宣聖教之時必先問集和僧委僧量宜作何等法事否則七非難越無一克辦故云前方便一集僧僧集不釋十誦律云有四種僧一者四人僧二者五人僧三者十人僧四者二十人僧乃至百千皆名僧也若但二三人則不名僧如上四種僧中若少一人非法非毗尼羯磨不成凡秉羯磨同界比丘並須盡集否則便成別眾法不成就故今羯磨說戒之先先問僧集知事者即維那是應稱量答云已集二問和和合不釋僧既集已必須一味一相猶如水乳不來者囑授現前應呵者不呵名為和合方可秉法少有違諍法則不成是以問云和合不答云和合三簡眾是非未受具戒者出不釋謂僧事集僧非僧不集未近圓者當驅令出防彼盜聽之愆詐稱比丘永成受具之難或露僧罪招世譏嫌故五分律云遣沙彌著不見不聞處今未秉白說戒之前先問遣出知事人應稱量而答云已出若無答無四說欲清淨不來諸比丘說欲及清淨釋謂聖開與欲本為三寶及看病等事覊身不至僧中故聽與欲事鈔云凡作法事必須身心俱集方成和合設有緣不開心集則機教不同將何拔濟故聽傳彼心口應僧前事方能彼此俱辦緣此故開與欲然欲有二種一時欲二非時欲云何為時欲謂黑白半月布薩及安居竟自恣楷定規模有定時故言非時欲者謂不定其時隨機施法如受戒懺悔治擯等不定時故又律中有三事不聽與欲一者結界欲令大眾知其界畔故二者滅諍用多人語故三者若草覆地滅犯諍不聽與欲要俱現前故餘一切法事並聽與欲先明與欲次明說欲言與欲者有五種若言與汝欲若言我說欲若言為我說欲若現身相若廣說欲成與欲若不現身相不口說者不成應更與餘者欲又云欲與清淨一時俱說不得單說若欲廣說者應具修威儀至可傳欲者所如是言具修威儀向取欲人或問訊或觸禮若取欲者或同歲或下座但對立若取欲者是上座應胡跪合掌白云大德一心念我比丘某甲如法僧事與欲清淨一說便止欲者樂欲也謂僧中如法作辦僧事我有樂欲之心赴集因事身故傳心口應僧前事不違和合故云與欲名心集也清淨者謂前布薩以來我戒身清淨無染穢也故云與欲清淨言說欲者取欲比丘至僧中已上座問云不來諸比丘說欲及清淨答云是也應起座如常威儀向上座一觸禮胡跪合掌作如是說言大德僧聽某甲比丘我受彼欲清淨彼如法僧事與欲清淨一說一拜起立還復本位四明說欲竟五傳請教誡誰遣比丘尼來請教誡釋謂尼稟礙質恒拘障累故闕遊方諮受法訓兼且女性憍恣亡滅正法大聖慈鑒故制此儀令尼請僧教誡傳宣八不可違法一一遵行還令正法無減所以半月半月必從大僧求請教誡僧今布薩故有此問若有請教誡者應答云有彼受尼囑授比丘從本位起如常威儀至上座前作禮胡跪合掌云大德僧聽某處比丘尼僧和合僧差比丘尼某甲半月半月頂禮比丘僧足求請教授尼人三說一拜而起律制具足十法方許教誡尼應至第一上座前問云大德慈濟能教授比丘尼不若能者答言能若未能者答言不能如是從二十夏已上應一一徧問有堪者白二羯磨差若無能者還上座所一拜長跪合掌云我某甲比丘徧問僧中無堪教授比丘尼者上座即應說略教誡法告彼囑授比丘云大德此眾無堪教誡師明日尼來求可否時應告彼言昨夜為尼僧中徧請無有堪能教誡師雖然上座有勅勅諸尼眾精勤行道謹慎莫放逸受囑比丘答言爾一拜歸位明日尼來如是告知若無者答言此處無尼來請教誡或有禮僧足者答言但有禮僧足者令尼次第而進作禮三拜長跪合掌上座撫尺云諸比丘尼今乃黑白半月布薩之期頒宣五篇聖章聽聞二部律典非僧不與之地受具方得序敷諸比丘尼爾當依戒為師依戒而住精勤行道謹慎莫放逸答云頂戴受持一拜而起欲聽戒者次第坐聽十誦毗尼序云比丘及尼得互聽戒不得互為說戒何以得互聽不得互說謂比丘戒中兼制尼學處尼戒中亦兼制比丘學處故容互聽不得互說者謂比丘是大僧尼乃亞僧各不相足數故也六問事端緒僧今和合何所作為釋謂僧今和集來者現前不來者囑授人非別眾所為何等法事然所為之緣不出三種攝盡一切一為情事如受戒說戒懺悔治擯等二非情事如結解諸界等三為情非情事如處分離衣畜長等此所為事具單離合委僧量宜故對僧問其知事者答云說戒羯磨若作餘法據事而答非錯彼此三秉白羯磨釋梵語羯磨天台禪門翻為作法南山翻為辦事謂施造遂法必有成濟之功焉一切羯磨須具四法一人二法三事四界也律中佛言有三羯磨攝一切羯磨謂單白羯磨白二羯磨白四羯磨若輕事則用單白若事中者則宣白二若事重者則秉白四凡秉羯磨時必須具前六種方便於中仍有全缺不同唯說戒時全具六法如結界多人語草覆地等不聽與欲無請教誡唯四法餘一切羯磨五法應具若不知法式差別一槩雷同即成非法非毗尼也今明僧法羯磨說戒言僧法者謂四人已上也大德僧聽今黑月十五白月十五日眾僧說戒若僧時到僧忍聽和合說戒白如是釋大德者謂嚴持淨戒有廣大德行故稱為大德也僧者是半梵語具云僧伽此翻和合眾理事二和如前言聽者誡令勿生餘覺餘思耑念聽我秉宣法事於所聽法正念憶持故曰大德僧聽黑白二月如前釋眾僧說戒者顯非餘事若僧時到者謂作法之時來到僧中也僧忍聽和合說戒者即告當時在座大眾忍可聽僧說戒勿得有餘諍論應當和合說戒也白如是者乃指法告知謂指其說戒之法事告白大眾令知故云白如是四說戒序諸大德我今欲說波羅提木叉戒汝等諦聽善思念之若自知有犯者即應自懺悔不犯者默然默然者知諸大德清淨若有他問者亦如是答如是比丘在眾中乃至三問憶念有罪不懺悔者得故妄語罪故妄語者佛說障道法若彼比丘憶念有罪欲求清淨者應懺悔懺悔得安樂釋言波羅提木叉者是最勝義以何義故名為最勝諸善之本以戒為根眾善得生故言最勝義又波羅提木叉此翻別解脫律攝云別解脫者由依別解脫經如說修行於下下等九品思惑漸次斷除永不退故於諸煩惱而得解脫名別解脫又見修煩惱其類各多於別別品而能捨離名別解脫由惑漂沒三界有情為此先應勤求別解脫經又云隨順解脫此據果立名隨順有為無為二種果故遺教經云戒是正順解脫之本又於二百五十戒中一一守持不犯於一一戒中別別得其解脫是名別解脫汝等諦聽者諦乃審實之義謂正說戒時勿得餘覺餘思始從戒序終至迴向應當諦審詳聽否則不一心攝耳聽法之咎焉逃三慧之中即聞慧攝也善思念之者謂如說思惟憶念所持戒品淨耶穢耶聽已而思令自知淨染即攝思慧也若自知有犯者即應自懺悔既聞已思已自知有犯應當出眾說露所犯之事依律懺悔清淨乃堪聞戒律云犯者不得說戒犯者不得聞戒故須懺悔言懺者名披陳眾失發露過咎不敢覆藏悔名斷相續心厭悔捨離能作之心所作之罪合而棄之故言懺悔又懺名修來悔名改往棄往修來合名懺悔乃修慧所攝也不犯者默然謂本無犯或有犯已悔除亦名不犯默然故知諸大德清淨者謂不須說言我清淨而亂於眾默然即表清淨義若有他問者亦如是答此有二義一謂餘時中他問實答今亦如是答二他問者他處問也即指下諸篇中一一結問謂此處如實答至他處亦如是答有犯則說露無犯則默然如是比丘在眾中者即指有犯之人也乃至三問者謂令語訶圓滿故離廣略故略則無智者卒難了明故無慚愧者未發悔心故廣則延時令眾疲勞故唯以三問處中故三問也憶念有罪不懺悔者得故妄語罪口雖不說由現身相表成語業也若三問三憶得三妄語罪故妄語者佛說是障道法所言障道法者此有二義一於現世障諸善品二於未來障生善趣即障初禪二禪三禪四禪空無相無願障須陀洹果乃至阿羅漢果及涅槃道故云障道法若彼比丘憶念有罪欲求清淨者應懺悔謂憶念所犯之事欲求戒身清淨者應懺悔以毗尼法水能滌除戒身汙穢然清淨有二義一是淨因二是淨果因謂淨戒果謂涅槃欲求涅槃之淨果必須堅持淨戒為因尠有瑕玼覆於胸襟即應斷除其根勿生覆蔭日茂敷榮致使穢花而成穢果也故云欲求清淨應懺悔懺悔得安樂者安樂亦有二義一現世安樂二後世安樂現世安樂者謂戒身既淨心無憂悔不為同梵行者所舉擯恒住善法之中後世安樂者謂得初禪二禪三禪四禪空無相無願初果乃至無生及涅槃樂道故名得安樂也五結問諸大德我已說戒經序今問諸大德是中清淨不三問釋諸大德乃通稱之詞戒經序者律攝云經是略詮義欲明略陳戒相詮其綱目不廣釋故戒經乃二百五十戒之總名序者由緒也謂說戒時以此為先能令餘說得生起故今問諸大德是中清淨否者此總結問二百五十學處中清淨也六勸持諸大德是中清淨默然故是事如是持釋謂亦勸持二百五十事既是三問默然是二百五十事清淨當如是持欲釋戒相先明戒體釋言無作戒體者戒體屬性戒法屬修從性起修修不離性全修在性謂正受戒時即用第六意識然此意識具有五種一定中獨頭意識緣於定境二散位獨頭意識緣受所引色及徧計所起色諸法處色如緣空花水月鏡像彩畵所生並過去未來諸塵並法處所攝三夢中獨頭意識緣夢境四明了意識依五根門與前五識同緣五塵五亂意識是散亂意識於五根中狂亂而起如患熱病青為黃見非是眼識所緣故受戒時唯用第二散位獨頭意識及徧行五心所作意觸受想思五種色法中第三受所引色受即領受引即引取如受諸戒品戒是色法所受之戒即是受所引色又如意識領納色聲香味觸等法乃至憶念過去曾所見境界皆名受所引色即無表色雖無表對想實見故名無表色也謂受戒時所起防惡發善等色即第二散位獨頭所緣之色法表即名作無表即名無作以有漏五蘊色身互跪合掌名為身表三說乞戒名為語表十師現前亦名身表秉白羯磨亦名語表憑師作法獲得無漏五蘊之戒身皆因上品心思業力用感發戒體白四羯磨畢時便得得斯體已任運止惡任運行善即於法界情非情邊得無量戒色而此無作須假色法以之為表見也所以者何葢戒雖非形礙之物而止持作犯亦必屬色法也成論無作品云無作屬非色非心聚古今律師咸同此說實由心感得借色表成一作之後不俟再作故名無作也已釋戒體竟次明篇聚差別初明五篇次明七聚今初釋一波羅夷比丘有四尼有八法配死梵語波羅夷華言極惡謂修行之人若犯此戒道果無分死墮地獄律云如人斷頭不可還活若犯此戒不復成比丘此罪極重故以死配之二僧殘比丘十三法尼有十七配流毗尼母云僧殘者如人為他所斫殘有咽喉故名為殘葢言人犯此罪僧作法除庶幾戒德可復猶如斫殘咽喉未斷早救尚可以由此罪稍輕於前故以流配之三波逸提配徒僧有一百二十分為二位前三十名捨墮次九十名單墮尼有二百零八法亦分二位和捨墮有三十次單墮有一百七十八法以由此罪輕於僧殘故以徒配之四提舍尼配杖比丘制四尼制成八梵語提舍尼華言向彼悔從對境以立名僧祗云此罪應露也此罪輕於前前故以杖罪配之五突吉羅配笞僧有百法尼亦等制善見云梵語突吉羅華言惡作律云式叉迦羅尼華言應當學謂餘戒罪重易持此戒難持易犯常須念學故不列罪名但言應當學此又輕於前故以笞罪配之是名五篇次明七聚釋四波羅夷名第一聚十三僧殘名第二聚一百二十波逸提名第三聚四波羅提提舍尼為第四聚偷蘭遮為第五聚眾學法在身為惡作名第六聚在口為惡說即第七聚也二不定法因犯事不定不獨立篇聚之名而攝入篇聚也若與女人可作婬處坐行不淨行即入波羅夷中若與女人麤惡語歎身索欲屬僧殘法中若與女人說法過五六語屏處坐露地坐入波逸提中即通三篇三聚也七滅諍法何篇所攝耶准義推之三五當收若諍事如法滅已後更發起波逸提應歸第三也若以七法而滅四諍應與不與不應與而與未善滅諍施法不相當違越毗尼犯突吉羅第五當攝也明篇聚竟附釋偷蘭遮善見律云偷蘭名大遮言障善道後墮惡道體是鄙穢從不善體以立名者由能成初二兩篇之罪故也鄙穢是醜從婬盜二戒出不善是惡從殺妄二戒出明了論云偷蘭為粗遮即為過粗有二種一是重罪方便二能斷善根過者不依佛所立戒而行故言過也其中復有獨頭方便依事知之
