body:
  text: 清金陵寶華山律學沙門德基輯五九十波逸提法分四初總標二別列戒相三結問四勸持初總標諸大德是九十波逸提法半月半月說戒經中來若論篇聚俱屬第三前三十事因財生犯此九十事無因而犯貪染雖輕慢教無減唯無財事為異縱有過量作牀衣等但違教而作不類三十唯截壞而後懺悔也又斯波逸提法性該六聚凡屬故作若輕若重於方便位皆有不敬聖教波逸提罪此篇於諸篇中獨得墮稱所謂墮落燒煮覆障不如意處也如佛告目連曰若無慚愧輕慢佛語犯波逸提如夜摩天壽二千歲墮泥犁中於人間數二十四億四十千歲覩此聖說自當誡勗身心慎思言行則無非而不除無戒而不淨者也二別列戒相有九十條初知而妄語乃至九十與佛等量作衣戒第一知而妄語戒總釋此是共戒尼犯亦同大乘同制救衆生故得開此是性罪律攝云由詐妄事覆藏煩惱制斯學處緣起處佛在釋翅搜迦維羅衛國尼拘類園中起緣人有釋迦子字象力按舍夷國有聚落名象力因聚落以稱名也後於舍衛國命終雜阿含經佛記云此人犯三種非法所謂慳貪愚癡瞋恚當墮地獄中偈云若生不善心成就貪瞋癡此身自作惡還復害於己如芭蕉生實自害於其身若無貪瞋癡是名為智慧不害於己身是名勝丈夫是以應除斷貪瞋癡大患善能談論常於外道梵志論義若不如時便違反前語若僧中問是語時即復違反前語於衆中知而妄語諸梵志譏嫌諸比丘聞白佛呵責結戒所立戒相若比丘知而妄語者波逸提釋義知而妄語者律攝云是決定心表非錯誤妄語者謂對了知人違心異說作詭誑言名為妄語也不見言見不聞言聞不觸言觸不知言知見言不見聞言不聞觸言不觸知言不知見者眼識聞者耳識觸者鼻舌身三識知者意識薩婆多論云見聞覺知以三根性利力用偏多各分為名三根性鈍力用處少總名為覺又復三根能取遠境界各分為名三根近取境界故合為名也犯緣此戒具足三緣方成本罪一有妄語心二正說時知是妄語三說聽了了定罪此中犯者若不見不聞不觸不知言我見聞觸知等知而妄語波逸提本不作妄語意妄語時知是妄語妄語已不憶是妄語故妄語波逸提於大衆中知而妄語說而了了波逸提說而不了了突吉羅說戒時乃至三問憶念罪而不說者突吉羅薩婆多論云若遣使妄語若書信妄語盡突吉羅根本律云違心而說皆得墮罪若不違心而說者無犯比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者不見言不見不聞言不聞不觸言不觸不知言不知見言見聞言聞觸言觸知言知意有見想便說者無犯不犯者最初未制戒等會詳律攝云佛之弟子言常說實不應為盟自雪表他不信故設被誣謗亦不應作誓雪者洗也謂自洗清白也十誦律云不得自呪呪他不得以物自誓誓他不得自投竄令他投竄呪與投竄一種故即今投狀訴神等事法死珠林云妄語二報一多誹謗謂因前世不務誠實妄語無信故感今生多被他人誹謗也二為他人所誑謂因前世專以妄語欺誑於人故感今生為人之所誑惑也第二毀呰語戒總釋此是共戒尼犯亦同大乘同制若但毀呰梵網云若佛子無事謗他良人善人罪結輕垢若合自讚即自讚毀他戒攝結重若增上煩惱犯者失菩薩戒此是性罪律攝云由出家人事不忍煩惱制斯學處緣起處佛在給孤獨園起緣人六羣比丘斷諍事以種類罵比丘比丘慚愧忘失前後不得語諸比丘聞白佛訶責結戒所立戒相若比丘種類毀呰語者波逸提釋義種類毀呰者卑姓家生行業亦卑伎術工巧亦卑或言汝是犯過人或言汝多結使人或言汝禿盲人或言汝禿瞎人卑者旃陀羅種此云屠者應法師云此云嚴幟一云主殺人乃是西方屠殺之輩以惡業自嚴行時搖鈴持竹以為幖幟故以為名若不爾者王必罪之或翻可畏法顯傳云名為惡人與人別居若入城市則擊竹以自異人則識而避之不相搪揬除糞種竹師種車師種卑姓者拘湊此是天竺𢍉小之姓也拘尸婆蘇晝此是天竺𢍉小種族迦葉此翻龜氏其先代學道有靈龜負圖而出因以為姓是天竺諸婆羅門之一姓而非首族也阿提梨夜或云阿支羅北天竺多此姓也婆羅墮此云捷疾或云利根本行集翻重幢此是婆羅門十八姓中之一姓元居𢍉末也若非卑姓習卑伎術即是卑姓卑業者販賣猪羊殺牛放鷹獵人網魚作賊捕賊者守城知刑獄卑伎術工巧者鍛作木作瓦陶作皮韋作剃髮作簱箕作犯者波羅夷僧殘波逸提波羅提提舍尼偷蘭遮突吉羅惡說結者從瞋恚乃至五百結盲瞎者盲瞎禿躄跛聾啞及餘衆患所加若比丘罵餘比丘言汝生卑賤家汝業卑伎術卑汝犯汝結使汝瞎禿如是等若面罵若喻罵若自比罵面罵者言汝是旃陀羅家生除糞家生乃至衆患所加喻罵者汝似旃陀羅汝似除糞種等自比罵者我非旃陀羅種我非除糞種我非衆患所加毀呰者欲令前人羞愧此有二一由瞋忿二因傲慢犯緣此戒具足三緣方成本罪一有毀呰心二作毀呰語三說而了了定罪此中犯者若比丘種類毀呰語了了者波逸提不了了者突吉羅若以善法而面罵若喻罵若自比罵善法者阿蘭若乞食補衲衣乃至坐禪人面罵者汝是阿蘭若乃至坐禪人喻罵者汝似阿蘭若乃至坐禪人自比罵者我非阿蘭若乃至坐禪人若說了了不了了皆突吉羅五分云毀呰餘四衆突吉羅比丘尼毀呰比丘比丘尼波逸提毀呰餘三衆突吉羅律攝云毀呰俗人亦得惡作若求寂等於苾芻等而毀呰得惡作罪對中方人作邊地語對邊地人作中方語若他解者得根本罪若不解者得惡作罪薩婆多論云若輕毀狂心亂心病壞心在家無師僧越濟人一切在家人聾人六罪人犯四根本破和合僧出佛身血盡突吉羅若遣使書信突吉羅設有先出家而後癩病者一切僧事得共作若食時莫令坐衆中比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者相利故說為法故說為律故說為教授故說為親厚故說或戲笑說或因語次失口說或獨說夢中說欲說此錯說彼無犯不犯者最初未制戒等會詳法苑珠林云惡罵二報一常聞惡音謂因前世口無禁忌發言粗惡令不忍聞故感今生常聞穢惡之音也二恆有諍訟謂因前世恃力怙勢好諍健訟惡逆無德故感今生常致諍訟而不和也第三兩舌戒總釋此是共戒尼犯亦同大乘同制梵網經云見持戒比丘手捉香爐行菩薩道而鬬遘兩頭謗欺賢人無惡不造等此是性罪律攝云依門徒事由畜衆煩惱制斯學處緣起處佛在給孤獨園起緣人六羣傳彼此屏語遂至衆中未有鬬事而生鬪已有鬪事而不滅諸比丘白佛呵責結戒所立戒相若比丘兩舌語者波逸提釋義兩舌者律攝云為離間事謂離間恩義挑唆鬪諍比丘鬪亂比丘比丘尼式叉摩那沙彌沙彌尼優婆塞優婆夷國王大臣外道異學沙門婆羅門如是互相鬬亂鬬亂者某甲說是言汝是旃陀羅種除糞種乃至衆患所加如前毀呰戒中不異是名兩舌也犯緣此戒具足三緣方成本罪一有心鬬亂二傳彼此屏語三說聽了了定罪此中犯者比丘鬬亂說而了了者波逸提不了了者突吉羅薩婆多云若以八事傳向四衆突吉羅八事者一種二伎三作四犯五病六相七煩惱八罵傳向在家無師僧若遣使書信狂心亂心病壞心聾啞越濟人六罪人一切在家人盡突吉羅除此八事更以餘事者云汝是多眠多食人戲笑人若言汝欺誑人多情詐人如是向比丘說者聞與不聞盡突吉羅若不傳彼此語但二邊說令離散者突吉羅律攝云為離間意他不了時但得惡罪比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者破惡知識破惡伴黨破方便壞僧者破助破僧者破作非法非律羯磨者破若為僧為塔廟若和尚同和尚阿闍黎同阿闍黎若知識親友若數數語者無義無利欲方便作無利義破如是等人無犯不犯者最初未制戒等會詳法苑珠林云兩舌語二報一得蔽惡眷屬謂因前世兩舌使人朋儔分離乖間皆生怨惡故感今生得蔽惡眷屬也二得不和合眷屬謂因前世兩舌離間人之親愛使不和合故感今生得不和合眷屬也第四與婦女同室宿戒總釋此是共戒尼犯亦同大乘同制避世譏嫌及護梵行律攝云由女人事淫染煩惱制斯學處緣起處佛在給孤獨園起緣人尊者阿那律或云阿那律陀此云無滅昔施食福人天受樂於今不滅淨名疏云或云阿泥盧豆或云阿㝹樓䭾梵音楚夏不同耳此云如意或云無貧過去饑世曾以稗飯施辟支佛九十一劫天人之中受如意樂故名如意爾來無所乏斷故名無貧佛之從弟斛飯王子西域記云阿泥𢫫陀舊曰阿那律者訛也根本云昔迦羅村䭾佛制底之處興大供養時有羣賊欲行竊盜入制底中見其燈闍遂便挑舉覩佛尊容情生歡喜即發大願願我來世得遇大師承事無倦得妙天眼人中第一由彼願力今獲天眼最為第一從舍衛國向拘薩羅中路至無比丘住處聞一淫女家常止賓客即往借宿門下結跏趺坐繫念在前時拘薩羅國諸長者亦來投宿門屋下坐相逼近淫女生愍念心令入舍內尊者結跏趺坐繫念在前淫女室中然燭竟夕不絶淫女於初夜來求作夫尊者默然不答不視到後夜復求作夫尊者復不答不視何以故由尊者得無上二俱解脫故成實論云二俱解脫者一慧解脫二心解脫慧解脫者謂以智慧斷無明惑業之縛而得解脫也二心解脫者謂因此心離於貪愛之縛而得解脫今尊者見思斷盡不染情欲故不答不視此淫女即脫衣前捉尊者以神通力湧身在空淫女慚愧著衣合掌懺悔至三尊者即下本處說微妙法淫女得法眼淨受三歸五戒為優婆夷次日尊者受其供養而去還僧伽藍向諸比丘說少欲者嫌責白佛結戒所立戒相若比丘與婦女同室宿者波逸提釋義婦女者人女有知命根不斷室者有四周墻壁障上有覆或前敞而無壁或有雖覆而不遍或雖覆遍而有開處室者實也人物實滿其中是謂曰室犯緣此戒具足四緣方成本罪一知有婦女二堪行淫境三同室無隔四脅臥著地定罪此中犯者若比丘先宿婦女後至或婦女先至比丘後到或二人俱至若欹臥欹音溪不正臥隨脅著地波逸提隨轉側波逸提若天女阿修羅女龍女夜叉女餓鬼女同室宿突吉羅若黃門二根人同室宿突吉羅晝日婦女立比丘臥突吉羅薩婆多云此戒亦身教成罪亦人上成罪一臥一波逸提十臥十波逸提是名身教成罪若一臥有一女人一墮罪有十女人十墮罪是名人上得罪若白衣舍內房舍各異若比丘在一房中女人在餘房比丘不閉房戶突吉羅閉戶無犯若樹下突吉羅五分云若同覆異隔若大會說法若母姊妹近親疾患有知男子自伴不臥皆不犯律攝云若天龍女可見形者及傍生女同處宿咸得惡作小傍生女不堪行淫者不犯若有父母夫主等守護者同宿無犯比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者比丘不知彼室內有婦女而宿若比丘先至而婦女後至比丘不知若屋有覆而四邊無障或盡覆而半障或盡覆而少障或盡障而不覆或盡障而少覆或半覆半障或少覆少障或不覆不障露地無犯此室中若行若坐無犯若頭眩倒地若病臥無犯或為強力所捉若為人所縛若命難淨行難無犯不犯者最初未制戒等第五同未受大戒人三宿戒總釋此是共戒尼犯亦同大乘比丘同學律攝云由眠宿事不寂靜煩惱制斯學處此戒二緣合結緣起處佛在曠野城起緣人六羣與諸長者共在講堂宿六羣中有一人亂心睡眠轉側形露有比丘以衣覆已復更轉側露形第二比丘復以衣覆尋復轉側形起善見云臨欲眠時應先念佛念法念僧念戒念天念無常不先作念心即散亂是故露身形也長者譏笑調弄時眠比丘慚愧無顏餘比丘亦慚愧無顏少欲比丘白佛訶責結戒不得與未受大戒人共宿佛在拘睒毗國諸比丘言佛不聽與未受大戒人共宿當遣羅云去時羅云無屋住往佛廁上宿善見云羅云入佛廁以袈裟敷地而眠所以入佛廁者以淨潔故多人以香花供養佛知往廁所作謦咳羅云亦作謦咳聲世尊知而故問此中有誰答言我是羅云問汝作何等答諸比丘言不得與未受具戒人共宿驅我出佛授指令捉將入自房共宿明日集比丘告言汝等無慈心乃驅出小兒是佛之子不護我意耶自今聽比丘與未受大戒人共二宿若至三宿明相未出時應起避去若至第四宿應自去或使彼去當如是說戒所立戒相若比丘與未受大戒人共宿過二宿至三宿波逸提釋義未受大戒人者除比丘比丘尼餘未受戒人是謂三小衆及白衣也過二宿至三宿者薩婆多論云所以聽二宿者若都不聽或有失命因緣以憐愍故得共二宿以護佛法故不聽三宿犯緣此戒具足四緣方成本罪一未受具人二共房無隔三過限不遣四脅臥著地定罪此中犯者本律得罪同前戒僧祇云若與未受具人同屋宿第三宿時當異房若露地露地風雨雪寒時當還入房坐至地了若老病不堪坐者當以縵障若齊項若齊掖縵下至地不得容猫子過若道行時無帳縵者若未受具人可信者應語言汝眠我當坐比丘欲眠時當喚使覺我眠汝坐若眠汝無福德薩婆多云若共宿過二夜已第三夜更共異人宿波逸提以前人相續故若共宿二夜已移在餘處過一宿已還共宿無過十誦云有病比丘使沙彌供給雖臥無犯是中有不病比丘不應臥根本云如在行路過二宿通夜應眠勿生疑惑目得迦云不合與俗人求寂授學人即學悔人別住人同坐必有難緣無犯比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者同前會詳薩婆多云結戒者為佛法尊重故為息誹謗故第六與未受戒人共誦戒總釋此是共戒尼犯亦同大乘比丘同學律攝云由教授事制斯學處緣起處佛在曠野城起緣人六羣與諸長者共在講堂誦佛經語聲高大如婆羅門誦書聲無異亂諸坐禪者諸比丘聞白佛訶責結戒所立戒相若比丘與未受戒人共誦者波逸提釋義未受戒者除比丘比丘尼餘者是共誦者五分云並誦者俱時誦或授聲未絶彼已誦或彼誦未竟此復授句義非句義句味非句味字義非字義句義者與人同誦不前不後諸惡莫作衆善奉行自淨其義是諸佛教句義者偈中一句是名句又云有字義昧是名為句句足義足是名句義非句義者如一人說諸惡莫作未竟第二人抄前言諸惡莫作非句義者如一人說句未了第二人復抄前而言者句既未了其義有缺名非句義句味者二人共誦不前不後眼無常耳無常乃至意無常句味者謂字雖同其義有別故云句味也非句味者如人未稱眼無常第二人抄前言眼無常非句味准前知字義者二人共誦不前不後阿羅波遮那非字義者一人未稱言阿第二人抄前言阿義味等同前文殊菩薩法一品云阿羅跛者那者是滿一切願義何以故阿字樂欲菩提義羅字染著不捨衆生義跛字第一義諦義者字妙行義那字無自性義樂欲菩提不捨衆生染第一義諦中行行修習諸法無有自性才說此陀羅尼一切如來所說法攝入五字中能令利益衆生般若波羅蜜多成就法者佛所說聲聞所說仙人所說諸天所說犯緣此戒具足四緣方成本罪一未受具人二是三藏文句三不先教誨四同誦了了定罪此中犯者與未受戒人共誦一說二說三說若口授若書授了了波逸提不了了突吉羅天子阿修羅子夜叉子龍子乾闥婆子畜生能變形者同誦說而了了突吉羅若師不教言我說竟汝可說者師突吉羅若授弟子經應教言待我誦斷汝當誦若不受語者不復得教僧祗云雖比丘尼受具戒亦不得教善見云若長行同誦者隨字得罪若佛涅槃後迦葉為上座五百羅漢所集三藏若共未受具戒人同誦此法者得波逸提若法師所撰文字共同誦者不犯戒因緣經云若比丘向未受戒者說一句戒波逸提由六羣向沙彌說毗尼故制蓋以五篇之名唯大僧法沙彌等必不可聞聞則成盜法重難故律攝云若不請輒為人說得越法罪比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者我說竟汝說一人誦竟一人書若二人同業同誦或戲笑語疾疾語獨語夢中語欲說此錯說彼無犯不犯者最初未制戒等第七向未具人說他粗罪戒總釋此是共戒尼犯亦同大乘同制義疏云說過者有兩一陷沒心欲令前人失名利等二治罰心欲令前人被繫縛等此二心皆是業主必犯重戒若獎勸心說及被差說罪皆不犯又犯七逆十重前人失戒失戒後說但犯輕垢律攝云此由未近圓事不忍煩惱制斯學處此戒三緣合結緣起處佛在耆闍崛山有行波利婆沙摩那埵比丘在下行坐起緣人六羣語諸白衣此等人犯如是如是事故衆僧罰使在下行坐有過比丘聞之慚愧餘比丘亦慚愧白佛訶責結戒犯粗惡罪不得向未受大戒人說時諸比丘不知粗惡罪不粗惡罪後乃知是粗惡罪或有作波逸提懺悔者或有畏慎者佛言不知不犯故更加知字後舍利弗為僧所差在王衆中說調達過生畏慎心佛言僧差無犯當如是說戒所立戒相若比丘知他有粗惡罪向未受大戒人說除僧羯磨波逸提釋義粗惡罪者波羅夷僧殘未受大戒人者除比丘比丘尼餘者是除僧羯磨者僧白二羯磨差說無犯僧者同一羯磨同一說戒犯緣此戒具足四緣方成本罪一知是粗罪二僧不差說三所對未具戒人四說而了了定罪此中犯者知他比丘有粗惡罪向未受大戒人說而了了波逸提不了了突吉羅除粗罪已更以餘罪向未受大戒人說突吉羅自犯粗惡罪向未受大戒人說突吉羅除比丘比丘尼以餘人粗惡罪向未受大戒人說突吉羅餘人者出家三小衆及在家二衆也粗惡粗惡想波逸提粗惡疑突吉羅非粗惡粗惡想突吉羅非粗惡疑突吉羅僧祇云比丘尼雖受具戒亦不得向說根本云若於不知俗家作不知想疑向彼說得墮罪若於知俗家作不知想疑向彼說得突吉羅若於不知俗家作先知想疑不犯五分云教向甲說而向乙說教說此罪而說彼罪皆波逸提十誦云若羯磨此比丘作說罪人餘比丘說者突吉羅若令向此人說此處說向餘人餘處說者突吉羅若僧作隨意隨時隨處說罪羯磨者說無犯問五分教向甲說而向乙說等皆波逸提十誦向餘人餘處說突吉羅此二何從答既被僧差則所向雖或失當宜從十誦結經設以惡心欲令陷沒故向乙說宜從五分結重也薩婆多云向未受具戒人說二篇罪名波逸提說罪事突吉羅若說下三篇罪名突吉羅說罪事亦突吉羅不問前比丘有罪無罪向未受具戒人說其粗罪盡波逸提若遣使書信印亦突吉羅若說出佛身血壞僧輪對首偷蘭若說四事邊十三事邊一切偷蘭遮突吉羅比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者若不知若衆僧差粗惡非粗惡想若白衣先已聞無犯不犯者最初未制戒等會詳薩婆多云結戒者為大護佛法故若向白衣說比丘罪惡者則前人於佛法中無信敬心故寧破塔壞像不得向未受具戒人說比丘過惡若說罪過則破法身故可不慎之第八向外人說證法戒總釋此是共戒尼犯亦同大乘同制律攝云因未近圓人似求名利似有貪故制斯學處戒因緣經中乃向沙彌說故制緣起處佛在毗舍離獼猴江邊樓閣精舍起緣人知而故問婆裘園比丘頗實爾耶答言實爾佛言汝等癡人真實猶不得向人說况不實呵責結戒准此義即前大妄語戒因緣並起不實者結重實者從輕結集之時輕重各列所立戒相若比丘向未受戒人說過人法言我見是我知是實者波逸提釋義如初篇第四戒中更無異故不出犯緣此戒具足三緣方成本罪一實得上人法二舉意向未受具人說三說而了了定罪此中犯者若彼真實有此事向未受大戒人說而了了者波逸提不了了突吉羅若手印書若作知相遣人了了波逸提不了了突吉羅若天子阿修羅子夜叉子乾闥婆子龍子餓鬼子畜生能變化者向說得上人法了了不了了盡突吉羅向受大戒人非同意者說突吉羅自稱言我得根力覺道禪定解脫三昧向人說者波逸提五分云受大戒人不問而向說語語突吉羅不犯者泥洹時說律攝云對俗人現神通得惡作罪神者如比丘有大神力能無量變化震動大地以一為多以多為一若近物遠物是神非通通者若墻壁高山徹過無礙如行虗空凌虗如鳥入地如水履水如地身出烟焰如大火聚日月威光以手捫摸乃至梵天身得自在是名通也今云神通二法合說不犯者為顯聖教現希有事或欲令彼所化有情心調伏故雖現無犯言我清淨持戒突吉羅若說天龍鬼神來至我所為名利故波逸提若言旋風土鬼來至我所為名利故突吉羅若實誦三藏隨所誦經隨所解義隨所問答為名利故向人說者突吉羅摩得勒伽云向狂人散亂心人重病人說突吉羅比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若實得上人法自言是業報不言是修得向同意比丘說若說根力覺道解脫三昧不向人說我得或戲笑語獨語夢中語欲說此錯說彼無犯不犯者最初未制戒等會詳薩婆多云結戒者為大人法故若自稱德行覆藏過罪是小人法為平等法故若自種聖德則賢愚各異前人於衆僧無平等心故第九與女人過說法戒總釋此是共戒尼犯亦同大乘同學須護譏嫌必若不起譏嫌隨機廣略為說無犯此是制罪律攝云因說法事淫染過限譏嫌煩惱制斯學處此戒三緣合結緣起處佛在給孤獨園起緣人迦留陀夷詣一大長者家在姑前與兒婦耳語說法姑見問婦說何等事婦言與我說法姑言若說法者當高聲令我等聞云何乃耳中獨說耶乞食比丘聞白佛訶責結戒與女人說法波逸提時有女人請比丘說法比丘畏慎白佛佛言聽比丘與女人說法不得過五六語諸比丘復以畏慎心以無有知男子便休不與女人說法佛言自今已去除有知男子聽過五六語與女人說法如是請授五戒說五戒法受八戒說八戒法說八聖道法十不善法十善法諸女問義以無知男子皆不敢為受為說答義佛言自今已去聽無知男子乃至問義若不解當廣說起緣雖多唯三緣制戒故云三緣合結也所立戒相若比丘與女人說法過五六語除有知男子波逸提釋義女人者人女有知未命斷能解知善惡言義法者律攝云謂是如來所說或聲聞所說五語者色無我受想行識無我受戒揵度云世尊食後告五比丘色無我若色是我者色不增益而我不受苦若色是我者應得自在欲得如是色不用如是色以色無我故而色增長故受諸苦亦復不能得隨意欲得如是色便得不用如是色便不得受想行識亦復如是六語者眼無常耳無常鼻舌身意無常無常經云假使妙高山劫盡皆散壞大海深無底亦復有枯竭大地及日月時至皆歸盡未曾有一法不被無常吞淨名疏云身無常等者決擇記云約生老病死配之緣初起名生本無有故無常也老奪盛色故無強也病為疾苦所侵故無力也死來滅壞故無堅也此約粗事無常亦云一期無常言速朽之法不可住也此約細無常亦云剎那無常若悟此生滅無常得四沙門果故即藏教義也過者律攝云過五至六過六至七是名過也有知男子者解粗惡不粗惡事僧祗云若盲若聾若眠亦名無知男子若減七歲若過七歲不解好惡語義味不名有知男子若七歲若過七歲解好惡義味是名有知男子薩婆多云有知男子者謂解人情語言意趣可作證明者要是相解言語若方類不同者一切不聽男子必是白衣一切出家人亦不得以事同故正使衆僧集會若有女人若多若少無有知男子不得為說得為尼說法一切尼衆以教誡法故無過犯緣此戒具足四緣方成本罪一人女有知解二所說佛法三無知男子四過說了了定罪此中犯者為女人說法過五六語徐有知男子說而了了波逸提不了了突吉羅若天女阿修羅女龍女夜又女乾闥婆女餓鬼女畜生女能變化不能變化者為說過五六語了了不了了盡突吉羅五分云為女人說五六語竟語言法正齊此從坐起去更有因緣復來坐為說不犯若說五六語竟更有女人來為後女人說如是相續為無量女人說皆不犯若自誦經女人來聽若女人問義要使得解過五六語皆不犯薩婆多云女者能受淫欲者若石女若小女未堪任作淫欲者突吉羅若說世間常事突吉羅比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者若五六語有知男子前過說若無知男子前授優婆夷五戒及說五戒法與八關齊說八關齊法說八聖道及十不善十善法及女人問義若不解廣為說若戲笑語疾疾語獨語夢中語欲說此錯說彼無犯不犯者最初未制戒等會詳法華云不應於女人身取能生欲想相而為說法亦不樂見若入他家不與小女處女寡女等共語亦復不近五種不男之人以為親厚不獨入他家若有因緣須獨入時但一心念佛若為女人說法不露齒笑不現胸臆乃至為法猶不親厚况復餘事第十掘地戒總釋此是共戒尼犯亦同大乘同學此是制罪律攝云由作鄙業妨廢正修因壞地事制斯學處此戒二緣合結緣起處佛在曠野城起緣人六群與佛修治講堂自手掘地諸長者譏嫌斷他命根諸比丘聞白佛呵責結戒不聽自手掘地六群復教人掘言掘是置是諸長者復譏嫌佛言當如是說戒所立戒相若比丘自手掘地若教人掘者波逸提釋義自手掘地者已掘地未掘地若已掘地經四月被雨漬還如本十誦云地有二種生地不生地多雨國土八月地生少雨國土四月地生除是名不生地文八月謂驚蟄後立冬前四月謂夏四月律攝云生地者謂未曾掘若曾經掘被天雨濕或餘水霑時經三月是名生地若無雨濕及餘水霑潤時經六月亦名生地異此非生自作教他成犯犯緣此戒具足四緣方成本罪一是生地二生地想三故掘四要傷土定罪此中犯者若用鋤或以钁斫或以椎或以鎌刀刺乃至指爪掐傷地一切波逸提打栓入地波逸提地上然火波逸提有地想波逸提謂地作地想非是砂石想若不教言看是知是突吉羅此是淨語令彼淨人自知所應掘應置比丘法不得直言掘是置是也僧祇云若河邊坎上以腳踏墮踏踏波夜提坎岸邊行土崩無犯若營事比丘多塔物僧物欲藏地中若在露處生地不得自掘當使淨人知若在覆處死地得自掘藏釘栓拔栓亦爾若死土被雨已不得自取使淨人取盡雨所洽際然後自取無罪掘地波夜提半沙越毗尼罪純沙無罪若石薑石糞灰亦如是薩婆多云不生地觸上乾土突吉羅下侵濕地犯墮墻根齊築處不犯以異於地故雖築治若濕相淹發犯墮凡欲取菜草土當遙言某處有好者淨來若到邊指示犯也蟻封雨時犯突吉羅以非根本實地故若中生草觸草犯墮封土犯突吉羅者有少相連分故屋下地犯墮通覆處處地若土起犯突吉羅及下地犯墮十誦云掘不生地一掘一突吉羅掘生地一掘一波逸提若比丘作師匠欲新起佛圖僧坊畫地作模不犯餘比丘畫者犯罪若金銀等礦若雌黃赭土白墡處生石處黑石處沙處鹽處掘者不犯根本律云若營作比丘欲定基時得好星候吉辰無有淨人應自以栓釘地記疆界深四指者無犯比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若語言知是看是若曳材木曳竹若離倒地扶正若反甎石取牛糞取崩岸土若鼠壤土若除經行處土若除屋內土若來往經行若掃地若杖築地若不故掘一切不犯無犯者最初未制戒等第十一壞鬼神村戒總釋此是共戒尼犯亦同大乘同學此是制罪律攝云因種子及鬼神村事以譏嫌無悲煩惱制斯學處緣起處佛在曠野城起緣人告諸比丘有一曠野比丘修治房舍自斫樹耶答言實斫呵責結戒所立戒相若比丘壞鬼神村波逸提釋義鬼神者非人是婆沙云鬼者畏也謂虗怯多畏又云威也能令他畏其威也又希求名之為鬼謂彼餓鬼恆從他人希求飲食以活性命光明疏云神者能也大力者能移山填海小力者能隱顯變化故曰神也村者一切草木是村有五種一根種呵梨陀即黃薑也憂尸羅即香莩也此云茅香根正法念處經云是冷藥草名根本云香附子貿他致吒是雀頭香盧犍即黃連也及根餘所生者是因根生故名根種也枝種者柳舍摩是菩提樹也婆羅醯陀謂貝多羅樹也此二種樹見交廣有餘方不見及餘枝種等是因枝發生故云枝種節生種者蘇蔓那華又云須曼那此云善攝意亦名蘇摩那華其色黃白極香樹不至大高三四尺下垂如蓋其華香氣與末利華相似蘇羅婆未詳蒲醯那是外國草名也勒蓼即是蓼草其味苦辣類有多種天蓼亦云水紅草多生水傍苗莖尺餘葉大色赤白馬蓼葉大同前卑濕之地亦生水蓼生淺水中葉大有黑點毛蓼冬根不死葉上有毛白蓼紅蓼香蓼禾蓼等及餘節生種者是覆羅種者是虗中種也甘蔗竹葦藕根及餘覆羅生種者是覆羅未知何義諸部節種子種者子還生子者是即如稻麥豆粟等子還生子故若斫截墮故名壞鬼神村也律攝云村者聚義謂是林薄諸鬼神鳥獸等稟生命者託之而住猶若人村壞者是拗拉拔掘斬截摧傷之總名也犯緣此戒具足四緣方成本罪一是生草木二草木想三故壞四斫截斷定罪此中犯者於五生種中若生生想自斷若教他斷若自炒教他炒自煮教他煮波逸提若生疑突吉羅生非生想突吉羅非生生想突吉羅非生疑突吉羅草木七種色青黃赤白黑縹青白色即淺青色也紫色生草木作生草木想若自斷教他斷若自炒教他炒自煮教他煮波逸提生草木疑突吉羅生草木非生草木想突吉羅非生草木生草木想突吉羅非生草木疑突吉羅若打栓著樹上波逸提若以火著生草木上波逸提若斷多分生草木波逸提若斷半乾半生草木突吉羅若不言看是知是突吉羅五分律云若比丘一一所須語淨人言汝知是若不解復語言汝看是若不解復語言與我是若為火燒若折若斫知必不生不犯住處庭中生草聽使淨人知摩得勒伽云以灰土沙覆生草突吉羅語餘人言取是果我欲食突吉羅生果未淨全咽突吉羅取木耳突吉羅打熟果落突吉羅打生果落波逸提善見云木倒笮比丘而不死雖手中有刀斧等寧守死不斫木掘土以脫命何以故掘土斫木得墮智慧人寧守戒而死不犯戒而生若人放火燒寺為護住處得剗草掘土以斷火不犯若水中翻蓮花浮萍突吉羅若離水波逸提若須花果得舉樹枝下使淨人取不犯不得令枝折若樹高淨人不及比丘得抱淨人取不犯若樹押人比丘得斫樹掘地以救其命不犯問上云木倒笮比丘不得斫木掘土以脫命下云若樹押人比丘得斫樹掘地以救其命此二義何從答木笮比丘不得斫木掘土正謂自利寧守戒而死不犯戒而生也樹押於人得斫樹掘地務當救人不犯禁戒自他俱利正與大乘教意相符也薩婆多云不問有種子無種子要須淨而食不淨果若合子吞咽突吉羅若嚙破波逸提第三分云不應不淨果便食應作五種淨法食一火淨二刀淨三瘡淨四鳥淨五不中種淨是中初後兩種淨已都食餘三種淨應去子食不應噉不淨果菜不應自作淨不應自手捉令人作淨應置地使人作淨作淨已不應不受而食律攝云若蒲桃瓜果總為一聚於三四處以火拄之此便為淨若刀爪一一皆須別淨僧祇云有國土作穀聚畏非人偷以灰火燒上作識即此為淨如摩摩帝有倉穀未淨畏年少比丘不知法使淨人火淨至倉穀盡比丘恆得語言舂去不犯比丘尼波逸提小三衆突吉羅是謂為犯五分云餘三衆無故殺生草木突吉羅薩婆多云三衆是淨人不犯問今此二律其義何從答若無故殺生草木必從五分結罪若為三寶營作即依薩婆多無犯開遮得所義無乖謬也開緣不犯者言看是知是若斷枯乾草木若於生草木上曳木曳竹若生草覆道以杖披遮令開若以瓦石拄之而斷傷草木若除經行地土及掃經行來往處地誤撥斷生草木若以杖築地撥生草木斷無犯不犯者最初未制戒等會詳根本云凡授事人為營作故將伐樹時於七日前在彼樹下設諸祭食誦經呪願說十善道讚歎善業復應告言若於此樹舊住天神應別求居止此樹今為三寶有所營作過七日已當斬伐之若伐樹時有異相現者應為讚歎施捨功德說慳貪過若仍現異相即不應伐若無別相應可伐之薩婆多云結戒者為不惱衆生故為止誹謗故為大護佛法故凡有三戒大利益佛法一不得擔二不得殺草木三不得掘地若不制三戒一切國王當使比丘種種作役有此三戒帝主一切息心根本雜事云得義尸羅國有醫鉢羅龍王化身為摩納婆形此云儒童持滿篋金遍遊諸處說偈問言何處王為上於染而染著無染而有染何者是愚夫何處愚者憂何處智者喜誰和合別離說名為安樂若有解者即以金篋供養然無有人能解釋者漸行至婆羅痆斯國復如是唱有人報言有上智人住阿蘭若名那剌陀當解斯義未幾那剌陀至龍以偈問彼聞記憶告言十二年後當為汝解釋龍言太長久漸求減至七日時那剌陀即往告五比丘五比丘答言汝可問佛即詣鹿林禮足而坐佛為說法證預流果願求出家佛言先為摩納婆解釋頌義然後出家應如是答第六王為上染處即生著無染而起染說此是愚夫愚者於此憂智人於此喜愛處能別離此則名安樂彼若不解更為說頌若人聞妙語解已修勝定若聞不了義彼人由放逸彼若更疑汝可對彼以爪截葉若問世尊出世報言已出若問何處報言在施鹿林時那剌陀受佛教已至龍王所具答如上彼龍化作轉輪聖王往世尊所佛言汝愚癡人於迦攝波佛時受佛禁戒不能護持感此下劣長壽龍身今者何故還起詐心汝今可復本形龍言世尊我是龍身多諸怨惡恐有衆生共相損害佛敕金手神為之守護龍王別至一處遂復本形身有七頭頭尾相去有二百驛一一頭上各生一醫羅大樹被風搖動膿血皆流霑污形骸臭穢可惡常有蠅蛆諸蟲遍其身上晝夜咂食是時龍王即以本身詣世尊所禮足却住白言唯願世尊為我授記當於何日捨此龍身佛言當來人壽八萬歲時有佛出世號曰慈氏為汝授記當免龍身龍王悲哭諸頭眼中一時淚出成十四河駛流驚注佛令裁止勿致損國龍禮佛足忽然不現大衆問其往因佛言迦攝波佛時此龍於佛法中出家修行善間三藏具習定門經行醫羅樹下以自䇿勵樹葉打頭即便忍受後時繫心疲倦從定而起䇿念經行葉還打頭極痛發瞋怒心即以兩手折其樹葉投地作如是語迦攝波佛於無情物上見何過咎而制學處令受斯苦由彼猛毒瞋心毀戒命終墮此龍中第十二異語惱他戒總釋此是共戒尼犯亦同大乘同學此是性罪律攝云由違惱事瞋恚煩惱制斯學處此戒二緣合結緣起處佛在拘睒毗國瞿師羅園中起緣人尊者闡陀犯罪諸比丘問言汝自知犯罪耶即以餘事報言汝向誰語為說何事為論何理為語我為語誰耶是誰犯罪罪由何生我不見罪云何言我有罪諸比丘白佛佛以無數方便呵責聽僧與作餘語羯磨結戒餘語者波逸提後便觸惱衆僧喚來不來不喚來便來應起不起不應起便起應語不語不應語便語諸比丘白佛呵責已聽僧與闡陀作觸惱羯磨當如是說戒所立戒相若比丘妄作異語惱他者波逸提釋義妄作異語者善見云若比丘見闡那捉銀錢比丘語言何以捉銀錢答言我捉錫錢非銀錢或見飲酒語言汝何以飲酒答言我飲水語言汝何以與女人獨坐屏處答言有智男子是名餘語或時默然不答律攝云如有苾芻問苾芻言爾見如是相貌苾芻及俗人男女不便作惱心而答之曰如此之人我不曾見但見兩腳從此而去或時默然是謂異語惱他犯緣此戒具足三緣方成本罪一有心惱他二餘語觸惱三僧與作羯磨已定罪此中犯者僧未作白作餘語汝向誰說為說何事為論何理為我說為餘人說我不見此罪如是語者盡突吉羅若作白已如是語者盡波逸提若未白喚來不來不喚來便來應起不起不應起便起應語不語不應語便語一切突吉羅若作白竟一切波逸提若上座喚來不來突吉羅違逆衆僧結重違逆上座結輕僧祇云若僧中問異答異得波夜提若多人中和尚阿闍黎諸長老前問異答異越毗尼罪律攝云若於僧伽及尊重類稱理之教垢心違惱亦得墮罪非稱理教作違惱言得惡作若向不解人而作違惱亦惡作罪若差知衆事以垢惡心應作不作不應作而作皆得墮罪若無惡心得惡作罪五分云若輕戒波逸提師令掃地不掃教順掃而逆掃皆突吉羅根本云若苾芻見獵人逐麞鹿等入寺內彼問頗見有鹿從此過不不應答言見若是寒時報言可入溫室向火若是熱時報言可入涼室飲水若彼云我不疲倦我問走鹿應自觀指甲報言我見指甲若更問者應觀太虗報言我見太虗若彼云我不問指甲及太虗然問可殺有情於此過不即應遍觀四方作如是念於勝義諦一切諸行本無有情報言我不見有情此皆無犯若餘問時不如實答皆得墮罪比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者重聽不解前語有參差汝向誰說乃至我不見此罪若欲作非法非毗尼羯磨若僧若塔寺若和尚阿闍黎親舊知識欲為作無利益羯磨不與和合喚來不來教莫來便來不犯若一坐食若不作餘食法食若病喚起不起不犯或舍崩壞或燒或毒蛇入舍乃至命難梵行難教莫起便起不犯若惡心問上人法汝說是不與說不犯若作非法非毗尼羯磨若僧塔寺和尚阿闍黎親舊知識為作無利益教莫語便語不犯若小語疾疾語夢中語若獨語欲說此錯說彼不犯律攝云若口有病含藥不言無犯不犯者最初未制戒等
