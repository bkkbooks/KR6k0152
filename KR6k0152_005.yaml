body:
  text: 清金陵寶華山律學沙門德基輯第九異分取片謗戒總釋同前緣起處佛在耆闍崛山起緣人慈地比丘從耆闍崛山下見大羝羊即牡羊也共母羊行婬即將羝羊比沓婆摩羅子母羊比慈比丘尼語諸比丘我先以聞無根法謗沓婆摩羅子我今親自眼見沓婆摩羅子與慈比丘尼行不淨行諸比丘問知其故白佛訶責結戒所立戒相若比丘以瞋恚故於異分事中取片非波羅夷比丘以無根波羅夷法謗欲壞彼清淨行彼於異時若問若不問知是異分事中取片是比丘自言我瞋恚故作是語作是語者僧伽婆尸沙釋義異分事中取片十誦云異分者四波羅夷是若犯者非沙門非釋子失比丘法故名異分不異分者十三事乃至七止諍法若犯是事故名比丘故名釋子不失比丘法是名不異分片者諸威儀中事文謂沓婆摩羅子在耆闍崛山下與女人共立而語此是威儀中細小之事慈地見之將非比丘法而謗故云諸威儀中事善見云餘分者沓婆是人羊是非人以羊當沓婆是名餘分或云餘分餘即非波羅夷事以餘事而當波羅夷也非波羅夷下前已釋明犯緣同前定罪此中犯者若比丘不犯波羅夷言犯波羅夷以異分無根法謗僧殘若比丘不犯波羅夷謂犯僧殘乃至惡說以異分無根波羅夷法謗僧殘若比丘犯僧殘彼謂犯波逸提乃至惡說以異分無根波羅夷法謗僧殘若不清淨人與不清淨人相似若不清淨人與清淨人相似若清淨人與不清淨人相似若清淨人與清淨人相似名同姓同相同以此人事謗彼以異分無根波羅夷法謗皆僧殘若見本在家時犯婬盜五錢若過五錢若殺人便語人言見比丘犯婬盜若殺若聞本在家時犯婬盜殺自稱得上人法如是以異分無根波羅夷法謗說而了了僧殘不了了偷蘭遮餘並同前故不繁出第十破僧戒總釋此是共戒尼結罪同大乘同制若僧輪未破即惡心瞋心僻教戒攝若僧輪破則成逆罪律攝云由僧伽事及邪智煩惱制斯學處緣起處佛在耆闍崛山起緣人提婆達多自欲害佛復教阿闍世王弑父惡名流布利養斷絕通己五人家家乞食提婆達多者又云提婆達兜此翻天授亦云天與謂父母從天乞故又翻天熱以其生時人天等眾心皆驚熱故略云調達是佛堂弟阿難親兄博通內外經書有三十相短佛六寸四月初七日生阿闍世王秦言未生怨母懷妊未生之日已有惡心於瓶沙王故名未生怨也舊翻無指初生時相師云是王怨王令升樓撲之不死但損一指故名無指也普超經云阿闍世王從文殊懺悔得柔順忍命終入實吒羅地獄即入即出生上方佛土得無生忍彌勒出時復來此界名不動菩薩後當作佛號淨界如來通己五人者一三聞達多此人智慧才高即居於首二騫茶達婆是調達親友三拘婆離是調達弟子四迦留羅鞮舍是人姊妹有七人皆為比丘尼有大勢力調達為主故云通已五人諸比丘聞白佛佛以無數方便訶責已告諸比丘自今已去不得別眾食聽齊三人食所以然者有二事利故為攝難調故為慈愍白衣家故何以故恐彼難調人故自結別眾以惱眾僧調達即生此念未曾有瞿曇沙門乃斷人口食我寧可破彼僧輪我身滅後可得名稱言沙門瞿曇有大神力智慧無礙而調達能破彼僧輪我等今有五法亦是頭陀少欲知足樂出離勝法我等盡壽乞食盡壽著糞掃衣盡壽露坐盡壽不食酥鹽盡壽不食魚肉以此五法教諸比丘令其信樂諸比丘聞白佛佛言調達今日斷四聖種以無數方便訶責當知破和合僧甚惡得大重罪在泥犂中一劫受罪不可救療告諸比丘聽僧與調達訶諫捨此事故白四羯磨為諸比丘結戒所立戒相若比丘欲壞和合僧方便受壞和合僧法堅持不捨彼比丘應諫是比丘大德莫壞和合僧莫方便壞和合僧莫受壞僧法堅持不捨大德應與僧和合與僧和合歡喜不諍同一師學如水乳合於佛法中有增益安樂住是比丘如是諫時堅持不捨彼比丘應三諫捨此事故乃至三諫捨者善不捨者僧迦婆尸沙釋義和合者同一羯磨同一說戒僧者四比丘若五若十乃至無數壞者即破也破有十八事法非法謂八聖道是法說是非法五法是非法而言是法也律非律八聖道是律說言非律五法非律說言是律犯非犯不剃髮剪爪佛說犯戒而言爪髮有命有剃剪犯剃髮剪爪是佛所制律云半月一剃此是恒式涅槃經云頭鬚爪髮悉皆長利是破戒之相非犯說犯者佛不制心戒而說心起三毒即是犯戒若輕若重有殘無殘如優羅龍王以摘樹葉故罪不可懺因此便言殺草木者一切是重重說輕者見須提那達尼吒等以先作故不得重罪便言婬盜等是輕粗惡非粗惡謂初二篇是粗惡罪言非粗惡罪下三篇非粗惡罪而言是粗惡罪上准薩婆多釋常所行非常所行十誦云常所行事者單白羯磨白二羯磨白四羯磨布藏自恣立十四人羯磨十四人者大沙門百一羯磨云一能作法人二能分臥具人三能敷臥具人四能分僧餅人五能處分差請人六能分處沙彌人七能分僧粥人八能處守園人九能分僧衣人十能分雨衣人十一主分藥人十二晝夜掌僧物人十三掌僧粗物人十四掌守住處人制非制僧祗云若比丘於十二事戒序四波羅夷十三僧殘二不定三十尼薩耆九十波夜提四波羅提提舍尼眾學法七滅諍隨順法不制者制制者便開是名制非制說非說八聖道是佛所說而言非佛所說五法非佛所說而言是佛所說是為十八住破僧法者即住此十八事是是為方便受壞和合僧法堅持不捨正明依事制戒律攝云於破僧事堅執不捨者既思眾破攝化門徒自守邪宗多求惡黨故堅持不捨也彼比丘應諫是比丘大德莫壞和合僧乃至堅持不捨下乃屏處諫勸令除惡見捨離邪法同一師學如水乳合下顯和合勝益同一師者謂如來是我等大師種種姓出家咸稱釋子同學十分教教體無別故善見云同有二義一者心同二者身同心同者心同法身同者共一和合布薩云何不同身雖共一處心行外法是名身同心不同也如水乳合者謂事理和合也水乳和合即同一相一味事與理一相無差同得解脫故云如水乳合也於佛法中有增益安樂住謂於貪瞋癡善能調伏於勝法中善能精修令佛教法得流通故住於八聖法中依此法故能獲勝果故曰於佛法中增益安樂住也是比丘如是諫時堅持不捨此謂屏處諫勸也彼比丘應三諫捨此事故此謂僧中羯磨諫也乃至三諫捨者善謂不犯本罪不捨者違諫成犯犯緣此戒具足三緣方成本罪一欲破僧心二受持破僧法三僧中如法三諫不捨定罪此中犯者若比丘方便欲破和合僧受破僧法堅持不捨彼比丘當諫此比丘言大德莫方便破和合僧莫受破僧法堅持不捨大德當與僧和合歡喜不諍同一水乳於佛法中有增益安樂住大德可捨此事莫令僧作訶諫而犯重罪若用語者善若不用語者復令比丘比丘尼優婆塞優婆夷若王若大臣種種異道沙門婆羅門求異道沙門者即外道出家者是沙門乃出家之總名也求者即求聽納諫此謂屏處諫也若餘方比丘聞知其人信用言者應求若用言者善若不用言者應作白作白已應更求大德我已白竟餘有羯磨在汝今可捨此事莫令僧為汝作羯磨更犯重罪若用語者善不用語者應作初羯磨作初羯磨已應更求若用語者善不用語者應作第二羯磨作第二羯磨已應更求若能捨者善若不捨者與說第三羯磨竟僧殘作白二羯磨竟捨者三偷蘭遮作白一羯磨竟捨者二偷蘭遮作白竟捨者一偷蘭遮若初白未竟捨者突吉羅若一切未白方便欲破和合僧受破和合僧法堅持不捨一切突吉羅若僧為破僧人作訶諫羯磨時有比丘教言莫捨此比丘偷蘭遮若不訶諫突吉羅若比丘尼教言莫捨尼偷蘭遮未作訶諫尼教莫捨突吉羅除比丘比丘尼更有餘人教莫捨盡突吉羅餘人即三小眾第三分云提婆達多行籌曰誰諸長老忍此五事是法是毗尼是佛所教者捉籌於是五百新學無智比丘捉籌隨調達去舍利弗目犍連說法現神通將還佛令作偷蘭遮懺悔又云有二事破僧妄語相似語妄語者非佛所說言佛所說相似語者謂制五法彷佛佛語復有二事破僧作羯磨取籌若一比丘乃至二人三人雖求方便亦不能破僧亦非比丘尼等能破僧若此眾四人若過彼眾四人若過行破僧籌作羯磨是為破和合僧泥犁中受罪一劫不療能和合者得梵天福一劫受樂五分云我不見餘法壞人道意如名聞利養者調達所以破僧為利養故調達成就八非法故破僧利不利稱無稱敬不敬樂惡隨惡知識有四事名破僧說五法自行籌捉籌於界內別行僧事復次若王若大臣若餘六眾令僧不和合而非破若一比丘乃至七比丘不和合亦非破若不問上座而行僧事是即不和亦非僧破若不共同食於食時異坐鬪諍罵詈亦不名破要於界內八比丘以上分作二部別行僧事乃名為破是中主者一劫墮大地獄不可救十誦云破僧有二種破羯磨破法輪破羯磨者一界內別作布薩羯磨破法輪者輪名八聖道分令人捨八聖道入邪道中言法輪者能運為義謂運行人直至涅槃由八聖道能得沙門四道果故又輪者摧壞為義謂如來以所證之法轉度與他心能壞一切眾生煩惱名之為輪也如輪王寶能壞能安法輪亦爾壞煩惱怨安住諦理入邪道中者謂五法非趣涅槃正道是調達師心制法攝化門徒令失正智增長邪見故云入邪道中也薩婆多云破僧輪破羯磨僧有何差別答有種種差別破僧輪破羯磨僧俱偷蘭遮而破僧輪犯逆罪偷蘭不可悔破羯磨僧不犯逆罪偷蘭可悔又破僧輪入阿鼻獄受罪一劫破羯磨僧不墮阿鼻獄破僧輪下至九人破羯磨僧下至八人破僧輪一人自稱作佛破羯磨僧不自稱作佛破僧輪界內界外一切盡破破羯磨僧要在界內別作羯磨破僧輪必男子破羯磨僧男子女人二俱能破破僧輪破俗諦僧破羯磨僧俗諦僧第一義諦僧二俱能破破僧輪但破閻浮提破羯磨僧通三天下比丘尼僧殘三小眾突吉羅是謂為犯開緣不犯者初諫便捨若非法別眾非法和合眾法別眾法相似別眾法相似和合眾非法非律非佛所教若一切未作訶諫若破惡友惡知識若破方便欲破僧者遮令不破若破方便助破僧者二三人羯磨若欲作非法非毗尼羯磨若為僧為塔為和尚同和尚為阿闍黎同阿闍梨為知識作損減作無住處破者不犯不犯者最初未制戒等善見云最初犯者調達是也問曰餘戒最初不犯調達亦應不犯答曰以眾僧三諫不捨故所以犯罪第十一黨惡破僧戒總釋此是共戒尼犯亦同大乘同制所由之事及起煩惱如上緣起處佛在耆闍崛山起緣人提婆達多故執此五法復往教諸比丘諸比丘諫調達時調達伴黨語諸比丘言汝莫諫提婆達多云云諸比丘白佛佛令僧作訶諫白四羯磨已結戒所立戒相若比丘伴黨若一若二若三乃至無數是比丘語彼比丘言大德莫諫此比丘此比丘是法語比丘律語比丘此比丘所說我等喜樂此比丘所說我等忍可彼比丘言大德莫作是說言此比丘是法語比丘律語比丘此比丘所說我等喜樂此比丘所說我等忍可然此比丘非法語比丘非律語比丘大德莫欲破壞和合僧汝等當樂欲和合僧大德與僧和合歡喜不諍同一師學如水乳合於佛法中有增益安樂住是比丘如是諫時堅持不捨彼比丘應三諫捨是事故乃至三諫捨者善不捨者僧伽婆尸沙釋義順從有二一法順從以法教授增戒增心增慧諷誦承受此名三無漏學增戒者戒防身口惡淨修身口無法不盡增心者心息於垢無法不周增慧者明見法相根本除惡又增戒者學律藏增心者學契經增慧者學阿毗曇經中有三修修戒修心修慧修此三學得須陀洹果乃至阿羅漢果故知學此三學攝一切學二衣食順從者給與衣被飲食臥具醫藥伴黨者若四若過四即乃至無數也是比丘語彼比丘言此非法羣黨而遮如法者諫勸大德莫諫此比丘此比丘是法語比丘律語比丘律攝云法語者語辭圓足律語者合理無差能引實義名曰法語出柔諫言名曰律語此比丘所說我等喜樂此比丘所說我等忍可下明依事制戒律攝云彼所作事咸稱我心彼比丘言如法比丘大德莫作是說乃至非法語比丘非律語比丘下勸隨正部捨背邪宗也大德莫欲破壞和合僧乃至增益安樂住下顯破僧罪固不小和合僧功德難思義如前釋犯緣此戒具足三緣方成本罪一作非法羣黨二受持非法三僧中如法三諫不捨定罪此中犯者若比丘作非法羣黨語諸比丘言大德汝莫諫此比丘乃至我等忍可諸比丘應諫乃至增益安樂住可捨此事勿為僧所訶更犯重罪若隨語者善若不隨語者當作白白已當語彼人言我已白餘有羯磨在汝可捨此事勿為僧所訶更犯重罪若隨語者善若不隨語者當作初羯磨作初羯磨已當語言我已白及初羯磨餘有二羯磨在如是乃至第三羯磨竟僧殘餘得罪輕重並同前戒十誦云若一比丘被擯而四比丘隨之名為破僧若多知多識多聞大德明解三藏義人不應與作不見擯若擯得偷蘭遮罪近破僧故又云若一人擯一人突吉羅一人擯二三四人隨二三四突吉羅二人三人擯二三四一人得罪亦爾若四比丘擯四比丘得偷蘭遮以破僧因緣故問一比丘被擯四比丘隨之名為破僧此破僧罪屬能擯耶屬所擯耶屬隨者耶答若能擯者如法則罪屬所擯及隨擯人若能擯者非法則罪屬能擯者及僧然如法比丘雖枉受擯決不在界內別行僧事也又問若多知多識等不應與作不見擯則此等人有過豈便可容恕耶答多知識人有過雖非可容恕但須善權誘勸令其見罪若輒作羯磨必致破僧之咎故得罪爾比丘尼僧殘三小眾突吉羅是謂為犯開緣不犯者初語時捨非法別眾非法和合眾法別眾法相似別眾法相似和合眾非法非律非佛所教若一切未作訶諫捨無犯不犯者最初未制戒等第十二驅擯不服戒總釋此是共戒尼犯亦同大乘同制即因利求利經理白衣等戒名污他家邪業覺觀邪命自活等戒名行惡行言僧有愛恚等即謗僧戒攝律攝云由受用鄙事故而行污他家由家慳煩惱制斯學處緣起處佛在給孤獨園須達多長者見佛聞法便獲初果為佛造寺欲擇好處祗陀太子亦云逝多太子有園甚好長者遍布金錢就買一處未徧太子曰金未徧處還我當為佛作寺門世尊到寺讚歎欲為呪願太子作是念惟願世尊先說我名世尊知已隨太子心告言此祗樹給孤獨園梵語祗陀此云戰勝以戰勝時生喜以為名也今單言祗者取文省故給孤表德謂常給施孤獨本名須達多葢祗陀施樹給孤買園兼二為名舉國令遠人知稱園令近人知故云舍衛國祗樹給孤獨園也起緣人時䩭連有二比丘一名阿濕婆二名富那婆娑䩭連村者迦尸國之邑名十誦云黑山土地梵語阿濕婆此云馬師梵語富那婆娑此云滿宿善見云馬師滿宿於六羣中最為上座本是田夫同作田辛苦共相論言我等作田辛苦可共出家於佛法中衣食自然同伴答言可爾即就舍利弗目連出家與受具足誦波羅提木叉竟滿五夏離師異住常好種華薩婆多云馬宿井宿恒造惡業佛常教化都不信受佛記二人命終生龍趣中彼亦自見於十指端有十道水將欲流出便作是念我等決定當生龍中佛復記云此二人已種獨覺菩提於當來世定成獨覺也在䩭連行惡行污他家彼作如是非法行自種華樹教人種華樹自溉灌教人溉灌自摘花教人摘花自作華鬘教人作華鬘自以線貫若繫教人線貫繫自持華教人持華自持華鬘與人教人持華鬘與人與彼村中婦女共一牀坐起同一器飲食言語戲笑或自歌舞倡伎或他作己唱和或俳說俳說即戱也又俳優雜戱也或彈鼓簧吹貝簧者乃笙竽管中金葉也然笙竽皆以竹管植于匏中而竅其管底之側以薄金葉障之吹則鼓之而出聲所謂鼓簧也貝乃海螺也吹之有聲或嘯乃至受雇戲笑僱者傭作也嘯者蹙口而出聲也時眾多比丘乞食䩭連齊整庠序低目直前居士見之反以為過不得飲食比丘問知其故具以白佛佛遣舍利弗目連往作擯羯磨時二比丘謗言眾僧有愛恚怖癡更有餘同罪比丘有驅者有不驅者舍利弗目連白佛佛令僧作訶諫白四羯磨已結戒所立戒相若比丘依聚落若城邑住污他家行惡行污他家亦見亦聞行惡行亦見亦聞諸比丘當語是比丘言大德污他家行惡行污他家亦見亦聞行惡行亦見亦聞大德汝污他家行惡行今可遠此聚落去不須住此是比丘語彼比丘作是語大德諸比丘有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者諸比丘報言大德莫作是語有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者而諸比丘不愛不恚不怖不癡大德污他家行惡行污他家亦見亦聞行惡行亦見亦聞是比丘如是諫時堅持不捨者彼比丘應三諫捨此事故乃至三諫捨者善不捨者僧伽婆尸沙釋義依聚落若城邑住者有四種如上律攝云村落巷陌街衢住處名為邨村外遠家名為落城邑者屬王律攝云君王都處名為城邑家者有男有女污他家者有四種事一依家污家二依利養污家三依親友污家四依僧伽藍污家云何依家污家從一家得物與一家所得物處聞之不喜所與物處思當報恩即作是言若有與我者我當報之若不與我者我何故與是為依家污家云何依利養污家若比丘如法得利乃至中之餘或與一居士不與一居士彼得者即生是念當報其恩若不與我者我何故與是為依利養污家云何依親友污家若比丘依王大臣或為一居士或不為一居士所為者思當報恩不為我者我不供養是為依親友污家云何依僧伽藍污家若比丘取僧華果與一居士不與一居士即作是念其有與我者我當供養不與我者我不供養是念依僧伽藍污家以此四事故污家故言污他家謂污染他人平等淨信揀別施供也行惡行者自種華樹教人種華樹乃至受雇戲笑等污他家行惡行亦見亦聞此明依事制戒律攝云由依污家生眾罪故見謂眼識聞謂耳識此顯見聞疑性非為虗妄而說也大德汝污他家行惡行今可遠此聚落去不須住此是驅擯之辭是比丘語彼比丘作是語大德諸比丘有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者此是污他家輩非理謗僧之語律攝云愛者於不驅者而有愛心於所驅者而有恚心怖者於逃去者不敢治罰癡者於污家之輩不善分別應驅而不驅也僧祗云是六羣比丘聞尊者與諸比丘來為我作驅出羯磨即生恐怖時三文陀達多摩醯沙達多走到王道聚落長老闡陀迦留陀夷便一由旬迎尊者懺悔言長老我所作非善犯諸過惡從今已去不敢復作彼二比丘既不懺悔又復不走故作羯磨驅出以非理謗僧諸比丘報言大德莫作是語乃至堅持不捨者此屏處諫也彼比丘應三諫下僧中三諫也犯緣此戒具足三緣方成本罪一污他家行惡行二非理謗僧三僧中如法三諫不捨定罪此中犯者彼比丘諫此比丘言大德污他家亦見亦聞行惡行亦見亦聞大德汝污他家行惡行可捨此事莫為僧所訶更犯重罪若隨語者善若不隨語者應作白作白已應求乃至第三羯磨竟僧殘如前二戒不異若白二羯磨捨者三偷蘭遮若白一羯磨捨者二偷蘭遮若白竟捨者一偷蘭遮若初白未竟捨突吉羅若未白前言僧有愛恚怖癡一切突吉羅若僧作訶諫時更有餘比丘教莫捨此比丘偷蘭遮若未作訶諫突吉羅若僧作訶諫時有比丘尼教莫捨尼偷蘭遮若未作訶諫教莫捨尼突吉羅除比丘比丘尼餘人教莫捨訶與不訶盡突吉羅餘人即三小眾若不看書持往突吉羅若為白衣作使突吉羅薩婆多云一切女母女姊妹不問親疎一切不聽同坐以壞威儀故以香塗身熏衣四眾得突吉羅比丘尼得波逸提以女人染著深故五眾盡不聽啼哭乃至父母喪亡一切不聽四眾得突吉羅尼得波逸提以愛戀心深故一切五眾不聽大喚以壞威儀故比丘尼僧殘三小眾突吉羅是謂為犯開緣不犯者初語時捨一切非法羯磨諫若未作訶諫前不犯若與父母病人小兒妊身婦女牢獄繫人寺中客作者不犯不犯污他家若種華樹復教人種供養佛法僧自造華鬘教人造供養佛法僧自以線貫華教人貫供養佛法僧不犯行惡行若人舉手欲打若被賊若象熊罷師子虎狼來恐難之處若擔刺棘於中走避者不犯若渡河溝渠坑跳躑若同伴在後還顧不見而嘯喚者不犯不犯行惡行若父母病若閉在獄若為篤信優婆塞病若閉在獄者看書持往不犯為白衣作使若為塔為僧為病比丘事持書往反者一切不犯不犯者最初未制戒等會詳薩婆多云若以種種信物與一切在家人皆名污他家何以故凡出家人無為無欲清淨自守以修道為心若與俗人信使往來廢亂正業非出家所宜又復若以信物信物者謂檀越信敬所施之物贈遺白衣則破前人平等好心於得物者歡喜愛敬不得物者縱使賢聖無愛敬心失他前人深厚福利又復倒亂佛法凡在家人應供養出家人而出家人反供養白衣仰失聖心又亂正法凡在家人常於三寶求清淨福田割損血肉以種善根以出家人信物贈遺因緣故於出家人生希望心破他前人清淨信敬又失一切出家人種種利養若以少物贈遺白衣縱使起七寶塔種種莊嚴不如靜坐清淨持戒即是供養如來真實法身若以少物贈遺白衣正使得立精舍猶如祇桓不如靜坐清淨持戒即是清淨供養三寶若以少物贈遺白衣縱令四事供養滿閻浮提一切聖眾不如靜坐清淨持戒即是清淨供養一切聖眾若有強力欲破塔壞像若以贈遺得全濟者當賣塔地華果若塔有錢若餘緣得物隨宜消息若有強力欲於僧祇作破亂損減若僧祇地中隨有何物賣以作錢隨宜消忍若僧常臘若面門臘常臘即十方常住僧物面門臘即現前僧物但臘字未知何義若有強力欲作損減隨此地中所可出物以消息之父母是福田則聽供養若僧祇役人則應與一切孤窮乞丐憐愍故應與一切外道常於佛法作大怨敵伺求長短是應與第三分云不應為白衣剃髮除欲出家者第四分云不應禮白衣不應禮白衣塔廟亦不應故左遶行不應與人卜占不應從人卜占不應自作伎若吹貝供養塔聽令白衣作不應畜鸚鵡等不應畜狗不應乘象馬車乘輦輿捉持刀劍老病者聽乘步挽車若男乘避難聽乘象馬白衣持刀劍寄聽藏舉不應向暮至白衣家除為三寶事病比丘事或檀越相喚常喜往反白衣家有五過一數見女人二漸相親近三轉相親厚四生欲意五或犯死罪若次死罪如是日親日厚婬機安得不動如乾薪觸火豈不生烟共相親近或不能觀九不淨想制伏婬心有犯不淨行如人斷頭不復活故云死罪或弄陰墮精身相觸粗惡語等如人斫傷殘有咽喉尚通懺悔故云次死罪白衣家有九法未作檀越不應作若至其家不應坐何等為九見比丘不喜起位不喜作禮不喜請比丘坐不喜比丘坐設有所說而不信受若有衣服飲食之具輕慢比丘而不與若多有而少與若有精細而與粗惡或不恭敬與是為九五分云不應以僧果餉白衣若乞應與學迷人呪起死人呪者偷蘭遮十誦云比丘有五不應行處童女家寡婦婦婬女比丘尼又五賊家旃陀羅家酤酒家婬女家屠兒家根本雜事云五非處不應住立唱令家即優俳戲樂之家婬聲美色能惑亂人道意故婬女家酤酒家王家旃陀羅家善見云檀越請比丘送喪不得去自念我往看塟作無常觀因此故或得道果如是去無罪尼陀那云苾芻不應賣藥若善醫方者起慈愍心應病與藥不得受他價直南海寄歸傳云死喪之際不得與俗同哀應為亡者淨飾一房或可隨時權施葢幔讀經念佛具設香華冀使亡魂托生善處方成孝子始為報恩若比丘亡者以火焚之送者在邊坐令一能者誦無常經半紙一紙勿令疲久各念無常還歸住處寺外連衣並浴皆用故衣不損新服別著乾者然後歸房衣服之儀曾無片別豈容號咷數月麻服三年者哉緇門警訓云但以邪心有涉貪染為利賣法禮佛讀經斷食諸業即打餓七水齋名為惡求多求所獲贓賄皆曰邪命物正乖佛化言贓賄者乃貪吏所受物名亦盜賊所偷劫物名今出家人邪心獲利亦得此名第十三不捨惡性戒總釋此是共戒尼結亦同大乘同制若菩薩惡性戾情難可共語四攝虧損利生無門障蔽大願佛果難期律攝云不忍他語違如法教由惡性故遂生惱恨自損損他制斯學處緣起處佛在拘睒彌國瞿師羅園釋在前文起緣人尊者闡陀惡性不受人語語諸比丘汝莫語我若好若惡我亦不語諸大德若好若惡諸大德且止莫有所說何用教我為我應教諸大德何以故我聖主得正覺故言我聖主者何以故我與勒陟送佛入山學道不見諸長老一人侍從佛者佛得道已而轉法輪是故佛是我家佛法亦是我家法是故我應教諸長老諸長老不應反教我闡陀何故不言僧是我家僧為與僧鬪諍故不言僧是我家僧也譬如大水初來漂諸草木積在一處亦如大風吹諸草木集在一處諸大德亦復如是是故諸大德不應教我我應教諸大德時諸比丘白佛佛聽僧與闡陀作訶諫白四羯磨已結戒所立戒相若比丘惡性不受人語於戒法中諸比丘如法諫已自身不受諫語言諸大德莫向我說若好若惡我亦不向諸大德說若好若惡諸大德且止莫諫我彼比丘諫是比丘言大德莫自身不受諫語大德自身當受諫語大德如法諫諸比丘諸比丘亦如法諫大德如是佛弟子眾得增益展轉相諫展轉相教展轉懺悔是比丘如是諫時堅持不捨彼比丘應三諫捨是事故乃至三諫捨者善不捨者僧伽婆尸沙釋義惡性不受人語者不忍不受人教誨於戒法中如法諫已戒法者有七犯聚波羅夷僧殘波逸提提舍尼偷蘭遮突吉羅惡說如法諫已者謂如法如律如佛所教謂於五篇七聚中依實事如法而說也自身不受諫語謂諸同學如法諫時仍守戾情不納其語言諸大德莫向我說若好若惡我亦不向諸大德說若好若惡謂己及他一切好事莫相勸惡事莫相遮正顯惡性憍慢不受諫也大德且止莫諫我且止者謂預相遮止未說之事不須復說莫諫我者不喜相聞好惡之言情不忍可彼比丘諫是比丘言乃至自身當受諫語謂勸其納諫消息戾情也大德如法諫諸比丘乃至展轉懺悔正顯相諫獲益之義由相諫懺悔佛弟子得增益安樂住由安樂住善法增長善法增長故聖教不斷聖教相續故三乘聖果相繼不絕皆由展轉相教懺悔之功能也問曰後略教誡經說但自觀身行若正若不正此云展轉相教豈不相違耶答曰佛因時制教言乖趣合不相違背若前人心有愛憎若鈍根無智少聞少見出言無補若為利養名聞為現世法樂若新出家愛戀父母兄弟妻子是故言但自觀身行若為慈心有益於彼若智慧利根若博聞廣見若為導利眾生闡揚佛法若欲以法化人使人同己若久染佛法力能兼人者則應展轉相諫相教非為一槩而論之也是比丘如是諫時下屏處諫及僧中三諫如前不異犯緣此戒具足三緣方成本罪一戾情自用二遮他人教三僧中如法三諫不捨定罪此中犯者若比丘惡性不受人語乃至可捨此事莫為僧所訶更犯重罪得罪輕重同前不異十誦云若諸比丘不舉不憶念自身作不可共語突吉羅是不應約敕不應約敕者不必訶諫即用默擯也佛言惡性比丘當用梵壇法治也所言梵壇法者謂梵天天子有過則別立一壇將有過天子而置壇內一切天子不共其語惡性比丘難可共語即用此法而治罰之一切如法比丘不共語言故云梵壇法也云舉者比丘應語長老汝作某罪當發露莫覆藏當如法除滅憶念者比丘應語長老汝憶念某時某處作如是罪不比丘尼僧殘三小眾突吉羅是謂為犯開緣不犯者初語時捨一切非法非毗尼非佛所教若未作訶諫前不犯若為無智人訶諫時語彼如是言汝和尚阿闍黎所行亦如是汝可更學問誦經若戲笑語若疾疾語若獨語若夢中語欲說此錯說彼無犯不犯者最初未制戒等會詳僧祇云佛告諸比丘過去世時有一婆羅門於曠野中造立義井放牧行者皆就井飲并及洗浴日暮有羣野干來飲殘水有野干主不飲地水便內頭罐中飲水飲已戴罐高舉撲破瓦罐罐口猶貫其項諸野干輩語野干主若濕樹葉可用者尚當護之況復此罐利益行人云何打破野干主言我作是樂但當快心那知他事時有行人語婆羅門汝罐已破復更著之如前為野干所破乃至十四諸野干數數諫之猶不受語時婆羅門念言是誰破罐當往伺之正是野干便作是念我福德井而作留難便作木罐堅固難破令頭易入出難持著井邊捉杖屏處伺之行人飲訖野干主如前入飲飲訖撲地不能令破時婆羅門捉杖打殺空中有天而說偈言知識慈心語狠戾不受諫守頑招此禍自喪其身命是故痴野干遭斯木罐苦三結問諸大德我已說十三僧伽婆尸沙法九戒初犯四乃至三諫若比丘犯一一法知而覆藏應強與波利婆沙行波利婆沙竟增上與六夜摩那埵行摩那埵已餘有出罪當二十僧中出是比丘罪若少一人不滿二十眾出是比丘罪是比丘罪不得除諸比丘亦可訶此是時今問諸大德是中清淨不三問釋言我已說者謂彰其事了欲令諸苾芻重審其罪故云已說九戒初犯四乃至三諫者謂從弄陰失精至取片謗戒事成即獲其罪不從他諫而生故云初犯也從破僧至惡性不受諫此四戒本非僧殘因三諫不捨方得此罪故曰四乃至三諫也一一法者謂十三法中隨犯一法知而覆藏者自知所犯僧殘而作覆藏心若犯僧殘謂犯波逸提提舍尼偷蘭遮突吉羅雖作覆藏心亦不名覆藏然覆藏有二種一謂覆夜二謂覆心若作覆藏心至明相出是名一夜覆藏若不知不憶雖經明相無覆藏罪故云知而覆藏也問曰四戒三諫不捨得罪僧眾咸知何覆藏之有答眾僧雖知自無露罪之心即名覆藏也十誦云是比丘入僧中自唱諸長老我某甲比丘得僧殘罪若說即善若不即說者從是時來名覆藏日數僧祗云佛訶覆藏比丘癡人此是惡事犯戒尚不慚羞悔過何以慚羞即說偈言覆葢者則漏開者則不漏是故諸覆者當開令不漏應強與波利婆沙強與者以人從法也謂如來所被之法違犯之人依從而行其行也故云強與波利婆沙是梵語此云別住以何義故名別住謂別住一房不得與僧同處又不得與同犯者同一房住設若同處須當白僧在一切大僧下行坐不得連草食又復雖入僧中不得與僧問答談論以是義故名為別住次明行法七五之法所不應行所應行法者律攝云謂開門然燈塗掃寺宇大小便廁洗除糞穢及供土葉寒時授火熱時扇涼打犍椎嚴香火并讚歎佛應在近圓下求寂上僧伽臥具安之具應為收舉制底香堂常應塗掃供給湯水應與善苾芻洗足塗油寺中利養最後應得如是行法盡覆歲日行之是名波利婆沙行行波利婆沙竟增上與六夜摩那埵言增上者謂更加六夜行法摩那埵梵語秦言意喜前人自意歡喜亦生慚愧亦使眾僧歡喜前人喜者與其少日因少日故始得喜名眾僧喜者謂觀此人所行行法不復還犯眾僧歎言此人因此改悔更不起煩惱成清淨人也是故自喜亦令眾僧喜耳善見云摩那埵者漢言折伏貢高亦言下意下意者承事眾僧行摩那埵已餘有出罪餘者謂別住摩那埵一一如法行竟止餘出罪一法在善見云阿浮訶那梵語漢言喚入亦言拔罪云何喚入與同布薩說戒自恣法事共同故名喚入拔罪摩得勒伽云於不善處舉著善處名阿浮訶那毗尼母云阿浮訶那者清淨戒生得清淨解脫於此戒中清淨無犯曇諦羯磨云二篇罪重故須僧中行調伏法要有於二一者治過二者治罪初與覆藏羯磨法治過非治罪六夜出罪此二是出罪法正懺僧伽婆尸沙故當二十僧中出是比丘罪若少一人不滿二十眾出是比丘罪是比丘罪不得除凡欲除罪須知五緣云何為五一由其罪謂所犯罪二由意樂謂知而覆藏三由治罪謂隨覆日與別住等四由行已謂令眾心喜五由人殊謂滿二十眾以定其數也謂此篇罪重不類餘法必借羯磨威勢眾僧大力方可拔除其罪若以行別住人足數不成滿數以行摩那埵人足數不成足數若以授學人足數不成足數廣如不足數中准知名不滿二十眾必須二十如法清淨僧是名滿若少一人非法不成羯磨是比丘罪不得除應更作法諸比丘亦可訶諸比丘者謂秉法之僧也不善作法應訶作突吉羅悔過此是時謂說戒發露結問清淨之時也今問諸大德等結問清淨也四勸持諸大德是中清淨默然故是事如是持三二不定法分四初總標二別列戒相三結問四勸持今初諸大德是二不定法半月半月說戒經中來釋二不定者此戒有二條而此罪體無定相故容有多罪不可定言薩婆多云佛坐道場時已決定五篇戒輕重通塞無法不定此所以言不定者直以可信人不識罪相輕重亦不識罪名字設見共女人一處坐不知為作何事為共行婬為作摩觸為作粗惡語為過五六語故言不定二別列戒相有二初三法不定總釋尼有共不共若與男子入屏處偷蘭遮行不淨行及身相觸波羅夷粗惡語偷蘭遮過五六語說法波逸提大乘同學此是性罪律攝云此因鄔波斯迦事由婬煩惱制斯學處緣起處佛在給孤獨園起緣人迦留陀夷先白衣時有親友婦名齋優婆私顏貌端正迦留陀夷亦顏貌端正互相繫念尊者時到著衣持詣齋優婆私家共獨屏覆處坐時毗舍佉母有小因緣事往彼遙聞語聲作是念言或能說法即倚壁而聽聞是非法語聲即闚看見共齋優婆私共一牀坐薩婆多論間毗舍佉聰明利根大德重人知比丘與女人屏處坐何故往答曰是人已入道跡深樂佛法佛常自說聽法有五事利益一得聞未曾聞法二已曾聞清淨堅固三除邪見四得正見五解甚深法是以毗舍佉樂法情深不以嫌疑自礙毗舍佉母此譯為別枝即是氐宿以生日所值宿為名也賢愚經云此是波斯匿王弟曇摩訶羨女也因罪逃奔得叉尸利國納娶而生此女此女妙才智辨嫁舍衛國棃耆彌大臣第七兒為婦波斯匿王聞其智辯拜為王妹後生三十二卵卵各出一兒顏貌端正勇健無雙一人之力能歒千夫時毗舍佉信心開解請佛及僧佛為說法合家得須陀洹道佛後為說法即得阿那含道於優婆夷中智慧才辨最為第一往白世尊佛以無數方便呵責已結戒所立戒相若比丘共女人獨在屏覆處障處可作婬處坐說非法語有住信優婆夷於三法中一一法說若波羅夷若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於三法中應一一治若波羅夷若僧伽婆尸沙若波逸提如住信優婆夷所說應如法治是比丘是名不定法釋義律攝云此中由事由處由情由證以為其體女人者人女有智未命終是堪行婬境此由事獨者一比丘一女人屏覆者有二種一見屏覆若塵若霧若黑暗中不相見也二聞屏覆乃至常語不聞聲處障處者若樹若墻壁若籬若衣及餘物障此由處故也可作婬處坐者得容行婬處於一尋內身相逼近得為坐臥然彼女人或相容許或不隨從說非法語者說婬欲法此由情故也有住信優婆夷者信佛法僧歸依佛法僧不殺不盜不邪婬不妄語不飲酒善憶持事不錯所說真實而不虗妄薩婆多云住信優婆夷者終不為身為財利而作妄語若人語言汝若妄語不害汝命若不妄語當害汝命即自思惟我不妄語害此肉身滅此一身若妄語者滅無量身兼害法身誓不妄語又復語言汝若妄語活汝父母兄弟姊妹一切親族若不妄語一切所親盡皆殺之尋復思惟我不妄語害此一世生死親族我若妄語流轉三惡永失人天累世親族眷屬又失賢聖出世眷屬誓不作妄語又復語言汝若妄語與汝珍寶種種財利若不妄語則不與汝即便思惟我不妄語失此俗財我若妄語失聖法財誓不妄語律攝云設是異生有忠信者言行無濫亦依其語是名住信優婆夷此由證也是坐比丘自言我犯是罪於三法中應一一治善見云是比丘自言我犯是罪者即隨比丘語治不隨優婆夷語治何以故見聞或不審諦故有一愛盡比丘一日往檀越家入屋中坐優婆夷對比丘別倚牀而立外凡夫比丘入檀越家乞食遙見比丘與優婆夷相對謂言共牀坐諦視不已愛盡比丘自念言此比丘當言我與女人共牀坐也各還所住乞食比丘欲舉其罪至愛盡比丘房求聽打戶欲入愛盡比丘逆知其心即以神力從屋棟出在虗空中坐此比丘入已徧求而不得見在虗空中坐語愛盡比丘言大德有神力如此何以入白衣家獨與女人共牀坐愛盡比丘答言長老此是獨入白衣家罪長老護我善文此謂見而不諦當隨比丘語而治也若不實說即依優婆夷語而治也以法不定故不立緣定罪此中犯者若比丘自言所趣向處自言所到處自言坐自言臥自言作即應如比丘所語治若比丘自言所趣向處自言所到處自言坐自言臥不自言作應如優婆夷語治若不自言臥不自言作乃至不自言所趣向處皆如優婆夷語治善見云若比丘欲入聚落樂與女人屏處坐著衣持鉢時突吉羅若發去時步步突吉羅若至檀越家入屏處坐波逸提若出已還坐一一波逸提若眾多女人共坐眾多波逸提若比丘先入在屏處女人來禮拜問訊不犯十誦云隨優婆夷所說事應善急問謂急急而問不得遲也是比丘善急問已若言我不往無有是罪應隨可信優婆夷語故與是比丘作實覓毗尼白四羯磨作羯磨已應隨順行不與他受大戒等於滅諍法覓罪相中明若不如法行者盡形壽不得出是羯磨出者解也薩婆多云若比丘初言爾後言不爾或言我不往不作是罪應隨可信人語與實覓毗尼所以爾者欲令罪人折伏惡心又令苦惱不覆藏罪又令梵行者得安樂住又肅將來令惡法不起與作羯磨已若說先罪應解羯磨隨事輕重治若不說者盡形壽不解羯磨會詳論又云與諸比丘結戒者一為止誹謗故二為除鬬諍故三為增上法故比丘出家迹絕俗穢為人天所宗以道化物而與女人屏處私曲鄙碎上違聖意下失人天宗向信敬四為斷惡業次第法故初既屏處漸染纏綿無所不至是故防之次二法不定所立戒相若比丘共女人在露現處不可作婬處坐作粗惡語有住信優婆夷於二法中一一法說若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於二法中應一一治若僧伽婆尸沙若波逸提如住信優婆夷所說應如法治是比丘是名不定法義並同前故不重釋三結問諸大德我已說二不定法今問諸大德是中清淨不三問四勸持諸大德是中清淨默然故是事如是持
