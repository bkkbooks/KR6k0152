body:
  text: 清金陵寶華山律學沙門德基輯二正釋戒相有九初四波羅夷至九七佛略教誡經初波羅夷分四初總標二別列戒相三結問四勸持今初諸大德是四波羅夷法半月半月説戒經中來釋僧祇律云波羅夷者義當極惡以三義釋之一者退沒由犯此戒道果無分二者不共住非但失道果而已不得於僧中羯磨説戒共住故三者墮落非唯退沒道果不共住捨此形命墮大呌喚地獄中受苦故律攝云波羅市迦者是極惡義是他勝義才犯之時被他梵行者所欺勝故出家近圓為除煩惱今破禁戒反被降伏又能害善品使消滅故又復能生惡趣之罪故名波羅市迦又被非法軍而來降伏法王之子受敗於他既失所尊故云非沙門非釋子出家謂出煩惱家入如來家近圓者圓謂涅槃本為親近涅槃出家受比丘戒故云近圓又云具圓亦名圓具以此具戒乃具涅槃正因故名具圓圓具也煩惱即見修惑也律云犯波羅夷者譬如有人截斷其頭終不能還活斷多羅樹心不復更生長如針鼻缺不堪復用如大石破為二分終不可還合一處比丘亦如是犯波羅夷罪不復成比丘行多羅梵語此翻岸形直而且高葉可書經此樹若斷其心即便枯死永不復生也薩婆多論云波羅夷者名墮不如意處如二人共鬪一勝一負犯此戒者不聽懺悔畢竟永墮負處又如焦穀種雖種良田勤加溉灌不生苗實犯戒亦爾雖勤加精進終不能生道果苗實問曰犯五篇戒皆名墮落何故此獨得墮落之名耶答餘篇戒中當犯之時亦名墮落但尋生悔心作法懺悔罪即消滅不同此篇才犯之時不通懺悔永墮之墮故獨得其名也半月半月説如前戒經中來謂所誦戒從戒經中來顯非臆説也二別列戒相有四初淫二盜三殺四妄問何此四他勝逆次而説不如餘處殺盜淫妄耶答律攝云先淫後殺此依犯緣前後而説又復煩惱最強盛者在前而制此四他勝其相云何謂無厭離不忍不證然無厭離最強盛者立為初二一於淫欲二於資財不忍故行殺不證故妄語若以酌量人情起淫多故淫乃首制又淫欲乃生死之原聲聞不起大悲惟怖生死故淫戒為先殺者慈悲之敵大士不怖生死大悲普度故殺戒居首故不同餘處殺盜淫妄而説也每戒釋文分為九科或具或缺初總釋大義二緣起處三起緣人四所立戒相五解釋文義六犯戒具緣七定罪輕重八隨緣別開九會詳經論第一淫戒初總釋淫非梵行事此是共戒尼犯亦同大乘同制梵網經云一切女人不得故淫等此是性罪律攝云由癡故因淫煩惱及淫事故制斯學處準瑜伽言學處有七義一自利處二利他處三真實義處四威力處五成熟有情處六成熟自佛法處七無上正等菩提處由尸羅不清淨三昧不現前以依定故方得發慧是故偏得學處之名根本能生故名為處是處應學故名學處也此戒三緣合結二緣起處爾時佛在毗舍離名義集云毗耶離亦名維耶離鞞舍隸吠舍離此云廣嚴西域記云吠舍離國舊訛曰毗舍離什師云毗言稻土之所宜也離耶言廣嚴其地平正莊嚴淨名略疏云此云廣博嚴淨其國寬平名為廣博城邑華麗故名嚴淨有師翻為好稻出好粳糧勝於餘國故也有言好道國有道砥直有言好道其國人民好樂正道自敦仁義不須君主五百長者共行道法率土人民莫不歸悅三起緣人時迦蘭陀村須提那子言迦蘭陀村者善見律云是山鼠之名也時毗舍離王入山於樹下眠有毒蛇欲出害王於此樹下有鼠來鳴令王覺王感其恩將村中食供此山鼠乃號此村為迦蘭陀村而此村中有一長者居金錢四十萬億王即賜於長者之號由此村故所以立名迦蘭陀長者也為長者財富無量唯無子息求請神祇而生須提那此云求得於彼村中饒財多寶持信堅固出家為道時世穀貴諸比丘乞食難得時須提那作是念我今寧可將諸比丘詣迦蘭陀村乞食諸比丘因我故得大利養得修梵行使我宗族快行布施作諸福德作是念已即將比丘詣迦蘭陀村母聞子歸即往子所語其子言可時捨道還家何以故汝父已死我今單獨恐家財物入官即答言我今不能捨道習此非法今甚樂梵行修無上道母如是至三勸其子再三不允乃令與婦安子使種子不斷子白母言此事甚易我能為之時佛未制戒前不見欲過便捉婦臂將至園中三行不淨行時園中有鬼命終即處其胎九月生男字為種子問何故三行不淨又不停二復不至四耶答薩婆多論云為懷妊故其母三反問得子便止如是至三方得子故三行不淨也時須提那行不淨已來常懷愁憂同梵行者問知其故往白世尊爾時世尊以此因緣集比丘僧世尊知而問知而不問時而問時而不問義合問義不合不問世尊知時義合問須提那汝實與故二行不淨行耶如是世尊我犯不淨行言故二者梵語褒羅那地那此云舊第二以妻次於夫故名故二也爾時世尊以無數方便訶責須提那汝所為非非威儀非沙門什法師云佛法及外道凡出家者皆名沙門肇法師云出家之都名也秦言義訓勤行勤行取涅槃阿含經云捨離恩愛出家修道攝御諸根不染外欲慈心一切無所傷害遇樂不欣逢苦不戚能忍如地故號沙門後漢書郊祀志云沙門漢言息心削髮去家絶情洗欲而歸於無為也瑞應云息心達本源故號為沙門文本為絶情洗欲出家今反為不淨事非沙門也非淨行非隨順行謂非隨順涅槃之行所不應為汝須提那云何於此清淨法中乃至愛盡涅槃與故二行不淨行耶言愛盡涅槃者善見律云由三界愛欲衆生所以不得出離為愛欲所纏縛故盡即滅也愛盡者即涅槃也又涅者不生槃者不滅謂不生不滅義告諸比丘寧以男根著毒蛇口中不持著女根中何以故不以此緣墮於惡道若犯女人身壞命終墮三惡道何以故我無數方便説斷欲法謂如來訶欲不淨教諸有情斷除欲愛若欲愛乾枯則盡此殘質不受後有矣斷於欲想滅欲念除散欲熱薩婆多論云欲想者身口不動心想女人欲念者於諸淫欲非但不動身口心念亦當絶止也欲熱者二身交會欲火熾然故云欲熱也我説欲如火不觸則已觸則焦爛如把草炬安得不燒身也亦如樹果熟時即墮犯淫亦爾五陰熟時墮三惡趣又如假借猶如枯骨亦如段肉謂男女形質假借四大和合而成本是幻化非實枯骨及段肉者謂皮肉包骨而成人相一朝散壞皮肉脫落白骨相現如此不淨何得染欲如夢所見謂如夢中所見之事不應生喜而妄生喜心不應生嗔怖而妄生嗔怖今淫欲亦復如是不應生染而妄生染著如履鋒刃豈無傷身之患如新瓦器盛水著於日中日及新瓦器能消於水淫欲亦爾能消滅一切善法如毒蛇頭如轉輪刀如在尖標如利戟刺如毒蛇頭轉輪刀者此物不可觸觸則能害身命淫欲亦爾能害法身慧命尖標戟刺者苦痛厭患淫欲亦然深可患厭也甚可穢惡佛無數方便訶責已告諸比丘自今已去與比丘結戒薩婆多論云問一切善法不言結何故但言結戒答戒是萬善之本但言結戒即一切結也集十句義一攝取於僧二令僧歡喜三令僧安樂四未信者令信五已信者令增長六難調者令調順七慚愧者得安樂八斷現在有漏九斷未來有漏十正法得久住二百五十戒中皆集此十句義結戒以下更不重出一攝取於僧謂如來制諸學處威儀細行清淨護持令居家男女見之不生譏謗譏謗不興自然發心發心即受化受化即攝歸僧寶也二令僧歡喜謂如來制戒令諸比丘住於戒中蕩滌凡情善法日茂六和無違極善安住故云令僧歡喜三令僧安樂如來示諸比丘此作不得罪此作得罪一切惡法制止令斷不令比丘造作諸惡而示行善道勿令有惡趣之怖今世後世令得安樂故曰令僧安樂四未信者令信因制戒故比丘戒律慎持威儀清淨若未信心見之生信而作是言沙門釋子勤心精進戒行威儀皆悉具足見如是已而生信心故云未信者令信五已信者令增長謂持信堅固出家者隨諸禁戒如説而行世人見聞淨信重增甚為恭敬是名已信增長六難調者令調順謂不慙愧者作不善法不生羞耻佛制戒已若有犯者衆僧以毗尼法治令彼更不敢作是名難調能調七慚愧者得安樂謂佛制戒已令不慙愧比丘不得入衆羯磨説戒不得觸嬈如法比丘故令慚愧者得安樂住也八斷現在有漏謂諸有情三毒不制放縱六根於非情境上有漏事興如來依事制戒斷除有漏無令興起是名斷現在有漏九斷未來有漏謂諸異生不斷五情而行惡法後身墮地獄中受種種苦毒非直一受而已輪轉在中無央數劫如來為説此戒依戒而修令證道果不受後有之身故云斷未來有漏十正法得久住善見律云正法有三一者學正法久住二者信受正法久住三者得道正法久住何謂學正法久住謂學三藏一切久住佛所説法是名正法於三藏中十二頭陀威儀細行禪定三昧是名信受正法久住四沙門果及涅槃是名得道正法久住如來結戒故令比丘隨順戒學因學戒故正心持律因持律故得入禪定因禪定故而得道果正法久住故學為初也欲説戒者當如是説若比丘犯不淨行行淫欲法是比丘波羅夷不共住如是世尊與諸比丘結戒時有跋闍子比丘愁憂不樂梵行即還家共故二行不淨行彼作是念將不犯波羅夷耶當云何即便語諸同學善哉長老為我以此事白佛隨佛所教我當奉行時諸比丘白佛佛言癡人犯波羅夷不共住薩婆多論云佛訶是愚癡人者佛大慈大悲兼無惡口云何言愚癡人答曰佛是稱實之語非是惡口此具縛煩惱衆生具足愚癡故二慈悲心故訶責折伏如今和尚阿闍黎教誡弟子故稱言癡人非是惡口若有餘人不樂淨行聽捨戒還家若復欲出家修梵行應度令出家受大戒乃更結不還戒戒羸不自悔之語此第二結戒也時有一乞食比丘依林中住薩婆多論云林中住者以在衆中多事多惱妨修善法故若以智慧偏多以在衆中多聞多見多論多語雖生智慧少於禪定宜在靜處以修其心若定多者則宜在衆廣求知見以此義故在林中住有一雌獼猴先在彼林中時乞食比丘到村乞食還在林中食食已餘食與此獼猴如是漸漸調順逐比丘後行乃至手捉不去此比丘即捉獼猴共行不淨時有衆多比丘案行住處至彼林中時彼獼猴在比丘前現其淫相時諸比丘作是念將無餘比丘作此不淨行耶屏處伺之見已即來語言如來不制言比丘不得行不淨行耶報言如來所制男女不制畜生諸比丘往白佛佛以無數方便訶責已初入波羅夷自今已去當如是説戒四所立戒相若比丘共比丘同戒若不還戒戒羸不自悔犯不淨行乃至共畜生是比丘波羅夷不共住釋義若比丘者有八種比丘一名字比丘謂如世間人為欲呼召男女時遂立名字喚作比丘又如檀越來請比丘沙彌雖未受大戒亦入比丘之數是名字比丘也二相似比丘謂如外道白衣自剃鬚髮著袈裟無師僧受具形貌相似比丘而實非比丘故名相似比丘也三自稱比丘如長老阿難夜行見一犯戒比丘而問咄汝為是誰犯戒比丘應言我是比丘又如賊住之人非是比丘而自稱言我是比丘四善來比丘謂如來觀其根性成熟堪可化度欲求出家佛便呼言善來比丘於我法中快自娛樂可修梵行得盡苦源佛語未竟鬚髮自落袈裟在身鉢盂在手如百臘老比丘五乞求比丘謂不受請食盡形乞食資身遠離邪命故云乞求比丘六著割截衣比丘謂衣價直百千萬比丘得已便割截而著壞衣價直以針線刺衲毀其細軟遂成粗衣而以樹皮壞其本色便是故衣能著割截衣者是名著割截衣比丘七破結使比丘結使者即見思煩惱先明見惑後明思惑頌云苦具一切集滅七身邊見取三使無道諦雙除身邊二上不行嗔八十八謂分別我執所惑者總有十種謂五鈍使五利使鈍者即遲鈍也謂此五種妄惑由推身見等五種利使而生對利説鈍故名鈍使謂貪嗔癡慢疑五利使者利即快利之義謂此五種妄惑動念即生造次恆有也謂身見邊見邪見見取戒禁取今斷惑不出四諦所謂苦集滅道令知苦斷集慕滅修道謂所取之惑有障諦有不障諦於四諦之中有全具有不全具云苦具一切者謂苦諦下十使全具集滅二諦各具七使除去身邊二見與戒取故云三使無也道諦止具八使除去身邊二見也此約欲界四諦共具三十二使上界不行嗔者謂色界無色界禪定力勝所以嗔使不行故於四諦之中各除一嗔謂苦下具九集滅二諦具六道諦惟七是知上色界止有二十八使無色界亦爾三界共有八十八品故云八十八使也斷此惑已即證初果次明俱生我執細而難斷故起修道方除也思惑者有四謂貪嗔癡慢欲界四惑全具上二界各除一嗔故色界有三貪癡慢無色界亦爾總名十諦思惟也若將前八十八品見惑合説者名九十八使也又思惑難斷故潤七生今三界分為九地欲界一地名為五趣雜居地色界四地初禪離生喜樂地二禪定生喜樂地三禪離喜妙樂地四禪捨念清淨地無色界四地者一空無邊處地二識無邊處地三無所有處地四非非想處地故云三界九地也又此思惑分為八十一品一地之中而有九品共為八十一品也謂初果人已斷八十八使見惑復起修道位方斷欲界九品思惑所以最強難斷者以欲界五欲心強盛故潤七生也謂上上品獨潤二生二生天上二反人間上中品上下品共潤二生方斷中上品獨潤一生中中品中下品共潤一生斷此六品方證二果名為一來果猶一來生惑未斷故下上品獨潤半生下中品下下品共潤半生如是合潤一生此謂欲界九品思惑斷盡方證三果名曰不還果住五不還天不來人間受生也已破欲界思惑盡故餘有上二界七十二品殘思以三果聖人修滅盡定時定力增勝稍易斷故若斷盡此惑即出三界名曰阿羅漢此云無生永不來三界受分段生死也言分段者分即分限段即形段謂三界果報壽有長短分限身有大小形段皆不免於生死是名為分段生死已上二惑八十八使名曰見惑謂見一切住地言一切者通三界見惑也上客下塵謂見思等惑皆由衆生不了外塵之境種種妄想而生若以智慧觀察惑體本空則法性理顯惑亦何有故經云不住名客是名客義二塵者謂微細之惑而能染汙清淨真性譬如牖隙光流諸塵相現亦能亂於虗空之性若智慧發明了惑本無則理現前塵亦何有經云澄寂名空搖動名塵是名塵義三界思惑者欲界九品名曰欲愛住地色界三十六品名曰色愛住地無色界三十六品名曰有愛住地總名四住地煩惱感三界分段生死之果若能三界果喪四住因亡則證有餘涅槃此二乘人極果也名破結使比丘八受大戒白四羯磨如法成就得處所比丘是中比丘若受大戒白四羯磨如法成就得處所住比丘法中是名比丘義是中取最後義共比丘者如餘比丘受大戒白四羯磨如法成就得處所住比丘法中是名共比丘義云何名為同戒我為諸弟子結戒已寧死不犯是中共餘比丘一戒謂戒體無二故同戒謂戒相無別故等戒謂百臘老比丘及新受戒比丘所行戒行俱等更無有異故是名同戒云何名為不捨戒捨即還也顛狂捨戒心亂捨戒痛惱捨戒啞捨戒聾捨戒啞聾捨戒顛狂心亂痛惱啞聾人前捨戒中國人邊地人前捨戒邊地人中國人前捨戒不靜靜想捨戒靜作不靜想捨戒戲笑捨戒若天若龍若夜叉若餓鬼若睡眠人若死人若無知人若自不語若語前人不解如是等不名捨戒云何名捨戒若比丘不樂梵行欲得還家厭比丘法常懷慚愧貪樂在家貪樂優婆塞法或念沙彌法或樂外道法或樂外道弟子法或樂非沙門非釋子法便作如是語我捨佛捨法捨比丘僧捨和尚捨同和尚捨阿闍黎捨同阿闍黎同和尚者謂同和尚一輩或戒臘同等或同師秉戒阿闍黎亦爾捨諸梵行捨戒捨律捨學事受居家法我作淨人我作優婆塞我作沙彌我作外道及作外道弟子我作非沙門非釋子如是説而了了者是名捨戒根本律云如有苾芻情懷顧戀欲希還俗於沙門道無愛樂心為沙門苦羞慚厭背詣苾芻所如是言具壽存念我某甲今捨學處薩婆多論云若捨戒時都無出家人若得白衣不問佛弟子非佛弟子但使言音相聞解人情去就亦得捨戒一説便捨不須三説問曰受戒時須三師七僧捨戒何故一人便捨答曰求增上法故則須多緣多力捨戒如從高墜下故不須多也又云受戒時如得財寶捨戒時如失財寶又如入海採寶無數方便然後得之及其失時盜賊水火須臾散滅捨戒亦爾戒羸不自悔者謂持戒心劣非法心盛故云羸也不自悔者不自悔改或有戒羸不捨戒或戒羸而捨戒何者戒羸不捨戒若比丘愁憂不樂梵行欲得還家厭比丘法常懷慚愧意樂在家乃至樂作非沙門非釋子法便作是言我念父母兄弟姊妹婦兒村落城邑田園浴池我欲捨佛法僧乃至學事欲受持家業乃至非沙門非釋子是謂戒羸不捨戒何者戒羸而捨戒若作如是思惟我欲捨戒便捨戒是謂戒羸而捨戒犯不淨行者是淫欲法律攝云行謂聖道淨謂涅槃由八聖道方能證會作不淨行正違彼故乃至共畜生者薩婆多論云畜生於六道中是邊鄙故云下至畜生既下至畜生凡可淫處一切盡結也是比丘波羅夷不共住是比丘指犯罪者言不共住者有二同一羯磨同一説戒不得於是二事中住是名不共住犯緣此戒具足四緣方成本罪若緣有缺罪結方便一有欲心受樂二堪行淫境三要根全四入過限復有五因緣而犯諸罪一無知故無所知識二放逸故放蕩縱逸不檢三業三煩惱熾盛故以貪嗔癡煩惱增盛不能制伏四不尊敬教故五無慚愧故以無慚愧故不尊敬受持如來所制清淨禁戒或可五義相躡而起由無知故放逸放逸故煩惱盛煩惱盛故不尊敬教不尊敬教故無慚愧也善見云若長老聞此不淨行慎勿驚怪何以故如來憐愍我輩為結戒故説此惡言若不説者云何得知波羅夷偷蘭遮突吉羅若法師為人講聽者慎勿露齒笑若有笑者驅出何以故佛憐愍衆生金口所説汝等應生慚愧心而聽何以笑定罪此中犯者三種行不淨行波羅夷人非人畜生復有五種行不淨行波羅夷人婦童女二形黃門男子於三種婦行不淨行波羅夷人婦非人婦畜生婦如是三種童女三種二形三種不能男三種男子犯人婦三處波羅夷大便道小便道及口非人婦畜生婦人童女非人童女畜生童女人二形非人二形畜生二形三處亦如是人黃門二處行不淨行波羅夷大便道及口非人黃門畜生黃門亦如是人男非人男畜生男亦如是比丘有淫心向人婦女大便道小便道及口若初入波羅夷不入不犯有隔有隔謂男女二根俱有衣隔有隔無隔謂女根有衣隔男根無衣隔無隔有隔女根無衣隔男根有衣隔無隔無隔男女二根俱無衣隔波羅夷乃至畜生亦如是若比丘淫意向睡眠婦女若死形未壞大便道小便道及口亦如是若比丘為怨家將至人婦女所強持男根令入三處始入覺樂入已樂出時樂波羅夷於三時中隨有一時受樂皆波羅夷乃至男子亦如是若怨家強捉比丘大便道中行不淨行若初入時入已出時於三時中隨有一時受樂皆波羅夷僧祗律云受樂者如飢得食如渴得飲不受樂者譬如好淨之人以種種死尸繫其頸上又如破癰熱鐵燒身不受樂者亦復如是從道入道從道入非道從非道入道從道入道者謂二道合或從小便道入從大便道出或從大便道入小便道出從道入非道者始從大小便道入從瘡穴中出謂瘡穴與二道連合也從非道入道者先從瘡穴而入後從二道中出若齊限入若盡入若語若不語皆波羅夷齊限者謂作齊限不盡入也語者告知也不語者不告彼人知如眠等人若比丘方便求欲行不淨行成波羅夷不成偷蘭遮若比丘教比丘行不淨行彼比丘若作教者偷蘭遮若不作教者突吉羅比丘尼教比丘行不淨行若比丘作尼偷蘭遮不作尼突吉羅除比丘比丘尼餘衆相教行不淨行作不作盡突吉羅餘衆者小三衆若死尸半壞行不淨行入便偷蘭遮若多分壞若一切壞偷蘭遮若骨間行不淨行偷蘭遮若穿地作孔摶泥作孔若君持口中犯偷蘭遮謂作大小便道想行淫偷蘭遮若不作道想僧殘若道作道想波羅夷道疑波羅夷道非道想波羅夷非道道想偷蘭遮非道疑偷蘭遮僧祗律云若比丘以染汙心欲看女人得越毗尼心悔即責心突吉羅若眼見若聞聲犯越毗尼罪相觸得偷蘭遮乃至入如胡麻波羅夷若身大雖入不觸其邊者得偷蘭遮謂身根大若女人裂為二分就二分行淫者偷蘭遮繫令合行淫者波羅夷薩婆多論云欲作重淫若起還坐輕偷蘭遮發足趣女人未捉已還及捉已失精乃至共相嗚抱輕偷蘭男形垂入女形已來未失精亦輕偷蘭若失精重偷蘭若男形觸女形及半珠已還不問失精不失精盡重偷蘭若生女死女三處行淫若壞墮蟲食於中行淫俱得重偷蘭若生女死女非處行淫腋下股間行淫得重偷蘭若發足向死人女非人女畜生女二根欲作重淫得罪如前發足向人男非人男畜生男黃門欲作重淫得罪同前若先正為女人上出精而已除三瘡門一切身分處精出僧殘若先為摩捉嗚抱而已若摩若捉盡僧殘若欲女人身上出精手已摩捉精未出便止四人偷蘭比丘尼波羅夷式叉摩那沙彌沙彌尼突吉羅滅擯是謂為犯開緣不犯者若睡眠無所覺知不受樂一切無有淫意不犯第四分云佛在舍衛國有比丘住阿蘭若處晝日眠時有取薪女人於比丘上行淫已去比丘不遠而住比丘覺已見身不淨汙念言此女必於我身上行淫生疑問佛佛言汝覺不答言我不覺佛言不犯比丘不應如是處晝眠不犯者最初未制戒癡狂心亂痛惱所纏善見律云初者於行淫中之初如須提那子不犯波羅夷餘者犯十誦律云有五相名狂人即癡狂也親里死盡故狂財物失盡故狂田業人民失盡故狂或四大錯亂故狂或先世業報故狂若雖有如是狂病自知我是比丘作淫欲得波羅夷有五種因緣令心散亂為非人所打故心散亂或非人令心散亂或非人食心精氣故心散亂或四大錯故心散亂或先世業報故心散亂若雖有如是散亂自知是比丘作淫欲犯波羅夷有五種病壞心或風發故病壞心或熱發故病壞心或冷發故病壞心或三種俱發故病壞心或時節氣發故病壞心雖有如是病壞心若自覺是比丘作淫欲得波羅夷若不自知不犯病壞心即痛惱所纏又云若此顛狂失本心故見火而捉如金無異見糞而捉如旃檀無異如是顛狂犯戒無罪會詳楞嚴經云若諸世界六道衆生其心不淫則不隨其生死相續汝修三昧本出塵勞淫心不除塵不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女又云當觀淫欲猶如毒蛇如見怨賊先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起禁戒成就則於世間永無相生相殺之業又云必使淫機身心俱斷斷性亦無於佛菩提斯可希冀梵網經云持佛禁戒作是願言寧以此身投熾然猛火大坑刀山終不毀犯三世諸佛經律與一切女人作不淨行法苑珠林云二種淫報一婦不貞潔謂因前世犯他妻妾邪行穢汙故感今生婦不貞艮端潔也二得不順意眷屬謂因前世邪淫奪人所寵令不如意故感今生眷屬常不順意也第二盜戒初總釋盜乃最為不良之事此是共戒尼犯亦同大乘同制梵網經云自盜教人盜方便盜呪盜乃至鬼神有主物劫賊物一切財物不得故盜等此是性罪然菩薩見機得作戒本經云菩薩淨戒律儀善權方便為利他故於諸性罪少分現行由是因緣於菩薩戒無所違犯生多功德律攝云此由癡故因積畜事畜積煩惱制斯學處二緣起處爾時佛遊羅閲城耆闍崛山中言羅閲者此云王舍域大論云昔有須陀摩王精進持戒常依實語晨朝乘車與諸婇女入園遊戲出城門時一婆羅門來乞財物而語王言王是大福德人我身貧窮當見愍念賜我少多王言當相布施須我出還作此語已入園澡浴嬉戲時兩翅王名曰鹿足空中飛來捉王將去至所住處置九百九十九王中須陀摩王言我不畏死自恨失信我從生來初不妄語即語前事鹿足王言汝意欲爾聽汝還去七日布施婆羅門訖當便來還若過七日我有翅力取汝不難須陀摩王得還本國恣意布施立太子為王大會人民懺謝之言我智不周初治多不如法當見忠恕如我今日身非己有正爾還去舉國人民及諸親戚叩頭留之願王留意慈蔭此國勿以鹿足鬼王為慮當設鐵舍奇兵鹿足雖神不畏之也王言不得而説偈言實語第一戒實語升天梯實語為大人妄語入地獄我今守實語寧棄身壽命心無有悔恨如是思惟已即發去到鹿足所鹿足喜言汝是實語人不失信要一切人皆惜身命汝從死得脫還來赴信汝是大人今相放捨九百九十九王亦布施汝隨意各還本國由此千王共居故名王舍此城有三名或言羅閲城亦言摩竭提亦言摩竭陀此三義一名異漢言王舍城羅者言王閲者言舍故言王舍又翻無害從劫初以來無刑害故中印度境善見律云王舍城國邑人民有八億萬戶邑外屬王舍城者有八萬聚落國土縱廣三百由旬耆闍崛山者耆者鷲鳥崛者頂也耆闍鳥食竟還就山頂栖故名耆闍崛山又有一解山頂名崛形似鷲鳥是故名耆闍崛山也三起緣人時羅閲城中有比丘字檀尼迦陶師子陶師者即瓦師此比丘是瓦師之子在間靜處止一草屋入村乞食後有取薪人破其草屋持歸比丘乞食還作是念我今自有伎藝寧可和泥作全成瓦屋取薪牛糞燒之屋成赤色如火爾時世尊從耆闍崛山下遙見此舍色赤如火知而故問諸比丘以此因緣具白世尊世尊以無數方便訶責自今已去不得作赤色全成瓦屋作者突吉羅時世尊敕諸比丘汝等共集相率速詣打破善見律云檀尼迦比丘作屋自用物作屋成如來何故打破答曰所以破者此屋不淨故是外道法復有餘義無慈悲衆生作此瓦屋檀尼迦是瓦師家子善能和泥作屋窗牖扄悉是泥作唯戶扇是木取柴薪牛糞及草以赤土汙塗外燒之熟已赤如火打之鳴喚狀如鈴聲風吹窗牖猶如樂音也檀尼迦見屋破已時摩竭國王有守材人與檀尼迦親厚知識乃語守材人汝知王瓶沙與我材木不彼人言若王與者好惡多少隨意自取王所留要材比丘輒斫截持去梵語瓶沙此翻模實身模充實故又翻形牢亦云影堅影謂形影亦云影勝又名頻婆娑羅此云顏色端正皆取強壯姝好為義其形長大性行雄猛常自躬為征戰也時有一大臣統知城事至材坊見王所留要材斫截狼籍問知其故白王檀尼迦比丘後往王所王言大德應死王自念言何以少材而斷出家人命是所不應訶責已放去諸臣不平羅閲城中居士譏嫌少欲比丘聞白佛佛以此因緣集比丘僧知而故問檀尼迦比丘汝審爾不答言實爾世尊以無數方便訶責有一比丘名曰迦樓本是王大臣善知世法迦樓或作迦留或作迦羅秦言黑此比丘是王瓶沙舊大臣善知世法故佛問之然後隨國法制戒去佛不遠在衆中坐世尊知而故問王法不與取幾許物應死比丘言若取五錢若直五錢物應死世尊告諸比丘檀尼迦癡人善見律云因癡故掘土踏泥取火燒多諸衆生因此而死故云癡人也多種有漏處最初犯戒自今已去與諸比丘結戒四所立戒相若比丘若在村落若間靜處不與盜心取隨不與取法若為王王大臣所捉若殺若縛若驅出國汝是賊汝癡汝無所知是比丘波羅夷不共住釋義村者有四種一者周匝垣墻二者柵籬三者籬墻不周四者四周有屋律攝云聚落者中有巷陌店肆名之為聚落者村外之家名之為落故云聚落也間靜處者村外靜地僧祗云空地者垣墻院外除聚落界盡名空地聚落界者去籬不遠多人所行蹤迹到處盡名聚落界五分云聚落外盡一箭道有慚愧人所便利處是名聚落所行處即界也不與者他不捨盜者盜心取隨不與取法者若五錢若五錢直薩婆多云於閻浮提一切國法禮樂以王舍城為正王舍國法盜五錢已上入重罪中佛依此法盜至五錢得波羅夷如閻浮提內現有佛法處限五錢得波羅夷罪若國不用錢準五錢成罪善見律云二十摩娑迦成一迦利沙槃分一迦利沙槃分為四分一分是五摩娑迦過去未來諸佛皆以一分結波羅夷一切諸佛不異結四波羅夷不增不減是故如來以一分結第二波羅夷也十誦云一銅錢直十六小錢王者得自在不屬人貫三才主萬物無為化世有道恩民大臣者種種大臣輔佐王捉者僧祗云王使人執或捉其手及餘身分是名捉殺者奪其命根縛者僧祗律云或以屋縛或以城縛或以材縛或著鎖絆或著杻械是名為縛驅出國者驅出聚落驅出城驅出國是名驅出汝是賊汝癡汝無所知此訶責之詞律攝云汝是賊者是總標癡無所知等是別釋無明是賊因正作業時由癡無所知故方便興盜無現行法怖及未來怖應知為盜因也作如是盜者正明盜業不告主知若強若竊並名為盜犯緣此戒具足五緣方成本罪若緣有缺罪便開輕一有盜心二有主物三有主想四直五錢五離本處定罪此中犯者共有七十二句今去復存單合有十句若自手取若看取若遣人取非己物想取非暫用取非本意取本字該同字恐筆誤耳他物他物想取若離本處有主有主想取他護他護想取波羅夷處者若地處若地上處若乘處若擔處若虗空若樹上若村若阿蘭若處若田若處所若船若水處若私度關塞不輸稅若取他寄信物若水楊枝樹果草木無足二足四足多足衆生若同財業若要若伺候若守護若邏要道是謂處地處者地中伏藏未發出七寶金銀真珠琉璃璧玉硨磲碼瑙生像金銀衣被若復有餘地中所須之物屬主者若以盜心取五錢若過五錢若牽挽取言牽者連也挽者引也著地牽引而去名牽挽取若埋藏若舉離本處初離波羅夷方便欲舉而不舉偷蘭遮自下結罪皆同地上者金銀乃至所須之物屬主乘處者乘有四種象乘馬乘車乘步乘若復有餘乘盡名為乘乘上若有金銀七寶乃至所須之物有主若取乘從道至道從道至非道從非道至道從坑中至岸上從岸上至坑中擔處者頭擔肩擔背擔若抱若復有餘擔此諸擔上有金銀七寶乃至所須之物有主若取擔者從道至道乃至坑中空處者若風吹毳若劫貝若拘遮羅若差羅波尼此云灰水乃衣名也若芻摩若麻若綿若耽嵐婆漢言絹若頭頭羅此云細布若鴈若鶴若孔鸚鵡鸜鵒若復有餘所須之物有主上處者若舉物在樹上墻上籬上杙上龍牙杙上衣架上繩牀上木牀上若大小褥上枕上地敷上有金銀七寶乃至所須之物有主村處者村有四種如上若村中有金銀乃至所須之物有主若以機關攻擊破村若作水澆或依親厚強力或以言辭辨説誑惑而得得者波羅夷不得偷蘭遮若處者村外有主空地彼空處有金銀七寶乃至所須之物有主若以方便壞他空地若作水澆或依親厚強力或以言辭辨説而得田處者稻田麥田甘蔗田若復有餘田彼田中有金銀七寶乃至所須之物有主若方便壞他田若作水澆若依親厚強力或以言辭辨説誑惑而得處所者若家處所若市肆處若果園若菜園若池若庭前若舍後若復有餘處彼有金銀七寶乃至所須之物有主船處者小船大船壺船以形似壺一木船以大木刳空以為船也舫船即方船也櫓船櫓即進船之器具以為名龜形船鱉形船謂形似龜鱉也皮船用皮為之浮瓠船瓠即瓢也又瓠者瓦器並可浮物也果船亦以形為名也懸船今時神廟中多以船懸於梁上供神筏船郭璞曰木曰𥱼竹曰筏編竹渡物也若復有餘船上有金銀七寶乃至所須之物有主若從此岸至彼岸從彼岸至此岸若順流若逆流若沉著水中若移著岸上若解移處水處者若藏金銀七寶衣被沉著水中若水獺若魚若鱉若失收摩羅收字或作守字善見律云鰐魚長二丈餘有四足似鼉齒至利禽鹿入水齧腰即斷又翻殺子魚廣州有之若優羅華此云青蓮華頭摩華此云紅蓮華拘物頭華此云地喜華亦云拘某陀此云黃蓮華分陀利華此云白蓮華睿師云未敷名屈摩羅將落時名迦摩羅處中盛時名分陀利體逐時遷名隨色變故有三名也及餘水中之物有主若以方便壞他水處直五錢波羅夷減五錢偷蘭遮輸稅者比丘無輸稅法若白衣應輸稅物比丘以盜心為他過物若擲關外若五錢若過五錢若埋藏舉若以辨辭言説誑惑若以呪術過取他寄信物者持寄信物去作盜心取五錢若過五錢頭上移著肩上若從右手移著左手從左手移著右手若抱中若著地舉離本處水者若大小甕及種種水器若衆香水若藥水以盜心取五錢若過五錢楊枝者若一若兩若衆多若一抱若一束若一擔若香所熏若藥塗若盜心取五錢若過五錢若牽挽取離本處園者一切草木藂林華果有主無足衆生者蛇魚及餘無足衆生有主二足衆生者人非人鳥及餘二足衆生有主四足衆生者象馬馲駝驢鹿羊及餘四足衆生有主多足衆生者蜂周隆伽此蟲身有多毛而復多足類似毛蟲若百足及餘多足衆生有主以盜心取直五錢若過五錢同財業者同事業得財物當共以盜心取五錢若過五錢共要者共他作要教言某時去某時來若穿墻取物若道路劫取若燒從彼得財物來共以盜心取直五錢若過五錢伺候者我當往觀彼村若城邑若船渡處若山谷若人所居處市肆處作坊處於彼所得物一切共以盜心取直五錢若過五錢守護者從外得財物來我當守護若所得物一切共若以盜心取直五錢若過五錢看道者我當看道若有王者軍來若賊軍來若長者軍來當相告語若有所得財物一切共若以盜心取直五錢若過五錢如上一切初離本處波羅夷方便欲舉而不舉偷蘭遮方便求過五錢得過五錢得五錢皆波羅夷得減五錢不得皆偷蘭遮方便求五錢得過五錢得五錢波羅夷得減五錢不得偷蘭遮方便求減五錢得過五錢得五錢波羅夷得減五錢偷蘭遮不得突吉羅教人方便求過五錢得過五錢得五錢二俱波羅夷得減五錢不得二俱偷蘭遮方便教人求五錢得過五錢得五錢二俱波羅夷得減五錢不得二俱偷蘭遮方便教人求減五錢得過五錢得五錢取者波羅夷教者偷蘭遮得減五錢二俱偷蘭遮不得二俱突吉羅方便教人求五錢若過五錢受教者取異物取者波羅夷教者偷蘭遮方便教人求五錢若過五錢受教者異處取物受教者波羅夷教者偷蘭遮方便教人求五錢若過五錢受教者謂使取物無盜心而取得五錢若過五錢教者波羅夷受使者無犯若教人取物受教者謂教盜取若取得直五錢若過五錢受教者波羅夷教者無犯有主有主想不與取五錢若過五錢波羅夷有主疑偷蘭遮無主有主想偷蘭遮無主疑偷蘭遮有主有主想減五錢偷蘭遮有主疑減五錢突吉羅無主有主想減五錢無主疑減五錢盡突吉羅根本律云起盜心興方便得惡作罪觸彼物窣吐羅底也即偷蘭遮罪舉離處滿五錢波羅市迦不滿者得粗罪亦偷蘭罪若是畜生邊物觸彼物惡作罪舉離處滿五錢者得粗罪不滿者惡作罪僧祇律云有比丘多有衣鉢大畜弟子彼諸弟子不修戒行作是念言可往和尚阿闍黎房中盜諸衣自己衣亦在師房中便共作要汝得衣物者與我共分若我得者亦共汝分便入房中就衣架上捉和尚阿闍黎衣徙就己衣衣不離本架者犯偷蘭遮若舉師衣離架著己衣中者波羅夷若師衣帶衣角若線縷未離衣架者未波羅夷一切離已波羅夷若彼和尚阿闍黎疑是弟子或能偷我衣便自藏衣更著餘處其弟子便入暗中誤偷自己衣出外不分故是中半衣邊滿者波羅夷以先共要凡所得物一切共既誤盜己衣亦準分半既不與分滿五錢波羅夷若比丘在道行為賊所劫或賊少比丘多或賊藏物已更往餘處是比丘若未作失想還奪還取無罪若已作失想還奪還取便為賊復劫賊滿五錢波羅夷又或順道去漸近聚落持物將分比丘還從乞得無罪若以勢力恐怖令還無罪若告聚落主方便慰令還無罪若知令彼或殺或縛則不應告若比丘作摩摩帝言摩摩帝者或云毗呵羅莎弭此云寺主塔無物衆僧有物便作是念天人所以供養衆僧者皆蒙佛恩供養佛者便為供養衆僧即持僧物修治塔者此摩摩帝得波羅夷若塔有物衆僧無物便作是念供養衆僧者佛亦在中便持塔物供養衆僧摩摩帝用者得波羅夷若塔無物僧有物得如法貸但分明疏記言某時貸用某時得當還若僧無物塔有物亦如是若交代時應僧中讀疏分明付授若不讀疏越毗尼罪若有二比丘共財應分一比丘盜心獨取除自分他分滿波羅夷若同意取者無罪若作是念我今用後當償還無罪第四分云衆多比丘遣一人取他物得五錢以上共分雖各得減五錢盡波羅夷以各具盜心取他物離本處時滿五錢故於彼處得直五錢物到此處直減五錢波羅夷至此處雖得減五錢初離本處時已得波羅夷唯取當時得罪耳於彼處得減五錢物到此處直過五錢偷蘭遮至此處雖直過五錢離本處時減五錢故又物主只失減五錢物故得偷蘭遮知前人以盜心使我取物先可之後悔不往突吉羅欲盜他衣錯取己衣偷蘭遮他盜取物而奪取彼盜者波羅夷前後取滿五錢者波羅夷此謂盜心相續若自受用若令他損減一切波羅夷此謂貪嗔二盜律攝云獵師逐鹿走入寺中隨傷不傷不還無罪謂慈護衆生非同盜故也若鹿被箭入寺便死應還勿留若與賊同心示彼舍處後時受分隨得招罪問此與教他取有何差別倘不受分豈無罪耶答教他為我取則決定得物之心物離本處即成本罪此示彼舍處不決生得物之心雖賊劫去彼物時不結罪待後受分時滿五錢方結本罪雖不受分亦結偷蘭遮罪若後生悔向彼物家報遣防護勿令失脫設彼賊偷皆得方便罪亦偷蘭遮後雖受分亦窣吐羅與賊同行欲為盜事中路而退但得惡作同心作賊為他守道分物受分者成犯由怖為伴無心共盜彼雖偷得苾芻非犯若持自物或是他物作如是語欲偷稅得越法罪教偷稅者從異道去得惡作罪若作惡心指他異道冀免稅直得窣吐羅罪若持他物過彼稅處無心取分者粗罪未至稅處或取半分或取全分而未過稅處得窣吐羅問此既得稅直已滿五錢何不得本罪而結方便耶答雖得稅直未過稅處恐後過稅而有阻隔未作實得之心先結方便待過稅已方結本罪若過稅處數滿本罪若持己物到於稅處使他越過亦得本罪實是己財決心回與父母兄弟等告掌稅者此非我物不與汝稅或乘空去或口含或衣裏或避路並得粗罪問此亦仍同為他越稅云何不得本罪答為他過物利必歸己故結本罪今是己物決心回施無利歸己罪結方便也若為父母及三寶事持物過稅處應為稅官種種説法稱讚三寶説父母恩彼不取直者無犯若猶索者應與盜事略有五種一對面強取二竊盜取三調弄取四恩寄取五與更奪取此之五事咸是盜收有施物來知非己分言我合得者窣吐羅罪若受其分準數成犯他不請食輒去食者得惡作罪若興方便欲盜他財觸著之後便從主乞彼與得時得前粗罪初為貸借後欲不還決絶之時便得本罪若他寄物先作盜心得窣吐羅後時移處便得本罪若先移處後心決絶亦得本罪博奕偷子迷惑取物準數成犯凡是賭物皆得惡作意偷彼物而錯偷此既乖本心但得粗罪五分云非同意人輒作同意取其衣食突吉羅善見云若受人寄物物主還取答言我不受汝寄突吉羅令物主狐疑偷蘭遮主言我不得此物波羅夷若偷人取物比丘以偷心奪取物離偷人身分若此人健又奪物去比丘雖不得物波羅夷以決定得偷心離本處故若檀越施衆僧果樹或擬衣服或擬湯藥衆僧不得分食若以果樹為四事布施比丘以盜心過分食隨直多少結罪若為作房舍施衆僧回食得偷蘭遮應還直若為衣施應作衣若飢儉時衆僧羯磨和合食用無罪以衣施作房舍以房舍施作衣食亦如是寺中房舍多無人修治敗壞應留好者餘粗敗得壞賣為食用為護住處故十誦云若水中浮物來比丘以偷奪心取選擇時偷蘭遮若捉留住後水到前或沉著水底或舉離水直五錢以上波羅夷盜佛舍利偷蘭遮若尊敬清淨心取無罪尊敬者謂見佛舍利如見佛身心生尊敬清淨心者謂無盜心以恭敬供養心取去供養無罪盜經卷隨計直犯盜塔寺中供養具若有守護隨計直犯奪神像物偷蘭遮薩婆多云若自盜他物欲取五錢五錢已上從始發足步步輕偷蘭乃至選擇取三錢已還得輕偷蘭四錢成重偷蘭若取一錢乃至四錢亦爾若遣使取他物當教時得輕偷蘭取五錢已上離本處時得重罪若盜僧物五錢已上得重偷蘭四錢已下得輕偷蘭而報罪甚深若舍屬一主物不異主若不離地未出家界步步輕偷蘭若入女姊妹奴婢房中得波羅夷若入兄弟兒房中得輕偷蘭若出主地相亦波羅夷比丘尼波羅夷三小衆突吉羅滅擯是謂為犯開緣不犯者與想取己有想取糞掃想暫取想親厚意想一切無罪第三分云有七法是親友利益慈愍故何等七難與能與難作能作難忍能忍密事相語不相發露遭苦不捨貧賤不輕根本雜事云凡是親友可委寄人有其五種一心相愛愍二近為得意三是所尊重四久故通懷五聞用己財心生歡喜不犯者最初未制戒等會詳首楞嚴經云若諸世界六道衆生其心不偷則不隨其生死相續汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人法苑珠林云偷盜二報一貧窮謂因前世盜他財物令彼空乏故感今生自亦貧窮也二不得自在謂因前世劫奪他財而令他人不得自在故感今生雖有財物而屬五家不得自在受用也
