body:
  text: 清金陵寶華山律學沙門德基輯第十三嫌罵戒總釋此是共戒尼犯亦同大乘同學此是性罪律攝云由謗讟事瞋恨煩惱制斯學處此戒二緣合結緣起處佛在耆闍崛山尊者沓婆摩羅子為衆僧所差知僧臥具及僧食起緣人慈地比丘相去眼見耳不聞處自相謂言此沓婆摩羅子有愛恚怖癡餘比丘語言汝等莫說彼有愛恚怖癡報言我等不面說在屏處譏嫌耳諸比丘白佛呵責結戒譏嫌波逸提慈地復齊沓婆摩羅子聞而不見處言有愛恚怖癡諸比丘言佛制戒譏嫌波逸提報言我等不嫌是罵耳佛言當如是說戒所立戒相若比丘嫌罵波逸提釋義嫌罵者若面見譏嫌背面罵面見嫌者齊眼見耳不聞處言有愛恚怖癡背面罵者齊耳聞不見處言有愛恚怖癡犯緣此戒具足三緣方成本罪一有心嫌罵二前人羯磨所差三言說了了定罪此中犯者嫌罵比丘說而了了波逸提不了了突吉羅若上座教汝嫌罵若受教嫌罵突吉羅薩婆多云此戒體僧先差十四人瞋譏是人者波逸提若捨羯磨瞋譏是人突吉羅若遣使書信突吉羅善見云譏嫌被僧差人波逸提嫌餘人突吉羅比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者其人實有愛恚怖癡恐後有悔恨語令發露若戲笑語獨語夢中語欲說此錯說彼不犯不犯者最初未制戒等第十四敷僧臥具不舉戒總釋此是共戒尼犯亦同大乘同學此是制罪律攝云因臥具事由輕慢煩惱制斯學處緣起處佛在給孤獨園城中有一長者欲請衆僧飲食起緣人十七羣取僧坐具在露地敷經行望食時到不收攝便赴彼食僧坐具即為風塵土坌蟲鳥啄壞污穢不淨諸比丘還白佛呵責結戒所立戒相若比丘取僧繩牀木牀若臥具坐褥露地敷若教人敷捨去不自舉不教人舉波逸提釋義僧者律攝云有六種僧一者四人僧二者過四人僧三者現前僧四者四方僧五者主僧六者客僧此中僧者謂四方僧物也繩牀有五種旋腳繩牀直腳繩牀曲腳繩牀入陛繩牀無腳繩牀木牀亦如是臥具坐褥者或用坐或用臥褥者用坐也律攝云臥褥長四肘濶三肘四邊縫合貯以毛絮毛謂羊毛絮謂木棉荻苕劫貝蒲臺雜絮并故破物或糞掃衣以如是物內在褥中拍令平正於中橫豎以線交絡勿使棉絮聚在一邊或扜毛為褥復安表裏坐褥謂小方坐褥也露地敷謂無蔭覆處也若自敷若教人敷敷者謂施張安布也去後若彼有舊住比丘若摩摩帝若經營人當語言我今付授汝汝守護看此謂教人舉也若都無人者當舉著屏處而去若無屏處自知此處必無有破壞當安隱持粗者覆好者上而去即自舉也若即時得還便應去若疾雨疾還若中雨中行得還若少雨少行及得還不壞坐具者應往比丘應次第作如是方便去雖不自舉不教人舉但觀時境不壞具褥得去犯緣此戒具足三緣方成本罪一是四方僧物二故心不舉三兩腳過限定罪此中犯者若不作如是方便而行初出門波逸提若一足在門內意欲去而不去還悔一切突吉羅若二人共一牀坐下座應收而去下座作如是意謂上座當收而上座不收下座犯波逸提復以非威儀故突吉羅上座意謂下座當收而下座不收上座犯波逸提若二人不前不後俱不收二俱波逸提及餘空繩牀木牀若凡浴牀臥具表裏地敷繩索毳紵放在露地不收便去突吉羅若敷僧臥具在露地不收入房坐思惟突吉羅薩婆多云若露地敷僧臥具已不囑人遊行諸房突吉羅若自臥具不隨時舉突吉羅所以時舉者一畏雨濕二畏日暴三畏風吹若雖有覆障而日雨所及處皆墮罪善見云他人私物不舉突吉羅比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若取僧繩牀木牀踞牀若凡臥具坐褥在露地自敷若教人敷去時應語舊住人乃至次第作方便去無犯如文中說二人共一牀坐下座應收諸餘空繩牀木牀若凡浴牀若臥具表裏若地敷繩索毳紵敷在露地收取而去若在露地敷僧坐具收攝已入房思惟無犯不犯者最初未制戒等會詳律攝云凡是僧伽所有衣服不將餘物襯替不合受用其所替物亦非疏破若僧敷具有破穿處應須縫補若斷壞者應為連接若不堪修補者用充燈炷或為拂或斬和泥用塗墻壁填孔隙令施主增福凡聽法時不應與比丘尼及俗人求寂授學人相近而坐有難緣者非犯無夏者不應共三夏者同坐一夏者不得與四夏者同坐二夏以去得共大三夏者同坐若白衣舍處所迮時雖塢波䭾耶同坐非犯不應一牀二人同臥有慚愧者無犯若在行途得大帔中間衣隔同臥無犯薩婆多云結戒者為行道安樂故為長養信敬故為令檀越善根成就故第十五僧房不舉臥具戒總釋此是共戒尼犯亦同大乘同學此是制罪律攝云由敷具事不敬煩惱制斯學處緣起處佛在給孤獨園起緣人有客比丘語舊住比丘我在邊房中敷臥具宿異時不語舊比丘便去僧臥具爛壞蟲嚙色變時舊住比丘不見客比丘謂是命過遠行等到房觀看乃見臥具爛壞白佛呵責結戒所立戒相若比丘於僧房中敷僧臥具若自敷若教人敷若坐若臥去時不自舉不教人舉波逸提釋義僧房者謂四方僧房房者於四威儀得為受用也若僧房中敷僧臥具若坐若臥去時若有舊住比丘經營人若摩摩帝當語言與我掌護牢舉此謂教人舉也於中若無人付授不失當移牀離壁高支牀腳持枕褥臥具置裏以餘臥具覆上而去若恐壞敗當取臥具氈褥枕置衣架上豎牀而去此是自舉也犯緣同上定罪此中犯者不作如是方便而去出界外波逸提一腳出界外還悔而不去突吉羅若期去而不去突吉羅若即還不久二宿在界外至第三宿明相未出若自往若遣使往若語摩摩帝若知事人汝掌護此物若不爾者波逸提比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者敷僧臥具若坐若臥去時有舊住人若摩摩帝若知事人語言汝守護是物若無知事人如上收舉而去若房舍崩落火燒毒蛇在內盜賊虎狼師子強力所執若被繫若命難梵行難若時還不久若二宿界外第三宿明相未出自去若遣使語舊住人汝掌此物若水陸道斷一切難緣第三宿不得遣使語掌護此物者無犯不犯者最初未制戒等第十六強奪止宿戒總釋此是共戒尼犯亦同大乘同學此是性罪律攝云自恃凌他因生觸惱由臥具事情生不忍制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人六羣及十七羣在拘薩羅道路行至無比丘住處村十七羣語六羣言汝等是我上座應先求住處我等後當求六羣報言汝等去求我不求住處十七羣即往求得宿止處敷臥具竟六羣知已往語言汝等當起以大小次第止宿十七羣不允六羣強在座間敷坐具宿十七羣高聲言諸尊莫爾諸比丘聞白佛呵責結戒戒文如後唯無知字時諸比丘不知是先住處非先住處後乃知是先住處或有作波逸提懺悔者或有畏慎者佛言不知不犯當如是說戒所立戒相若比丘知先比丘住處後來強於中間敷臥具止宿念言彼若嫌迮者自當避我去作如是因緣非餘非威儀波逸提釋義知先比丘住處者先比丘者是最初敷具者是住處者是房舍於四威儀得受用者是後來強於中間敷臥具止宿後來者後至比丘也強者不從人意欺凌於他中間者若頭邊若腳邊若兩脅邊臥具者草敷葉敷下至地敷念言意中作念非是口言彼若嫌迮者自當避我去於其中間縱肆坐臥逼迮他人令彼生惱彼若嫌迮當自避去不必言語相遣也作如是因緣非餘者謂作強逼迮惱亂因緣非為餘事也非威儀縱橫坐臥惱亂於他皆是非威儀中事犯緣此戒具足三緣方成本罪一知他先住二有逼惱心三強敷已竟定罪此中犯者知他先得住處後來強於中間敷臥具止宿隨轉側脅著牀波逸提僧祇云後來眠他牀是上座者應語長老不知世尊制戒耶若眠比丘是下座者應呵責汝不善知戒相云何後來眠他牀上若比丘在他處經行見先比丘來應避去若夜眠時雖振動寱語不作擾亂意無罪薩婆多云若自敷若使人敷能敷者波逸提不能敷者突吉羅此戒體不得強違前人意有所為作若為惱他故閉戶開戶閉向開向然火滅火然燈滅燈若唄呪願讀經說法問難隨他所不樂事作一一波逸提必以惱他心故成罪比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者先不知若語已住若先與開門若門寬廣不相妨礙若有親舊人言但於中敷我自當為語其主若倒地若病轉側墮上若為勢力所持若被繫閉若命難梵行難無犯不犯者最初未制戒等第十七牽他出房戒總釋此是共戒尼犯亦同大乘同學律攝云由瞋忿故於四方僧住處牽他令出因臥具事及攝養煩惱制斯學處緣起處佛在給孤獨園起緣人六羣及十七羣在拘薩羅道中行至小住處十七羣言長老去敷臥具六羣報言汝自去我何豫汝事十七羣自喜淨潔入寺掃酒房舍令淨敷好臥具止宿六群知已即入語言長老起隨次第坐十七群未允六群瞋不喜強牽驅出房十七群高聲言莫爾莫爾比房比丘問知其故白佛訶責結戒所立戒相若比丘瞋他比丘不喜僧房舍中若自牽出教他牽出波逸提釋義瞋他不喜者謂心懷忿恚不喜前人同房止宿也牽出者或以口牽或以手牽或手口俱牽自作教他是也犯緣此戒具足四緣方成本罪一是守戒比丘二瞋恚牽出三是僧房中四前人出戶定罪此中犯者若自牽若教人牽隨所牽多少隨出戶多少一一波逸提若閉他著戶外突吉羅若持物擲著戶外突吉羅若持他物出突吉羅五分云若將其所不喜人來共房住欲令自出若出若不出皆突吉羅牽餘四衆出突吉羅尼牽比丘比丘尼出波逸提牽餘三衆出突吉羅若牽無慚愧人若欲降伏弟子而牽出者無犯薩婆多云若先作殺心強牽出死者波羅夷不死者偷蘭遮若牽比丘尼淫亂心牽摩捉者僧殘僧祇云若牽比丘出時彼比丘若抱柱若捉戶若倚壁如是牽離一一處一一波夜提若口呵叱遣彼比丘隨語離一一處者一一波夜提若方便驅直出門去得一波夜提律攝云舍欲崩倒牽出病人不犯若有苾芻是鬬諍者戒見軌式多有虧違如此之人瞋而曳出若無善心亦得惡作若於非僧房處曳出清淨苾芻得惡作罪若破戒人衆共驅出若倚門若抱柱咸應斫去并推出之事殄息後所斫截處僧應修補或門徒等冀其懲惡牽出房時無犯然不應令出其住處比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者無恚恨心隨次第出若共宿二夜至三夜遣未受戒人出若破戒破見破威儀若為他所舉若為他所擯若應擯有命難梵行難驅逐如此等人無犯不犯者最初未制戒等會詳律攝云若於住處龍蛇忽至應彈指語曰賢首汝應遠去勿惱苾芻若不去者應持軟物而羂去之勿以毛繩等繫勿令傷損於草藂處安詳解放待入穴已然後捨去若棄蚤虱等應於故布帛上觀時冷熱而安置之此若無者應安壁隙柱孔中任其自活薩婆多云為不苦惱衆生故為滅鬬諍故而結此戒第十八重閣坐脫腳床戒總釋此是共戒尼犯亦同大乘同學律攝云由臥具事瞋恚煩惱制斯學處緣起處佛在給孤獨園起緣人諸比丘在重閣坐脫腳牀上坐不安庠閣下有比丘止宿閣薄牀腳脫墮下比丘上壞身血出仰向恚罵諸比丘聞白佛呵責結戒所立戒相若比丘若房若重閣上脫腳繩牀木牀若坐若臥波逸提釋義房者若僧房若私房重閣上者立頭不至上者是脫腳牀者腳入陛腳者不堅牢也謂尖腳如栓形插入陛中即插腳牀名脫腳牀也若坐臥下結成所犯犯緣此戒具足四緣方成本罪一是重閣二牀是脫腳三閣下有人四坐臥著牀定罪此中犯者在重閣上坐脫腳牀若坐若臥隨脅著牀隨轉側波逸提除脫腳牀已若在獨坐牀或一板牀或浴牀一切突吉羅僧祇云閣下無人坐無犯薩婆多云若牀腳不尖者不犯設尖不用力坐臥不犯此戒體必是重閣尖腳坐牀安牀處底薄用力坐臥波逸提凡比丘坐法一切審詳不審詳必有所傷兼壞威儀突吉羅比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者若坐旋腳繩牀直腳繩牀曲腳繩牀無腳繩牀若牀支大若脫腳牀安細腰即橫桄也若彼重閣上有板覆若重厚覆若反牀坐若脫牀腳坐無犯不犯者最初未制戒等第十九蟲水澆泥草戒總釋此是共戒尼犯亦同大乘同制此是性罪律攝云由用水事無慈悲煩惱制斯學處此戒二緣合結緣起處佛在拘睒彌國起緣人尊者闡陀起大屋以蟲水和泥教人和諸長者嫌責沙門釋子無有慈心害衆生命諸比丘聞白佛呵責結戒諸比丘未知有蟲水無蟲水後乃知有蟲水或有作波逸提懺者或有畏慎者佛言不知無犯當如是說戒所立戒相若比丘知水有蟲若自澆泥若草若教人澆者波逸提釋義水者謂池河井水釋名云水者準也準平物也其德能潤萬物澄之則清混之則濁堰之則止決之則流俱八種功德有蟲律攝云或自觀有蟲或他觀有蟲不觀有蟲客來蟲俱生蟲總有二種蟲一謂眼見二是濾得乃至微細有命者言水亦收漿醋等物有蟲俱不得用若自澆泥若草泥者草泥𦮽泥象屎泥牛屎泥等草者百卉之總名即茆芒等草澆者沃也即溉灌者是自作教他並皆成犯犯緣此戒具足三緣方成本罪一水有蟲二有蟲想三自教澆用定罪此中犯者若知水有蟲以草若土擲中者波逸提除水已若有蟲酪漿若醋若漬麥漿以澆泥若草若教人波逸提若以土若草著有蟲清酪漿中醋中若漬麥漿中若教人波逸提有蟲水有蟲想波逸提蟲水疑突吉羅無蟲水有蟲想突吉羅無蟲水疑突吉羅善見云自澆者隨息一一波逸提若教他澆者隨語語得波逸提十誦云隨蟲死一一波逸提比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者不知有蟲作無蟲想若蟲大以手觸水令蟲去若漉水灑地一切無犯不犯者最初未制戒等會詳僧祇云若比丘營作房舍須水若池若河若井漉取滿器看無蟲然後用若故有蟲當重囊漉諦觀之若故有蟲至三重若故有蟲當更作井如前諦觀若故有蟲當捨所營事至餘處去蟲生無常或先無今有或今有後無是故比丘日日諦觀無蟲便用薩婆多云若欲作住止處法先應看水用上細氎一肘作漉囊令持戒審悉者漉水竟看器中向日諦看若故有蟲者應三重作漉水囊若三重作漉水囊故有蟲者此處不應住第二十覆房過三節戒總釋此是共戒尼犯亦同大乘同學此是制罪律攝云由房舍事貪慢煩惱制斯學處緣起處佛在拘睒毗國瞿師羅園中起緣人闡陀起大房覆有餘草更重覆故有餘草第三覆猶餘草在念求索為難更覆不止屋便摧破居士譏嫌諸比丘聞白佛呵責結戒所立戒相若比丘作大房舍戶扉窗牖及餘莊飾具指授覆苫齊二三節若過波逸提釋義作大房舍者多用物薩婆多云用三十萬錢功用甚大律攝云大住處有二種大一形量大二施物大此據形大戶扉窗牖戶者通人出入處一門曰戶又曰內門為戶扉者戶扇也窗牖者通光明處在墻曰牖在屋曰窗及餘莊飾者刻鏤彩畫指授覆苫者覆有二種縱覆橫覆苫者蓋也編茅草覆物也按西國所造屋宇臺觀板屋平頭壁泥石灰覆以甎墼或苫茅苫草及以板木戶牖垣墻圖畫雕鏤種種奇製嚴飾非一今云及餘莊飾具乃總標一句也齊二三節者節者重也但齊二三重覆則止過即成犯故曰二三節也本律釋文稍有參差恐譯文之誤也五分義明五分云若至第四重若草若瓦若板覆一一波逸提若觀斯義三節無違至四成犯犯緣此戒具足三緣方成本罪一作屋疾成二三覆不止三指授覆竟定罪此中犯者二節覆已第三節未竟不去至不見不聞處第三節竟波逸提若捨聞處至見處捨見處至聞處一切突吉羅根本云若是熟甎及以木石或可施主欲得疾成雖過重數並皆無犯薩婆多云凡作房法有三品上中下覆房法各自有限若下房以中上房覆法者以鎮重故兼頓成故若用草覆草草波逸提若中房以上房覆法者亦鎮重故若用草覆草草波逸提若隨上中下覆法者以頓成故一波逸提若不頓壘墻成無犯比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者指授覆苫二節竟至第三節覆未竟至不見不聞處水陸道斷及一切難緣等不去至不見不聞處無犯不犯者最初未制戒等第二十一自往教尼戒總釋此是不共戒尼結不同大乘比丘同學必若觀機知有大益不犯然在末運尤宜慎重清凉大師願言足不履尼寺之塵必有切緣方許無事不聽此是制罪律攝云此由尼事貪心希望招世譏嫌待緣煩惱制斯學處緣起處佛在給孤獨園與大比丘衆五百人夏安居盡是衆所知識如舍利弗等五百比丘尼大愛道為首於舍衛國王園中安居時大愛道往世尊所白言唯願聽諸比丘與比丘尼教誡說法世尊聽許隨次差上座大比丘教誡尼為說法時般陀尊者當往般陀或云莎伽陀或云槃陀伽此云小路邊生又翻繼道而所誦惟一偈入寂者歡喜見法得安樂世無恚最樂不害於衆生世間無欲樂出離於愛欲若調伏我慢是為第一樂三說已三入四禪諸羅漢比丘尼皆大歡喜六群尼調戲譏嫌於是尊者現通而去起緣人時六群自往教誡不說正法惟說一切世俗論乃至笑舞跛行等六群尼大歡喜羅漢尼以恭敬心故默然無語大愛道白佛乃制僧中差教授尼人時六群作是言僧不差我等教授尼即出界外更互相差往教誡諸比丘聞嫌責白佛佛乃制成就十法者然後得教授尼戒律具足一多聞二誦二部戒利三決斷無疑四善能說法五族姓出家六顏貌端正尼衆見便歡喜七堪任與尼衆說法勸令歡喜八不為佛出家而被法服犯重法九滿二十歲若過十如是等可教戒尼與比丘結戒所立戒相若比丘僧不差教誡比丘尼者波逸提釋義僧者一說戒一羯磨不差者僧祗云僧不作羯磨名不差十法不成就不名為差衆不成就白不成就作羯磨不成就亦不名為差根本云具七法者衆應差教授尼一持戒二多聞三住耆宿位四善都城語五不曾以身污尼六於八他勝法善能分別七於八尊重法能善解釋教授者八不可違法何等八百臘比丘尼見初受戒比丘當起迎逆問訊禮拜請令坐一比丘尼不得罵比丘不得誹謗言破戒破見破威儀二比丘尼不得舉比丘罪言汝所作爾汝所作不爾不得作自言不得遮他覔罪不得遮他說戒自恣比丘尼不得說比丘過失比丘得說比丘尼過失三已學於學式叉摩那從衆僧求受大戒四若比丘尼犯重法應半月在二部僧中行摩那埵五比丘尼於半月當從衆僧中求索教授人六比丘尼不應無比丘處夏安居七比丘尼夏安居訖當詣衆僧中求三事見聞疑自恣八如此八法應尊重恭敬讚歎盡形壽不應違教誡何故說此八不可違法謂佛姨母及五百舍夷女人從佛三請出家佛未允以疾滅正法故後阿難啓請再三方許佛說八敬阿難依制宣傳諸女奉行名為八敬比丘尼尊行八法正法無減所以半月教誡仍宣八敬令正法久住故薩婆多論云教誡教授有何差別答曰遮無利益故名教誡與有利益故名教授又教住正念故名教誡教住正知故名教授乃至令修世間善法故名教誡令修出世間善法故名教授此是差別耳犯緣此戒具足三緣方成本罪一心有貪求二不差輒往三教誡出語了了定罪此中犯者比丘應剋時到尼亦剋時迎若此丘剋時不至突吉羅尼至時不迎突吉羅若聞教授師來比丘尼當出半由旬迎供給所須辦洗浴具為作粥種種飯食不作如是供給者突吉羅若僧不差或非教授日而往與說八不可違法突吉羅若僧不差而往與說法者波逸提若比丘僧病應遣人禮拜問訊若比丘僧不和合衆不滿足應遣人禮拜問訊若不突吉羅若比丘尼僧病及不和合衆不滿足者亦當遣人禮拜問訊若不突吉羅五分云若不差教誡尼語語波逸提教誡餘二女衆突吉羅若比丘僧不差為教授故入尼住處除因緣波逸提因緣者尼病是名因緣若僧不差為教授故入尼住處隨入多少步步波逸提若一腳入門突吉羅善見云若不說八敬先說餘法突吉羅若先說八敬已後說餘法不犯十誦云比丘應誦尼戒莫令忘失何以故諸女人喜忘智慧散亂我泥洹後諸尼當從大僧問戒法四衆突吉羅是謂為犯開緣不犯者比丘剋時至尼剋時迎乃至辦種種供具若僧所差與說八不可違法若衆僧病僧衆不滿別部不和合遺信禮拜若尼病衆不滿不和合亦遣信禮拜問訊衆僧若水道留難一切難緣等不遣人禮拜問訊如是等無犯不犯者最初未制戒等會詳僧祇云教誡尼不得從日沒至明相出不得深猥處不得露現處當在不深不露處若講堂若樹下不得十四日十五日月一日二日三日應從四日至十三日往教誡不得教誡不和合尼衆到已應問尼僧和合不若言不和合應遣使呼來若不得來者應與教誡欲不得偏教誡不得長語教誡第二十二教尼至暮戒總釋此是不共戒尼不同制大乘同學息世譏嫌律攝云因譏嫌事制斯學處緣起處佛在給孤獨園起緣人尊者難陀增一阿含云爾時牧牛難陀憑杖而立遙聞佛所說法即得解悟求佛出家受具足戒是時彼在閒靜處而自修克成阿羅漢果此非佛弟難陀為僧所差教授比丘尼已默然而住大愛道言我等欲得聞法願更與我等說尊者與說法已默然而住復更重請說法難陀好音聲為說法聽者樂聞遂至日暮根本云難鐸迦尊者佛遣彼為尼衆說法教誡時五百苾芻尼聞法得阿羅漢果薩婆多云維衛佛滅後有王起牛頭旃檀塔種種莊嚴此王有五百夫人供養此塔各發願言我等將來從此王邊而得解脫爾時王者今難陀是五百夫人者今五百尼是以本願因緣故應從難陀而得解脫尼出祗桓城門已閉即依城塹中宿晨旦在前入城諸長者譏嫌沙門釋子無清淨行諸比丘聞白佛呵責結戒所立戒相若比丘為僧差教授比丘尼乃至日暮者波逸提釋義為僧差者僧祗云十法成就衆成就白成就羯磨成就故云為僧差律攝云其教授尼人一被差已盡壽教授更不須差教授比丘尼者為說八不可違法及餘法是也乃至日暮者律攝云指其分齊日既沒已名非時雖在時中若諸尼衆立而不坐或復營務紛擾未息或身有拘礙而為說法亦曰非時也犯緣此戒具足三緣方成本罪一是大尼二教說八敬三日已暮定罪此中犯者若教授比丘尼乃至日暮波逸提除教授若受經誦經問義若以餘事乃至日暮突吉羅除比丘尼若為餘婦女受誦經若問義若以餘事至日暮突吉羅律攝云日暮日暮想等二重二輕二無犯若通夜說法或寺門相近或城門不閉或同在城中或尼衆在白衣舍此皆無犯尼等四衆突吉羅是謂為犯開緣不犯者教授尼日未暮便休除婦女已若為餘人教誦受經問義及以餘事不犯若船濟處說法尼聽與賈客共行夜說法若至尼寺中說法若來寺中請教授人值說法聽無犯不犯者最初未制戒等第二十三譏謗教尼戒總釋此是不共戒尼制不同大乘同學律攝云由懷嫉心制斯學處緣起處佛在給孤獨園尼聞教授師來半由旬迎安處房舍飲食牀座具洗浴處起經人六羣僧不差故生嫉妬心言諸比丘教授尼無有真實心但為飲食故諸比丘聞白佛呵責結戒所立戒相若比丘語諸比丘作如是語比丘為飲食故教授比丘尼者波逸提釋義為飲食故僧祇云食者麵飯魚肉復次有食名色聲香味觸教授者若阿毗曇若毗尼犯緣此戒具足三緣方成本罪一生嫉妬心二言為飲食教授三說而了了定罪此中犯者作是言諸比丘為飲食故教授尼乃至誦受經若問說而了了波逸提不了了突吉羅五分云若言為供養故教誡比丘及餘三衆突吉羅若言比丘行十二頭陀行坐禪誦經作諸功德皆為供養利故語語突吉羅僧祇云若言為醫藥者得越毗尼罪若語比丘尼作如是語彼比丘為飲食故教誡汝等得越毗尼罪若語比丘尼彼比丘為醫藥故教誡汝等得越毗尼心悔尼等四衆突吉羅是謂為犯開緣不犯者其事實爾為飲食教授尼為飲食故教誦經受經若問若戲笑語獨語夢中語欲說此錯說彼無犯不犯者最初未制戒等會詳維摩詰經云不嫉彼供不高己利而於其中調伏其心常省己過不訟彼短什師曰如一比丘林中坐禪時至須食持鉢出林路逢惡賊引弓射之比丘怒已自責不生惡心又指腹語賊汝應射此我為彼出林故致斯惱此腹之罪耳省己恕物類如此也第二十四與非親里尼衣戒總釋此是不共戒尼不同結大乘不同學為利衆生故然在末法應須審慎律攝云因致譏嫌制斯學處此戒三緣合結緣起處佛在給孤獨園起緣人一乞食比丘威儀具足有比丘尼見便生善心數請彼比丘比丘不受異時衆僧分衣物此比丘持分出門見此尼來即以與之意彼不收尼輒受之比丘數數向人嫌責彼尼諸比丘聞白佛訶責結戒不聽與比丘尼衣諸比丘皆畏慎不敢與親里尼衣佛言聽與親里尼衣更加非親里三字祗桓中二部僧共分衣物二部錯得尼持衣相換比丘未允佛言若貿易聽當如是說戒所立戒相若比丘與非親里比丘尼衣除貿易波逸提釋義如三十事中犯緣此戒具足三緣方成本罪一尼非親里二與非貿易三彼已取竟定罪此中犯者與非親里比丘尼衣除貿易波逸提五分云若與破戒邪見親里尼衣突吉羅與非親里餘二女衆衣突吉羅薩婆多云若與應量衣波逸提與不應量衣物突吉羅律攝云若尼被賊現闕衣服設使非親里與之無犯尼等四衆突吉羅是謂為犯開緣不犯者與親里衣共相貿易與塔與佛與僧無犯不犯者最初未制戒等第二十五與非親里尼作衣戒總釋此是不共戒尼不同制大乘同學律攝云因致譏嫌制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人有比丘尼欲作僧伽黎至僧伽藍中語迦留陀夷願尊者與我作衣報言汝等喜來催促故不能作尼言我不相催作竟與我即與裁之作男女行欲像尼來取衣即襞與之語言不得妄解披著亦莫示人時到當著在尼僧後行尼如其教即著後行諸居士見高聲大笑大愛道問知其故白諸比丘比丘白佛呵責結戒不聽與比丘尼作衣諸比丘皆畏慎不敢與親里尼作衣佛言親里者不犯當如是說戒所立戒相若比丘與非親里比丘尼作衣者波逸提釋義作衣者作者謂割刺浣染衣者謂僧伽黎鬱多羅僧安陀會犯緣此戒具足二緣方成本罪一尼非親里二自手裁縫定罪此中犯者若與非親里比丘尼作衣隨刀截多少波逸提隨縫一針亦波逸提若復披看牽挽尉治以手摩捫若捉角頭挽方正安帖若緣若索線若續線一切突吉羅五分云取衣突吉羅割截時染時皆波逸提縫時針針波逸提尼等四衆突吉羅是謂為犯開緣不犯者與親里尼作若與僧與塔作若借他衣著浣染治還主無犯不犯者最初未制戒等第二十六與尼屏坐戒總釋此是不共戒尼犯不同大乘同學護世譏嫌律攝云因招譏謗制斯學處緣起處佛在給孤獨園起緣人迦留陀夷與偷蘭難陀比丘尼各有欲意在門外共一處坐諸居士見皆共嫌之各相謂言汝等觀此二人共坐猶如夫婦亦如鴛鴦諸比丘聞白佛呵責結戒所立戒相若比丘與比丘尼在屏處坐者波逸提釋義屏處坐者一比丘一比丘尼屏處者見屏處聞屏處見屏處者若塵若霧若烟若雲若黑暗不見也聞屏處者乃至常語不聞聲處犯緣此戒具足三緣方成本罪一是屏處二無智人三身相近坐定罪此中犯者若獨與比丘尼屏處坐波逸提若盲而不聾聾而不盲突吉羅立住突吉羅僧祗云若尼請一比丘食一尼共比丘坐一比丘尼來往益食益食尼去時比丘隨一一時得波夜提五分云與餘二女衆坐亦波逸提薩婆多云經行已還坐波逸提隨起還坐隨得爾所波逸提尼等四衆突吉羅是謂為犯開緣不犯者若比丘有伴若有智人若行過卒倒地若病轉倒或為力勢所持若被繫閉若命難梵行難無犯不犯者最初未制戒等第二十七與尼同期行總釋此是不共戒尼不同犯大乘同學此是制罪律攝云由譏嫌故制斯學處此戒三緣合結緣起處佛在給孤獨園起緣人六羣與六羣尼在拘薩羅人間遊行諸居士見皆共嫌之諸比丘聞白佛呵責結戒不聽與比丘尼共行諸比丘不先與尼共期道路相遇畏慎不敢共行佛言若不期無犯更加共期二字後衆多比丘從舍衛欲至毗舍離時衆多尼亦往欲得同行以佛結戒故不敢共行比丘前去尼在後行為賊所劫失衣鉢諸比丘白佛佛言當如是說戒所立戒相若比丘與比丘尼同期一道行從一村乃至一村除異時波逸提異時者與估客行若疑畏怖時是謂異時釋義期者言共去至某村某城某國土僧祇云共期者若今日若明日若半月若一月同期一道行總標乃至村間別釋道者村間有分齊行處是僧祇云道行者三由延二由延一由延一拘盧舍除異時是遮制中之開聽與估客行估客者根本作商旅律攝云商旅者若離此伴無由進路為此聖開除餘緣故此中行法者苾芻尼食苾芻應持若至食時更相授與有病苾芻應共舁去若人少者尼亦助舁應在頭邊不應近足若至村落隨病所須為覓醫藥若尼有病准此應知是謂異時犯緣此戒具足三緣方成本罪一有心共期二發足同行三至村里分齊定罪此中犯者與比丘尼同一道行乃至村間分齊處隨衆多少界多少一一波逸提非村空處行乃至十里波逸提若減一村減十里突吉羅若多村間同一界行突吉羅方便欲去共期莊嚴一切突吉羅僧祇云若共車伴行止息發去時喚尼來勿使不及伴作是語者波逸提若言去去姊妹勿使失伴無罪比丘共商人隨道行商人先入聚落比丘不知道行法見尼問言姊妹示我道來即名共期若尼來舉一足得越毗尼罪舉二足波夜提言去示我道路者無罪若聚落中請比丘食不知檀越家處見尼問言知某甲檀越家處不示我處來即名為期若舉一足越毗尼罪舉二足得波夜提律攝云地行為契後遂乘空現身共期隱形而去皆得惡作薩婆多云不期而偶共同道當使相去不聞聲處若相聞已還突吉羅與餘二女衆期行同犯亦波逸提十誦云若有王夫人共行不犯尼等四衆突吉羅是謂為犯開緣不犯者不共期大伴行疑恐怖處若為力勢者所持若被繫命難梵行難無犯不犯者最初未制戒等第二十八與尼期同船戒總釋此是不共戒尼犯不同大乘同學律攝云由譏嫌故制斯學處此戒三緣合結緣起處佛在給孤獨園起緣人六羣舉六羣尼共乘船上水下水居士譏嫌比丘白佛呵責結戒不聽與尼共乘一船諸比丘不期而乘一船皆畏慎佛言不期無犯後衆多比丘欲渡恆河有衆多尼亦欲渡恆河以佛結戒故不敢與尼共渡尼讓比丘先渡船至彼岸暴雨水漲未還之間日時已暮諸尼即在岸邊宿夜偶賊劫奪佛言直渡者無犯當如是說戒所立戒相若比丘與比丘尼共期同乘一船上水下水除直渡者波逸提釋義上水下水上者逆流而上下者順流而下除渡成犯犯緣此戒具足二緣成本罪一有心共期二兩腳入船定罪此中犯者共期同乘一船上水下水除直渡若入船裏波逸提若一腳在船一腳在地若方便欲入而不入若共期莊嚴一切突吉羅薩婆多云與尼議載船突吉羅若一比丘與一尼共期載一船一波逸提乃至與四尼共載一船四波逸提隨尼多少隨得爾所波逸提若四比丘與一尼共載一船各得一波逸提亦隨尼多少得爾所波逸提與式叉摩那沙彌尼共期同船同犯亦波逸提若尼與比丘各在異船共期無白衣伴波逸提若不期必使語聲不相聞處若相聞突吉羅尼等四衆突吉羅是謂為犯開緣不犯者不共期若直渡彼岸船師失濟上水下水或為力勢所持或被繫命難梵行難無犯根本云篙棹柁折隨流而去或避灘磧或柁師不用其語此皆無犯十誦云欲直渡為水所漂去無犯不犯者最初未制戒等會詳律攝云若苾芻等將行之時預先一日應白二師我今有事詣彼村坊聽不隨師不應違逆若無二師應白上座所有臥具囑他守護於同行伴普告令知勿有病人捨棄而去出門之時應相告曰今日我等不有遺忘事不應可斟量所依商旅善惡進不無令廢闕於自同伴更相顧戀有讐隙者不應共行若有因緣須共行者應懺摩已與之同去凡涉路時應為法語勿出惡言或為聖默然勿令心散亂若至天神祠廟之處誦佛伽他彈指而進苾芻不應供養天神若於路次暫止息時或至泉池取水之時皆誦伽他其止宿處應誦三啓自整威儀問停止處第二十九尼讚得食戒總釋此是不共戒尼犯不同大乘同制是邪命自活故律攝云因不敬事制斯學處此戒三緣合結緣起處佛在給孤獨園有一居士請舍利弗目連於露地敷好坐具起緣人偷蘭尼往居士家見已即問欲請比丘耶報言我請舍利弗目連尼言居士所請是下賤人若先語我我當為請龍中之龍問言何者是龍中之龍尼言尊者提婆達多等是語頃二尊者至尼語居士言龍中之龍已至居士言汝向者言是下賤人今云何言龍中之龍耶自今以去勿復來往我家二尊者食訖還僧伽藍佛知而故問今日受請食得充足耶答曰食雖充足我於居士家亦是下賤人亦是龍中之龍佛問知其故呵責提婆達多部黨已結戒遣比丘尼勸化得食者波逸提時諸比丘不知有勸化無勸化後乃知有勸化或有作波逸提懺者或有疑者佛言不知不犯羅閲城中有大長者是黎師達親友彼作是言若黎師達來至羅閲城者我當為黎師達故供養衆僧有尼聞此語默然在懷異時尊者入城尼聞往語長者即遣信請尊者及衆僧食黎師達問云何知我來至此耶長者言家所供養尼見語尊者言若爾我不應食長者言我不從此尼語設食我先有誓願尊者言雖有此語我亦不應食即止不食往白世尊佛言若檀越先有意者不犯當如說戒所立戒相若比丘知比丘尼讚歎教化因緣得食食除檀越先有意者波逸提釋義讚歎教化者阿練若乞食人著糞掃衣作餘食法不食一坐食一摶食冢間坐露地坐樹下坐常坐隨坐持三衣讚偈多聞法師持律坐禪釋論云美其功德名為讚讚之不足又稱揚之名為歎也得食食者上食字飲食也下食字吞咽也從旦至中得食食有五正食五不正食釋於後文除檀越先有意者律攝云謂彼施主先生此念營辦飲食擬施其人設令讚歎具戒多聞此亦非犯由聞讚歎遂便不食是故復言除先有意者犯緣此戒具足三緣方成本罪一大尼讚歎二有教化想三食已入咽定罪此中犯者知比丘尼教化得食食咽咽波逸提除此飲食已教化得餘襯體衣燈油塗足油正法念處經云此足跟通於眼脉以油灌鼻以油塗足能令眼明淨一切突吉羅教化教化想波逸提教化疑突吉羅不教化教化想突吉羅不教化疑突吉羅五分云以餘四衆讚歎因緣得食食突吉羅薩婆多云乃至教以少薑著食中比丘食者突吉羅此戒體但偏讚其德不問凡聖食者盡波逸提若不曲讚功德但說布施沙門福德甚大比丘食者無罪尼等四衆突吉羅是謂為犯開緣不犯者若不知若檀越先有意若教化無教化想若尼自作檀越若檀越令尼經營若不故教化而乞食與無犯不犯者最初未制戒等第三十與婦女同行戒總釋此是不共戒尼犯不同大乘同學律攝云由道行事譏謗煩惱制斯學處此戒二緣合結緣起處佛在給孤獨園毗舍離女嫁舍衛人與姑共諍還詣本國起緣人阿那律從舍衛往毗舍離婦欲同行答言可爾即與同行時夫主不在後日還家即問母婦何所在母言與我鬬競逃去不知所在夫主逐之於道路得婦語尊者言何故將我婦逃走耶答言止止莫作此語我等不爾長者言云何言不爾汝今現與我婦同道行其人即打阿那律幾斷命根尊者於下道在一靜處結跏趺坐入火光三昧長者見即懺悔謂四姓中豪族望重世禮自居有德者自稱淨名疏云國內勝人稱為長者原西國與此方所稱不同彼以貴姓豪族富商大賈積財巨萬咸稱長者此方乃有德之稱謂年耆德艾事長於人稱為長者法華文句云具十德名長者一姓貴二位高三大富四威猛五智深六年耆七行淨八禮備九上歎十下歸尊者還僧伽藍向諸比丘說有少欲者白佛呵責結戒戒文如後唯無共期時諸比丘不共期道路相遇畏慎不敢共行佛言不共期不犯當如是說戒所立戒相若比丘與婦女共期同一道行乃至村間波逸提釋義並同前與尼期行戒中無異犯緣此戒具足三緣方成本罪一有心共期二人女堪行欲境三至村齊限定罪此中犯者共尼斯行不異律攝云若化女天女龍女半釋迦女二根若未堪行淫女同路行咸得惡作尼等四衆突吉羅是謂為犯開緣不犯者亦同前戒根本云若他遣女人引道或迷於道路女人指授無犯不犯者最初未制戒等
