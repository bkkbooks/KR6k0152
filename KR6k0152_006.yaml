body:
  text: 清金陵寶華山律學沙門德基輯四三十尼薩耆波逸提法分四初總標二別列戒相三結問四勸持初總標諸大德是三十尼薩耆波逸提法半月半月説戒經中來釋尼薩耆波逸提者波逸提義翻為墮根本律云波逸底迦者是燒煮墮落義謂犯此罪者墮在地獄傍生餓鬼惡道之中受燒煮苦又此罪若不殷勤説除便能障礙所有善法此有説義故名波逸底迦此戒僧有一百二十條前列三十因財事生犯故加尼薩耆也聲論云尼翻為盡薩耆翻為捨因貪慢財事故強制捨入僧中故名尼薩耆波逸提亦名捨墮此乃華言從略言之二別列戒相共有三十條初名畜長衣乃至第三十自求僧物入己第一長衣十日不淨施戒總釋薩婆多論云一以為俗利則道利不成又失檀越信敬淨心比丘無厭與俗無別有違佛教四聖種法此是共戒尼亦同結大乘不同學菩薩普利有情以檀度為首雖不同學然亦同須説淨律攝云此由長衣事多貪煩惱制斯學處此戒二緣合結緣起處佛在舍衛國祗樹給孤獨園聽諸比丘持三衣不得長此但遮止未曾結戒衣犍度云佛見諸比丘在道行多擔衣物作是念可為制衣多少不得過畜時佛初夜在露地在著一衣中夜覺寒即著第二衣後夜覺寒復著第三衣便安隱住乃聽比丘畜三衣不得過起緣人時六羣比丘薩婆多論云六羣者一難陀二跋難陀三迦留陀夷四闡陀五馬宿六滿宿二人得漏盡入無餘涅槃一迦留陀夷二闡陀二得生天一難陀二跋難陀二墮惡道生龍中一馬宿二滿宿難陀跋難陀善解算數陰陽又善能説法論義又多欲馬宿滿宿善於音樂種種戲笑事事皆能亦善巧説法論議亦解阿毗曇迦留陀夷闡陀深通射道深解阿毗曇然此六人無法不通善達三藏十二部經內為佛法之棟梁外為佛法之大護五人皆是釋種子王種唯迦留陀夷一人是婆羅門種六人俱是豪族共相影響相與為友宣通佛教故名六羣比丘也畜長衣或早起衣或中時衣或晡時衣彼常經營莊嚴如是衣藏舉薩婆多論云問曰何由得如是種種衣服答曰既是貴姓又多知識兼復多欲是故衣多何故如是畜積多衣答本是豪族先在家時愛著瓔珞種種服餝雖樂法出家以本習故樂好衣鉢又多欲故多畜積諸比丘見已往白佛佛以無數方便訶責已結戒若比丘畜長衣者捨墮時阿難從人得一貴價糞掃衣欲以奉大迦葉大迦葉常行頭陀著此衣故大迦葉不在不知云何即往白佛佛問大迦葉何時當還阿難言却後十日當還問曰長老阿難何由得知大迦葉十日當還答曰所以知者大迦葉欲遊行諸國時至阿難所言我欲遊行某國某日當還迦葉或遣信問訊世尊及阿難我某日當還所以知十日當還也問曰如來何故隨阿難語結戒答曰此是制罪非是性罪是故隨阿難語制佛告諸比丘自今已去聽畜長衣齊十日欲説戒者當如是説所立戒相若比丘衣已竟迦絺那衣已出畜長衣經十日不淨施得畜若過十日尼薩耆波逸提釋義衣已竟者三衣謂三衣已足或作衣已竟故名衣已竟迦絺那衣已出梵語迦絺那衣此翻功德衣以坐夏有功五利賞德也五利者一畜長衣二離衣宿三別衆食四展轉食五前食後食不囑入聚落此五開聽不犯律鈔引明了論本翻為堅實能感實能感多衣故又翻難活以貧人取活為難捨少財入此衣功德勝如以須彌大衣聚施也已言出者捨也前安居者五月謂從七月十六日至十二月十五日而出此衣後安居者不受迦絺那衣但開一月出者餘七月十一月是畜長衣者長者三衣之外更有餘長晉書云平生無長物是也衣者有十種一憍賖耶衣應師譯為蠶衣謂野蠶絲綿作故又云高世耶衣東天竺有烏陀國杭米熟時葉變為蠶蠶則食杭米人取蒸以為綿三劫貝衣此云木棉花是細棉布衣三欽婆羅衣是毛織成之衣即如絨褐之類四芻摩衣此云麻衣西域記云即麻之類彼土麻少多用草羊毛織成五讖摩衣此云粗布衣六扇那衣或云奢那衣乃樹名也此樹高共人等皮似麻取以織衣體如粗布此方無有七麻衣西域麻有多種自然青黃赤色八翅夷羅衣此云細布九鳩夷羅衣亦云細布衣十讖摩羅半尼衣未見翻譯長衣者若長如來八指廣四指是如來八指者謂佛指面闊二寸八指則長一尺六寸廣四指則橫有八寸堪作衣隔是名長衣不淨施等淨施有二種一真實淨二展轉淨於後波逸提五十九中明不作如是二種淨名不淨施薩婆多論云九十六種無淨施法佛大慈悲方便力故教令淨施令諸弟子得畜長財而不犯戒問曰佛何不直聽畜長財而強與結戒設此方便答曰佛法以少欲為本是故結戒不畜長財而衆生根性不同或有多預畜積而後行道得證聖法是故如來先為結戒而後設方便於佛法無礙衆生得益既作淨施得畜長財而不犯戒問曰淨主比丘不犯長財戒耶答曰無犯此是方便施是他物故犯緣此戒具足三緣方成本罪若緣有缺罪結方便一心有貪慢二畜衣應量三不施過期定罪此中犯者若比丘一日得衣乃至十日中所得衣十一日明相出盡捨墮言一日得衣者謂衣入手日非謂月初一也若比丘一日得衣不淨施二日乃至十日得衣若淨施若不淨施至十一日明相出皆捨墮此中從第一日得衣已乃至第十日於其中間或有日得或有日不得就所得者或有淨施或不淨施其淨施者無犯其不淨施者以第一日衣勢力故至十一日明相出盡犯捨墮如是若遣與人遣者送也即送與人也有言遣與人即是展轉淨非也若失衣謂盜去若故壞謂弊爛等若作非衣謂作餘衣用若作親厚意取謂親厚者取去若忘去謂衣置此處有緣他往忘去亦爾若捨墮衣不捨持更貿餘衣一捨墮一突吉羅此捨墮衣應捨與僧若衆多人若一人不得別衆捨謂界內僧盡集不來囑授方成如法反上即名別衆也若捨不成捨突吉羅捨與僧時將至僧中偏露右肩向上座禮胡跪合掌作如是語大得僧聽我某甲比丘故畜爾所長衣過十日犯捨墮我今捨與僧捨衣已懺罪竟僧應還此比丘衣白二羯磨懺罪法及白二羯磨還法如律廣明是比丘僧中捨衣竟不還者突吉羅若還時有人教莫還突吉羅若作淨施若遣與人若持作三衣若作波利迦羅衣善見云朱羅波利迦羅衣漢言雜碎衣若故壞謂故意壞彼衣若燒謂以火燒之若作非衣謂作餘衣受用若數數著壞者盡突吉羅此謂能作法僧應還不還乃是違法突吉羅罪僧祗云一日得衣即日作淨乃至十日得衣十日作淨十一日得衣十一日作淨犯越毗尼罪以無間故間者一日得衣更停九日二日得衣更停八日三日得衣更停七日至九日更停一日十日得衣即十日作淨十一日得衣不應受是名間也若為佛為僧供養故求物集在一處雖久未用不犯律攝云若為三寶畜衣非犯或施主作如是言此是我物仁當受用雖不分別用之無犯根本部分別即是淨施也根本云若犯捨墮不捨或雖捨不説悔或雖説悔不經宿隨有所得並成捨墮由前染故若捨衣説悔經宿已得皆無犯五分云不得捨與餘人及非人捨已然後悔過餘人者是三小衆也若不捨而悔者罪益深除長三衣若長餘衣乃至手巾過十日皆突吉羅若淨施不犯言長餘衣者謂非三衣數薩婆多云若初日得衣即不見擯不見罪舉不作擯不懺悔舉也惡邪不除擯不捨惡見舉若狂心亂心病壞心若不解擯不得本心乃至命終不犯此戒後若解擯若得本心還計日成罪若初日得衣上入天宮北至單越住若至命終不犯此戒後歸本處計日成罪若初日得衣至五日若不見擯不作擯惡邪不除擯若狂心亂心病壞心上入天宮北至單越後若解擯若得本心若還本處取前五日數後五日然後成罪西拘耶尼東弗婆提盡有比丘戒法亦同龍宮物皆有主是三處不同天上觸物自然單越物皆無主二處兼無比丘戒法三擯之人不共僧事故亦無犯比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者齊十日內若轉淨施若遣與人若賊奪想若失想若燒想若漂想不淨施不遣與人不犯若奪失燒漂取著若他與著若與作彼不犯謂他與我衣實作彼人物想過畜無犯彼受付囑衣者命終若遠出去若休道若為賊強將去若為惡獸所害若為水漂溺如此不作淨施不遣與人不犯不犯者最初未制戒等會詳緇門警訓引地持論云菩薩先於一切所畜資具為非淨故以清淨心捨與十方諸佛菩薩如比丘將現前衣物捨與和尚阿闍黎等涅槃經云雖聽受畜要須淨施篤信檀越是也今時禪宗及與講學專務名利不恥五邪多畜八穢但隨浮俗豈念聖言自下壇場經多夏臘至於淨法一未霑身寧知日用所資無非穢物箱囊所積並是犯財慢法欺心自貽伊戚謂憂戚皆自造而成猶云天作孽猶可違自作孽不可活此之謂也學律者知而故犯餘宗者固不足言誰知報逐心成豈信果由因結現前袈裟離體當來鐵葉纏身為人則生處貧窮衣裳垢穢為畜則墮於不淨毛羽腥臊況大小兩乘通名淨法儻懷深信豈憚奉行憚者畏也荊溪輔行記云有人言凡諸所有非己物想有益便用説淨何為今問等非己財何不任於四海有益便用何不直付兩田悲敬二田而閉之深房封於囊篋實懷他想用必招愆犯盜忽謂己財仍違説淨説淨而施於理何妨任己執心後生倣效故知不説淨人深乖佛制兩乘不攝三根不收若此出家豈非虗喪第二離衣宿戒總釋此是共戒尼犯亦同大乘同制梵網經云菩薩行頭陀時及遊方時行來百里千里此十八種物常隨其身此是制罪律攝云由離衣故制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人時六羣比丘持衣付親友比丘往人間遊行受囑比丘數數出衣日中曬諸比丘問知其故白佛佛以無數方便呵責已結戒不得離衣異處宿結戒已有一乾痟病比丘糞掃僧伽黎患重有因緣事欲遊行人間不堪持行即語同伴比丘白佛佛言與不失衣白二羯磨當如是説戒所立戒相若比丘衣已竟迦絺那衣已出三衣中離一一衣異處宿除僧羯磨尼薩耆波逸提釋義三衣者僧伽黎靈感傳云每轉法輪披僧伽黎南山云此三衣名諸部無正翻今以義翻大衣亦名雜碎衣以條數多故多羅僧此云上著衣即七條衣也南山云七條名中價衣安陀會此云中宿衣謂近身住也南山云五條名下衣華嚴云著袈裟者捨離三毒本律云懷抱於結使不應著袈裟離一一衣異處宿言一一衣者謂受持三衣中隨離其一異處宿者謂人衣各異其處而經明相律攝云有三種離衣一舉處離謂在障難處而舉其衣不得重觀或因失落二失念離於安衣處更不重憶三受用離謂暫安衣即遇緣隔不得受用也除僧羯磨僧者一羯磨一説戒善見云與不離衣羯磨者雖離衣宿而不犯尼薩耆罪問曰齊几時離衣宿答曰隨病未差得離宿若病比丘僧為羯磨離衣宿已往餘方若病差欲還道路險難不得還恆作還意雖病差不失衣若決定作不還意失衣若過十日犯長衣罪若往餘方病差還來至衣所病復發更欲往餘方承先羯磨更不須羯磨不失衣者僧伽藍裏有一界謂通結一大界已復結不失衣界界內攝衣失衣者僧伽藍裏有若干界但結大界未結不失衣界隨有隔障俱名失衣不失衣者樹有一界謂五月午日正中時日光所照枝葉遍覆日影無穿是為一界失衣者樹有若干界謂枝葉不相交接隨日影及處即名若干界不失衣者場有一界謂此場中有一主兄弟不分此之勢分中間總是外有一尋名為一界失衣者場有若干界謂場中兄弟各各分別即名多勢分也不失衣者車有一界謂此車有一主不分別是名一勢分失衣者車有若干界車屬多主各有分齊是名若干界不失衣者船有一界謂船屬一主名一勢分失衣者船有若干界謂船屬多主各有勢分故名若干界不失衣者有一界云何一村有一勢分謂於此村有一園林一神廟衆集之處是謂一村有一勢分失衣者村有若干界云何一村有多勢分謂此村有多園林多神廟衆集之處是謂一村有多勢分云何為勢分答此無勢分但齊室中不失衣者舍有一界謂此舍中惟一家長更無分別名為一勢分失衣者舍有若干界謂此舍中有多家長分別或九十六種外道所居為彼各執異見見既不同勢分各別是名若干界不失衣者堂有一界但屬一主無有分別失衣者堂有若干界謂屬多主各有分別名若干界不失衣者庫藏有一界失衣者庫藏有若干界不失衣者倉有一界失衣者倉有若干界如前僧伽藍者有四種如上樹者與人等足蔭覆跏趺坐場者於中治五穀處車者若車回轉處船者船回轉處者有四種如上堂者多敞露庫者儲積藏諸車乘輦輿販賣之物倉者儲積米穀此僧伽藍界非彼僧伽藍界此僧伽藍界非彼樹界乃至此僧伽藍界非彼庫藏界亦如是此樹界非彼樹界乃至此樹界非彼庫藏界及僧伽藍界餘界作句準知僧伽藍界者在僧伽藍邊以中人若用石若甎擲所及處是名界言中人者以力處中為離遠近故乃至庫藏界倉界亦如是言擲石所及處是名界此謂自然界之勢分或界與僧伽藍等或界小於伽藍但結攝僧界而缺攝衣界其義可通若界大於伽藍二界並結隨界攝衣故云攝衣界攝衣以屬人令無離宿罪何用復言擲石所及處名界思之犯緣此戒具足四緣方成本罪一心有慢教二受持三衣三不心念捨四已經明相定罪此中犯者若比丘置衣在僧伽藍內乃在樹下宿明相未出若捨衣若手捉衣若至擲石所及處若不捨衣若不手捉衣若不至擲石所及處明相出隨所離衣宿捨墮言明相出者有三種色若日照閻浮提樹則有黑色若照樹葉則有青色若過樹照閻浮提界則有白色於三色中白色為正除三衣若離餘衣突吉羅若比丘留衣著僧伽藍內往場處宿乃至庫藏倉處宿亦如是若比丘留衣樹下往場處宿乃至倉處僧伽藍處宿亦如是若阿蘭若處無界八樹中間一樹七弓遮摩黎國作弓法長中人肘四肘言肘者臂至指端中人肘量一尺八寸為一肘四肘為一弓有七尺二寸也七弓則有五丈零四寸也西國種樹之法以七弓方植一樹八樹七間共該三十五丈二尺八寸是阿蘭若自然界之勢分若比丘無村阿蘭若處留衣著此八樹間異處宿明相未出若捨衣若手捉衣若至擲石所及處若不捨衣不手捉衣若不至擲石所及處明相出捨墮除三衣離餘衣突吉羅僧中捨已不還等得罪同前雜事云若暫向餘處即擬還者任不將去復有暫出擬還至彼日暮即侵夜歸被蟲賊害當於彼宿不應夜行所受持衣應心念捨可於同梵行邊借餘三衣守持充事僧祗云隨所住處常隨三衣持鉢乞食譬如鳥之兩翼恆與身俱比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者僧與作羯磨明相未出手捉衣若捨衣謂作心念捨避重而就輕故離衣捨墮缺衣突吉羅若至擲石所及處若劫奪想若失想燒想漂想壞想若水道斷路險難若賊難惡獸若渠水漲若強力者所執若繫縛或命難梵行難若不捨衣不手捉衣不至擲石所及處無犯不犯者最初未制戒等會詳業疏云所以衣鉢常隨身者由出家人虗懷為本無有住著有益便停故制隨身若任留者更增餘習於彼道分曾無思擇故有由也唐無著禪師遊五臺因往金剛窟隨喜遇文殊化為老翁引入般若寺寺地盡是琉璃堂舍皆輝金色翁居白牙牀指金墩令著坐之對談著欲求寓一宿翁曰持三衣不答曰受戒已來持之翁曰此是封執處著曰亦有聖教在若許住宿心念捨之或有強緣佛故聽許翁曰無難不得捨衣宜從急護又清涼大師願中云臥不離衣鉢之側今時禪講兩宗離衣不以為咎不思佛語亦可慨矣第三過一月衣戒總釋此是共戒尼犯亦同大乘不同制此是制罪律攝云廢修正業制斯學處緣起處佛在給孤獨園有一比丘僧伽黎故爛弊壞自念言世尊結戒聽十日內畜長衣過者犯捨墮十日中間更不能辦我當云何即告同意比丘白佛佛言自今已去聽比丘畜衣乃至滿足故起緣人時六羣比丘聞世尊聽畜衣乃至滿足故彼有糞掃衣及餘同者不足取中糞掃衣浣染四角頭點作淨持寄親友比丘已人間遊行時受寄比丘以其行久不還出衣晒之諸比丘問知其故白佛佛呵責結戒所立戒相若比丘衣已竟迦絺那衣已出若比丘得非時衣欲須便受受已疾疾成衣若足者善若不足者得畜一月為滿足故若過畜尼薩耆波逸提釋義得非時衣者無迦絺那衣自恣後一月有迦絺那衣自恣後五月非時者過此限得者從在家出家若男若女及黃門邊得受已疾疾成衣既得衣已應速速作成三衣守持衣財既足更無開畜若足者善足者同樣衣財滿足謂體色量體即粗細等色謂青黃等量即長短濶狹等若不足者得畜一月為滿足故僧祗律云阿那律得一小段衣以水酒引令長廣佛知而故問阿那律汝作何等答言得一小段衣尺量不足欲引令長廣佛語尊者汝頗有更得衣望處不答言有佛言何時當得答言一月佛言從今日聽不足衣有望處者停一月為滿足故一月聽畜不犯若過下違制成犯犯緣此戒具足四緣方成本罪一心有貪慢二衣財應量三同衣足滿四畜過制限定罪此中犯者若十日中同衣足者應裁割若線拼若縫作衣若淨施若遣與人若不裁割縫作衣若不線拼不淨施不遣與人十一日明相出隨衣多少捨墮若同衣不足至十一日同衣足即十一日應裁割縫作衣若線拼若淨施若遣與人若不裁割等至十二日明相出隨衣多少盡捨墮乃至二十九日亦如是若同衣不足三十日若足若不足若同衣若不同衣應即日裁割縫作衣若線拼若淨施若遣與人若不裁割等至三十一日明相出捨墮僧中捨懺及不還等得罪同前善見云若二十九日得所望衣細先衣粗先衣説淨新得衣復得一月為望同故若望得衣粗復得停一月如是展轉隨意所樂為欲同故莫過一月律攝云有望處者謂於親友及阿遮利耶等或五年大會等我當得衣比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者若十日同衣足若裁割若線拼若縫作衣若淨施若遣與人如是乃至三十日若足若不足若同衣若不同衣即日應裁割若線拼若縫作衣若淨施若遣與人不犯若奪想失想燒想漂想不裁割乃至不遣與人不犯若奪失燒漂而取著若他與著若作彼不犯若受奇比丘命終遠行休道賊獸難等不裁割不線拼不縫作衣不淨施不遣與人不犯不犯者最初未制戒等第四取非親里尼衣戒總釋此是不共戒尼不同犯大乘不同制謂不論親里非親里但觀可取不可取然在末法尤宜護世譏嫌此是制罪律攝云由貪著心制斯學處此戒三緣合結緣起處佛在耆闍崛山起緣人時有一比丘著弊故僧伽黎蓮花色比丘尼見已發慈愍心即脫身所著貴價僧伽黎與之易彼弊故僧伽黎蓮花色尼者謂容貌作優鉢羅華色此人前世久遠劫時作婆羅門女父母家人入海採寶是女在後不能自活便與諸淫女共在一處賣色自供此女色貌不豐無人往來常自咎責何以獨爾時有辟支佛一切敬仰有人語言汝能供養辟支佛者隨心所欲世世如願時彼女人即隨其語辦美飲食以優鉢羅花覆上奉辟支佛即發願言令我世世常作女人端正無雙為人所敬無能過者又願得如沙門所得功德令我得之是故今世得作女人顏貌第一以本願故今得漏盡後著此衣見佛世尊知而故問彼以因緣白佛佛言不應如是聽汝畜持五衣完堅者餘衣隨意與人何以故婦人著上衣服猶尚不好何況弊衣世尊以此因緣結戒從比丘尼取衣捨墮是後諸比丘皆畏慎不敢從親里尼取衣佛言聽從親里尼取衣何以故若是親里籌量知有無可取不可取故聽時祗洹中二部僧得施衣共分比丘尼衣比丘錯得比丘衣尼錯得今時人言僧衣是陽邊尼衣是陰邊此乃不間律教律制尼畜五衣完堅者不聽受持上妙衣服今謂尼得上服僧得粗者故云錯得僧尼衣制無有差殊也時比丘尼持衣至僧伽藍中與諸比丘貿易諸比丘不聽白佛佛言自今已去聽貿易當如是説戒所立戒相若比丘從非親里比丘尼取衣除貿易尼薩耆波逸提釋義非親里者非父母親里乃至七世非親也親里者父母親里乃至七世有親父有六親母有六親父六親者謂伯叔兄弟子孫母六親者謂舅姨兄弟兒孫言七世者謂曾祖祖父己身子孫曾孫名七世也除貿易者以衣貿衣以衣易非衣或以非衣貿衣若以針若筒若刀若線若小段物乃至一丸藥貿衣薩婆多論云除貿易者令行者得安樂住故又使弟子無苦惱故若比丘得比丘尼所宜衣比丘尼得比丘所宜衣不貿易者以衣因緣故種種馳求廢行道故得諸苦惱是故聽之犯緣此戒具足四緣方成本罪一貪心為己二尼非親里三是應量衣四取衣入手定罪此中犯者從非親里比丘尼取衣除貿易捨墮捨懺不還等得罪同前根本云若尼將衣施僧或為説法故施或為受具時施或見被賊故施或尼多獲利養持衣物到苾芻所置地求受棄之而去取亦無犯薩婆多云取應量衣捨墮取不應量衣突吉羅若取一切鍵鎡器物突吉羅五分云從非親里式叉摩那沙彌尼取衣突吉羅若親里犯戒邪見從取衣突吉羅比丘尼突吉羅三小衆亦突吉羅若沙彌從非親里比丘尼式叉摩那沙彌尼取衣突吉羅若比丘尼式叉摩那沙彌尼從非親里比丘沙彌取衣皆突吉羅是謂為犯開緣不犯者從親里比丘尼邊取衣若貿易為僧為佛圖取者無犯不犯者最初未制戒等第五使非親尼浣衣戒總釋此是不共戒尼犯不同大乘同制時在未運尤宜護世譏嫌律攝云此為除淫染煩惱故復為廢彼正業故又為防其譏嫌過故亦為數數親近女人令自煩惱轉增盛故為斯衆過制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人迦留陀夷顏貌端正偷蘭難陀比丘尼亦復端正偷蘭是大亦名粗粗即大義難陀此云歡喜是比丘尼解通三藏善間説法六羣尼中之最者是釋種女分別功德論云是阿難妹互相繫念露形而坐欲心相視尋失不淨污安陀會尼即為浣即於屏處取不淨著口中及小便道中後遂有身諸尼問知其故白諸比丘諸比丘轉白世尊呵責結戒若比丘令比丘尼浣故衣若染若打捨墮後諸比丘各各畏慎不敢令親里尼浣故衣染打佛言聽令親里尼浣故衣染打當如是説戒所立戒相若比丘使非親里比丘尼浣故衣若染若打尼薩耆波逸提釋義浣者下至以水一浸即名為浣故衣者乃至一經身著五分云經體有垢膩名故衣染者乃至一入染汁打者下至將手一拍善見云得使出家女乃至孫女浣不得使出家婦兒婦浣何以故非親故犯緣此戒具足四緣方成本罪一是非親里尼二是故衣三是為己四浣染打竟定罪此中犯者令非親里尼浣故衣若染若打三捨墮若使浣染打彼浣染不打或浣不染而打或不浣而染打皆二捨墮一突吉羅使浣染打而不浣染打三突吉羅衣一捨即淨墮罪有三二一須悔過捨懺不還等同前善見云若比丘教尼浣衣若作竈暖水覓樵鑽火隨所作比丘一一得突吉羅罪浣竟捨墮若浣竟欲還比丘尼自言未淨更為重浣比丘得突吉羅罪十誦云先自小浣更令尼浣等皆突吉羅薩婆多云此戒應量不應量衣一切犯摩得勒伽云使非親里尼浣尼師壇捨墮浣褥枕突吉羅僧祇云若為二師持衣使尼浣越毗尼罪為塔為僧使尼浣染打無罪比丘尼及三小衆皆突吉羅是謂為犯開緣不犯者與親里尼故衣浣染打若病浣染打若為僧為佛圖浣染打若借他衣著浣染打者不犯借他衣者謂比丘衣尼借著後浣染打還比丘者不犯不犯者最初未制戒等會詳律攝云凡洗浣衣有五種利除臭穢氣蟣虱不生身無瘙癢能受染色堪久受用不浣衣者翻成五失著色衣亦有五利順聖形儀故令離傲慢故不受塵垢故不生蟣虱故觸時柔軟易將護故過分浣衣有五種失能令疾破故不堪苦用故受用勞心故無益煩勞故障諸善品故著好染衣亦有五失自長驕恣生他嫉心故令他知是治容好色故能令求時多勞苦故能障善品事故過染損衣用不牢故若過打時亦有五失四過同前五過打損衣用不牢故第六從非親乞衣戒總釋此是共戒尼得罪同大乘不同制為衆生故然亦須籌量施主堪與不堪律攝云強從索衣因生煩惱令他不樂長自貪求因譏嫌事制斯學處此戒六緣合結緣起處佛在給孤獨園起緣人時舍衛城中有長者晨朝嚴駕詣園遊觀回車詣祇洹精舍見跋難陀釋子禮敬聽法跋難陀辨才智慧善能説法開化勸令歡喜薩婆多或云初説布施中説持戒後説生天福報或云前後説法但説布施福報長者問何所須報言無所須長者故問報言止止即使我有所須不能見與長者復言但見告語我當隨所須給與長者身著廣長㲲白衣跋難陀言汝所著者可與我報言明日來至我家中我當相與尊者言我先語汝正使所須不能與我長者言非為不與但明日來若與此衣或更與好者此衣與汝我不能無衣入城長者不悅脫衣與之乘車著一衣入城守門者疑被賊劫長者説其因緣居士譏嫌諸比丘聞白佛呵責結戒不聽從居士索衣諸比丘皆畏慎不敢從親里居士索衣故更結非親里之言後有衆多比丘在拘薩羅國安居竟執持衣鉢往世尊所晝日熱不可行夜行失正道為賊所劫露形立祇洹門外諸比丘疑為尼犍子報優波離問知其故即借衣著見佛佛慰勞問具白因緣世尊呵責裸形行突吉羅爾時當以軟草若樹葉覆形應往寺邊若先有長衣應取著若無者知友比丘有長衣應取著若知友無應問僧中有何等衣應分若有者當與若無者應問有臥具不若有者當與若不與者應自開庫看若有褥若地敷若㲲若被應摘解取裁作衣以自覆形出外乞衣諸比丘畏慎不敢持此處物往彼處佛言聽時諸比丘奪衣失衣燒衣漂衣畏慎不敢著僧衣佛言聽彼得衣已不還本處佛言不應爾得衣已應還浣染縫治安著本處若不安本處如法治有比丘奪衣失衣燒衣漂衣畏慎不敢從非親里居士居士婦乞衣佛言聽從乞衣當如是説戒所立戒相若比丘從非親里居士若居士婦乞衣除餘時尼薩耆波逸提餘時者若比丘奪衣失衣燒衣漂衣是謂餘時釋義從非親里居士若居士婦者親里非親里如前居士者楞嚴云愛談名言清淨自居普門疏云以多積財貨居業豐盈謂之居士律攝云居士者簡餘黃門謂是男子女人方得重罪若是不男二根外道之類但得惡作乞者若自乞若教他乞餘時者創制之外開聽之時若比丘奪衣若王奪若賊奪若女人起欲心奪若父母親里欲令罷道故奪或他與衣後還奪去是名奪失衣或失落或忘處燒衣被火所燒漂衣水所漂也是謂餘時總結前文犯緣此戒具足四緣方成本罪一貪心為己二是非親里三衣財應量四得衣入手定罪此中犯者從非親里居士若居士婦乞衣除餘時捨墮捨懺不還等得罪同前僧祇云若自乞若使人乞若作寒熱相乞云何寒相若比丘冬分寒雨雪時著弊故衣詣檀越家現寒顫相爾時檀越禮足問言阿闍黎無時衣耶何以寒凍報言無有汝父母在時恆為我作時衣汝父母去世誰當為我作者非但汝父母死亦是我父母無常檀越即言莫怨恨我當為作時衣是名寒相乞若得衣者捨墮云何熱相若比丘五六月大熱時著厚衲衣流汗詣檀越家現熱相如上若説法乞云何説法比丘為衣故與檀越説偈言得生最勝處若人以衣施以樂布施者人天受福報生天得好色天寶冠莊嚴衣施比丘故生生自然衣是名説法乞得衣者捨墮若乞漉水囊若小補衣物若繫頭物若褁瘡物若衣褋若衣中一條皆不犯若為和尚阿闍黎乞越毗尼罪若為塔為僧不犯根本云乞時得惡作罪所得衣物若價若色若量與所乞相應者捨墮價者一迦利沙波拏乃至十五迦利沙波拏色者青黃等色量者五肘乃至十五肘等不相應者無犯薩婆多云二人共乞一衣突吉羅為他索突吉羅得應量衣捨墮得不應量衣突吉羅從親里貧乏者索突吉羅與少更索多突吉羅若非親里先請與之後貧乏從索突吉羅若與少更索多突吉羅若為他索亦突吉羅摩得勒伽云從非人畜生天邊乞衣不犯問四分為他乞不犯僧祗薩婆多皆結突吉羅此義何從答念他窮乏生慈愍心為他乞衣四分開其無犯心欲望報而為乞者僧祗薩婆多而結吉羅事一心殊故結不同比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者奪衣失衣燒衣漂衣從非親里乞若同出家人乞或為他乞他為己乞不求而得不犯不犯者最初未制戒等
