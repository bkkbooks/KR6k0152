body:
  text: 清金陵寶華山律學沙門德基輯八七滅諍法分四初總標二別列戒相三結問四勸持今初諸大德是七滅諍法半月半月說戒經中來若比丘有諍事起即應除滅釋諍有四種一言諍二覓諍三犯諍四事諍言諍者謂辯法相是非邪正即引十八事法非法乃至說不說各執己見而生其諍諍由言起故曰言諍覓諍者比丘犯過理須為除制有三根五德舉彼破戒破見破威儀同來詣僧伺覓前罪令其除殄因彼舉覓前罪遂生於諍諍由覓生故曰覓諍犯諍者由犯七聚過慝在懷宜須懺蕩罪相難識詞各紛紜遂生諍競由犯生諍故曰犯諍事諍者由前三諍中事而生諍名為事諍是中言諍以二毗尼滅謂現前多人語或但一毗尼滅謂現前覓諍共四毗尼滅謂現前憶念或現前不癡或現前罪處所犯諍共三毗尼滅謂現前自言治或現前草覆地事諍以一切毗尼滅隨所犯故律云有犯毗尼有諍毗尼謂所滅之病是其四諍能滅之法是七毗尼謂現前等七毗尼能滅四諍故曰七滅諍也律云比丘有十法者應差別平斷事一持戒具足二多聞三誦二部毗尼極利四廣解其義五善巧言語辭辯了了堪任問答令彼歡喜六諍事起能滅七不愛八不恚九不怖十不癡第四分云佛告比丘以二十二種行知是平斷事人具持二百五十戒一多聞善解阿毗曇毗尼二三不與人諍四亦不堅住此事五應呵者呵然後住六應教者教然後住七應滅擯者滅擯然後住八不愛九不恚十不怖十一不癡十二不受此部飲食十三亦不受彼部飲食十四不受此部衣鉢坐具針筒十五亦不受彼部衣鉢坐具針筒十六不供給此部十七亦不供給彼部十八不共此部入邨十九亦不共彼部入邨二十不與作期要二十一亦不至彼後來後坐二十二僧祇云比丘成就五法能滅諍事知是實非是不實是利益非不利益得伴非不得伴得平等伴非不得平等伴得時非不得時有二他邏他一者自護心見他是非作是念業行作者自知譬如失火但自救身焉知他事二者待時見他諍訟相言作是念此諍訟相言時到自當判斷是名二他邏他共此眾法食味食亦共彼眾法食味食或請斷當事或不請而斷當事亦作闥賴吒薩婆多云闥賴名地吒利名住智勝自在於正法不動如人住地無傾覆也十誦云闥利吒比丘取諍時應以五事觀此中誰先來持戒清淨誰多聞智慧善誦阿含誰於師如法誰信佛法僧誰不輕佛戒烏迴鳩羅比丘有十事僧應差薩婆多云烏迴名二鳩羅名平等心無二其平加秤也知諍來往處根本善知諍能分別諍知諍起因緣知諍義善滅諍滅諍已更不令起持戒清淨多聞多智闥利吒比丘行有二十二法當知是利根多聞一善知事起根本二善分別事相三善知事差別四善知事本末五善知事輕重六善知除滅事七善知滅事更不起八善知作事人有事人九有教勅力十能使人受力十一有方便輭語力十二亦能使人受十三有自折伏力十四亦能使人受十五知慚愧十六心不憍慢十七無憍慢語十八身口意無偏著十九不隨愛行二十不隨瞋行二十一不隨怖行二十二不隨癡行此謂能滅諍者是也十誦云有六諍本律云六諍為根也一瞋恨不語二惡性欲害三貪嫉四諂曲五無慚愧六惡欲邪見此之六事能生諍故曰諍根本也律攝云若有諍事起當以七法順大師教如法如律而除滅之是謂諍事起即應除滅也二別列戒相分七初現前毗尼至七草覆地法第一現前滅諍總釋此是共戒尼犯亦同大乘比丘同學梵網經云應生慈心善和鬪諍律攝云此等皆由他詰問事不忍他詰譏嫌煩惱制斯學處自下六戒咸同不復重出緣起處佛在舍衛國起緣人迦留陀夷與六群往阿夷羅䟦提河中浴迦留陀夷浴竟上岸著六群衣謂是己衣不看而去六羣洗浴已上岸不見己衣正見迦留陀夷衣即言迦留陀夷偷我衣人不現前便作滅擯羯磨迦留陀夷聞已有疑即往白佛佛問言汝以何心取答言謂是我衣不以賊心佛言不犯不應不看衣而著不應人不現前而作羯磨及訶責羯磨等若作羯磨不成得突吉羅自今已去為諸比丘結現前毗尼滅諍所立戒相應與現前毗尼當與現前毗尼釋義現前者法毗尼人僧界云何法現前所持法滅諍者是持者受持也謂持修多羅藏云何毗尼現前所持毗尼滅諍者是謂受持毗尼藏云何人現前言義往返者是謂起諍者二俱現前云何僧現前同羯磨和合集一處不來者囑授在現前得訶而不訶者是和合同集名之為僧滅諍須僧現前秉法故云僧現前云何界現前在界內羯磨作制限者是謂豎標唱相所結之界凡欲秉法盡齊限集僧令無別眾之咎今滅諍必須現前界內集僧作法故曰界現前也言諍以二毗尼滅謂現前多人語或但一毗尼滅謂現前若一比丘在一比丘前好言教語如法如毗尼如佛所教汝當受是忍可若作如是諍事得滅是為言諍以一滅滅現前毗尼不用多人語也若一比丘為二比丘三比丘為僧亦如是乃至僧為一比丘二比丘三比丘為僧亦如是是中現前義若能滅者四人以上其法毗尼人僧界五種一不現前則不名現前毗尼也若能滅者或但二三比丘一比丘唯以法毗尼人三種現前僧界二種不現前亦名現前毗尼也十誦云現前滅諍有二種非法若非法者約勅非法者令折伏與現前毗尼若非法者約勅如法者令折伏與現前毗尼有二種如法若如法者約勅如法者令折伏與現前毗尼若如法者約勅非法者令折伏與現前毗尼定罪若諍事如法滅已後更發起波逸提若應與不與不應與而與突吉羅會詳摩得勒伽云十種不現前作羯磨一覆鉢二捨覆鉢謂白衣罵謗比丘等僧為作覆鉢羯磨不共往返受食若自見過須詣僧中乞求捨者僧為解不現前羯磨為治罰俗人但遙作不令現前也三學家四捨學家前第三悔過法中所明五作房謂以故房與居士修理僧應作白二法與之此亦不現前作六沙彌謂擯惡邪沙彌令眼見耳不聞處立亦不現前七狂作癡狂羯磨謂由彼失本心故無所識知不須現前八不禮拜九不共語十不供養此三羯磨謂比丘觸惱比丘尼聽尼為比丘作此三種羯磨亦聽遙作勿得令比丘現前而治罰也律中又有四法不現前剃髮出家外道共住授式叉尼戒剃髮是最初入僧伽中欲作單白為彼剃髮令彼至眼見耳不聞處立之故與出家作單白亦爾與外道四月共住亦遣至眼見耳不聞處與之故與式叉摩那授戒亦應遣至眼見耳不聞處受之故此法在尼部中作合前論中共有十四種不現前餘一切羯磨並須現前現前毗尼竟此滅言諍第二憶念滅諍法緣起處佛在王舍城起緣人沓婆摩羅子不犯重罪波羅夷僧殘偷蘭遮時諸比丘皆言犯重罪即問言汝憶犯重罪不彼不憶犯重罪答言我不憶犯如是重罪諸比丘故問不止彼作是念我當云何白佛佛言自今已去聽為沓婆摩羅子作憶念毗尼白四羯磨所立戒相應與憶念毗尼當與憶念毗尼釋義憶念毗尼者彼比丘此罪更不應舉不應作憶念者是謂諸比丘數數詰問其罪彼不憶犯固問不止佛令僧為作憶念毗尼令彼憶念使諸比丘更莫令憶念故曰憶念毗尼是為覓諍以二毗尼滅謂現前憶念或現前不癡或現前罪處所薩婆多云此是守護毗尼五眾盡與憶念毗尼五篇戒盡與憶念毗尼必白四羯磨與比丘比丘尼現前三眾不現前十誦云有三非法與憶念毗尼有比丘犯無殘罪自言犯有殘罪是比丘從僧乞憶念毗尼若僧與憶念毗尼是名非法何以故是人應與滅擯故又如施越比丘癡狂心故多作不清淨非法還得本心先所作罪若僧等常說是事是人從僧乞憶念毗尼若僧與憶念毗尼是名非法何以故是人應與不癡毗尼故又如訶多比丘無慚無愧破戒有見聞疑罪是人自言我有是罪後言我無是罪若僧與憶念毗尼是名非法何以故應與實覓毗尼故是名三非法與憶念毗尼有三如法與憶念毗尼如陀驃比丘為慈地比丘尼無根波羅夷謗故若僧等常說是事是比丘從僧乞憶念毗尼若僧與憶念毗尼是名如法何以故是人應與憶念毗尼故又如一比丘犯罪發露如法悔過若僧等猶說是事是比丘從僧乞憶念毗尼若僧與憶念毗尼是名如法何以故應與憶念毗尼故又如比丘未犯將必當犯以是事故若僧等說是犯罪是比丘從僧乞憶念毗尼若僧與是人憶念毗尼是名如法何以故是人應與憶念毗尼故是名三如法與憶念毗尼覓諍以二毗尼滅現前毗尼憶念毗尼不用不癡及罪處所定罪薩婆多云憶念毗尼行法者餘比丘不應出其罪過不應令憶念不應乞聽亦不應受餘比丘乞聽若彼從乞聽突吉羅若受他乞聽亦突吉羅若彼不聽若出過罪若令憶念得波逸提此覓覓諍為舉人過罪須令憶念既為作憶念已不復更令憶念也若應與不與不應與而與法事乖違施法不當得突吉羅此滅覓諍第三不癡滅諍法緣起處佛在王舍城起緣人有比丘名難提癲狂心亂多犯眾罪非沙門法言無齊限行來出入不順威儀後還得本心諸比丘問言難提汝憶犯重罪不答言我先癲狂心亂時多犯眾罪非我故作是癲狂故耳諸長老不須數見難詰諸比丘故難詰不止彼比丘作如是念我當云何白佛佛言聽僧與難提不癡毗尼白四羯磨結不癡毗尼滅諍法所立戒相應與不癡毗尼當與不癡毗尼釋義不癡毗尼者彼比丘此罪更不應舉不應作憶念者是僧祇云佛言云何名不癡毗尼有比丘本癡今不癡諸梵行人說前癡行爾時應疾疾集僧集僧已如修多羅如毗尼隨此比丘事實與不癡毗尼以不癡毗尼滅誹謗事薩婆多云此是守護毗尼五眾盡與不癡毗尼或現前或不現前如前所明十誦云有四種非法與不癡毗尼有比丘不癡狂現癡狂相貌諸比丘僧中問汝狂癡時有所作今憶念不答言長老我憶念癡故作他人教我使作一憶夢中作二憶裸形東西走三立大小便四是人從僧乞不癡毗尼若僧與是人不癡毗尼是名四非法四如法者有比丘實狂癡心顛倒現狂癡相貌諸比丘問汝憶念狂癡時所作不答言不憶念他不教我作一不憶念夢中作二不憶裸形東西走三不憶立大小便四是人從僧乞不癡毗尼若僧與不癡毗尼是名四如法行法同前律云若如是諍事滅者是為覓諍以二滅滅現前毗尼不癡毗尼不用憶念毗尼罪處所阿難又問頗有覓諍以二滅滅現前毗尼罪處所不用憶念毗尼不癡毗尼耶佛言有若比丘好論議與外道論時得一切難便前後語言相違若在眾僧中問時亦前後語言相違眾中故妄語僧應與此比丘罪處所白四羯磨若如是諍事滅是為覓諍以二滅滅現前罪處所不用憶念毗尼不癡毗尼云何罪處所彼比丘此罪與作舉作憶念者是施法不當者突吉羅不癡毗尼竟此滅亦是覓諍第四自言滅諍法緣起處佛在瞻波城伽渠池邊時世尊十五日布薩白月滿時前後圍繞在眾前於露地坐阿難初夜過已白佛言初夜已過願世尊說戒世尊默然阿難即還復坐中夜亦如是至後夜過明相已出眾僧坐久惟願說戒佛告阿難眾僧不清淨欲令如來於不清淨眾中羯磨說戒無有是處起緣人長老目連觀察眾中以天眼清淨見彼比丘坐去佛不遠往彼語言汝今可起世尊知汝見汝出去滅去不應此住目連捉彼比丘臂牽著門外還白佛言眾已清淨願世尊說戒佛告目連不應如是若於異時亦不應如是目連令彼伏罪然後與罪不應不自伏罪而與罪自今已去為諸比丘結自言治滅諍法所立戒相應與自言治當與自言治釋義云何自言說罪名說罪種懺悔者是云何治自責汝心生厭離也五分云慈地比丘尼以無根波羅夷法謗陀婆比丘自言陀婆污我即與自言滅擯律云犯諍共三毗尼滅謂現前自言治或現前草覆地若比丘犯罪若欲在一比丘前懺悔應至一清淨比丘所偏露右肩若上座禮足右膝著地合掌說罪名罪種名者篇聚差別種者戒相各異隨機羯磨云畜長離衣三十事異也作如是言長老一心念我某甲比丘犯某罪今從長老懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不敢覆藏長老憶我清淨戒身具足清淨布薩第二第三說彼應語言自責汝心生厭離答言爾若作如是諍事滅者是為犯諍以二滅滅現前毗尼自言治不用草覆地若二人三人僧中懺悔亦如是薩婆多云自言滅諍法五眾有事及五篇戒有犯不犯事盡自言滅諍法滅也有十種非法若犯波羅夷僧殘波逸提提舍尼突吉羅自言不犯又不犯五篇自言我犯是名十非法十如法者有比丘犯五篇自言我犯若不犯五篇自言我不犯是名十如法此滅犯諍違越得罪如上第五覓罪滅諍法緣起處佛在釋翅瘦起緣人有比丘字象力喜論議共外道論得切問時前後言語相違於僧中問時亦復如是前後言語相違在眾中故作妄語外道譏嫌諸比丘聞白佛佛呵責已告諸比丘應與彼比丘罪處所白四羯磨應如是與集僧集僧已為作舉作舉已為作憶念作憶念已與罪應差堪能羯磨者作自今已去為諸比丘結罪處所滅諍法所立戒相應與覓罪相當與覓罪相根本律作求罪自性十誦律作實覓罪五分律作本言治釋義云何罪處所彼比丘此罪與作舉作憶念者是勒伽論云實覓罪者先犯罪已發露後覆藏薩婆多云此是折伏毗尼一切五篇戒盡與實覓毗尼一切五眾盡與此毗尼有五種非法有比丘犯波羅夷先言不犯後言犯若僧與是人實覓毗尼是名非法何以故是人應與滅擯故有比丘犯僧殘波逸提提舍尼突吉羅先言不犯後言犯若僧與是人實覓毗尼是名非法何以故是人隨所犯應治故有五種如法者有比丘犯波羅夷先言犯後言不犯若僧與是人實覓毗尼是名如法何以故是人應與實覓故若比丘犯僧殘乃至突吉羅先言犯後言不犯若僧與是人實覓毗尼是名如法何以故是人應與實覓毗尼故實覓毗尼行法者是比丘不應與他受大戒不得受他依止不應畜新舊沙彌不得教比丘尼法若僧羯磨教化比丘尼不應受僧所與作實覓毗尼罪更不應犯若似是罪若過是罪亦不應作不應呵僧羯磨亦不應呵作羯磨人不應從他乞聽不應遮說戒不應遮受戒不應遮自恣不應出無罪比丘過罪不應共同事應調伏心行隨順比丘僧意若不如是行者盡形不得離是羯磨僧祇云此人盡壽應行八事不得度人不得與人受具足不得與人依止不得受比丘按摩供給不得作比丘使不得受次第差會不得為僧作說法人及說毗尼人盡壽不應與捨五分云本言有二種一可悔二不可悔若本言犯重仍覆藏者應作盡壽不可悔白四羯磨此亦滅覓諍以二滅滅謂現前及覓罪相乖違得罪如前第六多人語滅諍法緣起處佛在舍衛國起緣人時舍衛諸比丘諍眾僧如法滅諍彼諍比丘不忍可僧滅諍事佛種種呵責已告諸比丘應求多人覓罪用多人知法者語為諸比丘結多人語滅諍法所立戒相應與多人覓罪當與多人覓罪釋義用多人知法者語聽行籌差行舍羅人白二羯磨若諸比丘諍事現前不能滅者應多求知法比丘行籌滅以籌多表語云何多人語用多人持法持毗尼持摩夷者是薩婆多云多覓毗尼者多求因緣斷多處求斷從多處斷故云多覓毗尼有五法不應差使行舍羅有愛恚怖癡不知已行不行反上五法應差有三種行籌一顯露二覆藏三耳語云何顯露若眾中雖非法比丘多然彼二師或上座智人皆如法語應顯露行籌作二種籌一破二完白言作如是語者捉不破籌作如是語者捉破籌行籌已應別處數若如法語者多應作白作如是語者諍事滅若如法語者少應作禮便去遣信往比丘住處僧中白言彼住處非法比丘多善哉長老能往至彼若如法比丘多諍事滅功德多此比丘聞應往若不往如法治云何覆藏行籌若眾中雖如法者多而彼二師及上座智人不如法恐顯露行籌諸比丘隨順眾中上座標首應覆藏行籌薩婆多云覆藏行籌者行籌人心為非法人故望取非法者多若在明處助非法者羞取非法籌故也云何耳語行籌若眾中雖如法者多而彼二師上座智人非法說應耳語行籌行籌時應稀坐間容一人身小障翳彼比丘作耳語語言汝二師親厚知識已捉籌善哉汝亦當捉籌慈愍故若如法比丘多諍事得滅功德多行捉已在一面數之薩婆多云所以行籌者事既難斷若說一是一非必增其惡心故行籌於眾人前好惡自伏理亦無偏僧祇云行籌訖若非法籌乃至多一者不應唱非法人多如法人少當作方便解坐或前食欲至者應唱令前食或後食時浴時說法時說毗尼時隨應唱之若非法者覺言我等勝為我故解坐我等今不起要即此坐決斷是事爾時精舍邊若有小屋無蟲者應使淨人放火已唱言火起火起即便散起救火乃往覓如法伴律云行籌斷事時一切僧集不得取欲何以故或多比丘說非法故一切比丘不應取欲如行鉢法也若不能斷乃至彼處僧坊中若有三人二人一比丘持三藏四眾所重者應到彼處應語彼一比丘如前次第事具足向說是大德比丘應作是語不可二人相言俱得勝也是中必一勝一負如是語者是名如法說若不如是語者是名非法說定罪是諸相言比丘若如法滅已還更發起波逸提若但訶責言是斷事不如法犯突吉羅就有德人眾所歸伏無不用語設有不隨者羞亦為諸人所笑必受語傳事人多說事不說人大德比丘亦直說事是非不說人有事二人各自內知而伏則勝負相現也還發起波逸提者以一一罪印之令彼此後更無言故結罪也此一毗尼亦滅言諍也第七草覆地滅諍法緣起處佛在舍衛國起緣人時舍衛比丘共諍諸比丘多犯眾戒非沙門法亦作亦說出入無限後諸比丘自作是念我曹多犯眾戒非沙門法亦作亦說出入無限若我曹還自共善問此事或能令此諍事轉深重經歷年月不得如法如毗尼如佛所教滅除諍事令僧不得安樂時諸比丘白佛佛言應滅此諍事如草覆地為諸比丘結如草覆地滅諍法所立戒相應與如草覆地當與如草覆地釋義草覆地若比丘諍事是中比丘者多犯眾罪非沙門法言無齊限出入行來不順威儀作如是念我等此諍事多犯眾罪非沙門法言無齊限出入行來不順威儀我等若自共尋究此事恐令罪深重不得如法如毗尼如佛所教諍事滅令諸比丘住止不安樂彼一眾中有智慧堪能比丘從座起偏露右肩右膝著地合掌作如是言諸長老我等此諍事多犯眾罪非沙門法言無齊限出入行來不順威儀若我等尋究此事恐令罪深重不得如法如毗尼如佛所教諍事滅令諸比丘住止不安樂若長老忍者我今為諸長老作如草履地懺悔此罪第二眾中亦如是說彼諸比丘應作白如草覆地懺如是白大德僧聽若僧時到僧忍聽此諍事作草覆地懺悔白如是白已作如草覆地懺悔是一眾中有智慧堪能者從座起偏露右肩右膝著地合掌作如是白諸長老我今此諸諍事己所犯罪除重罪遮不至白衣家羯磨言除重罪者謂此草覆地法一切波逸提突吉羅等輕罪皆悉除滅若犯波羅夷仍須滅擯僧殘還行別住等法偷蘭亦用作法方除遮不至白衣家亦非因此而解也若諸長老聽者為諸長老及己作草覆地懺悔第二眾亦應作如是說云何草覆地不稱說罪名罪種懺悔者是十誦云草布地有二義一鬬諍數起諍人亦多其事轉眾推其原本難可知處佛聽草布地除滅如亂草難可整理亂來棄之二者有德上座勸喻諍者使向兩眾羊皮四布悔過即五分云皆舒手脚伏地故如羊皮也二眾者各有所助故令各在一處五分云若有比丘鬬諍相罵作身口意惡業後欲於僧中除罪作草覆地悔過應三乞已皆舒手脚伏地向羯磨師一心聽受羯磨彼為白四羯磨是名現前毗尼草布地滅犯罪諍何謂草布地彼諸比丘不復說鬬原僧亦不更問事根本此一毗尼滅犯諍事諍通滅也會詳目得迦云有二苾芻共生瑕隙種種異言互相謗讟於此二人應信持戒者若二俱持戒應信多聞者若二俱多聞應信少欲者若二俱少欲應信極少欲者若二俱極少欲而生瑕隙無有是處十誦云用瞋恨者不滅瞋恨惟忍辱力乃能滅之有五事諍難滅不求僧斷不順佛語不如法白二眾諍心不息所犯不求清淨反上五事者易滅三結問諸大德我已說七滅諍法今問諸大德是中清淨不三問四勸持諸大德是中清淨默然故是事如是持次總結分二初總結名目二勸學餘法今初諸大德我已說戒經序已說四波羅夷法已說十三僧伽婆尸沙法已說二不定法已說三十尼薩耆波逸提法已說九十波逸提法已說四波羅提提舍尼法已說眾學戒法已說七滅諍法此是佛所說半月半月說戒經中來二勸學餘法若更有餘佛法是中皆共和合應當學釋若更有餘佛法等者此有二義一者毗尼雙明止作及僧尼犍度等法今此戒本惟明大僧二百五十學處更有餘法皆應習學根本戒經云若更有餘法及隨法律攝釋云若更有餘者謂是十七䟦窣親等梵云跋窣覩本律云犍度正音婆犍圖此云法聚以氣類相從之法類眾一處也所說學法咸應修習法及隨法者法謂涅槃清淨無累正行之法八聖道等能隨順彼圓寂之處故名隨法佛告諸苾芻或時有事我從先來非遮非許者然於此事若違不清淨順清淨者此即是淨應可行之若違清淨順不清淨者此是不清淨即不應行與此相應者皆當修學仁等共集歡喜無諍一心一說如水乳合應勤光顯大師教法令安樂住勿為放逸二者謂一切修多羅及阿毗曇謂諸佛慧命寄於三藏學則令佛法久住道明德備無濫僧寶道由人弘方可紹隆佛種不學則正法潛藏世間眼滅亦且招羺羊無聞之過不可不勉力勤學法燈相續正法久住不滅矣九述佛略教經有七初毗婆尸佛至七本師釋迦文今初分二初對機所說之法二能說之人後並同此律攝云初毗婆尸佛出現世間諸聲聞眾多樂苦身以為正行及諸邪師順其邪欲為說邪法對治彼故為說此頌忍辱第一道佛說無為最出家惱他人不名為沙門釋忍辱第一道者此頌偏讚忍辱者何也以持戒者未必能忍辱而忍辱者決無不持戒故遺教經云忍之為德持戒苦行所不能及也梵語羼提此云安忍法界次第云秦言忍辱謂內心能安忍外所辱之境故曰忍辱忍有二種一者生忍二者法忍云何名生忍生忍亦有二種一於恭敬供養中能忍不著則不生憍逸二於瞋罵打害中能忍則不生怨惱是為生忍云何名法忍法忍亦有二種一者非心法謂寒熱風雨饑渴病老死等二者心法謂瞋恚憂愁疑婬欲憍慢諸邪見等於此二法能忍不動是名法忍若見有辱可忍縱使身口不行報復心中決難脫然只此未得脫然一念便與沙門勤息名義不得相應惟深觀無為法性若生若法俱不可得尚無有辱將誰名忍故稱為忍辱第一道也佛說無為最者云無為法中忍為最故無為者即涅槃也出家等二句乃反顯之辭遮彼外道邪見出家之類妄說異法教化他人無益苦身令同己行自他俱惱終無果益何以故沙門之法忍辱無瞋勤修定慧了達無為淨名云出家者為無為法名真出家此是毗婆尸如來無所著等正覺說是戒經釋梵語多陀阿伽度亦云怛闥阿竭後秦翻為如來謂凡夫不如而來二乘如而不來唯世尊亦如亦來若約三身釋金剛經云無所從來亦無所去故名如來此約法身而言也轉法輪云第一義諦名如正覺名來此約報身釋成實論云乘如實道來成正覺此約應身釋有異凡夫二乘故名如來梵語阿羅訶此云無所著亦言應供大論云應受九界聖凡一切眾生供養故梵語三藐三佛陀亦云三耶三菩秦言等正覺亦云正徧知徧知法界一切諸法故什師言正徧覺也言法無差故言正智無不周故言徧出生死夢故言覺妙宗云此之三號即名三德今就所觀義當三諦正徧知即般若真諦也應供即解脫俗諦也如來即法身中諦也故維摩云阿難若我廣說此三句義汝以劫壽不能盡受此舉如來十號之三也下皆准此第二尸棄如來出現世間諸聲聞眾多為生天而修梵行彼佛為對治故而說斯頌譬如明眼人能避嶮惡道世有聰明人能遠離諸惡釋首二句舉喻如人有眼能避嶮難終獲安隱此中眼者謂是慧眼眼有明照與慧相應能見法得法明眼避嶮途能至安隱處三界之中無非是嶮是惡愚人無智不思出要之法而天妙樂報盡還墮諸惡趣中長受輪迴無有解脫故總名惡道也世有聰明人能遠離諸惡者聰則能聞道明則能見道信佛妙法深識苦因了達三界宛若水月空花自性本空猶如幻化一切諸惡不求離而自遠離既離諸惡苦果不招永絕輪迴至究竟地安隱常樂也諸惡者謂見思塵沙無明三惑一切現行及種子也此是尸棄如來無所著等正覺說是戒經第三毗葉羅如來出現於世諸聲聞眾多於持戒生於喜足不修餘法又常見他人過失惱害於人為對治彼說斯略教不謗亦不嫉當奉行於戒飲食知止足常樂在空閑心定樂精進是名諸佛教釋首二句不謗謂此頌意明初遮口過不毀訾他不嫉防意業不欲害彼謗者口出惡言嫉者心存惡念無此二過奉行於戒乃三業皆淨則名真持淨戒者也以下明對治之法飲食知止足二句謂衣趣蔽形食用充饑謂離愛欲息世馳求不同白衣外道離二邊過故常居蘭若遠避囂塵知足遠離皆是頭陁之勝法心定樂精進二句謂息世馳求所以心定以心定故於勝諸法常樂精進以精進故離諸懈怠順教勤修方契於道三世諸佛所有法要不出於斯故曰是諸佛教也此是毗葉羅如來無所著等正覺說是戒經第四拘留孫佛出現於世諸聲聞眾多希利養慢修善品為欲遮彼說斯略教譬如蜂採花不壞色與香但取其味去比丘入聚然不違戾他事不觀作不作但自觀身行若正若不正釋譬如蜂採花乃至入聚然等者聚謂聚落彼佛教諸比丘入邨乞食之時不應壞彼淨信敬心喻遊蜂在於花處少持輕蘂無損色香不應多有求索趨得充虗勿生惱害也又苾芻之行有二端嚴猶如妙華色香具足持戒喻色具定如香乞食資身勿虧此二不違戾他事乃至若正若不正等不違他正所謂不壞色香也時彼苾芻由自持戒觀他破戒自談己勝毀訾於他常多伺求他人過失是應作是不應作令心散亂乖上人法為對治彼說斯略教不違戾他不觀他人作善不作也當檢點自身所行之行是善不善慎勿觀他是邪是正也此是拘留孫如來無所著等正覺說是戒經第五拘那含佛出現世間諸聲聞眾多樂習定心生味著為對治彼說斯略教心莫作放逸聖法當勤學如是無憂愁心定入涅槃釋不放逸者攝心正念勤修聖道斷煩惱惑了無憂愁故心定既修聖道為因必會無生證入涅槃樂也若約四諦配釋者憂愁屬苦放逸是集聖法是道入涅槃是滅也此是拘那含牟尼如來無所著等正覺說是戒經第六迦葉如來亦如第三佛一切惡莫作當奉行諸善自淨其志意是則諸佛教釋一切惡莫作者謂性業遮業五住等諸煩惱見一切住地欲愛住地色愛住地有愛住地無明住地四住煩惱如前釋無明者即根本無明惑也謂聲聞緣覺未了此惑沉滯真空即住方便土大乘菩薩方能除斷由餘惑未盡住實報土故名無明住地無量不善之業悉使斷除勿令造作故曰一切惡莫作也當奉行諸善者謂諸善功德無量清淨法門常勤修進故云當奉行諸善若終日止惡而無能止之相終日行善而無能行之相是名自淨其志意不求淨而自淨是則諸佛聖教不越於斯矣此是迦葉如來無所著等正覺說是戒經第七釋迦如來出現於世諸聲聞眾性多煩惱造諸惡業多行放逸不修善品作少善事便生喜足為三事故說斯略教善護於口言自淨其志意身莫作諸惡此三業道淨能得如是行是大仙人道釋善護口言者謂三業之中口業最重抑且口過易起難防口有四過妄言綺語兩舌惡罵乃至出言粗獷所謂夫士處世斧在口中所以斬身由其惡言必當善護如瓶也自淨其志意身莫作諸惡謂身有殺盜婬或眼觀色耳聽聲鼻嗅香舌甞味有如是等過莫令妄動動則多不饒益自他俱損故應檢束也意家有貪瞋癡等三毒乃至無邊罪咎莫不皆從意起如君總䇿其臣造業招報罪固不小反流歸源功德難思當善護心莫令放逸意根若淨三業齊淨三業道淨萬善全彰若人若天若聲聞若緣覺若菩薩若諸佛無不依之若果能如是行者則大仙之道不出於斯矣此是釋迦牟尼如來無所著等正覺於十二年中為無事僧說是戒經從是以後廣分別說諸比丘自為樂法樂沙門者有慚有愧樂學戒者當於中學釋七佛戒經各逗時機而說旨趣各有所重應病與藥至於會歸涅槃理本無二十二年中稱無事僧者如五分中佛言我此眾淨未有未曾有法最小者得須陀洹諸佛如來不以未有漏法而為弟子結戒我此眾中未有持多聞人故不生諸漏未有利養名稱故未有多欲人故未有現神足為天人所知識故不生諸漏從是以後廣分別說謂從十二年後因有漏法生隨宜所結二百五十學處為斷彼有漏法故一一戒中皆有根本從生方便等流故云廣分別說下結勸學如上等法為比丘者皆應學之除非不自樂為比丘者不樂法者樂作非沙門非釋子者無慚無愧者不樂學戒者可不學之若自為樂法者樂作知慚愧者樂作沙門釋子者應一一學之集要問曰十二年前學箇甚麼答曰其無事者即是無學其未登無學者即學淨三業道問曰我今亦但淨三業道何用學此煩𤨏戒相為答曰汝今為在十二年後為在十二年前又且不論時前時後且問汝今三業為同無事僧為不同無事僧既不同無事僧若不學此戒何由知持知犯若謂戒不必學即犯輕戒波逸提只此輕戒一念為是淨為是不淨若謂持犯俱不可得汝今何獨不得持戒却得犯戒若謂犯即無犯則亦可持即無持何乃捨持取犯若謂情無取捨即不應取略捨廣若謂淨穢平等則地獄天堂亦平等惡罵美稱亦平等檀麝糞穢亦平等甘露膿血亦平等天衣刀杖亦平等汝何不常處地獄汝何不名猪狗畜生禿奴禿賊汝何不常嗅糞穢汝何不飡噉膿血汝何不刀杖打割其身若汝實證平等法性自然不壞俗諦必將受現法樂善化有情若汝勉強受汝上等事即魔入汝心亦非正道若汝既未證平等法性亦未能受如上等事而獨隨情逐意懶惰懈怠不肯學戒法即是賊住即非沙門即無慚愧即獅子身中蟲即最上大賊即惡魔眷屬即地獄種子汝何不觀如來證得色平等故能使地獄天宮皆為淨土如來證得聲平等故能使天魔惡聲化為讚頌如來證得香平等故能使幻士廁室化為香殿如來證得味平等故能使食中毒藥化成甘露如來證得觸平等故能使魔軍刃箭化成天華如來證得法平等故不為物轉恒為轉物具足無量不可思議神通妙用如來證得持犯平等故三業無不隨智慧行能使破戒眾生還得清淨汝既妄稱持犯平等何乃三業仍多蕪穢且於戒法作留難耶如此欺心但為自害嗚呼痛哉戒經已竟第三結勸迴向分七初讚持戒勝益二諸佛明證三勸遵佛教四顯戒利益五顧命教誡六勸行布薩七總結迴向今初明人能護戒能得三種樂名譽及利養死得生天上當觀如是處有智勤護戒戒淨有智慧便得第一道釋明人者謂曉了開遮成壞兩緣於毗尼藏通達無滯方能護戒非謂愚癡之人堪能護戒故梵網經云明人忍慧強能持如是法也三種樂者此總標一句下別明名譽及利養死得生天上謂於戒守護無缺者現世即得戒香馚馥見聞敬仰無不稱讚衣食豐饒報終生天受勝妙樂此以善道勸誘乃持戒之華報耳下明究竟之果報如是處者即指學處而言有智勤護戒戒淨有智慧所謂因智慧故而戒淨因戒淨故而生定因定故而發慧三學等持更相由藉以成福慧二嚴便得出世無上菩提第一之道故經云戒為無上菩提本應當一心持淨戒乃護戒之實果也二諸佛明證如過去諸佛及以未來者現在諸世尊能勝一切憂皆共尊敬戒此是諸佛法釋三世諸佛無不尊重於戒勝一切憂者謂煩惱所知二障為因分段變易二種生死為果煩惱障者謂昏煩之法惱亂心神不能願發妙明真性故名煩惱障所知障者亦名智慧障謂執所證之法障蔽智慧之性故名所知障葢六凡而有分段之苦二乘未免變易之憂六凡者即六道也分段生死者分即分限段即形段謂三界四生果報壽命有長短分限身有大小皆不免於生死時極必終是名分段生死也變易生死者因移果易名為變易羅漢支佛菩薩既離三界生死粗苦有阿黎耶變易行苦四相所遷轉易改變出生方便等土就其斷惑證果之時因移果易論為生死故名變易生死惟有諸佛五住究盡二死永亡餘聖咸所不及故稱能勝一切憂也皆共尊敬戒者謂三世諸佛皆由尊敬於戒依戒而修斷諸煩惱證寂滅理當知即是諸佛入道之法門也三勸遵佛教若有自為身欲求於佛道當尊重正法此是諸佛教釋自為身者揀非為求名聞利養亦非為求人天福報亦不求權乘小果本為自求無上菩提當尊重正法者謂如來金口親宣波羅提木叉惟佛出世方有不同定共道共二戒及治世五常十善等法故云正法也又有此戒乃有僧寶有僧寶故弘演毗尼羯磨說戒能令佛法久住不滅故云正法也所謂道由信發弘之在人若自為身求佛道者必當尊重此法如來五分法身以戒為初諸佛聖教以戒為首諸佛教法不出於斯矣四顯戒利益七佛為世尊滅除諸結使說是七戒經諸縛得解脫已入於涅槃諸戲永滅盡尊行大仙說聖賢稱譽戒弟子之所行入寂滅涅槃釋七佛世尊為欲滅除眾生諸結使說是七戒經此乃顯戒之功能也諸結者九結也謂愛恚慢無明見取疑嫉慳一愛結者為貪愛故廣行不善由此遂招未來生死之苦流轉三界不能出離是名愛結廣行不善者謂廣作殺盜婬妄等惡業也二恚結者謂諸眾生為瞋恚故廣行不善由此遂招未來生死之苦流轉三界不能出離是名恚結三慢結者謂諸眾生為慢過慢慢過慢我慢增上慢下劣慢邪慢故廣行不善由此遂招未來生死之苦流轉三界不能出離是名慢結慢者同類相傲也過慢者相似法中執己為勝也慢過慢者他本勝己強謂勝他也我慢者恃己凌他也增上慢者未得之法自謂己得也下劣慢者己本無能反自矜誇也邪慢者執著邪見凌慢他人也四無明結者謂諸眾生為無明所覆於苦法集法不能解了廣行不善由此遂招未來生死之苦流轉三界不能出離是名無明結苦法者三界生死眾苦之法也集法者積集三界有為之法即惑業也五見結者謂諸眾生於身見邊見邪見妄興執著廣行不善由此遂招未來生死之苦流轉三界不能出離是名見結身見者謂於五陰身中強作主宰計著有我也邊見者謂於身見中計斷計常各執一邊也邪見者謂執有執無及撥無因果也六取結者取即取著謂諸眾生於見取戒取妄計執著廣行不善由此遂招未來生死之苦流轉三界不能出離是名取結見取者即身見邊見邪見也外道取著此等邪見以為正見也戒取者謂外道妄計自身前世從牛狗中來即便食草噉穢取以進身以為戒也七疑結者謂諸眾生於佛法僧寶妄生疑惑不修正行廣行不善由此遂招未來生死之苦流轉三界不能出離是名疑結八嫉結者謂諸眾生躭著利養見他榮富起心嫉妬廣行不善由此遂招未來生死之苦流轉三界不能出離是名嫉結九慳結者謂諸眾生躭著利養於資生具其心悋惜不能捨施廣行不善由此能招未來生死之苦流轉三界不能出離是名慳結而言結者即繫縛之義謂一切眾生因此妄惑造作諸業而為眾苦繫縛流轉三界不能出離故云結也使者見思皆名為使釋在前文縛有四種謂貪瞋戒取見取亦名四結所以說是戒經普令眾生解脫諸縛同入涅槃滅諸三界種種戲論尊行大仙說下結勸也謂此戒法是大仙之所說非餘下聖也聖賢之所讚歎弟子之所行者凡為佛弟子者無不修行此戒法而入於涅槃者也五顧命教誡世尊涅槃時興起於大悲集諸比丘眾與如是教誡莫謂我涅槃淨行者無護我今說戒經亦善說毗尼我雖般涅槃當視如世尊此經久住世佛法得熾盛以是熾盛故得入於涅槃若不持此戒如所應布薩喻如日沒時世界皆闇冥釋此復引世尊最後扶律勸持此戒也謂佛在娑羅雙樹間入涅槃時而與教誡正如父母顧命其子較諸平日慈心更切與如是教誡謂諸比丘佛臨涅槃時悲泣懊惱世尊入滅後我等無所依怙故佛言莫謂我涅槃淨行者無護我今說戒經亦善說毗尼言戒經者略則如前偈廣即二百五十學處及比丘尼三百四十八戒廣略教誡也亦善說毗尼者通指律藏及能生善滅惡之法也言善說者佛為一切智窮盡眾生根性於二部戒中同制別制事有輕重制法多少事法相當無有乖違故曰善說也我雖般涅槃當視如世尊此世尊自言我般涅槃有不涅槃者在即是此戒汝等當視此戒即是如來法身常住世間故遺教經云汝等比丘於我滅後當尊重珍敬波羅提木叉如闇遇明如貧得寶當知此戒則是汝等大師若佛在世無異此也教令以戒為師依戒而住勿謂我滅度後無所依也故云當視如世尊此經久住世佛法得熾盛有秉羯磨者有如說行者因持律故正法永昌能使僧寶相繼化化不絕教理行果悉皆具足故云佛法得熾盛以是熾盛故得入於涅槃若不持此戒下反顯不持戒之過而誡之若不持此戒如所應布薩則正法疾滅既無戒日舒光法輪墜地修證無由法性界中煩惱陰覆悉皆闇冥喻如日沒時世界皆闇冥不見道路歸趣無所矣六勸行布薩當護持是戒如𤛆牛愛尾和合一處坐如佛之所說我已說戒經眾僧布薩竟釋此勸持戒兼行布薩也𤛆牛其狀如牛尾有五色而長又曰長尾牛人愛其尾而逐之彼惜尾故而亡其身護戒是法𤛆牛是喻喻如持戒之人寧捨身命護持禁戒亦如𤛆牛忘身護尾也和合一處者來者現前或三寶事覊身囑授現前故云和合如佛之所說者謂如法如律如佛所教法事無違人非別眾故曰如佛之所說也我已說下總結一卷經文謂二百五十戒相若廣若略一一說竟故云布薩竟七總結迴向我今說戒經所說諸功德施一切眾生皆共成佛道釋此一偈廣大迴向謂我今說戒功德不求人天福報及權乘小果普施法界眾生同成佛道問曰比丘律法本屬小教今云共成佛道其義何從答曰圓人受法無法不圓既法華開顯之後一色一香無非中道舉手低頭無不成佛豈有戒法而不圓頓故法華玄義云開粗者毗尼學即大乘學式叉式叉即大乘第一義光非青黃赤白黑三歸五戒十善二百五十戒皆是摩訶衍豈有粗戒隔於妙戒戒既即妙人亦復然汝實我子即此義也豈有持戒不成佛道者乎
