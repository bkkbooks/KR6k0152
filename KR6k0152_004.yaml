body:
  text: 清金陵寶華山律學沙門德基輯二僧伽婆尸沙法分四初總標二別列戒相三結問四勸持今初諸大德是十三僧伽婆尸沙法半月半月説戒經中來釋十誦云僧伽婆尸沙者是罪屬僧僧中有殘因衆僧前悔過得滅是名僧伽婆尸沙根本云僧伽者若犯此罪應依僧伽而行其法及依僧伽而得出罪伐尸沙者是餘殘義若於四事隨犯其一無有餘殘不得共住此十三法有餘殘可治故名僧殘律攝云由奉衆教罪方除滅毗尼母云如人為他所斫殘有咽喉名之為殘如二人共入陳間一為他所害命絶二為他所害命根少在不斷若得好醫良藥可得除瘥若無者不可瘥也犯僧殘者亦復如是有少可懺悔之理若得清淨大衆為如法説懺悔除罪之法此罪可除若無清淨大衆不可除滅是名僧殘善見云僧伽者為僧婆者為初謂僧中初與覆藏羯磨也尸沙者云殘謂未後與出罪羯磨也此罪一一從僧作法除故以境為名薩婆多論問四篇皆是有殘何獨此戒名僧殘答四篇雖是有殘不一切盡因僧滅此十三事一切因僧三十事中三事因僧餘則不因九十事中七事因僧餘則不因故云僧殘也三事因僧者第二離衣羯磨第十四減六年臥具羯磨第二十二行鉢法餘則不因故律云若僧若衆多人若一人九十事七事因僧者第七差説粗罪法第十二餘語法觸惱法第二十二差教尼師法第六十八諫惡邪法第七十諫惡邪沙彌出二法餘則不因二別列戒相有十三初弄陰失精乃至十三惡性不受諫第一弄陰失精戒總釋此無女境事雖無其境而得受樂此是不共戒尼結不同大乘同制梵網經云寧以利斧斬斫其身終不以此破戒之心貪著好觸菩薩戒經云起五蓋心不開覺者是名為犯衆多犯是犯染汙起律攝云由癡無智故依淫事及淫煩惱制斯學處此戒二緣合結緣起處爾時佛遊舍衛國律攝云遊者有四何謂為四一者行二者住三者坐四者臥以此四法是名遊譬如世人言王出遊若到戲處或行住坐臥佛遊舍衛亦復如是舍衛者是道士名也昔有道士居住此地往古有王見此地好就此道士乞立為國以道士名號為舍衛也如王舍城昔有轉輪王更相代謝止住此城以其名故號王舍城舍衛亦復如是名義集云梵語舍衛華言聞物亦云豐德以其具四德故也一具財寶德謂舍衛國中多出一切珍寶勝於餘國是名財寶德二妙五欲德謂舍衛國中五欲勝妙非餘國所及是名妙五欲德三饒多聞德饒益也謂舍衛國中財寶具足五欲勝妙聞於四方是名饒多聞德四豐解脫德豐盛也謂舍衛國中之人多修道行而得解脫是名豐解脫德也善見云此舍衛國邑內人民有五十七萬戶邑外屬舍衛國者有八萬聚落國土縱廣一百由旬偈云舍衛甚微妙觀者無厭足以十音樂聲音中喚飲食豐饒多珍寶猶如帝釋宮起緣人時迦留陀夷亦名烏陀夷此翻黑光又名粗黑由其面黑眼赤故乃婆羅門種與佛同日生本是王大臣因世尊出家成道父王思見遂命黑光往迎既至佛所佛為説法喚善來比丘鬚髮自落成比丘性而情多欲後於舍衛國有婆羅門女逼為非法而尊者不從彼懷瞋恨自破其身形反誣尊者告其父知父集五百婆羅門衆其曳尊者不能移足由尊者力大時佛觀知此是最後教誡佛衰其力時衆共打幾死將曳王所王雖審知事虗猶三反訶責尊者極生慚愧遂至舍利弗所頂禮具陳上事舍利弗與其説法教誡發勇猛心結惑皆除證呵羅漢果既得果已念報佛恩而行教化佛言我聲聞弟子中教化有情令得聖果者迦留陀夷而為第一於舍衛國教化八十億家令得聖果欲意熾盛顏色憔悴身體損瘦隨念憶想弄失不淨諸根悅豫顏色光澤諸親友比丘見已問言汝先時顏色憔悴身形損瘦如今顏色和悅光澤為是住止安樂不以飲食為苦耶如是問知其故諸比丘往白世尊佛以此因緣訶責迦留陀夷云何於我清淨法中出家作穢汙行汝愚癡人舒手受人信施復以此手弄陰墮精世尊以無數方便訶責已與諸比丘結戒不得弄陰失精結戒已有一比丘亂意睡眠於夢中失精有憶念覺已向同意比丘説時諸比丘具白世尊佛言亂意眠有五過失一者惡夢二者諸天不護三者心不入法四者不思惟明相五者夢中失精善意睡眠有五功德反上者是欲説戒者當如是説所立戒相若比丘故弄陰失精除夢中僧伽婆尸沙釋義故弄者有六種境實心故作失精者大論云以妄想邪憶念風吹淫欲火故肉髓膏流熱變為精精有七種青黃赤白黑酪色酪漿色何者精青色轉輪聖王精也何者精黃色轉輪聖王太子精也何者精赤色犯女色多也何者精白色負重人精也何者精黑色轉輪聖王第一大臣精也何者精酪色須陀洹人精也何者酪漿色斯陀含人精也失者律攝云精離本處以腰為處又言不然舉體有精惟除髮爪及燥乃無精若精離本處至道不至道及出乃至飽一蠅便得本罪除夢中者律攝云謂除於夢餘皆得罪夢中雖有情識然無楷定實事可求僧祗云夢虗妄不實若夢真實於我法中修梵行者無有解脫以一切夢皆不真實是故諸修梵行者於我法中得盡苦際犯緣此戒具足三緣方成本罪一舉心弄陰二作弄陰想三精離本處定罪此中犯者若為樂故為自試故為樂者謂貪其觸樂也自試者為七種精中是何種色也為福德故為祠天故福德者謂弄陰失精得大福德祠天者以精祠天此俱屬外道婆羅門法為生天故爾時有一婆羅門居間靜處誦持呪術彼經所記若故墮精者命終生天彼欲求天道常弄陰失精時有一婆羅門出家為道者聞此言為生天故即便弄陰失精彼疑白佛佛言僧伽婆尸沙為施故為種子故施者或有人來乞求出精而施種子者或無子息以出精續其種故為憍恣故為自試力故為好顏色故憍恣者即縱恣心情不思佛教自試力者謂自試力能出多少為好顏色者為欲火所逼顏色憔悴如前因緣可知為如是事弄失精一切僧殘若於內色外色內外色水風空內色者受色外色者不受色內外色者受不受色內謂屬內身即手及餘身分覺知冷暖澀滑故名內色受色也外謂屬無情即君持泥團等既無覺知故云不受色也內外色者謂受不受色如前準知水者若順水若逆水若以水灑風者若順風若逆風或口吹空者自空動身問此非內色外色內外色何故得罪答由自動身故得罪耳如上憶念弄失不淨皆僧殘不失偷蘭遮若比丘教比丘方便弄失不淨若失偷蘭遮不失突吉羅若比丘尼教比丘方便弄失不淨若失偷蘭遮不失突吉羅除比丘比丘尼教餘人弄失不失一切突吉羅餘人即三小衆也第四分云若女人捉比丘前彼動身失精僧殘不動身失不淨突吉羅捉後亦如是捉足禮時亦如是五分云眠時出不淨覺時發心動身偷蘭遮眠時身動覺時發出不淨突吉羅憶行淫事突吉羅律攝云覺作方便夢中流泄或復翻此作心受樂或前興方便後乃息心或作方便其精欲動即便攝念皆得粗罪言欲動者謂精未離本處根本云若苾芻量生支作心受樂因而泄精者得窣吐羅底若不泄者得惡作罪寧以手執可畏黑蛇不以染心捉生支比丘尼波逸提薩婆多云比丘尼波逸提者為令二衆有差別故又女人煩惱深重難拘難制若與制重則罪惱衆生又女人要在私屏處多緣多力苦乃出精男子不爾隨事能出故不同也三小衆突吉羅是謂為犯開緣不犯者夢中失覺已恐汙身污衣汙牀褥若以弊物樹葉器物盛棄若以手捺棄若欲想出不淨若見好色不觸失不淨若行時自觸兩䏶若觸衣觸涅槃僧失不淨若大小便時若冷水暖水洗浴時若在浴室中用樹皮細末藥泥土浴若手揩摩若大啼哭若用力作時一切不作出不淨意無犯不犯者最初未制戒等會詳薩婆多論云佛制此故出精戒為令法久住故又欲止誹謗故若作此事世人外道當言沙門釋子作不淨行與俗無異又欲生天龍善神信敬心故若作此事雖復私屏天龍善神一切見之又諸佛法爾淫是惡行法應制之也大涅槃經云應於淫欲生臭穢想乃至不生一念淨想若夢行淫寤應生悔第二與女身相觸戒總釋此是不共戒尼結第五重大乘同制律攝云隨意取樂事由癡覆故因淫煩惱制斯學處緣起處佛在舍衛國起緣人時迦留陀夷聞佛制戒不得弄陰墮精便手執戶鑰在門外立伺諸婦女來語言大妹可來入房看將至房中捉捫摸嗚口樂者便笑其所作不樂者便瞋恚罵詈出房薩婆多云諸女人何故來入寺看此有三義一以世間人多諸匆務出家人所住處寂靜安樂故二親近善知識聞法故三衆僧房中種種嚴餝彩畫房舍牀榻臥具觸目可樂是故來看問諸女人何故隨比丘入房舍中答謂出家之人斷欲清淨信敬故隨入無疑問何故有默有不默者有云欲心多者默然欲心少者不默然有云無有父母兄弟夫主兒女無畏者默然有父母兄弟失主兒女有畏者不默然是故有默然者有不默然者諸比丘白佛世尊以無數方便訶責已與諸比丘結戒所立戒相若比丘淫欲意與女人身相觸若捉手若捉髮若觸一一身分者僧伽婆尸沙釋義淫欲意者愛染污心善見云淫亂變心者淫欲入身如夜叉鬼入心無異亦如老象溺泥不能自出淫亂變心隨處而著無有慚愧或心變欲或欲變心淫亂變心心即染著女人者堪行欲境有智未命終身者從髮至足身相觸者若捉摩重摩或牽或推或逆摩或順摩或舉或下或捉或捺若捉摩者摩身前後善見云捉者不摩觸者不捉不摩是名觸也捉者捻置一處是名捉牽者牽前推者推却逆摩者從下至上順摩者從上至下舉者捉舉上下者若立捉令坐捉者若捉前若捉後捉乳捉髀捺者捺前捺後若捺乳捺髀善見云捉手者臂肘為初乃至爪甲一一身分者從髮至足一切身分犯緣此戒具足五緣方成本罪一有淫染心二是人女三人女想四身身相觸五動身受觸樂定罪此中犯者若比丘與女人身相觸若捉摩重摩或牽或推或逆摩或順摩或舉或下或捉或捺隨觸多少乃至隨捺多少一一皆僧殘若女人觸比丘隨觸多少乃至隨捺多少一一皆僧殘若天女阿修羅女龍女餓鬼女畜生女能變形者身相觸偷蘭遮畜生不能變形者突吉羅若與男子相觸突吉羅若與二根身相觸者偷蘭遮若女人作禮捉足覺觸樂不動身突吉羅若有欲心觸衣尼師壇針筒草秸乃至自觸身一切突吉羅人女人女想僧殘人女疑偷蘭遮人女非人女想偷蘭遮非人女人女想偷蘭遮非人女疑偷蘭遮第四分云作女想與男身相觸作男想與女身相觸皆偷蘭遮此女餘女想餘女此女想身相觸皆僧殘與死女身未壞者相觸僧殘半分壞多分壞者相觸偷蘭遮女人為水所漂愛念接出不受觸樂不犯僧祇云若比丘坐時有女人來禮足若起欲心當正身住應語言小遠住禮若女人篤信卒來接足者應自嚙舌令痛不令覺女人細滑若女人從比丘索水者不應自捉罐澆女人手應以器盛與若無器令淨人與若無淨人應持罐著牀凡上令其自取若女人落水求救者比丘作地想捉出不犯若授竹木繩牽出不犯若言知汝雖苦當任宿命者無罪根本云凡觸女身若是堪行淫者無衣隔時僧殘有衣粗罪若不堪者無衣粗罪有衣惡作若見女人被水所漂或自縊噉毒等為救濟時觸皆無犯十誦云若救火難水難刀難惡蟲難惡鬼難高處墮難一切不犯若無染心誤觸不犯女人為水所漂應救雖淫心起但捉一處莫放到岸不應更觸更觸得罪若繡女畫女故觸突吉羅善見云若摩觸女人粗厚衣偷蘭遮若人女細薄衣手出摩觸僧殘若比丘與女人髮髮相著毛毛相著爪爪相著偷蘭遮何以故無覺觸故若女人打比丘比丘以欲心喜受突吉羅若女人作