持往若為佛為法為僧為塔若為病比丘看書持往一切無犯不犯者最初未制戒等第六小房過量戒總釋此是不共戒尼不同犯大乘同制梵網所謂惡求多求菩薩戒本所謂多欲不知足也薩婆多云與少不足名為多欲得一求一名不知足又復得內供養無厭名為多欲得外利養無厭名不知足也律攝云由住處事鄙業煩惱制斯學處緣起處佛在羅閲祗耆闍崛山中聽諸比丘作私房舍起緣人有曠野國比丘即私作大房舍功力繁多根本云時摩竭陀憍薩羅二國中間大曠野處有五百羣賊殺害商旅人行路絶時影勝王命大將往彼屏除羣賊方便降伏即於二界中間築一新城總集諸人共住於此名曠野城常行求索居士畏避有一比丘欲起房舍自斫樹樹神念打比丘恐違道理乃往白佛佛讚慰之時尊者大迦葉乞食曠野城中諸居士遙見避入里巷五家為鄰五鄰為里直曰街曲曰巷迦葉問知其故白佛訶責結戒所立戒相若比丘自求作屋無主自為己當應量作是中量者長佛十二磔手內廣七磔手當將比丘指授處所彼比丘當指授處所無難處無妨處若比丘有難處妨處自求作屋無主自為己不將比丘指授處所若過量作者僧伽婆尸沙釋義自求者彼處處乞索屋者房也無主者彼無有人若一若兩若衆多自為己者自求索自為作也應量者長佛十二磔手內廣七磔手磔手者謂舒指一跨也又云張手周尺人一尺佛二尺唐於周一寸上增二分一尺上增二寸蓋周尺八寸也佛一磔手準唐尺即該一尺六寸也長佛十二磔手者乃房進深之量正有一丈九尺二寸也內廣七磔手者乃是橫量寬有一丈一尺二寸也若太大則功力煩多太小則難容四儀今佛制量正處於中也難處者有虎狼獅子諸惡獸下至蟻子比丘若不為此諸蟲獸所惱應修治平地若有石樹株荊棘當使人掘出若有陷溝坑陂池處使人填滿若畏水淹漬當預設隄防若地為人所認當共斷當無使他有語是謂難處妨處者不通草車回轉往來是謂妨處彼比丘看無難處無妨處已到僧中脫革屣偏露右肩右膝著地合掌作如是白大德僧聽我某甲比丘自乞作屋無主自為己我今從僧乞知無難處無妨處如是三乞時衆僧當觀察此比丘為可信不若可信即當聽使作若不可信衆僧應到彼處看若衆僧不去遣僧中可信者看若彼處有難有妨若無難有妨若有難無妨皆不應與處分若無難無妨應與處分故云當將比丘指授處所彼比丘當指授處所無難處無妨處此戒當知緣起兩事故戒制二途應量從多求索處分則伐樹神瞋故罪結二重也作房應知初安若石若土墼泥團乃至最後泥治訖是若比丘有難處下違制成犯也犯緣此戒具足四緣方成本罪一過量作二不處分三作過量不處分想四作屋已成定罪此中犯者若不被僧處分過量有難有妨處二僧殘二突吉羅僧不處分過量有難無妨無難有妨二僧殘一突吉羅僧不處分不過量一僧殘有難有妨二突吉羅有難無妨無難有妨皆一突吉羅僧處分過量一僧殘有難有妨二突吉羅有難無妨無難有妨皆一突吉羅僧處分不過量有難有妨二突吉羅有難無妨無難有妨皆一突吉羅僧處分過量無難無妨一僧殘若比丘僧不處分過量有難有妨自作屋成者二僧殘二突吉羅作而不成二偷蘭遮二突吉羅若使他作成二僧殘二突吉羅作而不成二偷蘭遮二突吉羅若為他作屋成二偷蘭遮二突吉羅作而不成四突吉羅若作屋以繩拼地應量作者過量作者犯若比丘教人案繩墨作彼受教者言如法作而過量彼受教者犯彼教人案繩墨作即如法作不還報作者犯若教人案繩墨作即如法作教者不問如法作不教者犯若僧不處分作不處分想僧殘若僧不處分疑僧不處分作處分想僧處分作不處分想僧處分疑悉偷蘭遮過量過量想僧殘過量疑過量不過量想不過量過量想不過量疑皆偷蘭遮有難有難想有難疑若有難無難想若無難有難想若無難疑咸得突吉羅妨處亦如是僧祇云作房時若授甎泥團及壘甎等悉得越毗尼罪若戶牖已成時偷蘭遮乃至作成時僧殘一切受用得越毗尼罪十誦云若比丘語餘比丘為我作舍語已便去後作未成行還自成是舍不如法作犯若得先成舍無犯善見云若二三人共作屋若一比丘一沙彌悉不犯何以故人無一屋分故若段段分人得一屋分僧殘薩婆多云從平地印封作相二團泥未竟已還盡輕偷蘭一團泥未竟重偷蘭作房竟僧殘比丘尼偷蘭遮三小衆突吉羅是謂為犯尼偷蘭者謂比丘尼不住蘭若故也開緣不犯者如量作減量作僧處分作無難處無妨處作如法拼作若為僧作為佛圖是佛塔廟也講堂草菴葉菴若作小容身屋若作多人住處即為衆作無犯不犯者最初未制戒等會詳薩婆多云一為正法久住故二為止誹謗故三不惱害衆生令信敬增長故四為少欲知足行善法故有此四義而結戒也第七作大房戒總釋此是不共戒尼結同前大乘同制梵網云頭陀行道乃至夏坐安居是諸難處皆不得入律攝云妨修善業因起違諍為防譏過制斯學處緣起處時佛在拘睒彌國瞿師羅園拘睒彌者西域記云憍賞彌國舊曰拘睒彌國訛也中印度境周六千餘里國大都城周三十里土稱沃壤地利豐植杭稻多甘蔗茂氣序暑熱風俗剛強好學典藝崇樹福善瞿師羅者是長者名也華言美音由過去世時作狗子以聲吠請辟支佛至家供養故生生中報得好音是長者身長三尺佛亦化身為三尺以化彼令歸正法西域記云城東南不遠有故伽藍如來於此數年説法起緣人時優填王與闡陀尊者親友知識優填王者或云優陀延又云塢陀衍那唐言出愛佛初降誕時大地震動普放光明時憍閃毗國百軍大王初誕一子見此光明便作念言我子福力有大光明宜與名曰光明闡陀者又云闡那薩婆多云是佛異母弟優填王妹兒生大豪族出家為道多住拘睒彌國性悷自用作種種過惡又以此中利益衆生多故多住此國後因惡性不捨衆僧與作梵罰悶絶於地阿難為説法要即得開悟證果語言欲為汝作屋隨意所好何處有好地任意作報言大王近城有尼拘律神樹多人往反象馬車乘止息其下闡陀往伐此樹尼拘律又云尼拘盧陀此云無節又云縱廣阿含云其身圓正其葉青滑長廣子似枇杷子承蒂如柿然其種類耐老諸樹中最能高大者也居士譏嫌世尊訶責結戒所立戒相若比丘欲作大房有主為己作當將餘比丘往指授處所彼比丘應指授處所無難處無妨處若比丘有難處妨處作大房有主為己作不將餘比丘往看指授處所僧伽婆尸沙釋義大房者多用財物有主者若一若二若衆多人唯除過量餘並同前第八無根謗戒總釋此是共戒尼結亦同大乘同制梵網云若佛子以惡心故無事謗他良人善人法師師僧國王貴人言犯七逆十重等若向外人説犯重若向同法者説犯輕垢此屬性罪律攝云由同梵行事及不忍煩惱制斯學處緣起處佛在耆闍崛山尊者沓婆摩羅子得阿羅漢自念此身不牢固我今當以何方便求牢固法耶我今宜可以力供養分僧臥具差次受請飯食即往白佛佛即聽許羯磨差之時有一比丘向暮上山尊者手出光明與分臥具沓婆摩羅子者沓婆是比丘名摩羅子是王名此是摩羅王之子出家故名沓婆摩羅子也尊者七歲出家剃髮落地即成羅漢善見曰過去有佛號波頭勿多羅此沓婆摩羅子生一居士家國邑人民共作大會請佛入國有六萬八千比丘圍繞大會供養七日布施有阿羅漢於大衆中以神通力處分牀席及諸飲食沓婆摩羅子見已心大歡喜往至佛所頂禮白言願我當來佛時出家學道速成羅漢為諸衆僧分布房舍及諸飲食如今羅漢神力無異佛言汝從此百千劫已有佛號釋迦牟尼汝年七歲得出家剃髮落地即成羅漢名沓婆摩羅子必得此願今從世尊乞此二願為滿本願也薩婆多論問曰陀驃何故常放光明自顯功德答曰自顯功德有二種一為利養名聞二為佛法衆生故若為佛法衆生隨時自在無所障礙陀驃所以放光明者正為止誹謗段如佛為婆羅門女孫陀利所謗故作師子吼自説我有十力四無所畏十八不共法以表清淨如舍利弗目連為瞿迦離所謗作師子吼我有七覺意寶如長者家庫藏中有種種衣服種種器杖自在取用我有七覺意寶亦隨意取用以表清淨目連亦作師子吼自説我生已盡不復當生所作已辦梵行已成以表清淨阿那律為人所謗自説我入智慧樓觀自在遊戲以表清淨如莎伽陀為人所謗言其飲酒自言我禪定能令從阿鼻地獸上至有頂滿其中火以表清淨如輸毗陀為人所謗自説一念能知五百劫事以表清淨陀驃為慈地所謗故常放光明以表清淨也起緣人有慈地比丘來隨次得惡房惡臥具便生瞋恚明日差次受請檀越聞是慈地便於門外敷弊坐具施粗惡食慈地倍生瞋恚乃倩其妹慈比丘尼誣謗尊者相犯慈地比丘常得粗惡食者先業力故又此人日夜無清淨心天龍鬼神等與作因緣令所作事悉不隨意故尊者去佛不遠世尊知而故問汝聞不答言聞唯世尊當知之佛言今不應作如是報我若實當言實不實當言不實尊者白佛言我從生已來未曾憶夢中行不淨況於覺悟而行不淨耶言世尊知之者薩婆多云以實清淨故不得言爾以本業力故不得言不佛何故不説陀驃清淨一以佛平等心無親無愛故不即言一是一非二以陀驃本業果熟故過去迦葉佛時作知食人有一冢間比丘是阿羅漢儀容端正在路而行有一女人見生染愛隨觀不捨時主食人見其如是謂先與交通尋作是言是比丘必與此女人共作惡法以謗賢聖故墮地獄罪畢得出以本善業值佛得道殘業力故受此惡報世尊以此因緣訶責慈地比丘有二種人一向入地獄若非梵行自稱梵行若真梵行以無根非梵行謗之是謂二一向入地獄訶責已結戒所立戒相若比丘瞋恚所覆故非波羅夷比丘以無根波羅夷法謗欲壞彼清淨行若於異時若問若不問知此事無根説我瞋恚故作是語若比丘作是語者僧伽婆尸沙釋義瞋恚所覆者有十惡法因緣故瞋十事中一一生瞋法數云恚恨讒誑憍忿怒慳癡妬瞋恚所覆者轉善心也南山鈔云比丘以六和表用以慈心為體今言瞋恚所覆正覆此體違背六和致興謗毀也以無根波羅夷法謗者根有三根見聞疑見根者實見犯梵行見偷五錢過五錢見斷人命若他見從彼聞是謂見根聞根者若聞犯梵行聞偷五錢過五錢聞斷人命聞自歎譽得上人法若彼説從彼聞是謂聞根疑根者有二種生疑從見生疑從聞生疑從見生疑者若與婦女入林出林無衣裸形男根不淨污身手捉刀血污與惡知識伴是謂從見生疑從聞生疑者若在暗地聞牀聲草褥轉側聲動身聲共語聲交會聲若聞我犯梵行聲聞言偷五錢過五錢聲聞言我殺人我得上人法是謂從聞生疑除此三根已更以餘法謗者是謂無根薩婆多云眼根者必清淨無病見事審諦可依可信唯聽肉眼不聽天眼天眼無往不見人誰無過但有大小若聽天眼説者則妨亂事多耳根者必清淨無謬審諦可信亦不聽天耳事同天眼疑不可依疑者非是決定或謂犯罪或謂不犯不可依故欲壞彼清淨行者謂壞彼人清淨之行德於諸勝法不復增修及同一處布薩羯磨若於異時謂過後之時也若問若不問僧祗云若檢校若不檢校問言汝見何事淫耶盜五錢耶故殺人耶不實稱過人法耶云何見何因見何處見是名檢校若不如是問者是名不檢校也知此事無根説我瞋恚故作是語此謂過後悔過自責發露虗謗之事蕩洗愆尤欲求戒身清淨作是語下結成所犯犯緣此戒具足四緣方成本罪一心有瞋恚二實無三根三所謗非比丘事四説而了了定罪此中犯者彼人若清淨若不清淨無見聞疑三根以無根波羅夷法謗説而了了僧殘不了了偷蘭遮除四波羅夷更以餘非比丘法謗言汝犯邊罪乃至二根説而了了僧殘不了了偷蘭遮若指印書使作知相了了僧殘不了了偷蘭遮除此非比丘法更以無根法謗比丘即下四篇二百四十六法也及輕遮等法謂隨謗前人所犯之事而自招愆若以僧殘謗波逸提若以波逸提謗突吉羅若以突吉羅謗亦突吉羅若以八無根波羅夷法謗比丘尼説而了了僧殘不了了偷蘭遮若指印書使作知相了了僧殘不了了偷蘭遮除八波羅夷更以餘無根非比丘尼法謗説而了了僧殘不了了偷蘭遮餘非比丘尼法者即十三重難除非比丘尼法更以餘無根法謗比丘尼者隨前所犯除比丘比丘尼以無根法謗餘人者突吉羅餘人即三小衆薩婆多云若欲以無根法謗他先向同意説某甲比丘犯如是罪與我相助重偷蘭比丘尼僧殘三小衆突吉羅律攝云若塢波索迦即優婆塞謗苾芻者應與作覆鉢羯磨是謂為犯開緣不犯者有見聞疑三根説實戲笑説疾疾説獨説夢中説若説此錯説彼不犯不犯者最初未制戒等會詳華嚴云一念瞋心起八萬障門開成論云瞋恚者非出家人法出家人法忍辱是也又若比丘形服異俗瞋恚心同則非所宜若行忍者則為自具慈悲功德又修忍者能成自利所以者何謂瞋恚者欲惱害人而返自害所有身口加惡於人自所得惡過百千倍故知瞋為大自損減是故智者欲令自利得免大苦及大罪者應當行忍也什師曰若能行忍則內不自纍外不傷物是自護護彼也無著禪師遊五臺遇文殊化作老翁并均提童子童子為無著説偈云面上無瞋供養具口裏無瞋吐妙香心裏無瞋是珍寶無染無垢是真常
