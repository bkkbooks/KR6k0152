body:
  text: 清金陵寶華山律學沙門德基輯七衆學戒法分四初總標二別列戒相三結問四勸持初總標諸大德是衆學戒法半月半月説戒經中來釋律攝云衆多學法者謂於廣釋所有衆多惡作惡説咸攝在衆學法中如苾芻不應鼓樂以鏡照面等事是故總言衆多學法也此篇有違罪結突吉羅善見云突者惡也吉羅者作也聲論正音突悉吉栗多律云式叉迦羅尼義翻應當學胡國訛云尸叉罽賴尼胡僧翻守戒也此罪微細持之極難故隨學隨守以立名薩婆多問曰餘篇不言應當學而此戒獨爾答曰餘戒易持而罪重犯則成罪或衆中悔或對首悔此戒難持而罪輕脫爾有犯心悔念學罪即滅也以戒難持易犯故當慎心念學不結罪名直言應當學也此篇大小雙行性遮齊護浮囊不泄乃是菩薩本心勿輕小愆還成最後之唱於諸戒中若犯小戒乃至微細當受苦報無有限齊二別列戒相此衆學法總為十例一著衣服事二入村事三坐起事四食噉事五護鉢事六便利事七説法事八佛塔事九道行事十觀望事頌云齊整著裙袈裟二入村十一坐二六噉嚼事有二十一護鉢二事便利三三聚説法軌二十敬塔房像二十六道行二事觀望一斯皆沙門應學法諸部每缺佛塔準本部則十例也僧祇六十七法五分一百八法十誦一百十三法解脫戒本七十六法根本四十三法獨於本律有百法初不齊整著內衣乃至一百不與持蓋者説法第一不齊整著內衣戒總釋此是共戒尼犯亦同大乘同學律攝云此等皆由法式事譏嫌煩惱制斯學處以後準知更不重出起緣處佛在給孤獨園起緣人六羣著涅槃僧或下著或高著或作象鼻或作多羅葉或時細褶居士譏嫌似王大臣如似節會戲笑俳説人著衣諸比丘聞白佛訶責結戒所立戒相當齊整著涅槃僧應當學釋義涅槃僧者涅槃訛也應云泥縛些那或云泥伐散那西域記云唐言裙既無帶襻其將服也集衣為褶束帶以絛褶則諸部各異色乃黃赤不同釋名云裙者羣也連接羣幅也不齊整者或時下著繫在臍下下者齊𨅯骨下或時高著謂褰齊膝或作象鼻垂前一角或作多羅樹葉垂前二角律攝云謂捉裙邊細疊成褶腰邊總擪形若多羅葉上聚下散者是也或時細褶謂繞腰褶皺律攝云齊整者離不齊整著衣過也僧祇云齊整著不得如淫女賣色法左右顧視為好不好應著令如法齊整著定罪此中犯者若故作犯應懺突吉羅以故作故犯非威儀突吉羅言應懺吉羅者故違佛教則犯戒體罪也非威儀吉羅者威儀不整罪由事生故曰非威儀突吉羅二罪同時而得懺時但悔戒體吉羅非威儀罪亦同滅喻如伐樹但伐根本枝葉亦除也此罪懺時亦爾兩悔則非若不故作突吉羅此謂誤犯責心突吉羅也五分云若不解不問而作此著突吉羅若解不慎而作此著突吉羅若解輕戒輕人而作此著波逸提諸部俱有不恭敬戒波逸提比丘尼亦爾律攝云若苾芻不依佛教不顧羞恥欲為非法著捉衣開張得責心惡作若披著身得對説惡作若苾芻有順奉心而著不如法或時忘念或是無知非法著者惟犯責心惡作如是於餘學處準此應知尼等四衆突吉羅是謂為犯開緣不犯者或臍中生瘡下著若腳有瘡高著若僧伽藍內若村外若作時若道行無犯薩婆多云若比丘沙彌遠行來時應踝上二磔手上至膝下比丘尼式叉摩那沙彌尼一切時踝上二指正使行來不得高也不犯者最初未制戒等會詳事鈔云世尊處世深達物機凡所施為必以威儀為主故此百事大乘悉皆同學息譏生信自護護他倍應嚴淨除是諸大菩薩示現逆行在處不論若是學地凡夫難越準繩律攝云爾時世尊作如是念過去諸佛云何教聲聞衆著衣服耶是時諸天前白佛言如淨居天所著衣服世尊即以天眼觀知如諸天所説無有異也因制苾芻披著衣法準諸部文義此篇制在四篇之前為佛初成道七日還本國住尼拘律國時度八王子及五百釋種出家以本是豪貴驕奢本習氣未除多犯威儀中事世尊一一制斷結集時以罪事重輕次第故列於後不可不知第二不齊整著三衣戒緣起處起緣人並如前戒所立戒相當齊整著三衣應當學釋義不齊整者或高著過腳上或下著下垂過肘露脅或作象鼻者下垂一角或作多羅樹葉者垂前兩角後褰高也或細褶者細褶已安緣齊整反上者是定罪同前僧祗云若泥時作時手得抄舉若放恣諸根不如法被衣者越毗尼罪四衆同前開緣不犯者或肩臂有瘡下著或腳有瘡高著若道行作時無犯會詳舍利弗問經云修供養時應偏袒以便作事作福田時應覆兩肩現田文相云何修供養如見佛時問訊師僧時應拂牀掃地卷衣裳乃至種種供養云何作福田時應請乞食坐禪誦經經行樹下人見端嚴有可觀也第三反抄衣戒緣起處起緣人同前所立戒相不得反抄衣入白衣舍應當學釋義反抄衣者或左右反抄衣著肩上律攝云不得偏抄一邊露現形體僧祗云若乞食若取食時畏污衣故得抄衣但莫令肘現無罪若精舍中食上和尚阿闍黎長老比丘前坐不得抄衣若抄者得抄一邊不得抄兩邊若偏袒者抄左邊若通肩被者得抄右邊若見長老比丘應還下若放恣諸根反抄衣坐家內者越學法定罪如前僧祇云若風雨時得抄一邊若偏袒右肩得抄左邊若通肩被衣得抄右邊不得令肘現無罪四衆同前開緣不犯者或時有如是病脅肋有瘡若在道行若作時無犯第四反抄衣入家內坐戒所立戒相不得反抄衣入白衣舍坐應當學此戒但以坐為異如前故不出會詳母經云比丘入檀越家之所行法不應調戲不應自恃憍慢不應輕躁不應無忌難所説不應雜亂無端緒語不應坐處遠故低身就他共語復不應相逼坐共談不應偏蹲跪坐不中大喚而坐雖執威儀不應示現有德相貌而坐不應纍䏶而坐不應纍膝而坐不應纍腳而坐不應用手左右撈摸而坐不應動腳不住而坐不中大甕器上而坐不中與比丘尼及女人獨靜房內坐不得下處坐為高坐人説法是名入家中比丘坐法第五衣纏頸入家內戒並如前戒所立戒相不得衣纏頸入白衣舍應當學釋義衣纏頸者總捉衣兩角著左右肩上定罪同前開緣不犯者或肩臂有瘡等第六衣纏頸入家內坐戒不得衣纏頸入白衣舍坐應當學以坐為異第七覆頭入家戒緣起處同前起緣人六羣以衣覆頭入白衣舍居士譏嫌如盜賊故制所立戒相不得覆頭入白衣舍應當學釋義覆頭者若以樹葉若以碎段物若以衣覆頭行律攝云以衣物覆頭猶如新嫁女僧祇云全覆頭及兩耳定罪同前開緣不犯者或患寒或頭上瘡生命難梵行難覆頭而走無犯第八覆頭入家坐戒不得覆頭入白衣舍坐應當學釋義僧祇云不得覆頭坐家內若精舍中食上和尚阿闍黎長老比丘前不得覆頭坐若風寒雨時若病若頭患風不得全覆當覆半頭令一耳現若見長老比丘時當挽却若屏處私房覆頭無罪若放恣諸根覆頭坐家內者越學法餘有開遮同前以坐為異第九跳行戒緣起處同前起緣人六群跳行入白衣舍居士譏嫌似鳥故制所立戒相不得跳行入白衣舍應當學釋義跳行者雙腳跳僧祇云不得先下腳指後下腳跟當先下腳跟後下腳指若腳心有瘡當側腳行作蔽瘡物繫之平腳行定罪同前開緣不犯者若為人所打若有賊若惡獸若有棘刺或渡渠或渡坑塹或渡泥跳過者無犯會詳五百問云昔有優婆塞請一比丘欲與作一領好衣比丘隨去中道有一小水比丘躑渡優婆塞便嫌心念我謂是好比丘欲與一領好衣而便跳躑溝坑當與半領衣以是無著知其心念前行見水復故跳躑賢者復念當與一張粗㲲前行見水復躑過賢者復念當與一頓食無著復知其念前行見水便舉衣涉渡賢者問何以不躑渡比丘言卿前與我一領衣一躑過水正得半領復一躑正得一張粗㲲復一躑正得一頓食我今所不躑者恐復失食賢者乃知是得道人便向懺悔將歸大供養以此驗之知比丘不得躑過坑水第十跳行入家坐戒不得跳行入白衣舍坐應當學如前釋第十一蹲坐舍內戒緣起處同起緣人有居士請衆僧食六羣蹲坐比座以手觸之即倒露形居士譏嫌似裸形婆羅門故制所立戒相不得白衣舍內蹲坐應當學釋義蹲坐者若在地若在牀上尻不至地定罪同前僧祇云不得抱膝坐交腳坐若放恣諸根抱膝坐家內者越學法四衆同前開緣不犯者若尻邊生瘡若有所與若禮若懺悔若受教誡無犯第十二手叉腰戒緣起處同前起緣人六羣手叉腰行入白衣舍居士譏嫌如世人新婚娶得志驕奢故制所立戒相不得手叉腰入白衣舍應當學釋義手叉腰者以手叉腰匡肘或一手叉兩手叉定罪同前開緣不犯者脅下生瘡若作時若道行第十三叉腰家坐戒不得手叉腰入白衣舍坐應當學釋義手叉腰者匡肘妨比座十誦云不得掌扶頰坐僧祗云若精舍中食上二師前長老比丘前不得叉腰坐若老病若風動腰痛叉腰無罪臀痤瘡癬以藥塗之畏污衣故叉腰無罪若見上座來應下若放恣諸根叉腰坐家內者越學法餘並同前第十四搖身行戒緣起處起緣人同前所立戒相不得搖身行入白衣舍應當學釋義搖身者左右戾身趨行戾身斜曲也字從犬出戶而身曲戾也行而張足曰趨釋名云疾行曰趨疾趨曰走律攝云如衒色女搖身而行定罪同前比丘尼搖身趨行犯波逸提三小衆突吉羅開緣不犯者或時為人所打回戾身避杖或被賊惡獸或逢擔棘刺人如是戾身避或渡坑渠泥水處於中搖身過或時著衣回身看衣齊整不無犯僧祇云若老病身振風雨寒雪搖無罪第十五搖身入家坐戒不得搖身行入白衣舍坐應當學第十六掉臂行戒緣起處起緣人同前所立戒相不得掉臂行入白衣舍應當學釋義掉臂者垂臂前却也僧祇云若先是王子大臣本習未除應當教言汝今出家當捨此俗儀從比丘法律攝云猶如小兒及癲狂類馬勝雍容行道感採菽信樂出家鶖子安詳乞食攝外道反邪歸正凡行路非大人相者皆應遠離定罪同前開緣不犯者或有如是病或為人所打舉手遮或值惡獸盜賊或逢擔棘刺人來舉手遮或渡河水或跳渡坑塹泥水或共伴行不及以手招喚無犯僧祇云若欲呼人不得雙舉兩手當以一手招第十七掉臂行入家坐不得掉臂行入白衣舍坐應當學釋義僧祇云不得動手足家內坐者不得動手動足舞手舞足並折草坐當安詳靜住若問四塔者得指示是生處得道處轉法輪處般涅槃處無罪檀越欲起精舍得指地形勢此中可起講堂此中可起溫室此中可起僧房得指示無罪餘並同前以坐為具第十八不好覆身戒緣起處同前起緣人六羣不好覆身行入白衣舍居士譏嫌似婆羅門故制所立戒相好覆身入白衣舍應當學釋義不好覆身者處處露現僧祇云好覆身者應用緻物作內衣若用疏物者應兩重三重若內衣疏者多羅僧應緻物作若多羅僧疏者僧伽黎應用緻物若僧伽黎疏者多羅僧應用緻物坐時不得坐衣上當一手褰衣一手按坐具然後安詳而坐謂生世譏嫌壞威儀故也定罪同前開緣不犯者或時被縛若風吹衣離體無犯第十九好覆身入白衣舍坐應當學第二十左右顧視戒緣起處同起緣人六羣左右顧視行入白衣舍居士譏嫌似盜竊人左右顧視故制所立戒相不得左右顧視行入白衣舍應當學釋義左右顧視者處處看僧祗云諦視行時不得如馬低頭行當平視行防惡象馬牛當如擔輦人行不得東西瞻視若欲看時回身向所看處律攝云不高視者舉目視前一踰伽地是為視量踰伽量者長四肘也不應傍視亦不回顧端形直視徐行而進定罪同前開緣不犯者或仰瞻日時節或命難梵行難左右處處伺求方便道欲逃走無犯第二十一不得左右顧視白衣舍坐應當學釋義根本云在白衣舍他不請坐不應輒坐不應不善觀察而坐因迦留陀夷坐殺小兒故制僧祇云坐時不得如馬延頸低視當平視勿令不覺檀越持熱器搪揬手面若精舍中二師前長老比丘前坐時不得左右顧視當平視餘者同前以坐為異第二十二寂靜入家戒緣起處同前起緣人六羣高聲大喚行入白衣舍居士譏嫌似婆羅門衆故制所立戒相靜默入白衣舍應當學釋義不靜默者高聲不喚若囑授若高聲施食僧祇云若欲喚者應彈指若前人不覺者當語近邊人若精舍中食上二師前長老比丘前坐不得高聲大喚若欲語時語比坐如是展轉第二第三令彼知律攝云不應同俗多作言説不大呌呼如童兒類設有須喚他不聞時應請俗人為其大喚定罪同前開緣不犯者若聾不聞聲須高聲喚或高聲囑授若高聲施食若命難梵行難高聲而走無犯第二十三靜默白衣舍坐應當學第二十四戲笑入家戒緣起處同前起緣人六羣戲笑行入白衣舍居士譏嫌如獼猴故制所立戒相不得戲笑行入白衣舍應當學釋義戲笑者露齒而笑僧祇云若有可笑事者不得出齗現齒呵呵而笑應制忍之當起無常苦空無我想思惟死想若不可止當自齧舌若復不能止者當以衣角遮口除徐抑制定罪同前摩得勒伽云欠時不遮口突吉羅開緣不犯者或時有如是病或唇不覆齒或念法歡喜而笑不犯第二十五不得戲笑白衣舍坐應當學第二十六不用意受食戒緣起處同起緣人有居士請僧食自手斟酌種種飲食六羣不用意受食捐棄羮飯居士譏嫌云何不用意受食貪心多受如穀貴時故制所立戒相用意受食應當學釋義不用意受食者棄羮飯食律攝云凡受食時極須存念不應寬慢致令鉢破五分云一心受食者左手一心持鉢右手扶緣定罪同前僧祇云一心受食時不得兩手按鉢在腳前當先淨洗手滌鉢行食至當一心受若直月監食人後來得索水洗手滌鉢無罪若放恣諸根不一心受食者越學法開緣不犯者或鉢小故食棄飯或還墮案上無犯第二十七溢鉢受食戒緣起處同前起緣人六羣溢鉢受食捐棄羮飯居士譏嫌如飢餓人故制所立戒相當平鉢受食應當學釋義不平鉢者溢滿律攝云不得滿者受食之時應觀其鉢勿令流溢所有羮菜不應多請後安飯時恐溢出故行食未至不應遙喚隨到受之勿生貪想若預申鉢表有貪心鉢臨食上臨者自上臨下也是醜惡相定罪同前開緣不犯者或鉢小或時還墮案上無犯第二十八平鉢受羮應當學同前戒中第二十九不等受食戒緣起處同起緣人有居士請衆僧食自手斟酌飯及羮時下飯已入內取羮比取羮還六羣食飯已盡與羮已復還取飯比取飯還食羮已盡居士譏嫌如飢餓人故制所立戒相羮飯等食應當學釋義不等者飯至羮未至飯已盡羮至飯未至羮已盡定罪同前僧祇云不得先取羮後取飯當先取飯案已後取半羮若國俗法先行羮後行飯者當取鍵鎡拘鉢受若無者當作樹葉碗受復無葉者得以鉢受羮但受飯時應以手遮徐徐下鉢中莫令溢出若比丘病宜多須羮者多取無罪若放恣諸根不羮飯等受者越學法四衆同開緣不犯者或時正須羮不須飯或時正須飯不須羮或日時欲過或命難梵行難疾疾食無犯第三十不次第食戒緣起處同前起緣人六羣比丘不次第取食居士譏嫌如豬狗食亦如牛驢烏鳥食故制所立戒相以次食應當學釋義不次第者鉢中處處取食食僧祇云刳食者刳四邊留中央當先受飯案著一邊後受羮合和而食當次第取若欲與人者得截半與十誦云不得鉢中擇好食定罪同前開緣不犯者或患飯熱挑取冷處食若日時欲過若命難梵行難疾疾食無犯第三十一挑鉢中食戒緣起處同起緣人六羣挑鉢中而食令現空謂現空相更欲得食居士譏嫌似牛驢駱駝豬狗如烏鳥食無異故制所立戒相不得挑鉢中而食應當學釋義挑鉢中者置四邊挑中央至鉢底定罪同前開緣不犯者若患飯熱開中令冷若日時欲過若命難梵行難疾疾刮鉢中食者無犯第三十二自為索食戒此戒二緣合結緣起處同起緣人六群自為己索食如飢餓時居士譏嫌故制諸病比丘皆有疑不敢自為索食亦不敢為他索若他索食與亦不敢食佛言皆聽當如是説戒所立戒相若比丘不病不得自為己索羮飯應當學定罪如前開緣不犯者若病者自索若為他他為己索若不求而得無犯第三十三以飯覆羮戒此戒二緣合結緣起處同起緣人有居士請衆僧食自手斟酌羮飯與一六群比丘羮已識次更取羮比丘即以飯覆居士還問言羮在何處比丘默然居士譏嫌似飢餓人故制不得以飯覆羮結戒已諸比丘請食羮污手污鉢污衣疑不敢以飯覆羮佛言聽以飯覆羮當如是説戒所立戒相不得以飯覆羮更望得應當學釋義僧祇云若比丘迎食慮污衣者不得盡覆當露一邊若一切覆者前人問得未應答已得律攝云羮飯不得互掩者意欲多求長貪心故應於飲食生厭離想是為出家所應作事隨得隨食少欲為念定罪同前開緣不犯者若請食或時正須羮有時正須飯無犯第三十四視比座食戒緣起處同起緣人六群中一人得食分少見比座分多即語居士言汝與食不平等有愛居士言我平等相與何言有愛耶故制所立戒相不得視比座鉢中應當學釋義視比座鉢中者誰多誰少耶定罪同前開緣不犯者或時有如是病若比座病若眼暗看得食不得食淨不淨受未受無犯僧祇云若監食人看食何處得何處不得無犯若共行弟子若依止弟子病看其鉢中是應病食不無罪若看上座為得食不無罪第三十五不繫鉢想食戒緣起處同起緣人六群受羮飯已左右顧視比座取其羮藏之彼自看不見羮問言我向受羮今在何處比座言汝何處來耶答言我在此置羮在前左右看視而今無爾諸比丘白佛制戒所立戒相當繫鉢想食應當學釋義不繫鉢想者左右顧視也僧祇云不得放鉢在前共比座語若有因緣須共左右語者左手撫鉢上若行食到第三人時當先滌鉢豫擎待至定罪同前開緣不犯者或比座比丘病若眼暗為受取瞻看淨不淨得未得或看日時或命難梵行難欲逃避左右看視者無犯會詳智度論云思惟此食工夫甚重計一鉢之飯作夫流汗合集量之食少汗多此食辛苦如是入口即成不淨宿昔之間變為屎尿本是美味惡不欲見行者思之如是弊食我若貪著當墮三塗如是觀食當厭五欲第三十六大摶飯食戒緣起處同起緣人六群大摶飯食令口不受居士譏嫌似豬狗駱駝驢牛烏鳥食故制所立戒相不得大摶飯食應當學釋義大摶者口不容受僧祇云不得大不得小如淫女人兩粒三粒而食當可口食定罪同前僧祇云上座當徐徐食不得速食竟住看令年少狼狽食不飽開緣不犯者或日時欲過或命難梵行難疾疾食無犯第三十七張口待飯食戒緣起處同起緣人六群受食食未至先大張口居士譏嫌如前故制所立戒相不得大張口待飯食應當學釋義大張口者飯摶未至先大張口待僧祇云比丘食時當如雪山象王食法食入口已以鼻作後分齊前食咽已續內後團不得張口而待律攝云摶者謂以手爬飯非多非少可口而內非是摶令相著定罪同前開緣不犯者或日時欲過或命難梵行難疾疾食無犯僧祇云若口有瘡得豫張口無罪第三十八含食語戒緣起處同起緣人六群含飯語居士如前譏嫌故制所立戒相不得含食語應當學釋義含食語者飯在口中語不可了令人不解僧祇云若食上和尚阿闍黎長老比丘喚時咽未盡能使聲不異者得應若不能者咽已然後應若前人嫌者應答言我口中有食是故不即應律攝云食在口中不應言説同白衣法定罪同前開緣不犯者或時噎而索水或命難梵行難無犯第三十九遙擲食戒緣起處同起緣人六羣摶飯遙擲口中居士譏嫌如似幻師故制所立戒相不得摶飯遙擲口中應當學定罪同前開緣不犯者若被繫縛擲口中食者無犯僧祇云若酸棗若葡萄如是種種乃至熬豆挑擲噉無罪第四十遺落飯食戒緣起處同起緣人六羣受食不如法手把飯摶囓半食居士譏嫌似豬狗駱駝驢牛烏鳥故制所立戒相不得遺落飯食應當學釋義遺落者半入口半在手中僧祇云不得齧半還著鉢中當段段可口食若團大當手中分令可口若餅當分作分齊令可口定罪同前開緣不犯者或噉薄餅燋飯若瓜甘蔗噉菜及諸果等不犯第四十一頰食食戒緣起處同起緣人六羣頰食食居士譏嫌如獼猴故制所立戒相不得頰食食應當學釋義頰食者令兩頰鼓起似獼猴狀僧祇云從一頰回至一頰當一邊嚼即一邊咽定罪同前開緣不犯者或日時欲過或命難梵行難疾疾食無犯第四十二嚼飯作聲食戒緣起處同起緣人六羣嚼飯作聲居士譏嫌似豬狗駱駝牛驢烏鳥故制所立戒相不得嚼飯作聲食應當學釋義律攝云不彈舌食者施主設食其食過甜故為彈舌詐現酸相不㗘㗱食者其食實酸故㗘㗱脣作聲而現甜相十誦云啜粥不得作聲噉根莖等勿令大作聲僧祇云不得全吞食使嗗嗗作聲若咽喉病無罪定罪同前開緣不犯者嚼乾餅及燋飯甘蔗瓜果等第四十三大吸飯食戒緣起處同起緣人六羣大吸飯食居士如前譏嫌故制所立戒相不得大吸飯應當學釋義大吸飯者張口遙呼吸氣出為吹氣入為吸謂引食入口也老子曰將欲歙之必故張之是也定罪同前開緣不犯者若口痛若食羮若食酪酪漿蘇毗羅漿此漿作法先遣淨人搗大大麥器中盛之著水經二三日小小酢也淨濾飲之若苦酒即醋也因有苦味俗呼為苦酒無犯第四十四舌舐食戒緣起處同起緣人六羣吐舌食居士如前譏嫌故制所立戒相不得舌舐食應當學釋義舌舐食者以舌舐飯揣食僧祇云吐舌食者吐出舌以食著上然後合口不得反覆舐手食不得舐手食若酥油等著手當就鉢緣上溉聚一處然後取食定罪同前開緣不犯者或時被縛或手有泥及垢膩污手舌舐取無犯僧祇云不得嗾指食若蜜及鹽等著指得嗾無罪若直月及監食人欲知生熟鹹淡甜酸得著掌中舌舐無罪若病得置鹽掌中舐無罪第四十五振手食戒緣起處同起緣人六羣振手而食居士譏嫌似王大臣故制所立戒相不得振手食應當學釋義僧祇云若振手時不得向比坐振若食著手當向己前振若鉢中抖擻律攝云手有食水不振餘人繫心而食充軀長道定罪同前開緣不犯者或時有如是病或食中有草有蟲或有不淨欲振去之或有未受食手觸而污手振去之無犯第四十六手把散飯食戒緣起處同起緣人六羣手把散飯食居士譏嫌似雞鳥故制所立戒相不得手把散飯食應當學釋義散飯者散棄飯也律攝云不手散食者不得如雞食定罪同前十誦云食墮所受草葉上者應食若有土者吹土却而食或有多土著者水洗得食開緣不犯者或時食中有草有蟲或有不淨污或有未受食捨棄無犯第四十七污手捉飲器戒緣起處同起緣人六羣以不淨膩手捉飲器居士譏嫌似王大臣故制所立戒相不得污手捉飲器應當學釋義污手者有膩飯著手僧祇云比丘食時應護左手當以左手受飲器拄脣而飲不得口深含器緣亦不得令緣觸鼻額不得盡飲當留少許當口處瀉棄之更以水滌次行與下若左手有病瘡者右手就鉢緣上淨溉去膩淨水洗若不淨以葉承取飲已如上律攝云凡欲食噉皆須土屑澡豆等淨洗手已方捉食器飲器及淨水瓶定罪同前開緣不犯者或草上受葉上受洗手受無犯會詳五百問云昔有一執事比丘處分作飲食常手拄器言取是用是日日常爾不懺命終墮餓鬼中有一比丘名無著於夜上廁聞喚聲問汝是誰答言我是餓鬼問本何行墮餓鬼中答於此寺中為僧執事問汝本精進何由墮此答不淨食與衆僧云何不淨答衆僧有種種甕器盛食以指拄器教取是用是犯墮罪三説戒不悔轉至重以是故墮餓鬼中兩手擘胸裂皮肉摶喉吹潠問何以擘胸答蟲噉身痛故問何以呻喚答餓極欲死問欲食何物答意欲食糞而不能得以諸餓鬼推排不能前無著言我知奈何鬼言願僧見為呪願無著即還向衆具説衆與呪願後便得糞食不復呻喚以是證故知大比丘不得手污觸僧器物若非僧器手受得行與僧無犯第四十八洗鉢水棄白衣舍戒緣起處同起緣人六羣在居士家食已洗鉢棄水乃至餘食狼藉在地居士譏嫌多受飲食如飢餓之人而捐棄狼藉如王大臣故制所立戒相不得洗鉢水棄白衣舍內應當學釋義洗鉢水者雜飯水根本云食時當稱腹而取不得多受若淨人卒與多者未噉時應減與比座若比座不取應與沙彌及園民若洗鉢時不得一粒瀉棄地若有者應取著板上葉上若細粒若不可聚者無犯定罪同前開緣不犯者或以器若澡槃承取水持棄外無犯十誦云問主人棄不犯會詳律攝云有諸俗人從苾芻乞鉢中水為吉祥故為除病故時塢波難陀以所食鉢水和殘飯持與令生嫌賤是故聖制授鉢水法應先三遍淨洗鉢已盛滿清水誦聖伽陀可兩三遍方授與伽陀云以世五欲樂或復諸天樂若比愛盡樂千分不及一由集能生苦因苦復生集八聖道能超至妙涅槃處所謂布施者必獲其義若利為樂故施後必得安樂第四十九生草菜上便利戒二緣合結緣起處同起緣人六羣大小便涕唾生草菜上居士譏嫌似豬狗駱駝牛驢故制病比丘不堪避生草菜疲極佛言病比丘無犯當如是説戒所立戒相不得生草菜上大小便涕唾除病應當學釋義僧祇云當在無草地若夏月生草普茂無空缺處當駱駝牛馬驢羊行處若復無是者當在甎瓦石上若復無是者當在乾草葉上若復無是者當以木枝承令糞先墮木上後墮地若比丘經行時不得涕唾生草上經行道頭當著唾壺瓦石草葉以細灰土著唾壺中然後唾上若大小便涕唾污手腳得拭生草病者下病冷病風病或足病不堪行動避生草菜等定罪同前律攝云若青草上好樹下及華果樹人所停息者不應大小便若棘刺叢處者無犯若大林中行枝葉交茂應離人行處若涉生草田間無空處應持乾葉布上便利若無可得者無犯此丘尼波逸提三小衆突吉羅開緣不犯者或病或在無草菜處大小便流墮生草菜上或時風吹鳥銜而墮生草菜中者無犯第五十水中便利涕唾戒二緣合結緣起處同起緣人六羣水中大小便涕唾居士譏嫌似豬狗駱駝牛驢故制病比丘避水疲極佛言病者無犯當如是説戒所立戒相不得水中大小便涕唾除病應當學釋義水中者一切江河池水中定罪同前僧祇云不得大小便涕唾水中當在陸地若雨時水平浮滿當在土塊上若無是者當於瓦石上若竹木上先墮木上然後水中若大小便涕唾污手腳得水中洗水中洗大小行無罪若比丘入水浴時不得唾中若遠岸者當唾手中然後棄善見云若水人所不用或海水不犯水雖中用曠遠無人用不犯開緣不犯者或病或於岸上大小便流墮水中或為風吹鳥銜墮水中無犯第五十一立大小便戒二緣合結緣起處同起緣人六羣立大小便居士譏嫌似牛馬豬羊駱駝故制病比丘疲極不堪蹲佛言病者無犯當如是説戒所立戒相不得立大小便除病應當學釋義五分云佛言雖是我所制餘方不以為清淨者皆不應用雖非我所制餘方必應行者皆不得不行今此方國風男子蹲踞小便者世所譏嫌則宜從方為淨無逆聖情以順國風得名清淨持戒也不得妄取餘外定禁雷同斯目此則非制而制是制而開廢教之罪難免定罪同前開緣不犯者或病或被繫縛或腳有垢膩若泥污無犯第五十二與反抄衣人説法戒二緣合結緣起處同起緣人六羣與不恭敬反抄衣人説法諸比丘嫌責故制諸比丘疑病反抄衣者不敢為説法佛言病者無犯當如是説戒所立戒相不得與反抄衣不恭敬人説法除病應當學釋義僧祇云説法者為前人開解其義分別演説欲令如法修行法者佛所説佛印可佛所説者如來自説佛所印可者聲聞所説佛讚善哉是名印可定罪同前開緣不犯者或病或為王王大臣説無犯以下並同第五十三不得為衣纏頸者説法除病應當學同前戒中以纏頸為異第五十四不得為覆頭者説法除病應當學釋義覆頭者若衣覆若葉覆及餘一切物覆皆名覆頭西國以露頂跣足而為敬東土以衣冠整齊而為恭然隨國風必以敬重為心除冠巾外餘物覆者不應為説定罪同前開緣不犯者僧祇云若比丘為塔為僧事詣王若地主時乃至邊有淨人者當立意為彼人説王聽無罪若比丘在怖畏險道行時防衛人言尊者為我説法彼雖覆頭為説無罪以下並同第五十五不得為褁頭者説法除病應當學釋義褁者謂纏褁與覆別也餘並同前第五十六不得為叉腰者説法除病應當學釋義叉腰者或一手叉或兩手叉以自慠慢輕法故不得為説僧祇云不得為抱膝及翹腳人説法除病第五十七不得為著革屣者説法除病應當學釋義革屣者即皮鞋也若一重若兩重開緣不犯者僧祇云若王地主及防衛人雖著革屣為説無犯五分云若多人著革屣不能令脫但因不著者為説不犯餘並同前會詳第三分云佛在王舍城時瞻波城有長者子字守籠那其父母唯有此一子甚愛念之生來習樂未曾躡地而行足下生毛時摩竭國王欲見之即敕瞻波城主使諸長者各將其兒來時城主奉敕與諸長者將兒到已乞王以衣敷地守籠那詣王所頭面作禮王見心甚歡喜即賜金寶語言我已與汝現世利益世尊在耆闍崛山中汝可往見禮拜當與汝後世利益守籠那如教禮佛聞法得法眼淨受三歸五戒為優婆塞時守籠那求佛出家因父母不聽即五百不食遂聽出家為道精進經行血流污地如屠殺處佛為説琴絃之喻故聽在寺內著一重革屣若在邊國多瓦石聽兩重為護身護衣護臥具故也第五十八不得為著木屐者説法除病應當學釋義僧祇云屐者十四種金屐銀屐摩尼屐牙屐木屐多羅屐皮屐欽婆羅屐綖屐芒屐樹皮屐婆迦屐草屐如是等是名屐餘並同前第五十九不得為騎乘者説法除病應當學釋義僧祗云乘者有八種象乘馬乘牛乘驢乘船乘車乘輿乘輦乘餘並同前第六十佛塔中止宿戒二緣合結緣起處同起緣人六羣止宿佛塔中比丘白佛制戒比丘疑不敢為守護故止宿佛塔中佛言無犯當如是説戒所立戒相不得在佛塔中止宿除為守護故應當學釋義佛塔者梵語窣堵波又云浮圖或云偷婆又曰私偷簸皆訛也此翻方墳亦翻圓冢亦翻高顯義翻靈廟廟者貌也先祖形貌所在也又梵名塔婆徐鉉新加云西國浮圖也言浮圖者此翻聚相戒壇圖經云塔字此方字書乃是物聲本非西土之號若依梵本瘞佛骨所名曰塔婆僧祇云有舍利名曰制底無舍利名曰支提文句云支提無骨身者也今云佛塔者用別餘塔也除為守護者即今殿主香燈之類常在塔中灑掃塵穢然燈燒香守護塔物故聖開聽在中止宿也定罪同前根本雜事云諸香臺殿幡竿制底如來形影皆誦伽陀然後足蹈不爾得越法罪開緣不犯者或時有如是病若為守護故止宿或為強者所執或命難梵行難止宿無犯會詳涅槃後分經云佛告阿難佛般涅槃茶毗既訖一切四衆收舍利置七寶瓶釋老志云佛既謝往香木焚尸靈骨粉碎大小如粒擊之不壞焚之不焦而有光明神驗謂之舍利當於拘尸那城內四衢道中起七寶塔高十三層上有輪相言輪相者僧祇云佛告迦葉佛塔上施槃蓋長表輪相經中多云相輪以人仰望而瞻相也辟支佛塔應十一層阿羅漢塔成以四層亦以衆寶而嚴餝之其轉輪王塔亦七寶成無復層級何以故未脫三界諸有苦故十二因緣經八種塔並有露槃佛塔八層菩薩塔七重辟支佛六重四果五重三果四重二果三重初果二重輪王一重凡僧但蕉葉火珠而已第六十一藏財物佛塔中戒二緣合結緣起處同起緣人六羣藏財物置佛塔中比丘白佛制戒比丘疑不敢為堅牢故藏財物著佛塔中佛言無犯當如是説戒所立戒相不得藏財物置佛塔中除為堅牢應當學釋義財物者或是供塔財物或復供僧財物為恐失故為堅牢故聖所開許藏佛塔中若是私物未必聽許定罪同前開緣不犯者或為堅牢故藏著佛塔中或為強者所執或命難梵行難無犯第六十二著革屣入佛塔中戒緣起處起緣人並同前所立戒相不得著革屣入佛塔中應當學定罪同前開緣不犯者或有如是病或為強者所執第六十三不得手捉革屣入佛塔中應當學釋義前戒著入踐污佛地此以手捉入復無敬心故亦制斷第六十四不得著革屣繞佛塔行應當學釋義繞有二種一路由經過繞二為表敬繞此言繞佛塔行者是由經過繞餘並同前第六十五不得著富羅入佛塔中應當學第六十六不得手捉富羅入佛塔中應當學釋義富羅者是梵語此云短靿靴五分云不應深作𩍓聽至踝上不得𩍓如靴應開前斂後第六十七塔下坐食污地戒二緣合結緣起處同起緣人六羣在塔下坐食已留草殘食污地而去比丘嫌責白佛制戒時作塔已施食若作房若作池并施食若衆集坐處窄狹疑佛未聽我等塔下坐食佛言聽坐食不應留草及食污地時有一坐食比丘若作餘食法不食比丘若有病比丘不敢留殘食草污地佛言聽聚著腳邊出時持棄之當如是説戒所立戒相不得塔下坐食留草及食污地應當學釋義言留草及食污地者謂西域受食之時敷草為座並無椅凳古人席地而坐此方亦然定罪同前開緣不犯者或聚一處出時持棄無犯第六十八擔死尸塔下過戒緣起處同起緣人六羣擔死尸從塔下過護塔神瞋故制所立戒相不得擔死尸從塔下過應當學釋義死者盡也氣絶神遊謂之曰死在牀曰尸在棺曰柩定罪同前開緣不犯者或從此道過或強力者所將去無犯第六十九不得塔下埋死尸應當學會詳根本雜事云苾芻身死應可焚燒無柴可得可棄河中若無河者穿地埋之地多蟲蟻可於叢薄深處令其北首右脅而臥以草稕支頭若草若葉覆其身上送喪苾芻可令能者誦三啓無常經并説伽陀為其呪願事了歸寺應可洗身若觸尸者連衣俱洗其不觸者但洗手足還至寺中應禮制底第七十不得在塔下燒死尸應當學第七十一不得向塔下燒死尸應當學第七十二不得佛塔四邊燒死尸使臭氣來入應當學法華經云藥王菩薩而自念言我以神力供養不如以身供養即灌香油焚身供養淨明德佛此求大法情深難行能行難捨能捨今死尸佛塔四邊焚燒臭煙熢㶿熏穢聖像故爾制之第七十三持死人衣及牀塔下過戒二緣合結緣起處同起緣人六羣持死人衣及從牀塔下過彼所住處神瞋故制諸糞掃衣比丘疑不敢持如是衣從塔下過佛言聽浣染香熏已持入當如是説戒所立戒相不得持死人衣及牀從塔下過除浣染香熏應當學釋義除浣染香熏毗尼母云若得糞掃衣者水中久漬用純灰浣淨以奚黑伽香塗上然後得著入塔定罪同前開緣不犯者若浣染香熏者無犯第七十四佛塔下便利戒緣起處起緣人並同前戒不異所立戒相不得佛塔下大小便應當學罪同定前開緣不犯者或為強力所執等會詳優鉢祇王經云伽藍法界地漫大小行者五百世身墮拔波地獄後經二十小劫常遣肘手抱此大小便處臭穢之地乃至黃泉第七十五不得向佛塔大小便應當學第七十六不得繞佛塔四邊大小便使臭氣求入應當學第七十七不得持佛像至大小便處應當學定罪同前開緣不犯者或道由中過或為強力所持第七十八不得在佛塔下嚼楊枝應當學第七十九不得向佛塔嚼楊枝應當學第八十佛塔四邊嚼楊枝戒緣起等同前所立戒相不得佛塔四邊嚼楊枝應當學釋義嚼楊枝者律云嚼楊枝有五利益一口無臭氣二能別味三不增熱陰四能引食五眼明不嚼反上五過藥師經云晨嚼齒木澡潄清淨楊枝者此方言也西域不局或葛藤槐枝桃條但有苦味者俱可用也定罪同前十誦云佛前和尚阿闍黎一切上座前佛塔前聲聞塔前俱不得嚼楊枝嚼者突吉羅同歲比丘前不犯三千威儀云不得向佛塔及和尚阿闍黎與背開緣不犯者或有病或為強力所執或被繫縛等第八十一不得在佛塔下洟唾應當學第八十二不得向佛塔洟唾應當學第八十三佛塔四邊洟唾戒緣起等同前所立戒相不得塔四邊洟唾應當學釋義洟唾者謂從鼻出曰洟從口出曰唾凡洟唾須在屏處水懺云洟唾堂房污佛僧地招過非輕可不慎歎根本雜事云寺中四角柱下各安唾盆僧祇云以細灰土著唾壺中然後唾上定罪同前開緣不犯者或時有如是病成鳥銜風吹去無犯第八十四向塔舒腳坐戒緣起等同前所立戒相不得向塔舒腳坐應當學釋義舒腳者舒者伸也或舒一腳或舒兩腳無敬信心故定罪同前開緣不犯者或時有如是病若中間隔或為強者所持無犯第八十五安佛塔下房戒緣起處佛在拘薩羅國遊行向都子婆羅門村五分云都夷婆羅門聚落案此村在拘薩羅國舍衛大城西北六十餘里元是迦葉佛生處也起緣人六群安佛塔在下房己在上房住故制所立戒相不得安佛塔在下房己在上房住應當學釋義第四分云六群共如來塔同室宿佛言不應爾有比丘為守護堅牢故而畏慎不敢共宿佛言聽安杙上若頭邊而眠六群安如來塔置不好房中己在上好房中宿佛言不應爾應安如來塔置上好房中己在不好房中宿此以好惡為上下彼安如來塔置下房己在上房宿佛言不應爾應安如來塔在上房己在下房中宿此以高下為上下定罪同前開緣不犯者或命難梵行難第八十六立為説法戒二緣合結緣起等並同前所立戒相人坐己立不得為説法除病應當學釋義人坐己立前人無敬法心比丘不尊聖教自𢍉於他非法而説也會詳梵網經云若佛子常行教化起大悲心入檀越貴人家一切衆中不得立為白衣説法應在白衣衆前高座上坐法師比丘不得地立為四衆白衣説法若説法時法師高坐香華供養四衆聽者下坐如孝順父母敬順師教如事火婆羅門其説法者若不如法説犯輕垢罪第八十七為臥人説法戒身心慢法故佛制斷人臥己坐不得為説法除病應當學釋義除病者時毗舍佉母道獲三果染疾比丘往看樂法情深請為説法以佛制戒不敢為説白佛故爾開聽第八十八在非座為人説法戒人在座己在非座不得為説法除病應當學第八十九為高座人説法戒所立戒相人在高座己在下座不得為説法除病應當學釋義僧祇云卑牀有二種一者下牀名卑二者粗弊名卑高有二種一高大名高二妙好者亦名高會詳善見云佛告諸比丘往昔於波羅奈國有一居士名車波迦其婦懷妊思菴羅果菴羅果正云菴沒羅肇法師注云其果似桃而非桃略疏云奈樹定非奈也又翻難分別其果似桃而非桃似奈而非奈又生熟難分其形似梨語其壻覓其夫答言此非菴羅果時我云何得婦言君若不得我必當死矣夫自念言惟王園中有非時菴羅果我往偷取即夜入王園偷果取果未得明相已出不得出園於是樹上藏住時王與婆羅門入園欲食菴羅果婆羅門在下王在高座婆羅門為王説法偷果人在樹上心自念言我今偷果事應死因王聽婆羅門説法故我今得脫我無法王亦無法婆羅門亦無法何以故我為女人故而偷王果王由憍慢故師在下自在高座而聽法婆羅門為貪利養故自在下座為王説法我與王婆羅門相與無法我今得脫作是念已即便下樹往至王前而説偈言一人不知法一人不見法教者不依法聽者不解法為食粳米飯及諸餘肴膳為是飲食故我言是無法為以名利故毀碎汝家法我為凡夫時見人在上説法者在下言其非法何況我今汝諸弟子為在高人自在下而為説法時偷果人者我身是也第九十為在前人説法戒人在前行己在後行不應為説法除病應當學開緣僧祗云若比丘眼患前人捉杖牽前為説無罪餘同前戒第九十一為高經行人説法戒人在高經行處己在下經行處不應為説法除病應當學第九十二為在道人説法戒人在道己在非道不應為説法除病應當學第九十三擕手道行戒緣起處佛在給孤獨園起緣人六羣擕手在道行或遮他男女居士譏嫌似王大臣豪貴長者故制所立戒相不得擕手在道行應當學釋義擕手者謂手手相持並行也定罪同前開緣不犯者或時有如是病或患眼暗須扶接等第九十四上樹過人戒二緣合結緣起處同起緣人有一比丘在大樹上受夏安居於樹上大小便樹神瞋伺其便欲斷其命根故制有比丘向拘薩羅國道中值惡獸恐怖不敢上樹過人即為惡獸所害諸比丘白佛佛言若命難梵行難得上樹當如是説戒別立戒相不得上樹過人除時因緣應當學開緣不犯者或命難梵行難上樹過人無犯沙彌小衆等為僧取枝葉華果上樹無罪第二分安居犍度云欲取樹上乾薪聽作鈎鈎取作梯取若繩羂取若樹通身乾聽上第九十五杖絡囊戒緣起處同起緣人跋難陀絡囊中盛鉢貫著杖頭肩上擔諸居士見謂是官人皆下道避於屏處看之乃知是跋難陀譏嫌故制所立戒相不得絡囊盛鉢貫杖頭著肩上而行應當學開緣不犯者或為強力者所逼或被縛若命難梵行難無犯第九十六為持杖人説法戒二緣合結緣起等並同前人持杖不恭敬不應為説法除病應當學開緣不犯者或時有如是病或王大臣為説無犯僧祇云若比丘在怖畏險道行時防衛人言尊者為我説法彼雖捉杖為説無罪第九十七為持劍人説法戒人持劍不應為説法除病應當學釋義劍者檢也所以防檢非常也顯無敬法心故制除病者或病人心生恐怖以劍防身去邪是以開聽以下三戒義亦同此第九十八為持鉾人説法戒人持鉾不應為説法除病應當學第九十九為持刀人説法戒人持刀不應為説法除病應當學第一百為持蓋人説法戒人持蓋不應為説法除病應當學釋義僧祗云蓋者樹皮蓋多羅葉蓋多黎葉蓋竹傘蓋疊傘蓋孔尾蓋如是種種能遮雨日者皆名傘蓋除病者或頭上患瘡長日曬或身因病苦畏雨畏熱必須傘蓋三結問諸大德我已説衆學戒法今問諸大德是中清淨不三問四勸持諸大德是中清淨默然故是事如是持
