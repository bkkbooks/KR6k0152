body:
  text: 清金陵寶華山律學沙門德基輯第七十八瞋打比丘戒總釋此是共戒尼犯亦同大乘同制若以怨報怨以打報打罪結輕垢若無端起瞋及忿恨增上不受懺謝犯重律攝云由伴屬事不忍煩惱制斯學處緣起處佛在給孤獨園起緣人六羣一人瞋打十七羣比丘其被打人高聲大喚比房比丘聞白佛訶責結戒所立戒相若比丘瞋恚故不喜打比丘者波逸提釋義瞋恚不喜者瞋名九惱及非處起瞋恚者忿恨也學人凡夫有乃至阿羅漢亦有不喜心在打者擊也若身身分身方便身者一切身是身分者若手若脚若肘若膝若齒若爪甲是名身分身方便者若捉杖瓦石等打若遙擲是名身方便犯緣此戒具足三緣方成本罪一心生瞋恚二身器行打三已著彼身定罪此中犯者以手石杖打比丘者一切波逸提除杖手石若以餘戶𨷲曲鈎拂柄香爐柄桎者一切突吉羅菩婆多云若打三眾突吉羅若打得戒沙彌盲瞎聾瘂波利婆沙摩那埵比丘悉波逸提若打他或波羅夷或僧殘或偷蘭遮或波逸提或突吉羅若殺心打他死者波羅夷不死偷蘭遮若婬亂心打比丘尼式叉摩那沙彌尼白衣女人悉僧殘若無殺意但瞋心打比丘波逸提打不滿突吉羅摩得勒伽云打三種人突吉羅謂賊住本不和合本犯戒若以把沙把豆等擲眾比丘隨所著得爾所波逸提不著突吉羅僧祇云打比丘尼偷蘭遮重於吉羅輕於墮罪若惡象馬牛羊狗來不得打得捉杖木瓦石等打地作恐怖相若畜生來入塔寺中觸突形像壞華果樹亦得以杖木瓦石打地恐怖令去五分云打畜生突吉羅比丘尼波逸提小三眾突吉羅是謂為犯開緣不犯者若有病須人椎打若食噎須椎脊若共語不聞而觸令聞若睡時以轉側妥上若往來經行時共相觸若掃地時杖頭誤觸一切無犯不犯者最初未制戒等第七十九瞋搏戒總釋此是共戒尼犯亦同大乘同制煩惱緣起處起緣人如前不異但此戒以手搏十七羣故制所立戒相若比丘瞋恚不喜以手搏比丘者波逸提釋義搏者謂作打勢而擬其手名之為搏餘部名擬擬者像也為作打相善見云手不著身名手搏也薩婆多云此與前戒打擬為異餘義盡同前戒若打波逸提舉擬欲打便止突吉羅以打不滿故此戒本意不規打直欲掌擬令其惱怖但擬波逸提如本意欲女人身上出精若遂意僧殘若不出精直摩捉便止偷蘭遮若本心直規摩捉樂意僧殘此二戒亦爾犯緣此戒具足三緣方成本罪一心有瞋恚二所舉手足三欲令惱怖定罪此中犯者瞋恚以手搏比丘波逸提除手已若戶𨷲拂柄香爐柄桎一切突吉羅十誦云以手掌脚掌向他波逸提舉餘身分向他突吉羅五分云手擬及波逸提不及突吉羅律攝云作打心而擬其手初舉手時便得本罪若一舉手向多苾芻隨其多少准人得罪僧祇云擬比丘尼偷蘭遮對首輕偷蘭也擬式叉摩尼沙彌沙彌尼越毗尼比丘尼波逸提小三眾突吉羅是謂為犯開緣不犯者若他打舉手遮若惡象來若盜賊來若惡獸來若持刺來舉手遮無犯若渡水若欲從溝瀆泥水處過相近舉手招喚餘比丘觸彼若彼不聞語手挃令聞若眠時若行入出觸彼若掃地若以杖誤觸一切不故作無犯不犯者最初未制戒等第八十無根僧殘瞋謗戒總釋此是共戒尼犯亦同大乘同制即無事謗他良人善人向同法者說結輕垢若向外人說犯重律攝云由同梵行事不忍煩惱制斯學處餘並同前不出所立戒相若比丘瞋恚故以無根僧伽婆尸沙謗者波逸提釋義根者見根聞根疑根見根者實見弄墮精見與女身相觸見粗惡語見自歎身或見媒嫁若餘人見從彼聞是謂見根聞疑准知除此三根已以餘謗者是為無根犯緣此戒具足三緣方成本罪一心懷恚忿二實無三根三言說了了定罪此中犯者瞋恚故以無根僧殘謗說而了了波逸提不了了突吉羅僧祇云謗比丘尼偷蘭遮謗式叉摩尼沙彌沙彌尼越毗尼罪謗俗人越毗尼心悔律攝云若窣吐羅罪謗若前人不領解語咸得惡作比丘尼波逸提小三眾突吉羅是謂為犯開緣不犯者有見聞疑根若說其實欲令改悔而不誹謗若戲笑語疾疾語獨語夢中語欲說此錯說彼無犯不犯者最初未制戒等會詳法苑云瞋有二種報一者常為他人求其長短謂因前世不能容物稍不如意即興嗔恨故感今生被人伺求長短動輒得咎也二者常為眾人之所惱害謂因前世瞋惱眾人令不安隱故感今生常被多人之所惱害也第八十一輒入王宮閾戒總釋此是共戒尼亦同犯大乘同制末運尤所當慎設令喚請亦不應輒入若具大神力威德任從不犯律攝云由詣王宮事并譏染煩惱制斯學處緣起處佛在給孤獨園末利夫人見佛聞法得法眼淨為優婆私還至宮中勸波斯匿王令得信樂聽諸比丘入出宮閤無有障礙起緣人迦留陀夷往入王宮時王與夫人晝日共眠夫人遙見尊者來即起披衣拂座令坐夫人失衣墮地形露慚愧而蹲尊者尋還語諸比丘波斯匿王第一寶我今悉見諸比丘問知白佛訶責結戒所立戒相若比丘剎利水澆頭王種王未出未藏寶而入若過宮門閾者波逸提釋義剎利水澆頭王種者取四大海水取白牛右角收拾一切種子盛滿其中置金輦上使諸小王輿王與第一夫人共坐輦上大婆羅門以水灌王頂上若是剎利種水灌頂上作如是立王名為剎利王水澆頭種若是婆羅門種毗舍首陀羅種以水灌頂作如是立王亦名為剎利王水澆頭種未出者王未出婇女未還本處未藏寶者金銀真珠硨磲碼碯水精瑠璃貝玉一切眾寶瓔珞而未藏舉薩婆多云未藏寶者王已出外夫人未起其進御時所著寶衣輕明照徹內身外現以發欲意未藏此衣名未藏寶五分云寶者所重之物及諸女色皆名為寶若過宮門閾者閾者門限也門下橫木為內外之分限犯緣此戒具足三緣方成本罪一是王宮二無緣輙入三兩足過限定罪此中犯者若過宮門閾者波逸提若一足在門外一足在門內發意欲去若共期而不去一切突吉羅除剎利種若入餘粟散小王豪貴長者家入過門閾者一切突吉羅薩婆多云王及夫人大臣太子勢力強將入不犯入天龍鬼神宮門突吉羅入空宮門不犯比丘尼波逸提三小眾突吉羅是謂為犯開緣不犯者若王已出若婇女還本處所有金寶瓔珞已藏舉若有所奏白若被請喚或為力勢所執持去若命難梵行難一切無犯不犯者最初未制戒等會詳律攝云入王宮有十過失一宮人有娠便疑苾芻行不淨行二宮中失物三密言出外四王子有損五王身有損六舉大臣七黜國相八國人苦害九往征餘國十輒聚軍師如是等事咸疑苾芻第八十二捉寶物戒總釋此是共戒尼犯亦同大乘為眾生故不問處所但酌機緣此是制罪律攝云由珍寶事多貪煩惱制斯學處此戒三緣合結緣起處佛在給孤獨園有外道弟子道行止息忘千兩金囊而去起緣人眾多比丘從後來見此金囊自相謂言且持去若有主識者當還即持去時彼居士前行數里乃憶疾還諸比丘遙見必是金主即問言欲何所至報言我於某處止息忘千兩金囊今往取之諸比丘即出金囊示之言是汝物非耶報言是但此中物何故少比丘言正得爾許耳居士即詣官了之王波斯匿問諸比丘比丘言我等所得止有此耳居士言我所有物者乃至若干王即勅人如彼所說斤兩取庫中金來著囊中其囊不受王言此非汝物汝更自求去即治其罪更稅家財物并此金一切入官諸比丘聞白佛呵責結戒不得捉寶舍衛城中諸女人節會日毗舍佉母莊嚴瓔珞從祇桓邊過念言不宜著瓔珞具見佛脫身寶衣積置樹下見佛佛為說法甚大歡喜心存於法忘取還家比丘見不敢取白佛佛言聽在僧伽藍內見有遺物為不失堅牢故取舉之更結除僧伽藍中有眾多比丘從拘薩羅國至一無住處村止宿巧師家巧師以金銀置舍內而去比丘為守護故竟夜不眠還以白佛佛言在他家止宿時若屋中有物為堅牢不失故應收舉又開及寄宿處當如是說戒所立戒相若比丘若寶及寶莊餝自捉若教人捉除僧伽藍中及寄宿處波逸提若比丘在僧伽藍中若寄宿處捉寶若以寶莊飾自捉教人捉當作是意若有主識者當取作如是因緣非餘釋義寶者金銀真珠琥珀硨磲碼碯瑠璃貝玉生像金寶莊餝者銅鐵鉛鍚白鑞以諸寶莊餝也自捉教人捉除僧伽藍中及寄宿處謂開此二處自捉教他此為非犯外捉不開故也薩婆多云若僧籬墻外復非白衣住處不應取若比丘在僧伽藍內若舍內若寶若寶莊餝自捉若教人捉當識囊器相識褁相識繫相應解囊器看知幾連綴幾未連綴幾方幾圓幾故幾新若有求索者應問言汝物何似若相應應還若不相應語言我不見如是物若有二人俱來索應問言汝物其形何似若言相應還若不相應當語言我不見如是物若二人語俱相應應持物著前語言是汝等物各取若有主識者當取作如是因緣非餘此謂雖開聽自他舉捉未取之間當作是念此非我物有主識者當還之為彼藏舉堅牢作如是因緣非為餘事也犯緣此戒具足三緣方成本罪一是寶物二非伽藍及舍內三自捉教他定罪此中犯者在僧伽藍內若舍內若寶若寶莊餝若自捉若教人捉若不識囊相褁相繫相突吉羅若不解囊不看幾連綴幾未連綴幾方幾圓幾新幾故一切突吉羅十誦云捉偽珠突吉羅人間金銀寶地牀器比丘不應行坐用天上金銀寶地牀器比丘應行坐用根本雜事云不應於寶器中食或往天上或至龍宮無餘雜器者設金寶器亦應取食律攝云若觸輪王七寶隨其所應得輕重罪一得眾教觸女寶得僧殘二得墮罪觸珠寶及輪寶也餘四無犯謂主丘主藏馬象四寶是比丘尼波逸提小三眾突吉羅是謂為犯開緣不犯者若至僧伽藍內若寄宿處若寶若寶莊餝若自捉若教人捉識囊相褁相繫相解看知幾連綴幾未連綴及方圓故新乃至來索語相應者令持去若是供養塔寺莊嚴具為堅牢故收舉如是一切無犯不犯者最初未制戒等會詳根本云時諸苾芻咸皆有疑以何因緣毗舍佉母不失錢財佛告諸苾芻乃往古昔迦葉波佛涅槃之後有一老母奉持戒行時訖栗王宮人遊戲園中遺瓔珞具時彼老母得此瓔珞繫竹竿頭上欲求本主時王遣人尋此瓔珞於老母處得已奉王王見物喜恠其奇異嗟歎老母問曰既有好心理合嘉賞今何所欲老母白王更無所欲不求現利願以此緣於未來世所生之處得不失財報由昔淨心今受斯果往時老母者即毗舍佉母是由於往時不藏他物發願力故於生生中雖失珍寶終還獲得是故苾芻得他物時勿盜藏舉如是應學第八十三非時入聚落戒總釋此是共戒尼犯亦同大乘同學息世譏嫌故律攝云由入村事招俗譏謗制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人䟦難陀非時入村與諸居士摴蒱比丘勝居士不如以慳嫉故便言比丘晨朝入村為乞食故非時入村為何事耶諸比丘聞白佛訶責結戒比丘或有僧事塔寺事瞻病人事佛言聽有因緣囑授已入聚落不知囑授何人佛言當還囑比丘若獨處一房當囑授比房者當如是說戒所立戒相若比丘非時入聚落不囑比丘者波逸提釋義時者從明相出至中非時者從中後至明相未出廣釋如非時食戒囑者薩婆多云入聚落時若總白入聚落隨意所至也若別相白若先不白隨見異寺比丘白不犯應云大德一心念我某甲比丘非時入聚落至某城邑聚落某甲舍前人答言可爾此別相白僧祇云應言長老我非時入聚落前人答言可爾此謂總白也犯緣此戒具足三緣方成本罪一是非時二有緣不囑三已入邨門定罪此中犯者非時不囑授動足初入邨門波逸提一脚在門內一脚在門外方便欲去而不去一切突吉羅十誦云若白已入聚落還所住處即以先白復至聚落波逸提若不白入聚落隨經過大小巷隨得爾所突吉羅隨入白衣家一一波逸提若八難中一一難起不犯僧祇云二比丘在阿練若住欲俱行展轉相白若一人說已行後人復欲行應白餘比丘若無餘比丘應作是念若道中邨門若聚落邊見比丘當白白已然後入摩得勒伽云若無比丘應白餘四眾比丘尼波逸提小三眾突吉羅是謂為犯開緣不犯者營僧事塔寺事瞻病人事囑授比丘道由村過若有所啟白若為請喚或為力勢所執或被繫縛將去或命難梵行難無犯律攝云若阿蘭若苾芻須入邨中或路在兩村中間若乘空入若無苾芻囑餘俗人者無犯不犯者最初未制戒等第八十四作高牀戒總釋此是共戒尼犯亦同大乘同學律攝云由臥具事憍恣煩惱制斯學處緣起處佛在給孤獨園起緣人迦留陀夷預知世尊必從此道來即於道中敷高好牀座佛言當知此癡人內懷弊惡訶責結戒所立戒相若比丘作繩牀木牀足應高如來八指除入陛孔上截竟若過者波逸提釋義足應高如來八指律攝云謂中人一肘薩婆多云一指二寸也八指該有一尺六寸不得過除入陛孔上陛孔者即卯眼是謂除入卯孔準頭已還餘外牀脚有一尺六寸為定量截竟過者截竟即是作竟過量犯墮作而未竟罪得方便薩婆多云所以不入捨墮者以截斷故截使應量入僧中悔犯緣此戒具足三緣方成本罪一自為作牀二作不應量三過作已成定罪此中犯者自作繩牀木牀足應高八指截竟過者波逸提作而不成突吉羅若為他作成不成一切突吉羅十誦云應截己悔過若未截僧應勅令截不勅不聽盡突吉羅五分云得高牀施應作是念此牀不如法我更截不作是念受波逸提僧祇云若自作終日坐上一波夜提起已還坐一一波夜提他牀而坐上者越毗尼罪支牀脚亦應量當使堅牢若客比丘來次第付牀得過量牀應語知事者言借我鋸來問作何等答言此牀過量欲截令如法若知事者言莫截檀越見者或能不喜若不久住者鑿地埋脚齊量止若久住應齊埋處木筒盛脚勿使壞若檀越家坐牀脚高不應懸脚坐應索承机或索摶木承足若福德舍中牀高坐者無犯薩婆多云若下濕處聽八指支脚過八指盡犯也比丘尼波逸提小三眾突吉羅是謂為犯開緣不犯者若作足高八指若減八指若他施已成者截而用之若脫却脚無犯不犯者最初未制戒等第八十五兜羅綿貯褥戒總釋此是共戒尼犯亦同大乘同學律攝云由惱他事制斯學處緣起處佛在給孤獨園起緣人六羣作兜羅綿貯繩牀木牀大小褥居士譏嫌無有慈心斷眾生命似王大臣諸比丘聞白佛訶責結戒所立戒相若比丘作兜羅綿貯繩牀木牀大小褥成者波逸提釋義兜羅綿者白楊樹華楊柳華蒲臺華名義集云兜羅綿或云妬羅綿妬羅是樹名綿從樹生因而立名即如柳絮蘆荻等花也薩婆多云兜羅者草木花綿之總稱也貯者律攝云謂於牀上散布其綿便用布禪隨時掩覆大褥者為坐臥故小褥者為坐故大小雙遮俱不聽也薩婆多云以世人所畜故又人所嫌故喜生蟲故又若臥輭煖上後得寒及粗鞕時不堪忍故成者波逸提犯緣此戒具足三緣方成本罪一是兜羅綿二貯牀褥三作已成定罪此中犯者若自作教他作成者波逸提不成突吉羅若為他作成不成一切突吉羅五分云若坐坐坐波逸提若臥臥臥波逸提若他與受波逸提要先棄然後悔過若不爾罪益深僧祇云若貯枕枕頭支足越毗尼罪若病枕頭支足無罪若兜羅貯皮枕得二越毗尼罪若為律師法師敷尼師壇及坐具散華著上不得坐拂却而坐無罪根本云絮應撤去罪應說悔對說罪者應問言絮撤去未若不問者得惡作罪比丘尼波逸提小三眾突吉羅是謂為犯開緣不犯者若鳩羅草未見翻譯文若草十誦文闍草五分文柔草未見翻譯娑婆草此草甚為柔輭翻云膩草若以毳獸毛也劫貝木棉花也碎弊物若用作支肩物作輿上枕無犯不犯者最初未制戒等第八十六作骨牙角針筒戒總釋此是不共戒尼不同犯大乘同學律攝云由針筒事譏嫌煩惱制斯學處緣起處佛在耆闍崛山起緣人有信樂工師為比丘作骨牙角針筒廢其家業財物竭盡無復衣食世人譏嫌求福得殃諸比丘聞白佛呵責結戒所立戒相若比丘作骨牙角針筒刳刮成者波逸提釋義骨者僧祇云象馬牛駝龍等骨及餘骨等牙者象牙魚牙摩伽羅牙猪牙及餘牙等角者牛角水牛角犀角鹿角羊角等針筒者律攝云有二種應畜一葦二鐵又有四種針筒應畜銅鐵鍮石及赤銅不應用金銀瑠璃等寶作畜針筒者應密藏舉刳刮者刳者剖盧其中刮者刮削摩治使令光澤薩婆多云針筒者以是小物故所以不入三十事中又應破故若還主主不受若與他則生惱施僧則非法唯毀棄貪好故不淨故犯也犯緣此戒具足四緣方成本罪一心存貪好二用骨牙角三是作針筒四自作已成定罪此中犯者若作骨牙角針筒自作教他刳刮成者波逸提不成突吉羅若為他作成不成一切突吉羅律攝云若得先成者受用無犯若對苾芻說悔罪時彼應問曰所作針筒已打碎未若不問得惡作罪僧祇云不破悔過者越毗尼罪尼等四眾突吉羅是謂為犯開緣不犯者若鐵若銅若鉛錫若白鑞若竹若木若葦若舍羅草即是甘蔗草用作針筒不犯若作錫杖頭鏢𨰭若作傘葢子今時穿絨為嚴餝作子連綴如瓔珞及斗頭鏢即傘頂也如今時作銀頂若作曲鈎若作刮污刀若作如意若作玦㺲若作匙若作杓若作鈎衣𮢏用刮衣令光直或用刻為痕使針行之以直也若作眼藥篦若作刮舌刀若作擿齒物若作桃耳篦若作禪鎮比丘坐禪時聽作禪鎮置額上以自警覺十誦云禪鎮作孔已以繩貫孔中繩頭施粈挂耳上去額前四指著禪鎮禪鎮一墮聽一舒脚二墮二舒脚三墮應起行若作熏鼻筒律攝云吸烟鼻筒此筒法長十二指以鐵作或一嘴雙嘴吸烟入鼻可治諸疾如是一切無犯不犯者最初未制戒等第八十七過量作具戒總釋此是不共戒尼制不同大乘同學律攝云由不依量制斯學處此戒二緣合結緣起處佛在給孤獨園時世尊不受請檀越送食諸佛常法若不受請徧行諸房舍見眾僧臥具敷在露地不淨所污時天大暴雨佛以神力令臥具不為雨漬諸比丘還以此因緣告言乃至不為雨漬當知此污是有欲人非是無欲人是有瞋恚人非是無瞋恚人是癡人非是無癡人也若外道仙人離欲者無有此事況阿羅漢若比丘念不散亂而睡眠者無有此事況阿羅漢自今已去聽比丘為障身障衣障臥具故作尼師壇事鈔云為身者恐坐地上有所損故為衣者恐無所替三衣易壞故為臥具者恐身不淨污僧牀榻故不將餘用今時持用禮佛及僧反為恭敬此非聖意起緣人六羣便多作廣長尼師壇訶責結戒迦留陀夷體大尼師壇小不得坐知佛從此道過便在道邊手挽欲令廣大世尊知而故問答言欲令廣大是故挽耳佛告諸比丘聽更益廣長各半磔手當如是說戒所立戒相若比丘作尼師壇當應量作是中量者長佛二磔手廣一磔手半更增廣長各半磔手若過截竟波逸提釋義尼師壇者敷下坐根本云尼師但那唐言敷具謂敷僧臥具上隨時坐臥也長佛二磔手廣一磔手半此明本制數量更增廣長各半磔手則橫量有三尺二寸豎量該四尺也義淨律師云然其大量與自身等頂上餘有一磔手在斯乃與臥具相當若其量小不堪替臥律攝云尼師但那應量重作疊為三分在下一分應截斷作葉與三衣葉同所以南山律祖錯裁坐具天人指授乃作如法以垂後式犯緣此戒具足三緣方成本罪一為己作二違教過量三造作已成定罪此中犯者作尼師壇若長過量廣不過量廣過量長不過量廣長俱過量若自作若教他作成波逸提不成突吉羅若為他作成不成突吉羅僧祇云尼師壇是隨坐衣不得作三衣不得淨施及取薪草盛巨磨唯得敷坐若道路行得長疊著衣囊上肩上擔十誦云應截斷已悔過若未截僧應勅令截尼等四眾突吉羅是謂為犯開緣不犯者應量作或減量作若從他得已成者裁割如量若疊作兩重無犯不犯者最初未制戒等犯緣定罪開緣後三戒並同會詳戒壇經云尼師壇如塔之有基也汝今受戒即五分法身基也良以五分由戒而成若無坐具以坐汝身則五分定慧無所從生第八十八過量作覆瘡衣戒總釋此是不共戒尼不同制大乘同學律攝云由諸苾芻過量而作制斯學處緣起處佛在給孤獨園諸比丘患瘡疥膿血流出污衣污臥具佛言聽畜覆瘡衣諸比丘覆瘡衣粗多毛著瘡舉衣患痛佛言聽大價細輭衣覆瘡上著涅槃僧若至白衣家請坐時應語言我有患若主人言但坐當褰上涅槃僧以此衣覆瘡而坐起緣人六羣便多作廣長覆瘡衣諸比丘問佛制三衣不得過此是何衣六羣言是覆瘡衣諸比丘嫌責白佛呵責結戒所立戒相若比丘作覆瘡衣當應量作是中量者長佛四磔手廣二磔手裁竟過者波逸提釋義覆瘡衣者有種種瘡病持用覆身長佛四磔手廣二磔手者長有六尺四寸廣則三尺二寸此為定量裁竟過者成犯犯緣如上過量作具戒定罪此中犯者如前不異十誦云乃至瘡瘥後十日若過是畜波逸提應同長衣犯捨墮僧祇云若屈量縮量水洒量欲令乾已長大作成波夜提受用越毗尼罪尼等四眾突吉羅是謂為犯開緣不犯者亦如前同第八十九過量作雨衣戒總釋此是不共戒尼不同制大乘同學律攝云由諸苾芻過量而作制斯學處緣起處佛在給孤獨園毗舍佉母作雨浴衣遣人持詣僧伽藍中與諸比丘起緣人六羣聞聽作雨浴衣便多作廣大雨浴衣諸比丘白佛訶責結戒所立戒相若比丘作雨浴衣應量作是中量者長佛六磔手廣二磔手半過者裁竟波逸提釋義雨浴衣者諸比丘著在雨中洗浴長佛六磔手廣二磔手半長有九尺六寸廣有四尺是為應量若過量裁竟悔罪犯緣定罪開緣並如前會詳薩婆多云凡比丘浴若露覆室要不共白衣及覆上身要當著竭支即僧祇支是掩腋衣也一當有羞愧二喜生他欲想故昔有羅漢比丘洗浴有一比丘見其身體鮮淨細輭便生欲心後不久男根墮落即有女根休道為俗生子後遇見便識知本所因羅漢教令悔過用心純至還得男根故宜不露形也婬持戒大比丘及沙彌罪同破七寶塔勸人令出家精進斯福同塔也第九十與佛等量作衣戒總釋此是不共戒尼不同制大乘同學律攝云由招譏過制斯學處緣起處佛在釋翅搜尼拘類園中尊者難陀短佛四指此云歡喜是佛親弟姨母大愛道生與佛身相似有三十相唯少白毫相千輻輪相身長一丈五尺四寸四月九日生佛後度令出家為說胎經獲阿羅漢果於佛聲聞弟子中善護諸根能防外境最為第一諸比丘遙見彼來謂是佛來即起奉迎至乃知是難陀彼此慚愧諸比丘白佛佛制難陀比丘著黑衣起緣人六羣與如來等量作衣或過量作諸比丘白佛訶責結戒所立戒相若比丘與如來等量作衣或過量作者波逸提是中如來衣量者長佛十磔手廣六磔手是謂如來衣量釋義等量過量下明制戒法以下明定衣量如來衣量者長佛十磔手廣六磔手薩婆多云佛身丈六常人半之衣量廣長皆應半也佛弟難陀短佛四指衣應減長中一尺廣中四寸難陀先著上衣佛著中衣今不聽過等聽著下衣常人則下中下也又佛衣如金詰施加毛㲲色亦爾故難陀衣宜當覆沙令同比丘衣色文覆沙者此云壞色准量則佛衣長一丈六尺廣有九尺六寸謂以長短壞色用別如來衣之色量也犯緣定罪開緣亦如前戒會詳僧祇云作時或減量不得過量當隨自身量是僧伽黎有三種上者長五肘廣三肘中者長五肘一不舒手廣三肘一不舒手下者長四肘半廣三舒一不舒手多羅僧亦爾安陀會上中二種亦爾下者長四肘半廣二肘一不舒手律攝云若減此量不得罪若過五肘已上皆得惡作五分云肘量長短不定佛令隨身分量律云度身而衣故也三結問諸大德我已說九十波逸提法今問諸大德是中清淨不三問四勸持諸大德是中清淨默然故是事如是持六四悔過法分四初總標二別列戒相三結問四勸持初總標諸大德是四波羅提提舍尼法半月半月說戒經中來釋波羅提提舍尼者此無正翻事鈔准義翻向彼悔從對治境以立名律攝問曰自餘諸罪亦聽對說云何於此得對說名答曰謂於住處現有苾芻皆須一一別對陳說不同餘罪故受別名又犯罪已即須陳說不得停息亦異餘罪詳斯四法事同貪惱由生二過故佛禁之一以飲食長自煩惱二由無厭退他信敬今此悔篇雖次墮章然其罪事逾於逸提二別列戒相分四初從非親尼受食乃至第四恐怖處取食也第一受非親尼食戒總釋此是不共戒尼不同制大乘但觀可受不可受不問親里非親里然在末世與尼疎絕為是律攝云由苾芻尼事譏嫌煩惱制斯學處此戒四緣合結緣起處佛在給孤獨園時世穀貴人民譏餓乞求難得起緣人蓮華色比丘尼乞食所得盡持與比丘如是三日不得食有長者乘車覲王驅人避道尼因避道墮深泥中面掩地而臥長者慈愍勅人扶起問知其故譏嫌比丘不知義讓諸比丘聞白佛訶責結戒諸比丘不敢受親里尼食佛言聽受病比丘疑不敢受非親尼食佛言聽受非親尼持食置地不敢取或使人授與亦不敢取佛言聽受當如是說戒所立戒相若比丘入村中從非親里比丘尼若無病自手取食食者是比丘應向餘比丘悔過言大德我犯可訶法所不應為我今向大德悔過是法名悔過法釋義邨中者必以村中成犯薩婆多云若天祠中多人聚中與若沙門住處與聚落外與比丘尼坊舍中與不犯非親如前病者僧祇云不謂小小病謂疥癩黃爛瘡病癰痤人所惡賤是名為病自手取食食者自手取食者顯非置地與使人持與謂手從尼授受食者必須入咽而得罪故曰自手取食食也是比丘應向餘比丘悔過言此犯罪比丘應向餘清淨持戒者對說悔罪悔過言者即自陳首所犯事下文乃是悔詞大德我犯可訶法正陳罪體所不應為世尊所遮非比丘所應為事自責之詞也我今向大德悔過不敢覆匿而陳露也僧祇云前人應問汝見罪不答云見罪語言慎莫更作答言頂戴持是法名悔過法總結上文犯緣此戒具足四緣方成本罪一是村中二身無病三非非親里四自手取食食定罪此中犯者入村中從非親里比丘尼若不病自手受食食咽咽提舍尼五分云若比丘在邨外尼在邨內比丘在村內尼在村外若比丘在空尼在地若比丘在地尼在空如是受食皆突吉羅僧祇云非親里尼邊自手受飲食時越毗尼罪食時犯悔過法非親里非親想非親里疑皆犯悔過非親里親里想親里非親里想親里疑皆越毗尼罪親里親里想無犯為餘人受越毗尼罪為病人受無罪尼等四眾突吉羅是謂為犯開緣不犯者受親里尼食若病若置地與使人與若在僧伽藍中若在村外與若在比丘尼寺內與無犯律攝云若尼為施主施食非乞得受取無犯不犯者最初未制戒等第二不止尼指授食戒總釋此是不共戒尼不同制大乘同學律攝云由飲食事譏嫌煩惱制斯學處緣起處佛在給孤獨園起緣人多比丘與六羣在白衣家內食六羣尼為六羣索羮飯與此羮與此飯而捨中間不與乃越次與六羣而食之諸比丘嫌責白佛訶責結戒所立戒相若比丘至白衣家內食是中有比丘尼指示與某甲羮與某甲飯比丘應語彼比丘尼如是言大姊且止須比丘食竟若無一比丘語彼比丘尼如是言大姊且止須比丘食竟者是比丘應悔過言大德我犯可訶法所不應為我今向諸大德悔過是法名悔過法釋義白衣家內者有男女者是指示與某甲羮與某甲飯指示者即指教檀越偏與其食大姊且止須比丘食竟大姊乃稱呼之詞且止即遮止之語須待比丘食竟或言且止少時待諸比丘食竟或言小住待諸比丘食竟或言小却待諸比丘食竟若止者善不止者第二第三語令止也若無一比丘下結成所犯犯緣此戒具足四緣方成本罪一在白衣家二大尼偏指與食三見聞不止四受食入咽定罪此中犯者若無一比丘語言大姊小止須比丘食竟而食者咽咽提舍尼五分云餘二女眾教益食不語言小却者突吉羅比丘教益食不平等突吉羅僧祇云若不語受者越毗尼罪食者犯悔過法不滿三呵而食者越毗尼罪滿三訶不止食者無罪一人訶已一切食無罪不見不聞者食無罪律攝云若在門外食應問門內無苾芻尼指授食不若不問者得惡作罪若見有尼出入亦應問之若不問者亦得惡作罪尼等四眾突吉羅是謂為犯開緣不犯者若語言大姊且止須比丘食竟若尼自為檀越若檀越設食令尼處分若不故作偏為與此置彼如是一切無犯僧祇云若檀越未曾請僧不知儀法爾時尼得教安置形像教益食法然後應坐不犯者最初未制戒等第三學家受食戒總釋此是不共戒尼不同制大乘同學律攝云由乞食事譏嫌煩惱制斯學處此戒四緣合結緣起處佛在耆闍崛山中起緣人有居士家夫婦俱得信樂為佛弟子諸佛見諦弟子常法於諸比丘無所愛惜乃至身肉若諸比丘至家者常與飯食及諸供養故令貧窮比居譏嫌先大富饒供養沙門釋子反得貧弊諸比丘聞白佛聽僧與居士作學家羯磨結戒有比丘先受學家請疑不敢往佛言聽先請者往病比丘疑不敢受學家食佛言聽受彼置地與若使人與疑不敢取佛言聽受當如是說戒所立戒相若先作學家羯磨若比丘於如是學家先不請無病自手受食食是比丘應向餘比丘悔過言我犯可訶法所不應為我今向大德悔過是法名悔過法釋義學家羯磨者謂夫婦俱登聖果名為學家有一居凡不名學家也學者對無學而言若愛結斷盡則果證無生名曰無學我生已盡羅漢支佛已斷分段生死故說我生已盡梵行已立得有餘果證故說梵行已立所作已辦凡夫人天所不能辦七種學人先所未作虗偽煩惱斷故說所作已辦不受後有羅漢支佛所斷煩惱更不能受後有故說不受後有無法可學故云無學若初二三果俱惑未盡有法須學有惑須斷故曰學也惟此學人處在居家故曰學家謂剎利婆羅毗舍首陀四姓之家羯磨者謂佛聽僧與作遮護法白二羯磨一切比丘不聽至其家而受飲食護世譏嫌增長道意無病自手受食食者此有三開若先受請或病或置地與使人與聖咸開聽外則成犯犯緣此戒具足三緣方成本罪一作學家羯磨二無緣輙受三食已入咽定罪此中犯者先不請又無病於如是學家中自手受食食者咽咽提舍尼尼等四眾突吉羅是謂為犯開緣不犯者若先受請若有病若置地與若從人受取若學家施與後財物還多無犯彼學家財物還多從僧乞解學家羯磨佛言僧應與作白二羯磨解十誦云若居士財物損減不增長若乞不乞不應捨學家羯磨若財物增長乞不乞皆應與捨若不增不減乞應捨不乞不應捨律云時諸比丘皆疑不敢受已解學家羯磨居士食佛言聽諸比丘受食無犯不犯者最初未制戒會詳五分云若婦是聖夫是凡或夫是聖婦是凡皆不應與作學家羯磨若夫婦俱是聖無慳貪心財物竭盡乃與作學家羯磨僧祇云若僧已作學家羯磨者不得如烏鳥遠避射方絕不往應時時往看為說法論法事若學家欲布施者應語且置汝邊我自知時若先請後作羯磨不得取大價重物得取小小輕物若學家言尊者何故不受是施謂我貧耶爾時應語汝不貧如世尊說須陀洹人成就四法於聲聞中為最大富何等四一者於如來應正徧知生堅固信根沙門婆羅門諸天世人所不能壞二者於法生堅固信根三者於僧中生堅固信根四者於戒生堅固信根沙門婆羅門諸天世人所不能壞是為四法成就如來聲聞中不貧最為大富如是說令生歡喜第四恐怖處受食戒總釋此是不共戒尼不同制大乘同學律攝云因生譏謗由飲食事譏嫌煩惱制斯學處此戒四緣合結緣起處佛在釋翅搜尼拘類園中起緣人舍夷城中諸婦女俱棃諸女人舍夷是彼姓氏俱棃是其種姓持飲食詣僧伽藍中供養諸盜賊於道路嬈觸諸比丘聞白佛佛言諸比丘應語諸婦女莫出道路有賊恐怖若已出城應語言莫至僧伽藍有賊恐怖與比丘結戒時諸檀越先知有疑恐怖而故持食來比丘疑不敢受佛言先語檀越聽受諸病比丘亦疑不敢受佛言聽受時有施主以食置地與若教人與亦不敢受佛言聽受當如是說戒所立戒相若比丘在阿蘭若逈遠有疑恐怖處若比丘在如是阿蘭若處住先不語檀越若僧伽藍外不受食在僧伽藍內無病自手受食食者應向餘比丘悔過言大德我犯可訶法所不應為我今向大德悔過是法名悔過法釋義在阿蘭若迴遠有疑恐怖處阿蘭若者或名阿練若大論翻遠離處薩婆多翻閒諍處天台云不作眾事名之為閒無憒故名之為諍或翻無諍謂所居不與世諍即去聚落五里處也肇法師云忿兢生乎眾聚無諍出乎空間故佛讚住阿蘭若也逈遠者謂遠離城邑寂寥處是先不語檀越比丘請檀越言汝莫出越道路有賊恐怖若已出城應語言莫至僧伽藍中道路有疑恐怖是曰先語檀越者即施主也常能捨施自可越渡貧窮苦海也若無病自手取食食下結成所犯律攝云前三學處過由村舍起此一學處過在空林也犯緣此戒具足四緣方成本罪一恐怖蘭若二不語檀越三無緣開聽四受食入咽定罪此中犯者在阿蘭若逈遠處住若先不語檀越於僧伽藍外不受食僧伽藍內無病自手取食食咽咽提舍尼尼等四眾突吉羅是謂為犯開緣不犯者若先語檀越若有病若置地與若教人與若來受教勅聽法時比丘自有私食令授與無犯五分云若軍行經過與食若賊自持食與不犯不犯者最初未制戒等三結問諸大德我已說四波羅提提舍尼法今問諸大德是中清淨不三問四勸持諸大德是中清淨默然故是事如是持
