body:
  text: 序夫一大藏教岐而為三曰經曰律曰論雖有頓漸大小之殊皆從佛口出以言顯道以道立行總歸之心地法門而已猶若寶鼎三足缺一則傾且覆抑何以立言行樹道德作禁戒之隄防出世之根本也哉故四分戒本為正法關鑰諸佛以之同證菩薩以之同修眾生以之同具者以戒為體以戒為用顯其用則行無不立明其體則道無不備審毗尼之嚴淨殊勝於理於事實踐實履無絲毫假借調御正法以壽世者是以吾佛如來出大圓音諸菩薩弘宣波羅提木叉啟廸像季眾生迷而為愚癡悟而為智慧真妄同源自他普覺乃至世出世間一切果因罪福靡不外乎是經必須行解相應然後弘範三界化導天人惟律藏為甚深妙旨此大部六十卷離而為四故曰四分戒本乃大部中第一分之統要也自西域優波離尊者親承佛囑傳至東土南山澄照悟真允堪元照諸大聖師後先弘化歷代帝主所欽賜褒崇載諸盛典元明以來正法凌彝迨啟禎間千華老人乘願輪而來為東南半壁憧憧受毗尼法者到處蜂攢蟻聚化被之盛兆乎是矣清朝嘉運肇興繼千華而起者南來見者和尚大其家世擴充模範四方稟法之士不啻如星拱月似鳥附鳳四十載旺化南都千萬眾而得定公和尚一人焉公丱歲脫穎博綜內外典籍攷覈律藏全書采法苑之精華闡諸經之奧旨發前賢底蘊繼後啟之芳規自學地而據師位雖萬指雲臻不忘苦心勵志閱有二十餘夏而關要告成豈止加惠來學即近世唱導之師星分碁布忽於行解汲汲于弘戒虗式而實圖利養者得覩是書立能啟其茆塞而登康衢足徵定和尚護持正法之心誠良且溥矣嗚呼余生謭劣蕪陋不文之言奚足為是書之重然竊喜南山之道言行相符復觀全鼎於今日以救三學之通獘作季法大光明幢者吾于華山三世幸千載一遇云爾康熙戊辰歲春仲潤州夾山弟大珍拜撰毗尼關要目次卷第一序釋本題目釋初讚頌釋前方便釋白羯磨釋戒經序卷第二釋四波羅夷法第一婬戒第二盜戒卷第三釋四波羅夷法第三殺戒第四妄語戒卷第四釋十三僧伽婆尸沙法自第一法至第八法卷第五釋十三僧伽婆尸沙法自第九法至第十三法釋二不定法卷第六釋三十尼薩耆波逸提法自第一法至第六法卷第七釋三十尼薩耆波逸提法自第七法至第十九法卷第八釋三十尼薩耆波逸提法自第二十法至第三十法卷第九釋九十波逸提法自第一法至第十二法卷第十釋九十波逸提法自第十三法至第三十法卷第十一釋九十波逸提法自第三十一法至第四十二法卷第十二釋九十波逸提法自第四十三法至第六十一法卷第十三釋九十波逸提法自第六十二法至第七十七法卷第十四釋九十波逸提法自第七十八法至第九十法釋四悔過法卷第十五釋眾學法卷第十六釋七滅諍法釋總結名目釋勸學餘法釋七佛戒經釋結勸迴向毗尼關要目次終
