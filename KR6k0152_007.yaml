body:
  text: 清金陵寶華山律學沙門德基輯第七過受衣戒總釋此是共戒尼結亦同大乘不同制隨施應受此是制罪煩惱同前制斯學處緣起處佛在舍衛國給孤獨園起緣人時有衆多比丘遇賊失衣來到祇桓精舍時有優婆塞聞諸比丘遇賊失衣多持好衣來隨諸比丘意取諸比丘報言止止便為供養已我等自有三衣不須也六羣比丘語言何不取與我等若與餘人耶而諸比丘三衣具足取居士衣與六羣及與餘人少欲比丘嫌責白佛呵責已結戒所立戒相若比丘奪衣失衣燒衣漂衣若非親里居士居士婦自恣請多與衣是比丘當知足受衣若過者尼薩耆波逸提釋義若失一衣不應取若失二衣餘一衣若二重三重四重應擲作若僧伽黎若多羅僧若安陀會若三衣都失彼比丘應知足受衣知足有二種在家人知足出家人知足在家人知足者隨白衣所與衣受之謂隨俗人所施衣應受縱少不足不應更從乞索也出家人知足者三衣也謂三衣既足不應更受故云出家人知足若居士自恣請多與比丘衣自恣請者善見律云檀越語比丘言若有所須隨意取是名自恣請若衣細若衣薄若不牢應取作二重三重四重當安緣當肩上應貼障垢膩處律攝云若三衣肩上垢膩污者於著肩處應以物替長一肘半廣一張手四邊縫著污即拆洗也文律制本貼在內今人以障肩外謂是須彌山訛也應安鈎紐若有餘殘語居士言此餘殘衣裁作何等若檀越言我不以失衣故與我自欲與大德耳彼若欲受者便受作衣之餘告主令知即名知足受若過下成犯犯緣此戒具足三緣方成本罪一為失衣故施二貪心過受三衣財入手定罪此中犯者若比丘過知足受衣捨墮捨懺不還等得罪同前善見云若比丘尼失五衣得受二衣若失四衣得受一衣若失三衣不得受若親友檀越自恣請若自己物隨意受比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者若知足取若減知足取若居士多與衣若細薄不牢若兩重三重四重作衣安緣貼障垢膩處安鈎紐若有餘殘衣語居士言作何等若居士言我不以失衣故與自欲與大德若欲受便受無犯不犯者最初未制戒等第八求益衣價戒總釋此是共戒尼犯亦同大乘同制即是惡求多求而不知足此是制罪律攝云因相觸惱制斯學處此戒二緣合結緣起處佛在舍衛國一乞食比丘入城乞食聞居士夫婦共議跋難陀是我知舊當持如是衣價買如是衣與彼乞食比丘還見跋難陀即告上事問知其家起緣人跋難施明日往語言若欲與我衣者當如是廣大作新好堅緻中我受持若不中我受持何用是為居士譏嫌比丘白佛訶責結戒戒文如後唯無先不受自恣請後居士自恣請比丘言大德須何等衣比丘意疑不敢答又有居士欲作貴價衣比丘知足欲須不如者亦意疑不敢隨意索佛言受自恣請者不犯當如是説戒所立戒相若比丘居士居士婦為比丘辦衣價買如是衣與某甲比丘是比丘先不受自恣請到居士家如是説善哉居士為我買如是如是衣與我為好故若得衣者尼薩耆波逸提釋義辦如是衣價者若金銀錢真珠琉璃貝玉瓔珞生像金持如是衣價買如是衣與某甲比丘如是衣價者一錢乃至百千錢買如是衣者色謂青黑等量或五肘乃至十五肘體乃粗細等是比丘先不受自恣請未受居士恣意之請到居士家如是説善哉居士善哉居士者善哉讚歎之詞居士稱呼之語欲令所施愈加妙好乃至為好故求有二種一者求價二者求衣求價者檀越與作大價衣求乃至增一錢十六分之一分西國以十六升為斗猶如此方以十六兩為斤求衣者語居士言作如是廣長衣乃至增一錢如是如是衣為好故者律攝云更求新好堅緻謂價色及量悉皆精妙也若得衣者謂要待衣入手成犯犯緣此戒具足四緣方成本罪一有貪好心二未受自恣請三自為己索四衣物入手定罪此中犯者先不受自恣請而往求貴價廣大衣若得衣者捨墮求而不得突吉羅捨懺不還等得罪同前五分云從親里索好者惡作罪薩婆多云若親里豐財多貨從索無過若貧者突吉羅律攝云若從天等乞或乞縷繢及小帛片等無犯比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者先受自恣請而往求索知足減少求從親里求從出家人求或為他求他為己求或不求自得無罪不犯者最初未制戒等第九求合作衣戒並如前緣故不重出合作為異若比丘二居士居士婦與比丘辦衣價持如是衣價買如是衣與某甲比丘是比丘先不受居士自恣請到二居士家作如是言善哉辦如是如是衣價與我共作一衣為好故若得衣者尼薩耆波逸提第十過六反索衣戒總釋此是共戒尼犯亦同大乘同制息世譏嫌長他淨信此是制罪律攝云取不淨財不護他意致生惱亂制斯學處緣起處佛在給孤獨園起緣人羅閲城中有一大臣與跋難陀親友遣使持衣價與跋難陀跋難陀將此使入城持衣價與親舊長者掌之異時大臣問使人言跋難陀著我衣不報言不著即遣使索還衣價跋難陀乃疾疾至長者家語言我今須衣時城中諸長者集會先有制其有不至者罰錢五百長者報言大德小待我赴會還跋難陀不允長者為作衣竟會坐已罷衆人以其不到即輸錢五百長者盡共譏嫌比丘白佛呵責結戒所立戒相若比丘若王若大臣若婆羅門若居士居士婦遣使為比丘送衣價持如是衣價與某甲比丘彼使人至比丘所語比丘言大德今為汝故送是衣價受取是比丘應語彼使如是言我不應受此衣價我若須衣合時清淨當受彼使語比丘言大德有執事人不須衣比丘應語言有若僧伽藍民若優婆塞此是比丘執事人常為諸比丘執事時彼使往至執事人所與衣價已還比丘所如是言大德所示某甲執事人我已與衣價大德知時往彼當得衣須衣比丘當往執事人所若二反三反為作憶念應語言我須衣若二反三反為作憶念若得衣者善若不得衣四反五反六反在前默然立若四反五反六反在前默然住得衣者善若不得衣過是求得衣者尼薩耆波逸提若不得衣從所得衣價處若自往若遣使往語言汝先遣使持衣價與某甲比丘是比丘竟不得衣汝還取莫使失此是時釋義若王若大臣乃至婆羅門居士居士婦此明能施之主遣使為比丘送衣價衣價者即金銀錢寶及生像金等持如是衣價與某甲比丘此明受施之人如是衣價者或百錢乃至千錢等彼使人至比丘所乃至我不應受此衣價謂比丘法不應自為受畜金銀七寶等是不淨物非比丘法故不應受我若須衣合時清淨當受謂順比丘須用之時或順比丘開畜之時故曰合時清淨者謂駝毛緂等由體不淨不堪為衣受持必須如法清淨也彼使語比丘言大德有執事人不乃至常為諸比丘執事言僧伽藍民者謂充僧給使也此有二別一曰淨人二曰守園人云何淨人苾芻告淨人曰清淨之業應可作之不清淨事皆不應作由作淨業故曰淨人若但防護住處名守僧園人緣從波斯匿王所施為僧給使常事比丘言優婆塞者義名信士男亦云清淨士正翻近事男近事者親近承事諸佛法故又翻為近住言受持戒行堪近僧住為比丘執作衆事故云常為諸比丘執事也此謂比丘指示執事人處謂在某城某村某處名某甲是我執事人時彼使往至執事人所與衣價已乃至大德知時往彼當得衣謂彼使人付衣價已還報比丘我已與衣價大德當自知時或須用之時或合畜之時應往彼執事人所當得如是清淨衣須衣比丘當往執事人所若執事人若在家若在市若在作處二反三反語言我今須衣與我作衣為作憶念者是謂告彼令知憶念不忘故云憶念也若二反三反為作憶念得衣者善謂隨求即獲不假六反默然而得故云善也若不得衣四反五反六反在前默然立此戒體正在三反往索六反默然住得衣無過過此則犯僧祗云三反往索六反默然住時或緩期或急期若比丘至檀越所索衣時答言尊者更一月來比丘滿一月往索若復言更一月來比丘滿一月復往索若復言更一月來比丘又滿一月復往索過三月已不得復索若言半月來過三半月不得復索若言十日五日四日三日二日一日乃至三須臾過三須臾不得復索六反往默然住時檀越言我知尊者來意更一月來如是過六月乃至六須臾不得復往默然善見云云何默然口不語立不坐檀越教坐不得坐若與飲食不得受若請説法呪願悉不為説若檀越問言何因緣來至此答居士自當知是為默然僧祗云齊幾名默然住時如人入庫取物著店上頃又如褁襆物頃即應去若比丘作一語破二反默然作二語破四反默然作三語破六反默然善見云若不口語索得十二默然求若一語索破二默然乃至六語索破十二默然犯緣此戒具足三緣方成本罪一貪心希取二違制過索三衣物入手定罪此中犯者過三反語索過六反默然住若得衣者捨墮不得突吉羅捨懺不還等得罪同前十誦云是比丘語衣主已有餘因緣到執事處若問何故來答言我有餘事故來若言持衣去答言我已語衣主汝可往自分了若言但持去我自解語衣主爾時受衣持去不犯根本云若苾芻遣使報已執事人來作是語聖者可受此衣應報言此衣我已捨訖汝當還彼送衣來處如是報者善若受衣者捨墮若執事人言聖者可受此衣彼之施主我共平章令其心喜若如是者取衣不犯比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者三反語索得衣六反默然立得衣若不得衣從所得衣價處若自往若遣使往語言汝先遣使與某甲衣是比丘竟不得衣可還取莫使失若彼言我不須即相布施是比丘應以時軟語方便索衣僧祗云若語物主時物主言我先施比丘隨方便更索爾時得如前三反語索六反默然住若為作波利迦羅衣故與以時索軟語索方便索得者不犯不犯者最初未制戒等第十一蠶綿作臥具戒總釋此是不共戒尼制不同大乘為衆生故得受但不得受用以慈悲為體律攝云殺諸生命增長貪求廢自善品損他正信制斯學處緣起處佛在曠野國界起緣人六羣作新雜野蠶綿臥具至養蠶家語言我等須綿報言小待須蠶熟時來六羣在邊住待看彼曝繭時蠶蛹作聲蛹者蠶所化為蛹蛹化為蛾也居士譏嫌無有慚愧害衆生命諸比丘聞白佛呵責結戒所立戒相若比丘雜野蠶綿作新臥具尼薩耆波逸提釋義雜者若毳若劫貝拘遮羅乳葉草若芻摩若麻毳者乃獸毛細者是拘遮羅乳葉草未見翻譯也野蠶綿者薩婆多云此國養蠶如秦地人法蠶熟得綿名憍奢耶僧祗云憍奢耶有二種一者生二者作生者細絲作者紡絲善見云雜者乃至若經若緯雜憍賒耶一毛尼薩耆憍賒耶一毛者絲中微細者是也作新臥具律攝云新者有二種一謂新造二謂新得此據新造薩婆多論云此國以綿作衣法有二種一擘綿布貯如作氈法二以綿作縷織以成衣此二衣名作敷具敷具者衣之都名也作者若自作若使他作故名作新臥具犯緣此戒具足三緣方成本罪一貪慢心二為己求三臥具已成定罪此中犯者自用雜野蠶綿作臥具成者捨墮作而不成突吉羅若語他人作成者捨墮作而不成突吉羅為他作成不成突吉羅此應捨是中捨者若以斤斧細銼斬和泥若塗壁若塗埵五分云雖不自作不使他作他施而受亦捨墮律攝云或他告言我為仁作高世耶衣意欲得故而不止遂貪心故亦得本罪尼等四衆突吉羅是謂為犯開緣不犯者若得已成者以斤斧銼斬和泥塗壁塗埵無犯不犯者最初未制戒等會詳緇門警訓引央掘經云繒綿皮物若展轉來離殺者手施持戒人不應受者是比丘法若受者非悲不名破戒涅槃經云皮革履屣憍奢耶衣如是衣服悉皆不畜是正經律楞嚴經云若諸比丘不服東方絲綿絹帛及此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界何以故服其身分皆彼緣故東方者此東震旦國也震旦東方屬震是日出之方故云震旦樓炭經云𦵇河以東名為震旦以日初出耀於東隅故得名也此土者西竺五印土也印度梵語唐言月月有多名斯其一稱良以聖賢繼軌導凡御物如月照臨由是義故謂之印度東方不無裘毳西土不無絲綿各以多分言之也衆生身分身既不服真解脫者酬還宿債不遊三界經語甚倒知之服其身分皆彼緣故如人食其地中百穀足不離地衆生身分況食況服豈能出離三界乎高僧傳載南嶽道休二師不衣綿並服艾絮故南山云佛法東漸幾六百載惟斯衡嶽慈行可歸南嶽慧思禪師少以慈恕聞於閭里常夢梵僧勸出俗乃辭親入道及稟具常習坐禪得宿命通後悟法華三昧最上乘門於陳光大六年將四十僧徑趣南嶽乃告曰吾寄此山止期十載心事遠遊師習慈忍奉菩薩三聚淨戒衣服率布寒加之以艾絮道休禪師恆以頭陀為業住雍州新豐福祿寺南囇山幽谷結草為庵一坐七日乃出之出山乞食施説禁戒誨人慈善如是積四十年貞觀三年夏內依期不出端拱而卒然休師出家以來常但三衣不服繒纊以傷生也所著布衣積有年稔塵朽零破見者心寒故知休之慈救與衡嶽同風薩婆多云為止誹謗故長信敬故行道安樂故不害衆生故而結此戒第十二黑羊毛作具戒總釋此是不共戒尼犯不同大乘同制律攝云由愛上色復求細軟廢業長貪遮無益故制斯學處緣起處佛在毗舍離獼猴江邊住樓閣諸梨車子多行邪淫作純黑羺羊毛氈被體夜行使人不見言梨車子者善見云往昔波羅奈國王夫人懷妊月滿生一肉段無有手足恐王見必生惡賤即取盛則器中打金作薄以朱砂書題云是波羅奈國王夫人所生蓋覆器頂以王印印之使人送放江中諸鬼神營護使無風浪驅沒爾時有一道士清朝往江邊澡面遙見此器近已而取又見金薄朱字復見王印印上便開器看唯見一肉段而作是念若是死肉久應臭爛必有異相即取將去安於好處過半月已而成兩片復經半月二片各有五胞又過半月一片成男一片成女男作黃金色女作白銀色道士見已心生愛重如自生子以慈心力故兩手拇指自然出乳而養二子乳入子腹譬如清水入摩尼珠內外明徹道士號兒名離車子後牧牛人見道士養子疲勞即從乞此二子供養後此二子打牧牛人子諸子告父母言此無父母人打我父母報言他若打汝即應避去梵語離車此云避去亦翻薄皮又翻同皮後年十六歲見地平博縱廣一百由旬起立舍宅以男立為王女為王夫人後時王子漸多各立舍宅故號毗舍離城離車子所居離車是其種姓正音云栗呫婆此云仙施王種起緣人六羣便效而作梨車言大德我等在於愛欲為淫欲故作汝等作此何所為耶諸比丘聞白佛訶責結戒所立戒相若比丘以新純黑羺羊毛作新臥具者尼薩耆波逸提釋義新者薩婆多論云言新者非故若得朽壞黑羊毛作敷具無犯純黑毛者或生黑或染黑純者不雜也羺羊毛羺䍲乃胡羊之名通俗文云羊卷毛謂之羺䍲僧祗云此毛大貴或一錢得一兩乃至二三四金錢得一兩然此毛極細軟觸眼睛不淚出甚為難得故不聽純黑羊毛也作新臥具者薩婆多云黑羊毛作衣法亦二種一以黑毛擇治布貯作細氈二作縷織成衣此二種衣盡名敷具敷具衣之總名也此毛作三衣盡中受持犯緣此戒具作三緣方成本罪一貪心自為二純黑無雜三作具已成定罪此中犯者自以純黑羺羊毛作新臥具成者捨墮作而不成突吉羅教他作成捨墮不成突吉羅為他作成不成突吉羅捨懺不還等得罪同前薩婆多云若以駝毛羖羊毛牛毛若芻麻劫貝褐衣欽婆羅合作者皆突吉羅十誦云不犯者為塔為僧作尼等四衆突吉羅是謂為犯開緣不犯者若得已成者若割截壞若細薄揲作兩重細薄摺作雙重即是小坐具故不犯若褥若作枕若作方小坐具若作臥氈或作襯鉢內氈或剃刀囊或作帽或作襪或作鑷熱巾或作褁革屣巾盡無犯不犯者最初未制戒等第十三不雜色作臥具戒總釋此是不共戒尼犯不同大乘同制內尊僧制外護譏嫌惱事同前緣起處佛在給孤獨園起緣人六羣以純白羊毛作新臥具諸居士譏嫌似王大臣西域以白為上色王與大臣方著故言似王大臣也諸比丘聞白佛訶責結戒所立戒相若比丘作新臥具應用二分純黑羊毛三分白四分牻若比丘不用二分黑三分白四分牻作新臥具者尼薩耆波逸提釋義黑義如上白者或生白或染令白牻者頭上毛耳毛若腳毛若餘牻色毛牻者雜色毛也律攝云粗惡者謂頭足腹毛由頭足腹是行動處毛粗惡也若欲作四十鉢羅羊毛臥具者二十鉢羅純黑十鉢羅白十鉢羅牻若欲作三十鉢羅臥具者十五鉢羅黑七鉢羅半白七鉢羅半牻若作二十鉢羅臥具者十鉢羅純黑五鉢羅白五鉢羅牻十誦云一鉢羅四兩律攝云若作十斤毛褥五斤純黑二斤半白二斤半粗若更增減準此文謂以十斤毛分作四分純黑者應用二分故云二分黑白者用一分即四分中第三分故曰三分白牻者亦用一分即第四分故曰四分牻依制而作若比丘不用下違制成犯犯緣此戒具足三緣方成本罪一貪心自為二黑白過分三作具已成定罪此中犯者不以二分黑三分白四分牻自作新臥具成捨墮不成突吉羅若使他作成捨墮不成突吉羅若為他作成不成突吉羅捨懺不還等得罪同前十誦云用黑乃至多一兩捨墮用白乃至多一兩突吉羅用牻乃至減一兩捨墮僧祇云二分者多用黑毛而作等想等用作減想而更益第三分多用白毛而作等想等用作減想而更益四分者少用下毛而作等想若自作教他作成捨墮受用越毗尼罪律攝云或黑者易得餘色難求斤數減增並成無犯比丘尼及三小衆突吉羅是謂為犯開緣不犯者若二分黑三分白四分牻作若白不足以牻足之若作純牻者若得已成者割截壞若作壞色者作枕若作氈若褥若作臥氈若作小方坐具若作襯鉢氈若作剃刀囊若作襪作鑷熱巾作褁革屣巾一切無犯不犯者最初未制戒等十四減六年臥具戒總釋此是不共戒尼犯不同大乘同制菩薩少欲知足心無多求律攝云為遮不樂用故受新好者制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人六羣嫌臥具或重或輕或薄或厚不捨故臥具更作新者如是常營求臥具藏積衆多諸比丘聞白佛呵責結戒唯無除僧羯磨有比丘得乾痟病糞掃臥具極重有小因緣欲人間遊行不堪持行告同意比丘白佛佛言聽僧與彼作白二羯磨自今已去當如是説戒所立戒相若比丘作新臥具持至六年若減六年不捨故更作新者除僧羯磨尼薩耆波逸提釋義作新臥具持至六年僧祗云作者若自作若使人作新者初成律攝云六年持者縱不樂畜亦須六年滿除僧羯磨薩婆多云僧羯磨已得從檀越乞衣具作衣此戒體斷多貪多畜犯緣此戒具足四緣方成本罪一貪心自為二減六年三不捨故作新四作具已成定罪此中犯者減六年不捨故更作新臥具成捨墮作而不成突吉羅若使他作成捨墮不成突吉羅若為他作成不成突吉羅捨懺不還等得罪同前此戒體若作衣已六年內不得從檀越乞羊毛縷種種衣具作應量衣隨織成已捨墮薩婆多云此戒體自有衣財作若買得衣財作皆不犯僧祇云應當自疏記失受持故氈年月日數病差已還受持此故氈從前滿六年若病差不還補六年捨墮比丘尼及三小衆突吉羅是謂為犯開緣不犯者僧聽及滿六年減六年捨故更作新者若復無故者自作若他作與若得已成者無犯不犯者最初未制戒等第十五坐具不貼故者戒總釋此是不共戒尼犯不同大乘同學律攝云為欲遮其輕賤心故制斯學處緣起處佛在給孤獨園遣人請食諸佛常法諸比丘受請後遍行諸房僧祗云世尊以五事利益故五日一按行僧房一者聲聞弟子不著有為事不二者不著世俗言論不三者不著睡眠妨行道不四者觀病比丘不五者為年少新出家比丘見如來威儀庠序起歡喜心見故坐具處處狼藉無人收攝聽諸比丘作新坐具取故者縱廣一磔手貼著新者上壞色故起緣人六羣不遵佛誨諸比丘白佛訶責結戒所立戒相若比丘作新坐具當取故者縱廣一磔手貼著新者上壞色故若作新坐具不取故者縱廣一磔手貼著新者上用壞色故尼薩耆波逸提釋義作新坐具時若故坐具未壞未有穿孔當取浣染治牽挽令舒裁割取縱廣一磔手貼新者上若貼邊若中央壞色縱者豎也廣者橫也謂橫豎一磔手善見云若不能貼細劈雜新者作亦得五分云佛一磔手方二尺壞色者隨意覆新者上文言二尺者即今時一尺六寸也若作新坐具不取故者下違制成犯犯緣此戒具足三緣方成本罪一貪好自為二有故不貼三作新已成定罪此中犯者不取故者貼新者上捨墮不成突吉羅若令他作成捨墮不成突吉羅若為他作成與不成突吉羅捨懺不還等得罪如上十誦云若減取作乃至半寸突吉羅摩得勒伽云若離宿不須捨但作突吉羅悔過比丘尼及三小衆突吉羅是謂為犯開緣不犯者截取故者貼新者上壞色故彼自無得更作新者若他為作若得已成者若純故者作不犯不犯者最初未制戒等第十六持羊毛過三由旬戒總釋此是不共戒尼犯不同大乘同學應息世譏嫌長他淨信律攝云因譏嫌故制斯學處緣起處佛在給孤獨園起緣人跋難陀得羊毛貫杖頭擔在道行居士譏嫌沙門釋子云何販賣羊毛諸比丘聞白佛訶責結戒所立戒相若比丘道路行得羊毛若無人持得自持乃至三由旬若無人持自持過三由旬尼薩耆波逸提釋義若比丘在道行若在住處得羊毛須者應取若無人持謂無淨人及優婆塞等自持至三由旬僧祗云三由延者五肘弓二千弓名一拘盧舍四千弓半由延八千弓一由延十六千弓二由延二十四千弓為三由延自擔齊三由旬若有人持應語彼人言我今有此物當助我持乃至彼處比丘於此中間不得助持若無人持下違制成犯犯緣此戒具足三緣方成本罪一貪心多擔二所擔羊毛三持過限齊定罪此中犯者持過三由旬捨墮若有人持助持過三由旬突吉羅若令餘四衆持過三由旬突吉羅除羊毛若持餘拘遮羅若乳葉草等過三由旬突吉羅若復擔餘物著杖頭行者亦突吉羅捨懺不還等得罪同前善見云至三由旬已放地若以杖撥或以腳轉過三由旬皆捨墮至二三由旬若虎狼賊難擔出三由旬悉捨墮若三由旬內為賊劫奪劫奪已復還比丘比丘復得擔三由旬不犯五分云應使淨人擔若無淨人乃聽自持不得擔擔頭戴背負犯者突吉羅摩得勒伽云比丘空中持羊毛去與化人持去皆突吉羅比丘尼及三小衆突吉羅是謂為犯開緣不犯者若持至三由旬若減三由旬若有人與持者語使持乃至某處中間更不助擔若使尼等四衆擔三由旬若毳裝獸毛褥也毳繩若擔頭毛項毛腳毛若作帽若作鑷熱巾若褁革屣物盡無犯不犯者最初未制戒等第十七使尼染羊毛戒總釋此是不共戒尼制不同大乘同學法運像末宜當護世譏嫌迹絶尼寺之塵律攝云因廢正修制斯學處此戒二緣合結緣起處佛在釋翅搜迦維羅衛尼拘律園釋翅搜者釋種也此云能仁住處迦維羅衛訛也應云迦毗羅皤窣都迦毗羅此云黃色皤窣都此云所依處上古有仙名曰黃頭依此修道西域記云劫比羅伐窣堵劫比羅亦仙人之名也因劫比羅仙灑水為界以立城故曰劫比羅伐伐者梵音此云城也或云迦毗羅衛或名迦夷此云赤澤竺法蘭對漢明帝云迦毗羅衛者大千之中也此土夏至之日猶有餘陰天竺則無故云大千之中也尼拘律西域尼拘律陀樹即東夏楊柳名雖不同樹體是一西僧指楊柳始體言意其後東僧往彼識尼拘律是東夏之楊柳兩土方言一時洞曉了焉此園在赤澤城南三四里如來成道還國遣信語父王如來不住王宮即於此園造大精舍一十六所其諸小者總六十四諸院之中皆有重閣如祗陀林等無有異佛於中住度八王子及五百釋迦種以樹彰名故曰尼拘律園起緣人六群取羊毛作新坐具使摩訶波闍波提比丘尼染染色污手或云瞿曇彌是姓也或云憍曇彌或云瞿夷皆女聲呼也若男聲呼云瞿答摩此云地最勝往禮世尊佛問知其故訶責六羣結戒不得使比丘尼浣染擘羊毛諸比丘疑不敢使親里尼浣染擘佛言聽親里者得浣染擘當如是説戒所立戒相若比丘使非親里比丘尼浣染擘羊毛者尼薩耆波逸提釋義浣染擘羊毛浣者下至以水一漬染者下至一人染汁擘者下至擘一片犯緣此戒具足三緣方成本罪一貪心自為二尼非親里三如教而作定罪此中犯者使非親里比丘尼浣染擘羊毛者三捨墮若使浣染擘彼浣染而不擘或浣不染而擘或不浣而染擘皆二捨墮一突吉羅使浣染擘彼不浣染擘三突吉羅使非親里式叉摩那沙彌尼浣染擘者突吉羅捨懺不還等得罪同前薩婆多云使浣染僧物突吉羅比丘尼及三小衆突吉羅是謂為犯開緣不犯者使親里尼浣染擘若為病人浣染擘若為衆僧為佛為塔浣染擘無犯不犯者最初未制戒等問使尼浣染僧物論中結罪四分無犯二義何從答若假托浣染僧物往反當依論結罪若心實為僧應準四分開聽會詳薩婆多云結戒者為增上法故若諸比丘尼衆執作浣染廢息正業則無威德破增上法故又為止惡法次第因緣故又為二部衆各有清淨故結此戒也第十八受金銀戒總釋此是共戒尼制亦同大乘不同制為衆生故聽受然須淨人掌舉設無淨人者心不染著亦得自捉若貪心自畜即是多欲不知足是名染污犯此是制罪律攝云因起譏嫌制斯學處緣起處佛在耆闍崛山城中有一大臣與跋難陀親舊知識彼大得豬肉即敕其婦留分與之時城中節會日作衆伎樂竟夜不眠大臣兒亦在其中竟夜不眠譏乏問母有殘肉不母言唯有跋難陀分在兒與母錢持此錢更市肉與跋難陀此肉與我母即取錢與肉起緣人跋難陀晨朝詣大臣家大臣婦具告上事跋難陀言若為我故與錢我不須肉即置地與跋難陀得錢持寄市去諸居士譏嫌時王及諸大臣集會共作是言沙門釋子得捉金銀錢沙門釋子不捨金銀錢珍寶珠瓔有一大臣名曰珠髻即語諸大臣言莫作是言沙門釋子得捉金銀錢不捨珍寶珠瓔何以故我自從如來聞沙門釋子不得捉金銀錢捨離珍寶珠瓔珠髻大臣有威勢能善説令諸大臣歡喜信解往白世尊世尊讚其所説多有所益大臣當知日月有四患不明不淨不能有所照亦無威神云何為四阿修羅煙雲塵霧是日月大患阿修羅與天鬪時天用日月以為旗幟由日月威天常勝彼阿修羅心常忿日月欲摧滅之由諸有情業增上力盡其智術不能摧壞遂以手障令暫隱沒沙門婆羅門亦有四患不明不淨不能有所照亦無威神云何為四不捨飲酒不捨淫欲不捨手持金銀不捨邪命自活是為四大患少欲比丘白佛呵責結戒所立戒相若比丘自手捉錢若金銀若教人捉若置地受者尼薩耆波逸提釋義自手捉錢僧祇云自手者若身若身分若身相續身者一切身身分者若手若腳若肘若膝身相續者若僧伽黎多羅僧安陀會覆瘡衣僧伽支雨浴衣若鉢下鉢鍵鎡中此名身相續咸名自手錢者上有文像外圓像天內方像地國號居中以天地人三才合為像故云上有文像隨國土所用者是若金銀翻譯集云梵語蘇伐羅或云修跋拏此云金大論云出山石沙赤銅中許慎云金有五色黃金為長久埋不變百陶不輕謂之曰金也梵語阿路巴或云惹多此云銀大論云銀出燒石中爾雅云白金謂之銀其美者謂之鐐若教人捉若置地受者謂不從手受如前因緣中以錢置地與也薩婆多云此戒體正以畜寶制戒不為捉故若捉他寶若捉自説淨寶但捉故得波逸提非此戒體是九十事捉寶戒非此戒攝也犯緣此戒具足三緣方成本罪一貪心自畜二無難輒開三捉國所用錢寶定罪此中犯者自手捉金銀若錢教人捉若置地受捨墮此應捨是中捨者若彼有信樂守園人若優婆塞當語言此是我所不應汝當知之此是對俗捨寶法墮罪向一清淨比丘悔若彼人取還與比丘者比丘當為彼人物故受敕淨人使掌之若得淨衣鉢針筒尼師壇應貿易受持之若彼優婆塞取已與比丘淨衣鉢尼師壇若針筒應取持之若彼取已不還者令餘比丘語言佛有教為淨故與汝應還彼比丘物若彼取已不還餘比丘不語者當自往語言佛有教為淨故與汝汝今可與僧與塔與和尚同和尚與阿闍黎同阿闍黎與諸親舊知識若還本主何以故不欲使失彼信施故若不語彼人知是看是者突吉羅即是淨語第三分云有比丘在冢間得錢自持來佛言不應取彼比丘須銅佛言打破壞相然後得自持去根本云若為修營房舍等事應求草木車乘人工不應求金銀錢等若捉方國共所用錢犯捨墮若捉非方國所用錢得惡作罪若捉赤銅鍮石銅鐵鉛錫者不犯律攝云若安居時施主持衣價與苾芻衆即作委寄此施主心而受取之應可信敬淨人居士為淨施主作施主物想執捉無犯若無施主可得應持金銀等物對一苾芻説言具壽存念我某甲得此不淨財當持此不淨財換取淨財如是三説應自持舉或令餘人舉之今時末運此法易行古今咸採取之斷宜遵奉矣若苾芻於行路中得金銀等為道糧故應自持去或令淨人及求寂持去應知求寂於金銀等但制自畜不遮捉持比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者若語言知是看是即是淨語若彼有信樂優婆塞守園人當語彼人言此物我所不應汝當知之若彼人受已還與比丘者比丘當為彼人物故受與淨人掌之後若得淨衣鉢針筒尼師壇得貿易持之若彼人取已與淨衣鉢若坐具針筒尼師檀應取持之若彼人不肯與者餘比丘當語其人言佛有教為淨故與汝應還彼比丘物若彼人不與自往語言佛教比丘作淨故與汝當與塔與僧與和尚同和尚與阿闍黎同阿闍黎與諸親屬知識若教使與本施主不欲令失彼信施故如是一切不犯不犯者最初未制戒等會詳警訓引鈔云一田宅園林二種植生種三貯積穀帛四畜養人僕五養繫禽獸六錢寶貴物七氈褥釜鑊八象金餝床及諸重物此之八名經論及律盛列通數顯過不應又律經言若有畜者非我弟子五分亦云必定不信我之法律由此八種皆長貪壞道污染梵行有得穢果故名不淨也乃至云律中在事小機意狹故多開畜涅槃經云若諸弟子無人供須時世飢饉飲食難得為欲護持建立正法我聽弟子受畜金銀車乘田宅穀米貿易所須雖聽受畜如是等物要須淨施篤信檀越會正記云上明大乘機教俱急下明小乘機教俱緩律在事者違事故輕則顯經宗於理違理故重小機意狹不堪故開反上大乘堪任故重世人反謂小乘須戒大乘通方幾許誤哉第十九貨寶戒總釋此是共戒尼犯亦同大乘同制菩薩應息世譏嫌即是以利求利多欲不知足律攝云因非法貪制斯學處緣起處佛在耆闍崛山起緣人跋難陀往市肆上以錢易錢持去諸居士譏嫌沙門釋子善能賣買諸比丘聞白佛呵責結戒所立戒相若比丘種種賣買寶物者尼薩耆波逸提釋義種種賣買者以成金未成金成未成金成銀未成銀成未成銀及錢互相貿易等已成金者謂已作成瓔珞具一切器皿錢有八種金錢銀錢鐵錢銅錢白鑞錢鉛錫錢木錢胡膠錢犯緣此戒具足三緣方成本罪一自貪息利二是重寶三轉易已成定罪此中犯者種種賣買寶物以成金易成金乃至易錢捨墮捨法同前不異薩婆多云此戒體以重寶與人求息利當與時捨墮此戒直一往成罪不同販賣戒販賣戒為利故買已還賣成罪律攝云若為三寶出納或施主作無盡藏設有馳求並成非犯然此等物出利之時應一倍納質求好保證明作契書年終之日應告上座及授事人皆使同知或復告彼信心塢波索迦比丘尼捨墮三小衆突吉羅是謂為犯開緣不犯者如前若以錢貿瓔珞具為佛法僧若以瓔珞具易錢為佛法僧無犯不犯者最初未制戒等
