body:
  text: 清金陵寶華山律學沙門德基輯第六十二飲蟲水戒總釋此是共戒尼結亦同大乘同制此是性罪律攝云由害衆生命故制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人六羣取雜蟲水飲用居士譏嫌比丘白佛訶責結戒諸比丘不知有蟲無蟲後乃知有蟲或有作波逸提懺或有畏慎者佛言不知不犯當如是說戒所立戒相若比丘知水有蟲飲用波逸提釋義蟲者僧祇云非魚鱉等謂小小倒孑諸蟲乃至極細微形眼所見者薩婆多云蟲水者若眼所見若漉囊所得一時舍利弗以淨天眼見空中蟲如水邊沙如器中粟無邊無量見已斷食經二三日佛敕令食凡制有蟲水齊肉眼所見漉囊所得耳不制天眼見也飲用者前制澆泥草等此制一切不得用用有二種內用謂身所須飲者入口至腹此局內用外用者謂澆灌浣衣等用字乃通於內外飲字唯局於內隨何所用皆名曰用也犯緣此戒具足三緣方成本罪一有蟲水二有蟲想三飲用定罪此中犯者知是雜蟲水飲用波逸提若雜漿苦酒清酪漿漬麥汁飲用波逸提有蟲水有蟲想波逸提有蟲水疑突吉羅無蟲有蟲想突吉羅無蟲疑突吉羅僧祇云比丘受具已要當畜漉水囊應法澡灌行時應持漉水囊看水時不應天眼看亦不得使暗眼人看下至能見掌中細文者得使看水看水時不得厭課當志心看不得太速不得太久當如大象一回頃若載竹車一回頃無蟲應用若有蟲者應漉用若水中蟲極微細者不得就用洗手面及大小行若檀越家請比丘食應問汝漉水未若言未漉應看前人是可信者應教漉水若不可信者不得語令漉莫傷殺蟲比丘應自漉用問從何處取水隨來處還送蟲水瀉中若先取水處遠者若有池水七日內不消盡者得以蟲水著中若無池水者當著器中盛水持來養之若天大雨有暴水以蟲水瀉中作是言汝入大海去律攝云有五種眼不應觀水一患瘡眼二睛醫眼三狂亂眼四老病眼五天眼不觀不漉咸不合用若苾芻無濾水羅不應往餘村餘寺所到之處知無闕乏不持去無犯若順河流一度觀水無有蟲者齊一拘盧舍隨意飲用五里是也然須中間無別河入若不流水及逆流水一度觀時齊一尋內得用或云八尺或云六尺若知彼人是持戒者存護生命縱不觀察得彼水時飲用無犯凡一觀水始從日出迄至明相未出已來咸隨受用薩婆多云凡用水法應取上好細㲲縱廣一肘作漉水囊令比丘持戒多聞深信罪福安詳審悉肉眼清淨者令其知水法漉水置一器中足一日用明日更看若有蟲者應更好漉以淨器盛水向日諦視若故有蟲應作二重故有蟲者應三重作若故有蟲不應此處住應急移去若用有蟲木隨爾所蟲死一一波逸提根本云以絹繫君持口細繩繫項沉放水中擡口出半待滿引出仍須察蟲但是綽口瓶瓨無問大小以絹縵口隨時取水極是省事比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者先不知有蟲無蟲想若有粗蟲觸水使去若漉水飲無犯不犯者最初未制戒等會詳僧祇云波羅脂國有二比丘共伴來詣舍衛問訊世尊中路渴乏無水前到一井一比丘汲水便飲一比丘看水見蟲不飲飲水比丘問言汝何不飲答言世尊制戒不得飲蟲水彼復勸言長老但飲勿令渴死不得見佛答言我寧喪身不毀佛戒遂便渴死飲水比丘漸到佛所佛問汝從何來又問汝有伴不彼即具以上事答佛言癡人汝不見我謂得見我彼死比丘已先見我十誦云彼持戒者不飲水便死即生三十三天得天身具足先到佛所禮足聞法得法眼淨故曰先見我也若比丘放逸懈怠不攝諸根雖共我一處彼離我遠彼雖見我我不見彼若有比丘在海彼岸能不放逸精進不懈斂攝諸根雖去我遠我常見彼彼常見我放逸之人雖生聖世不異末法不放逸者雖生末世不異正法佛身真常本無出世及與滅度願有智之士莫起像法法滅盡想而自委棄誓當精進不懈斂攝諸根嚴淨毗尼勿輕小罪常如面奉慈顏親承妙旨當見靈山一會儼然未散也緇門警訓云漉囊乃行慈之具濟物之緣大行由是而生至道因茲而剋第六十三故惱他戒總釋此是共戒尼犯亦同大乘同學律攝云由戲弄事掉舉煩惱制斯學處此戒二緣合結緣起處佛在給孤獨園十七羣往語六群長老云何入初禪乃至第四禪若自尸羅皎潔志在禪門專修五法則色界清淨四大自現身中緣是次第獲得根本四禪種種勝妙支林功德爾乃因超欲網果居色界從初禪至四禪通名禪者禪是西土音此翻棄惡能棄欲界五蓋等一切諸惡故或翻功德叢林或翻思惟修又翻為定今不具釋言根本者以無量心背捨勝處一切處神通變化及無漏觀慧等種種諸禪三昧從四禪中出故稱根本初禪五支一覺支二觀支三喜支四樂支五一心支二禪四支一內淨支二喜支三樂支四一心支三禪五支一捨支二念支三慧支四樂支五一心支四禪四支一不苦不樂支二捨支三念清淨支四一心支云何入空無相無願云何得須陀洹果乃至阿羅漢果耶起緣人六群報言如汝等所說者則犯波羅夷法非比丘十七群往問上座若有作如是問云何入初禪乃至阿羅漢為犯何罪上座報言無犯十七羣言我向如是問六羣彼言我等自稱得上人法犯波羅夷非比丘即知為作疑惱諸比丘聞白佛訶責結戒時衆多比丘集在一處共論法律有一比丘退去心疑作是言彼諸比丘與我作疑惱諸比丘白佛佛言不故作者無犯當如是說戒所立戒相若比丘故惱他比丘令須臾間不樂波逸提釋義疑惱者若為生若為年歲若為受戒若為羯磨若為犯若為法也為生時疑者問言汝生來幾時耶報言我生來爾所時語言汝不爾所時生汝如餘人生是謂生時疑云何年歲時疑問言汝幾歲報言我爾所歲語言汝非爾所歲如餘受戒者汝未爾所歲是謂年歲生疑云何受戒生疑問言汝受戒既年不滿二十又界內別衆是謂受戒生疑云何羯磨生疑問言汝受戒時白不成羯磨不成非法別衆是謂羯磨生疑云何於犯生疑語言汝犯波羅夷乃至惡說是謂於犯生疑云何於法生疑汝等所謂法者則犯波羅夷非比丘是謂於法生疑令須臾間不樂者三十須臾為一晝夜非謂多時令他疑惱乃至令須臾間不樂亦成犯也犯緣此戒具足三緣方成本罪一有心故惱二其事虗僞三言說了了定罪此中犯者故惱他比丘以生時乃至法時說而了了波逸提不了了突吉羅五分云令餘四衆疑悔突吉羅尼令二衆疑悔波逸提令餘三衆疑悔突吉羅薩婆多云更以餘事欲令疑悔突吉羅所謂語比丘言汝多眠多食多語等是人非比丘非沙門非釋子若以此六事令餘人疑悔者突吉羅若以此六事遣使教人突吉羅僧祇云若有人來欲受具足若不滿者語言且住待滿二十若彼便於餘處受具足來者不得語令疑悔若比丘臨受具足時若羯磨不成就應彈指語長老汝羯磨不成就若臨時不語者後不得語令疑悔若瞎眼瘻脊腳跛身體不成就來受具足者應語言但爾住彼若於餘處受具足來者不應語令疑悔此謂身根不具也但爾住者但得沙彌戒而已若病人來欲受具足應語言但爾住若彼便於餘處受具足來者不得語令疑悔病者即白㿗乾痟等病語者皆得越毗尼罪若俗人越毗尼心悔比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者其事實爾彼非爾許時生實無爾許歲實年不滿二十界內別衆羯磨不成就非法別衆實犯波羅夷乃至惡說若彼為性粗疏不知言語便言如汝所說自稱上人法犯波羅夷或戲笑語疾疾語獨語夢中語欲說此錯說彼無犯不犯者最初未制戒等第六十四覆他粗罪戒總釋此是共戒少分不共尼覆波羅夷得波羅夷尼覆僧殘得波逸提大乘同制梵網經云一切犯戒罪應教懺悔等問設舉他罪不犯說四衆過耶答佛制不得向外人說不制僧中如法舉過也儻姑息縱容養成巨慝令彼罪惡日深有玷法門慈悲之士豈甘坐視也哉此是性罪律攝云由舊伴屬事覆藏煩惱制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人跋難陀數數犯罪向一親厚比丘說汝勿語人後二人共鬬彼比丘向餘比丘說跋難陀犯如是如是罪我先忍不說今不忍故說諸比丘聞白佛訶責結戒彼比丘不知粗罪不粗罪後乃知粗罪或有作波逸提懺者或疑者佛言不知不犯當如是說戒所立戒相若比丘知他比丘犯粗罪覆藏者波逸提釋義他比丘者律攝云若持戒若破戒有苾芻相皆曰苾芻也粗惡罪者四波羅夷十三僧殘是律攝云初二部及此方便根本云何故此二名為粗惡自體及因皆粗弊可惡故言粗惡方便者母經云如人欲作四波罪夷事身所作及口所說無慚愧因此二處必成波羅夷事是名粗惡又復一處濁重僧殘邊成僧殘方便是也是二偷蘭名濁重何者非濁重波逸提提舍尼自性偷蘭突吉羅如是等亦是不善身口所作但非大事方便以是義故非粗惡濁重也覆藏者覆心覆夜成犯犯緣此戒具足三緣方成本罪一是粗惡罪二知而覆藏三已經明相定罪此中犯者知他比丘犯粗罪小食知食後說突吉羅食後知至初夜說突吉羅初夜知至中夜說突吉羅中夜知至後夜欲說而未說明相出波逸提除粗罪覆餘罪者突吉羅自覆藏粗罪突吉羅除比丘比丘尼覆餘人罪突吉羅粗罪粗罪想波逸提粗罪疑突吉羅非粗罪粗罪想突吉羅非粗罪疑突吉羅善見云若比丘知他比丘粗罪覆藏第二比丘復覆藏如是百千人共覆藏皆犯波逸提十誦云見他犯罪向一人說便止若聞若疑不須說薩婆多云覆藏粗罪有三種覆藏波羅夷僧殘波逸提覆藏出佛身血壞僧輪得對首偷蘭遮下三篇得突吉羅僧祇云說時不得趣向人說當向善比丘說若彼罪比丘凶暴若依王力大臣力凶惡人力或起奪命因緣傷梵行者應作是念彼罪行業必自有報彼自應知喻如失火但自救身焉知餘事爾時但護根應無犯下至俗人五戒若一一覆藏者越毗尼心悔摩得勒伽云天眼舉他罪突吉羅天耳亦如是比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者先不知粗罪不粗罪想若向人說或無人可說發心言我當說未說之間明相已出若說或命難梵行難不說無犯不犯者最初未制戒等第六十五減歲與授具戒總釋此是共戒尼少分不共曾嫁女十二歲受具大乘同學律攝云由近圓事攝衆煩惱制斯學處此戒二緣合結緣起處佛在羅閲城迦蘭陀竹園城中有十七羣童子先為親友最大者年十七最小者年十二來求出家起緣人諸比丘度令出家受大戒不堪一食夜半患饑高聲啼哭與我食來世尊靜處思惟聞小兒啼聲知而故問阿難具白佛言不應授年未滿二十者大戒若年未滿二十不堪忍寒熱饑渴暴風蚊虻毒蟲及不忍惡言種種苦痛不能堪忍又復不堪持戒不堪一食年滿二十堪如上事與比丘結戒彼比丘不知年滿不滿後乃知不滿二十或有作波逸提懺者或有疑者佛言不知者無犯當如是說戒所立戒相若比丘年滿二十應受大戒若比丘知年不滿二十與受大戒此人不得戒彼比丘可訶癡故波逸提釋義若比丘年滿二十應受大戒文此戒相中二句若比丘俱是能授之師滿與不滿乃是求具之人年滿授受如法如律師無過犯資無賊住否則弟子與師俱招大罪律攝云能授者謂塢波馱耶阿遮利耶并餘僧伽滿足十夏方住師位復須成就五法一知有犯二知無犯三知輕四知重五於別解脫經廣能開解於諸學處創結隨開若遇難緣善知通塞常誦戒本能決他疑戒見多聞自他俱利威儀行法無有虧犯具如是德名親教師由其親能教出離法故若苾芻雖近圓已於諸學處不識重輕設六十夏仍須仗託明德依止而住若師小者唯除禮拜自餘咸作此即名為老小苾芻不得與他出家及受近圓也阿遮利耶有其五種一求寂阿遮利耶謂授三歸五十學處二屏教阿遮利耶謂於屏處問其障法三羯磨阿遮利耶謂近圓時秉白四法四依止阿遮利耶乃至一夜依之而住五教讀阿遮利耶下至授彼四句伽他此之五人並當師位能生軌範總名軌範師也此人不得戒彼比丘可訶癡故非但所受之人不成受具復應呵能授之師不審根器好攝門徒好為人師皆癡無所知故癡之一字出呵責之詞犯緣此戒具足三緣方成本罪一為秉具和尚二知年未滿三羯磨已竟定罪此中犯者和尚若知若疑未滿二十與受具戒三羯磨竟波逸提二羯磨竟三突吉羅一羯磨竟二突吉羅白竟一突吉羅為作方便乃至集僧盡突吉羅若僧知若疑一切突吉羅即九師也薩婆多云年未滿二十不聽者以其輕躁不耐寒苦若受大戒人多訶責若是沙彌人則不訶故也尼十二得者為夫家所使任忍衆苦加猒本事也僧祇云若前人不知者當問其父母親里若復不知者當看生年板若復無是者當觀其顏狀觀時不得直觀形體或貴樂家子形大年小當觀其手足成就不若如是復不知者當問何王何歲國土豐儉旱潦時節受戒犍度云若得阿羅漢即名受具足比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者先不知信受戒人語若傍人證若信父母若受戒已疑佛言聽數胎中年月數閏月若一切十四日說戒以為年數者無犯律攝云若近圓時年實未滿而作滿想後有親友報云不滿應數胎月閏月若滿者善若不滿者退為求寂更受近圓不爾則成賊住若年十九作二十心而受近圓後經一年親友來見報云不滿或自憶知不滿或年十八而受近圓後經二歲同前憶知期等皆名善受正教難逢是開聽故開聽者謂數胎中月及以閏月十四日布薩而得足滿二十故也不犯者最初未制戒等劈邪辨訛近聞有說戒之師知沙彌年不滿歲輒與受具曰和尚借一歲或闍黎教授各借一歲或於七僧中借一歲而為善受具足律為本受具人忘却年歲言滿二十和尚諸師信彼語故與受具已方自憶知生年未滿或是親族言未滿即以本人胎中月數足之如或不滿以閏月足之又或不滿以僧一年十八十五日布薩六十四日布薩俱作十四日布薩足之再若不滿退為求寂若經布薩便成賊住豈有師知而故授律有大訶不成具足律藏未曾見有借歲受具者也倘若有幾十未滿歲人欲求具足師俱借年補他歲者豈不自招短壽之報耶如曰吾已悟性明心律己師人豫乃禪律並行躬操實踐律有借歲授具之法強作是說者即法中大魔破壞正法故復招謗佛謗法之愆是一顛迦沉三苦海無解脫期或云我不怖墮三途捨身為人我以身命布施有何不可即如金剛經云初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施乃至無量百千萬億劫以身布施不如聞此經典信心不逆其福勝彼何不聞此律典信心不逆遵制奉行其福亦爾安得將此生身而行布施報墮三塗甘心受苦耶真是愚癡呵呵第六十六發起諍事戒總釋此是共戒尼犯亦同大乘同制梵網經云應生慈心善和鬪諍而反亂衆鬪諍等律攝云由起諍事不忍煩惱制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人六群鬪諍如法滅已後更發起作是言汝不善觀不成觀不善解不成解不善滅不成滅令僧未有諍事而有諍事起已有諍事而不滅諸比丘白佛呵責結戒時諸比丘不知諍事如法滅不如法滅後乃知如法滅或有作波逸提懺者或有疑者佛言不知者無犯當如是說戒所立戒相若比丘知諍事如法懺悔已後更發起者波逸提釋義諍者有四種言諍覓諍犯諍事諍如法者如法如毗尼如佛所教後更發起作如是言不善觀不成觀不善解不成解不善滅不成滅不善觀不成觀者謂不善觀察稱量現前諍事也不善解不成解者謂不善解諍事之根源及四諍中是何等諍事根源未諳施法與事相違故云不成滅也犯緣此戒具足三緣方成本罪一是四諍之事二知如法滅已三說而了了定罪此中犯者說而了了波逸提不了了突吉羅除此諍已若餘鬬諍罵詈後更發起一切突吉羅若自發起已鬬事者突吉羅除比丘比丘尼已共餘人鬬諍罵詈後更發起者突吉羅觀作觀想波逸提觀疑突吉羅不成觀有觀想突吉羅不成觀疑突吉羅薩婆多云此戒體不問羯磨不羯磨但僧和合如法作已後還發起不問衆中屏處盡波逸提若是僧制不入佛法還更發起突吉羅若非佛法非僧法人和合作已作非法心還更發起無罪比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若先不知若觀作不觀想若事實爾不善觀乃至不成滅若戲笑語疾疾語夢中語欲說此錯說彼無犯不犯者最初未制戒等第六十七同賊伴共行戒總釋此是共戒尼犯亦同大乘同制此是制罪律攝云由行路事譏嫌煩惱制斯學處此戒三緣合結緣起處佛在給孤獨園起緣人有衆多比丘從舍衛欲至毗舍離時賈客伴欲私度關不輸王稅問諸比丘欲至何所比丘報言欲至毗舍離賈客言我等可得與諸尊共伴不報言可爾即與共行私度關守關人捉得將至王所王即問言此賈客私度關沙門復有何事守關人報言與此人為伴王問言諸尊知此人不輸王稅不報言知王言若實知者法應死王念言豈當殺沙門釋子但訶責放去諸臣不服諸比丘聞白佛呵責結戒諸比丘不知共伴行後乃知是賊或有作波逸提懺者或有疑者佛言不知者無犯彼比丘不結要疑佛言不結要不犯當如是說戒所立戒相若比丘知賊伴結要共同道行乃至一村間波逸提釋義賊伴者若作賊還若方欲去梵語株利此言賊賊者害也凡偷盜劫殺皆曰賊律攝云賊者若竊盜若強奪若偷稅人曲路而過僧祇云賊相貌有三種可知香色莊嚴香者在曠野中食熟肉生肉氣色者常恐怖色莊嚴者終日結束面黑髮黃凶惡似閻羅人是三種名為賊相不應共行結要者共要至城若至村道行者村間處處道行犯緣此戒具足三緣方成本罪一知是賊伴二結要同行三至村間分齊定罪此中犯者如前婦女同行戒不異五分云共惡心比丘期行突吉羅若諸難緣不犯十誦云若險難處賊送度者不犯根本云若迷失道彼來指示雖同行不犯僧祇云與女賊共行波逸提與叛負債人共行越毗尼罪比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若先不知不共結伴逐行安隱若力勢所持若被繫縛將去若命難梵行難無犯不犯者最初未制戒等第六十八不捨邪見戒總釋此是共戒尼犯亦同大乘同制即謗三寶戒攝則犯重律攝云由邪思事僻執煩惱制斯學處緣起處佛在給孤獨園起緣人有比丘字阿黎吒此言無相有如是惡見生我知佛說法其有犯淫欲非障道法諸比丘欲除彼惡見諫而不捨白佛佛訶責已聽僧為作訶諫白四羯磨結戒所立戒相若比丘作如是說我知佛所說法行淫欲非障道法彼比丘諫此比丘言大德莫作是語莫謗世尊謗世尊者不善世尊不作是語世尊無數方便說犯淫欲是障道法彼比丘諫此比丘時堅持不捨彼比丘乃至三諫捨此事故若再三諫捨者善不捨者波逸提釋義我知佛所說法行淫欲非障道法下正明依事結戒此有二義一者謂邪見深沉謬解佛語由佛制居家五戒唯制邪淫又維摩居士給孤長者現有妻室而證聖果遂生邪見二者阿黎吒比丘先是外道子弟外道邪師遣入佛法中倒亂佛法其人聰明利根不經少時通達三藏即便倒說佛法非障道法者習行其事不障聖道謂不障初禪二禪三禪四禪空無相無願三解脫門須陀洹道乃至阿羅漢果故云行淫欲非障道法也彼比丘諫此比丘言大德莫作是語大德稱呼之詞莫作是語遮止惡言此總標一句以下諫辭也謗世尊者不善謂佛凡所說法離欲清淨寂滅無為汝言非障道者非理謗佛此非善事乃是惡因必招惡果故名不善也世尊無數方便說犯淫欲障道法無數方便者如前淫戒種種呵欲過惡能障聖道則初禪乃至阿羅漢果也堅持不捨乃至三諫屏處諫若再三諫僧中白羯磨諫犯緣此戒具足三緣方成本罪一心執惡見二非理謗法三僧中如法三諫不捨定罪此中犯者唱三羯磨竟波逸提作白已二羯磨竟捨三突吉羅作白已一羯磨竟捨二突吉羅白已捨者一突吉羅若白未竟捨者突吉羅若未白作是語我知佛所說法行淫欲非障道法一切突吉羅彼比丘諫此比丘時餘比丘遮若比丘尼遮若有餘人遮餘人即小三衆汝莫捨此事衆僧諫以不諫一切突吉羅比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者初語時捨若非法別衆諫若非法和合諫法別衆法相似別衆法相似和合非法非毗尼非佛所教若無諫者無犯不犯者最初未制戒等會詳大般若經云若染色欲於生梵天尚能為障況得無上正等菩提是故菩薩斷欲出家能得無上菩提非不斷者菩薩摩訶薩於五欲中深生厭患不為五欲過失所染以無量門訶毀諸欲欲為熾火燒身心故欲為穢惡染自他故欲為魁膾於去來今常為害故欲為怨敵長夜伺作衰損故欲如草炬欲如苦果欲如利劍欲如火聚欲如毒器欲如幻惑欲如暗井欲如詐親旃陀羅等菩薩摩訶薩以如是等無量過門訶毀諸欲法苑珠林云二種邪見報一者生邪見家謂因前世邪僻覆心起諸妄見故感今世不具正信之心而生邪見之家也二者其心諂曲謂因前世邪見心不正直故感今生心常諂曲也第六十九黨惡見人戒總釋此是共戒尼犯亦同大乘同制事及煩惱如上此戒二緣合結緣起處佛在給孤獨園阿黎吒惡見衆僧呵諫而不捨諸比丘白佛佛呵責已聽僧與阿吒黎作惡見不捨舉白四羯磨作羯磨已起緣人六羣共給所須共同羯磨止宿言語諸比丘白佛訶責結戒諸比丘不知有如是語不如是語後乃知有如是語或作波逸提懺者或有疑者佛言不知者無犯當如是說戒所立戒相若比丘知如是語人未作法如是邪是而不捨供給所須共同羯磨止宿言語者波逸提釋義知如是語人者我聞世尊說法行淫欲者非障道法未作法者若被舉未為解謂未解羯磨也不捨者衆僧訶諫而不捨惡見供給所須者有二種若法若財法者教修習增上戒增上意增上智學問誦經財者供給衣服飲食臥具醫藥共同羯磨者薩婆多云作白白二白四羯磨布薩說戒自恣差十四人羯磨也止宿者屋有四壁一切覆或一切覆不一切障或一切障不一切覆或不盡覆不盡障言語者謂評論一切善惡法事也犯緣此戒具足三緣方成本罪一知如是語人二為僧所舉三脅臥著地定罪此中犯者若知是語人先入比丘後來比丘先入如是語人後至若二人俱入隨脅著地轉側一切波逸提五分云共語語語波逸提共坐坐坐波逸提共宿宿宿波逸提共事事事波逸提雖捨惡見僧未解羯磨亦波逸提若作惡見僧未羯磨突吉羅十誦云若教他法若從他受法若與他財若取他財若共宿一切突吉羅薩婆多云起已還臥隨起還臥一一波逸提若通夜坐不臥突吉羅僧祇云若有比丘為和尚阿闍黎所嫌比丘不得誘引言我與汝衣鉢疾病醫藥牀褥臥具汝當在我邊住受經誦經若觀彼比丘因緣必當捨戒就俗者得誘取已當教言汝當知和尚闍梨其恩甚重難報汝應還彼目下住無罪舉不舉想共住共食無罪不舉舉想共住共食越毗尼罪舉舉想波夜提不舉不舉想無罪比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者共女人同室宿不異故不重出根本云若彼身病看侍無犯或共同居令捨惡見亦無犯不犯者最初未制戒等會詳薩婆多云為滅惡法故為佛法清淨故而結此戒第七十畜被擯沙彌戒總釋此是共戒尼犯亦同大乘同制律攝云與共住事畜養煩惱制斯學處此戒二緣合結緣起處佛在給孤獨園跋難陀有二沙彌一名羯那二名摩睺迦自相謂言我從佛聞法其有行淫欲非障道法諸比丘聞白佛佛訶責此二沙彌已聽僧與作訶諫白四羯磨立二沙彌眼見耳不聞處彼二沙彌衆僧呵諫而故不捨聽僧與此二沙彌作惡見不捨滅擯白四羯磨起緣人六羣便誘將畜養共止宿諸比丘聞白佛呵責結戒彼二沙彌城中擯出便往外村城外擯出還入城中諸比丘不知是滅擯不滅擯後乃知是滅擯或有作波逸提懺者或有疑者佛言不知不犯當如是說戒所立戒相若比丘知沙彌作如是言我從佛聞法行淫欲非障道法彼比丘諫此沙彌如是言汝莫誹謗世尊謗世尊者不善世尊不作是語沙彌世尊無數方便說淫欲是障道法彼比丘諫此沙彌時堅持不捨彼比丘應乃再三訶諫令捨此事故乃至三諫而捨者善不捨者彼比丘應語彼沙彌言汝自今已去不得言佛是我世尊不得隨逐餘比丘如諸沙彌得與餘比丘二三宿汝今無是事汝出去滅去不應住此若比丘知如是衆中被擯沙彌而誘將畜養共止宿者波逸提釋義知沙彌作如是言乃至三諫而捨者善並如前釋彼比丘應語彼沙彌言汝自今已去不得言佛是我世尊披緇離俗稱佛為師惡見深沉誹謗佛法非佛弟子故不得言佛是我世尊不得隨逐餘比丘謂沙彌二利悉皆隨僧法憑僧受食從僧分既擯之後一切無分故也如諸沙彌得與餘比丘二三宿汝今無是事不捨惡見擯出僧坊不得效諸如法沙彌二三宿共住汝出去滅去不應住此謂絶其踪跡不容與清衆同居攪亂佛法誘者若自誘將若教人誘誘者以言語相勸引動其心也畜者若自畜若與人共止宿者釋在前文犯緣此戒具足三緣方成本罪一知僧已擯二有心畜養三共同止宿定罪此中犯者若比丘先入宿滅擯者後至若滅擯者先入比丘後至或二人俱至隨脅著地轉側波逸提薩婆多云若教擯沙彌經法若偈說偈偈波逸提若經說事事波逸提若別句說句句波逸提若與衣鉢乃至終身藥皆波逸提若通夜坐不臥亦波逸提與滅擯羯磨若還俗作白衣後還作沙彌即先羯磨若受具戒亦即先羯磨若根變作沙彌尼亦即先羯磨僧祇云若沙彌為二師所嫌比丘不得誘呼共住我當與汝衣鉢醫藥教汝經若比丘知是沙彌因此還俗者得軟語誘取已語言和尚阿闍黎恩重難報汝當還彼目下住若驅不驅想無罪不驅驅想越毗尼罪驅驅想波逸提不驅不驅想無罪比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者同女人共宿戒此不重出第七十一拒諫難問戒總釋此是共戒尼犯亦同大乘同制梵網經云若佛子應學十二部經誦戒日日六時持菩薩戒解其義理佛性之性等律攝云由遮止事嫉妬煩惱制斯學處緣起人佛在拘睒彌國瞿師羅園中起緣人闡陀比丘餘比丘如法諫時作是言我不學此戒當問餘智慧持律比丘諸比丘聞白佛呵責結戒所立戒相若比丘餘比丘如法諫時如是語我今不學此戒當難問餘智慧持律比丘者波逸提若為知為學故應難問釋義如法者如法如律如佛所教我今不學此戒此乃拒諫之言我不用汝語而學毗尼當難問餘智慧持律比丘者難問者謂以巧言語問智慧持律者謂嚴淨毗尼輕重開遮通達無礙此乃反叱能諫之人況汝愚癡自無智慧而不間法律欲諫我耶為知為學故應難問者知者欲知毗尼差別義理學者博學開遮成壞二持通曉故聽犯緣此戒具足三緣方成本罪一如法諫勸二違拒不納三說而了了定罪此中犯者說而了了波逸提不了了突吉羅比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者彼比丘癡不解故語言汝還問汝和尚阿闍黎汝可更學問誦經或戲笑語疾疾語獨語夢中語欲說此錯說彼無犯不犯者最初未制戒等會詳律攝云有五種人不應為說毗奈耶藏謂性無所知強生異問或不為除疑而問或試弄故問或惱他故問或求過失故問第七十二輕呵戒總釋此是共戒尼犯亦同大乘同制菩薩戒本經云若菩薩如是見如是說言菩薩不應聽聲聞經法不應受不應學菩薩何用聲聞法為是名為犯衆多犯是犯染污起此是性罪律攝云因輕毀事心不忍可制斯學處緣起處佛在給孤獨園衆多比丘集一處誦毗尼起緣人六羣恐彼誦律通利必當數數舉我罪往語言長老何用此雜碎戒為若欲誦者當誦四事十三事餘者不應誦若誦者使人懷疑憂惱餘比丘觀察六羣欲滅法故作是語耳白佛訶責結戒所立戒相若比丘說戒時作是語大德何用說是雜碎戒為說是戒時令人惱愧懷疑輕訶戒故波逸提釋義說戒時者若自說戒若他說戒時若誦時雜碎戒者薩婆多云以十二年前佛常說一偈今說五篇名為雜碎僧祇云除四事十三事餘者是也令人惱愧懷疑此乃具述實情由多犯衆戒聞誦說時其心不喜曰惱憶所犯罪愧於他人隱惡在心情懷憂感罪愆未曾露悔猶豫在心曰疑故云惱愧懷疑也輕訶下結成所犯犯緣此戒具足三緣方成本罪一欲令他廢學毗尼二所訶是具足戒三言說了了定罪此中犯者說而了了波逸提不了了突吉羅毀呰毗尼波逸提毀呰阿毗曇及餘契經突吉羅僧祇云未說時訶越毗尼罪說時訶波逸提說已呵越毗尼心悔五分云若欲令人遠離毗尼不讀不誦而毀呰者波逸提若欲令波羅提木叉不得久住而毀呰者偷蘭遮毀呰經亦如是若欲令經法不久住亦得偷蘭毀呰餘四衆及在家二衆戒突吉羅比丘尼毀呰二部戒波逸提毀餘五衆戒突吉羅新受戒人生疑廢退心教未可誦戒不犯薩婆多云凡經中有隨律經說時呵者盡波逸提除隨律經說餘經時隨多隨少呵者盡突吉羅何以訶戒經罪重餘經罪輕戒是佛法平地萬善由之而生又佛弟子皆依而住若無戒則無所依又入佛法之初門若無戒者無由入泥洹城又是佛法瓔珞莊嚴佛法是故呵毀罪重比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若語言先誦阿毗曇然後誦律先誦餘契經後誦律若有病者須差然後誦律當勤求方便於佛法中得沙門果然後誦律不欲滅法故作是語或戲笑語疾疾語夢中語獨語欲說此錯說彼無犯不犯者最初未制戒等會詳善見云學毗尼有五德一身自護戒二能斷他疑三入衆無畏四能伏怨家五令正法久住云何身自護戒持戒清淨無有缺漏云何能斷他疑有比丘犯罪狐疑不能決判若來咨問依律為判云何入衆無畏以知律故隨事能作云何能伏怨家如離車子起十非法能依律除滅云何令正法久住一身自隨法二令他得法因法故正心持律因持律故得入禪定因禪定故而得道果我滅度後毗尼即是汝大師下至五人解律在能令正法久住若中天竺佛法滅邊地有五人受戒滿十人住中天竺得與人受具足戒是名令正法久住乃至二十人得出罪是名令正法久住以律師持律故佛法住世五千年五百問云佛言吾滅度後若有比丘比丘尼誹謗如是毗尼者當知是人是魔朋侶非吾弟子如是人輩世世學道不成不出三界薩婆多云為尊重波羅提木叉故為長養戒故為滅惡法故而結此戒第七十三無知戒總釋此是共戒尼亦同犯大乘同制律攝云由不敬事亂心煩惱制斯學處緣起處佛在給孤獨園起緣人六羣中一人當說戒時自知罪障恐清淨比丘發舉便先詣清淨比丘所語言我今始知是法戒經所載半月半月說戒經中來諸比丘察知白佛呵責結戒所立戒相若比丘說戒時作如是語我今始知此法戒經所載半月半月說戒經中來餘比丘知是比丘若二若三說戒中坐何況多彼比丘無知無解若犯罪應如法治更重增無知罪語言長老汝無利不善得汝說戒時不用心念不一心攝耳聽法彼無知故波逸提釋義說戒時者若自說戒時若他說戒時若誦戒時作如是語我今始知此法戒經所載我一向謂長老等集誦戒律乃臆說耳今日始知戒經中來謂我不間戒律或當無過咎也薩婆多云實先知言始知犯妄語墮罪此中正結不專心聽罪也餘比丘知是比丘若二若三說戒中坐何况多餘比丘乃清淨者是察知其人已曾經二三次布薩應知持犯何況多經布薩而不知也若犯罪應如法治更重增無知罪不以不知故無罪隨其所犯如法如毗尼治復更增無知解波逸提也汝無利不善得此句總呵毗尼不諳於佛法中出家近圓不善得其中利益故也不用心念不一心攝耳聽法餘覺餘思也律攝云有六過失謂無信心失無敬心失無樂欲失緣外境失心惛沉失生勞倦失彼無知故由不聽學故爾無知由不知故多犯衆戒結成所犯犯緣此戒具足三緣方成本罪一心不敬教二布薩曾經三無所知解定罪此中犯者若說戒不善用意思惟一心聽法無知故重與波逸提若不與者突吉羅僧祇云受具足已應誦二部毗尼若不能者當誦一部乃至若復不能者當誦五衆戒乃至四三二一衆戒及偈布薩時當廣誦五衆戒若復不能乃至四衆三二一衆戒及偈餘者僧常聞不誦者越毗尼罪僧中應使利者說餘人專心聽不得坐禪及作餘業若於四事乃至七滅諍法中間隨不聽隨得越毗尼罪一切不聽波逸提此罪不得趨向人悔當衆中持戒有威德人所敬難者於前悔前人應訶言長老汝失善利半月說波羅提木叉時汝不尊重不一心念不攝耳聽法訶已波夜提悔過律攝云若聞苾芻尼不共學處作如是語得惡作罪若共學處便得本罪若老耄無所識知依實說者無犯耄音帽惛忘也八十九十曰耄比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者未曾聞說戒今始聞若未曾聞廣說今始聞若戲笑語疾疾語獨語夢中語欲說此錯說彼無犯不犯者最初未制戒等第七十四謗回僧物戒總釋此是共戒尼犯亦同大乘同學律攝云因鬬亂事不忍煩惱制斯學處緣起處佛在耆闍崛山沓婆摩羅子典僧牀座臥具及分飲食彼以僧事塔事故外人有為初立寺初立房作池井而設會布施不得往衣服破壞垢膩不淨異時有人施僧貴價衣僧共議以此衣與之白二羯磨與起緣人六羣亦在中既與衣已作是語諸比丘隨所親以衆僧衣與之諸比丘聞白佛呵責結戒所立戒相若比丘共同羯磨已後如是言諸比丘隨親厚以衆僧物與者波逸提釋義共同羯磨者謂同集情和秉法已親厚者同和尚同阿闍黎坐起言語親厚者是物者衣鉢針筒尼師壇下至飲水器犯緣此戒具足三緣方成本罪一同和秉法二謗隨親與物三說而了了定罪此中犯者說而了了波逸提不了了突吉羅薩婆多云此戒體若僧和合作羯磨不作羯磨與知事執勞苦人若僧祇物若自恣物和合已後便訶言隨親厚與波逸提凡衆僧中若為僧執勞苦人若大德及貧匱者若僧和合與盡得與之若與欲和合後呵者波逸提若在外來訶者突吉羅此戒不必言隨親厚與但言不應與盡犯僧祇云遮有三種與已遮波夜提與時遮越毗尼罪未與時遮越毗尼心悔比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者其事實爾隨親厚以衆僧物與之或戲笑語疾疾語獨語夢中語欲說此錯說彼一切無犯不犯者最初未制戒等會詳薩婆多云為滅鬬諍故為滅苦惱故為得安樂行道故而結此戒法苑珠林云無義語有二種報一者謂因前世語言無義即是虗妄故感今生雖有言說人亦不信用也二者不能明了謂因前世語言無義皆因暗昧故感今生有所言說而亦不明了也第七十五不與欲戒總釋此是共戒尼犯亦同大乘同學律攝云由評論事不寂靜煩惱制斯學處此戒二緣合結緣起處佛在給孤獨園衆多比丘集一處共論法毗尼起緣人六羣恐為我等作羯磨即從坐而去諸比丘白佛呵責結戒諸比丘或營僧事塔事及瞻病事疑佛言聽與欲當如是說戒所立戒相若比丘衆僧斷事未竟不與欲而起去者波逸提釋義僧者一說戒一羯磨事者十八破僧事法非法乃至說不說等是名事斷事者謂斷當評論僧祇云斷事有二種一者說法毗尼二者作折伏羯磨乃至別住羯磨事也不與欲者身既來集有緣聽白僧與欲而去故不與欲令僧不成辦事犯緣此戒具足三緣方成本罪一同僧法事二不與他欲三兩腳出戶定罪此中犯者僧斷事未竟不與欲而起去動足出戶外波逸提一足在戶外一足在戶內方便欲去而不去一切突吉羅僧祇云若欲大小便須臾還不廢僧事無罪若說法毗尼應白去不白去者越毗尼罪若衆多比丘聽誦經應白去不白去者越毗尼罪若誦經止者作餘語去者無犯五分云若屋下羯磨隨幾過出一一波逸提若露地羯磨出去僧面一尋波逸提若神通人離地四指波逸提若僧不羯磨斷事出去突吉羅若私房斷事來而去者突吉羅若僧不羯磨斷事及私房斷事沙彌得在其中起去突吉羅式叉摩那沙彌尼亦如是比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者有僧事塔事瞻病事與欲若口噤不能與欲若非法非毗尼羯磨或為僧為塔寺為二師親厚知識方便作損減無利作無住處羯磨如是不與欲去一切無犯不犯者最初未制戒等第七十六與欲後悔戒總釋此是共戒尼犯亦同大乘同學律攝云由悔恨煩惱制斯學處緣起處佛在給孤獨園起緣人六羣中有犯事者恐衆僧彈舉六人共相隨不相離使諸比丘無由得與作羯磨異時六羣作衣衆僧得便遣使喚來衆僧有事六群言我等作衣不得往僧報言不得來者可令一人持欲來六群即令一人受欲來僧即與此一人作羯磨六群悔言羯磨不成我以彼事故與欲不以此事諸比丘聞白佛呵責結戒所立戒相若比丘與欲已後悔者波逸提釋義與欲已欲有通局局者半月布薩與清淨欲自恣言與自恣欲不通餘法通者但言與欲羯磨則通一切法盡得作唯除說戒自恣後悔者謂欲令彼羯磨不成作辨律攝云此戒與前學處有差別者前望羯磨事已先知此據不知但遮其欲犯緣此戒具足三緣方成本罪一如法羯磨二與欲後悔三說而了了定罪此中犯者與欲已後悔作如是言汝等羯磨不成我以彼事故與欲不以此事說而了了波逸提不了了突吉羅五分云僧不作羯磨斷事後呵突吉羅薩婆多云若僧如法作一切羯磨事已後呵言不可波逸提若僧作一切羯磨事作不如法當時力不能有所轉易故默然不呵後言不可無罪除僧羯磨一切非羯磨事衆僧和合共斷決之後更呵者若順法順毗尼者波逸提若是王制僧制不順法毗尼突吉羅比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者其事實爾非法羯磨不成若戲笑語疾疾語獨語夢中語欲說此錯說彼一切無犯不犯者最初未制戒等第七十七屏聽鬬諍戒總釋此是共戒尼亦同犯大乘同制鬬遘兩頭此是性罪律攝云由鬬諍事不忍煩惱制斯學處緣起處佛在給孤獨園起緣人六群聽諸比丘鬬諍言語向彼人說未有諍事而有諍已有諍事而不滅諸比丘察知白佛呵責結戒所立戒相若比丘比丘共鬬諍已聽此語向彼說波逸提釋義鬬諍者有四種言諍覓諍犯諍事諍聽此語向彼說者聽者屏聽他語耳根發識亦用意識分別好惡言詞若隔壁隔籬若戶邊若隔幔若隔石若隔草默然而聽語者評論彼人好惡而相傳彼此薩婆多云以能破佛法令僧為二部是故制犯緣此戒具足三緣方成本罪一知是鬬諍二故往屏聽三至聞其聲定罪此中犯者往聽他諍比丘語往而聞波逸提不聞突吉羅若方便欲去而不去一切突吉羅若二人在暗地語若隱處語當彈指若謦咳驚之若不爾者突吉羅若道行有二人在前共語亦當彈指謦咳若不突吉羅律攝云若情無向背若忽遇聞若聽其言欲令消殄無犯薩婆多云此中諍人及餘不諍來聽及向人說不說皆犯五分云默聽餘四衆語突吉羅善見云往步步突吉羅至聞處波逸提為欲自改往聽不犯比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若二人在暗處共語彈指謦咳二人在屏處語彈指謦咳在道行二人在前行共語若後來謦咳彈指若欲作非法非毗尼羯磨若為僧為塔寺為二師親友知識欲作損減無利無住處等羯磨欲得知之而往聽無犯不犯者最初未制戒等會詳僧祗云若比丘共餘比丘鬬諍結恨作是罵詈我要當殺此惡人然後捨去比丘聞已得語彼人長老好自警備我聞有惡聲有諸客比丘來知事比丘聞客比丘作是言我等當盜某庫藏某塔物某僧淨廚某比丘衣鉢聞是語已默然應還應衆僧中唱言諸大德某庫藏某塔物某僧淨廚某比丘衣鉢當警備我聞惡聲應使前人知若比丘多有弟子日暮案行諸房知如法不若聞說世俗語不得便入訶責待自來已然後誨責曰汝等信心出家食人信施應坐禪誦經云何論說世俗非法事此非出家隨順善法若聞論經說義問難答對不得便入讚歎待自來已然後讚美汝等能共論經說義講佛法事如世尊說比丘集時當行二法一者賢聖默然二者講論法義
