body:
  text: 清金陵寶華山律學沙門德基輯第三十一過受一食戒總釋此是共戒尼制亦同大乘同學律攝云因過宿食事招世譏嫌制斯學處此戒二緣合結緣起處佛在給孤獨園時拘薩羅國有無住處村有居士為比丘作住處常供給飲食在此住者聽一食起緣人六羣往彼住處經一宿得好美飲食故復住第二宿復得美食彼於此住處數數食居士譏嫌諸比丘聞白佛呵責結戒時舍利弗詣此一宿明旦得好食於彼得病念世尊制戒即扶病而去病遂增劇諸比丘白佛佛言聽病比丘過受食當如是説戒所立戒相若比丘施一食處無病比丘應一食若過受者波逸提釋義施一食處者在中一宿食者乃至時食病者離彼村增劇者是十誦云病者下至竹葉所傷無病過受成犯犯緣此戒具足三緣方成本罪一無病緣二過受食三食入咽已定罪此中犯者若無病比丘於彼一食處過受食咽咽波逸提除食已更受餘襯身衣燈油塗腳油盡突吉羅十誦云過一宿不食突吉羅律攝云於此宿在餘處食得惡作罪若餘處宿於此處食得波逸底迦比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者一宿受食病過受食若居士請住我當與食我等為沙門釋子故設此宿處供給飲食若不得沙門釋子亦當與餘人耳若檀越次第請食若兒女姊妹兒婦次第請食或一切難緣等過食者無犯不犯者最初未制戒等第三十二展轉食戒總釋此是不共戒尼不同犯大乘同制此是制罪律攝云此由食事過分廢闕不寂靜譏嫌煩惱制斯學處此戒三緣合結緣起處佛從羅閲城出遊行人間持世穀貴乞食難得有沙䨲婆羅門以五百乘車載滿飲食經冬涉夏隨逐世尊伺候空缺設供而無空日阿難為其白佛佛告阿難汝可往語婆羅門明旦以此食具作粥與諸比丘食後當受時食時婆羅門觀諸供養皆無餅即辦種種粥及餅供養佛及僧佛言食粥有五事善除飢除渴消宿食大小便調適除風患居士聞佛聽僧食粥及餅皆大歡喜起緣人有一少信大臣見佛及僧大得供養如是言此非少福田者辦肥美飲食請僧時阿那頻頭諸居士即於其夜辦種種粥送至僧伽藍中僧先食濃粥後往大臣家不能多食大臣嫌之我為衆僧作種種好食云何先食濃粥方受我食瞋恨白佛佛為説法得法眼淨羅閲城中有少信樂師其事亦爾世尊呵責諸比丘已結戒不聽展轉食諸病比丘所請食處無有隨病食及藥若有隨病食及藥畏慎不敢食恐犯展轉食佛言聽病比丘展轉食後一居士請佛及僧設食供養復一居士亦請佛及僧設食及衣供養諸比丘畏慎白佛佛言布施衣時不犯當如是説戒所立戒相若比丘展轉食除餘時波逸提餘時者病時施衣時是謂餘時釋義展轉食者請也請有二種若僧次請別請也食者飯乾餅魚及肉展轉者謂此家食已餘處復食病者不能一坐食好食令足施衣者自恣竟無迦絺那衣一月有迦絺那衣五月若復有餘時施食及衣若今日得多請食應自受一請餘者當施與人如是言長老我應往彼今布施汝此謂但施食無衣也根本云餘時者病時作時道行時施衣時此是時此創制中分外別開時也犯緣此戒具足三緣方成本罪一多請不捨二是正食三食入咽定罪此中犯者若不捨前請受後請食者咽咽波逸提不捨後請受前請食者咽咽突吉羅十誦云病比丘若一請處不能飽應受二請第二處不能飽足應受第三請第三處不能飽應受已漸漸食乃至日中不應受第四請聽節日數數食十誦毗尼序云阿難先受他請忘不憶復同佛受波斯匿王請以食著口乃憶知有二請不與他一請不敢吐食為恭敬佛故又不敢咽食為持戒故佛知阿難心悔告令心念與他便食優波離問佛餘人亦得爾不佛言除五人一坐禪人專心禪定故二獨處無人對説故三遠行人造次就路容有多忘對説恐難故四長病久疾患者形體羸弱故五飢時依親里住現前無比丘故餘悉不聽摩得勒伽云若先受無衣請後受有衣請不犯語比丘言就此食當為汝覓衣食食不犯語比丘言此間食餘處隨意食食不犯律攝云若一舍或寺中或阿蘭若若為求肥悅或樂美食而數食者得惡作罪若輕賤心或懷矯詐而不食者亦得惡作尼等四衆突吉羅是謂為犯開緣不犯者病時施衣時若一日有多請自受一請餘者施於人若請與非食或食不足或無請食者或食已更得食或一處有前食後食無犯不犯者最初未制戒等第三十三別衆食戒總釋此是共戒尼犯亦同大乘同制此是制罪律攝云因提婆達多制斯學處此戒八緣合結緣起處佛在耆闍崛山起緣人提婆達多教人害佛復教阿闍世王殺父惡名流布利養斷絶通己五人家家乞食時諸比丘聞白佛呵責結戒不聽別衆食時諸病比丘有請處不得隨病食及藥有好隨病食及藥畏慎不敢受恐犯別衆食佛言聽病比丘受別衆食諸比丘自恣已迦提月中作衣諸優婆塞恐比丘不得食疲苦請與比丘食比丘言但請三人我等不得別衆佛言聽作衣時受別衆食有居士欲施食及衣請諸比丘食比丘恐犯別衆佛言聽施衣時別衆食有衆多比丘與諸居士往拘薩羅同道行乞食時到欲詣村乞食居士言我當與食比丘畏犯別衆即入村乞食伴便前去比丘在後不及為賊所劫佛言聽險道中受別衆食更結道行時後有衆多比丘與諸居士乘船順流而去乞食時到欲入村乞食居士言但去我等當供給飲食比丘恐犯別衆上岸入村乞食船伴前去諸比丘後來為賊劫奪衣服佛言聽比丘乘船時別衆食有衆多比丘從拘薩羅國遊行詣一小村諸居士念衆僧多而村落少我等寧與衆僧作食勿令疲苦即請比丘明日食比丘畏慎白佛佛言聽大衆集時別衆食瓶沙王姊子名曰迦羅為諸沙門施食欲於外道沙門中出家往白瓶沙王王問欲於何處出家答言欲於尼犍子中出家王問言與我曹沙門設食不迦羅言大王何者是沙門耶王言沙門釋子是也迦羅言我竟不與設食王言汝今往與沙門釋子設食即往僧伽藍中請諸比丘食諸比丘畏慎白佛佛言聽沙門施食時得別衆食當如是説戒所立戒相若比丘別衆食除餘時波逸提餘時者病時作衣時施衣時道行時乘船時大衆集時沙門施食時此是時釋義別衆者若四人若過四人五分云若於界內別請四人以上名別衆食若次請不犯根本云別衆食者別別而食律攝云別衆食者謂不同處食若四苾芻同一界內下至一人不同食並名別衆食十誦云以二利故遮別衆食一者隨護檀越以憐愍故二者破諸惡欲比丘力勢故凡別衆有其二義一者別為衆而成僧即如四分調達通己五人家家乞食二者別於衆即如根本一界同居別別而食五分受請必須僧次薩婆多僧祗淨食必打楗槌請食私房無緣不聽聖制分明不可違越食者飯乾餅魚及肉謂是正食簡非餘食病時者下至腳跟躄作衣時者自恣竟無迦絺那衣一月有迦絺那衣五月乃至衣上作馬齒一縫施衣時者亦一月五月及餘時施食及衣餘時者七月十一月設有施食及衣亦名衣時道行時者下至半由旬來者去者乘船時者下至半由旬內上下大衆集時者食足四人長一人為患五人十人乃至百人長一人為患食少人多故薩婆多云衆僧集會或以餘緣或以法事極少舊比丘四人客比丘四人名為大衆集律攝云大衆食時者謂作世尊頂髻大會若五年大會若六年大會此大會日隨施主心各處設食若四若五隨意分食頂髻大會者世尊為菩薩時五歲而除頂髻給孤長者為佛作五年大會於六歲時重立頂髻長者為佛作六年大會俱云大會時也沙門施食者在此沙門釋子外諸出家者及從外道出家者是若比丘無別衆食因緣彼比丘即當起白言我於此別衆食中無因緣欲求出聽出若餘人無因緣亦聽使出若二人三人隨意食若四人若過四人應分作二部更互入食若比丘有別衆食因緣欲求入尋即當起白言我有別衆食因緣欲求入當聽隨上座次入有因緣者即前七緣是也此是時者即開別衆之時也犯緣此戒具足三緣方成本罪一無緣別衆二是正食三食入咽已定罪此中犯者別衆食咽咽波逸提若有因緣不説突吉羅僧祇云若三人食一人不食若三圓具一未圓具皆無犯若以食送彼乃至鹽一匕與彼衆處食皆無犯謂檀越在布薩界中請僧食或以食乃至鹽一匕送本界僧中即非別衆食也或施主言但來入者我皆與食此謂不遮客來比丘或施主別造房施住我房者我皆與食斯亦無過十誦云若三比丘別共一處食第四人取食分不犯若道行乘船昨日來今日食明日行今日食皆波逸提薩婆多云若僧祇食時應作四種相一打楗槌二吹貝三打鼓四唱令令界內聞知此四種相隨定作一勿使雜亂不成僧法若不作相而食僧伽食者食不清淨名為盜僧祇食不名別衆食乃上品獨頭偷蘭若作相食者設使內有比丘無比丘若多若少若來不來但使不遮一切無咎若使有遮雖打楗椎食不清淨名盜僧祇食為遮外來客比丘也得罪如前若大界內有二處三處各有始終僧祇但一布薩若食時但各打楗椎一切無遮清淨無過此謂法同食別界中布薩等法共同飲食各別然必打楗椎名為如法也若檀越請四人以上在布薩界內食應布薩處請僧次一人若送一分食不爾犯墮若二處三處亦如是若聚落內雖無僧界設二檀越請四人以上於二處食應打楗椎二處互請一人若送食一分若更有異比丘應如法入乃至一人若不互請及送食分者墮罪根本云有五因緣早請食來在房中食一是客新到二將欲行去三身嬰病苦四是看病人五身充知事目得迦云若檢校人應於齋食先取自分食之無過比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者病時作衣時施衣時道路行時乘船時大衆集時沙門施食時若三人四人更互食若有因緣去無犯不犯者最初未制戒等會詳雜阿含云如來何故制別衆食而聽三人共一處食如是之意為欲擁護於諸人故使不損減復為制伏惡欲比丘斷除於人多眷屬故稱僧名字多有所求減損諸家破壞衆僧使作二部故令如法比丘不得供養衣服飲食非法比丘多獲利養惡欲比丘既得供養與淨行者而共諍訟故十誦云以二利故遮別衆食一者隨護檀越以憐愍故二者破諸惡欲比丘力勢故第三十四過三鉢受請戒總釋此是共戒尼犯亦同大乘同學此是制罪律攝云此由食事多貪煩惱制斯學處此戒二緣合結緣起處佛在給孤獨園有一女人名伽若那是大村女來禪國與人作婦經歷數月遂便有身還父母家起緣人有比丘來乞食者自持食施後其夫遣使呼還因諸比丘盡取其食方更辦具其夫已更取婦又波羅奈城外衆商賈車伴共宿有一乞食比丘入此賈客營中乞食一信樂賈客取鉢盛滿美食與比丘出營未遠復有比丘來乞食如是展轉他食都盡更市糴糧後不及伴為賊所劫諸比丘聞白佛呵責結戒諸病比丘畏慎不敢過受食佛言聽當如是説戒所立戒相若比丘至白衣家請比丘與餅飯若比丘欲須者當二三鉢受還至僧伽藍中應分與餘比丘食若比丘無病過兩三鉢受持還至僧伽藍中不分與餘比丘食者波逸提釋義白衣家者有男有女僧祗云剎利婆羅門毗舍首陀羅家請比丘與餅飯餅飯者所謂大小麥米豆如是等種種餅飯也當問其主言為是歸婦食為是商賈道路糧若言歸婦食賈客道路糧者食已出還僧伽藍中白諸比丘某甲家有歸婦食有賈客道路糧若欲食者食已應出若欲持食還者齊二三鉢我今不持食來若持一鉢食來還與諸比丘共分食之當語餘比丘言某甲家有歸婦食商賈道路糧若至彼家食者即於彼食若持食還應兩鉢我已持一鉢還若持兩鉢還應共餘比丘分食之語諸比丘乃至欲食者即彼家食欲持來者應取一鉢我已持兩鉢還若盡持三鉢還分與諸比丘食白餘比丘乃至欲食者於彼家食慎勿持還我已持三鉢來若比丘欲須者當二三鉢受律攝云鉢有三種謂大小中大者可受摩揭陀國二升米飯於上得安豆并茹以大拇指一節鉤緣不觸其食斯為大鉢量小者受一升米飯二內名中言二三鉢者若取大鉢一中鉢一小鉢一或唯大鉢二或大鉢一小鉢二或中鉢三小鉢一或中鉢一小鉢二或中鉢三小鉢三三鉢者謂極多受三鉢也持還至僧伽藍中應分與餘比丘食善見云若取二鉢一鉢自食一鉢與比丘僧若取三鉢一鉢自食二鉢與比丘僧不得與知識白衣無病過兩三鉢受者有病不限其數無病佛制當遵律攝云過受者謂大鉢三或大鉢二兼處中鉢一或大鉢二兼小鉢一或大鉢一兼處中鉢二根本云要而言之取他食時過四升半米飯分量以上當得墮罪若施主任取多少者無犯犯緣此戒具足三緣方成本罪一歸婦食商賈道路糧二無病過三鉢受三兩足過限定罪此中犯者無病過兩三鉢受出彼門波逸提若一足在門內一足在門外方便欲去還住者突吉羅若不問歸婦食賈客道路糧而取食突吉羅若持至僧伽藍中不分與餘比丘食者若不語餘比丘突吉羅律攝云若即此座過三鉢食或除餅但將餘物或施主歡喜隨意將去並無犯比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者兩三鉢受食病者過受食問歸婦食商客道路糧還僧伽藍中分與餘比丘共食白餘比丘使知村處若彼自送至僧伽藍中得受若彼送至比丘尼寺中亦得受無犯不犯者最初未制戒等會詳律攝云有三種虗損信施一施主信心施持戒者受已與犯戒人二信心施正見者受已與邪見人三過量而受不自噉食乃至長受一掬之食除其施主先有隨意如斯三事並名虗損信施當招惡報第三十五不作餘食法戒總釋此是不共戒尼犯不同大乘同制此是制罪律攝云因食飽更食貪餮無厭制斯學處緣起處佛在給孤獨園與諸比丘説一食法讚歎一食法諸比丘食佉闍尼食若飲漿服藥便當一食形體枯燥顏色憔悴佛問阿難白諸上事佛言聽諸比丘一座上食飽滿諸比丘或食佉闍尼食若飲漿服藥便令飽足更不復食形色枯悴佛又聽食五種食若飯乾餅魚及肉得令飽足諸病比丘雖得好食不能一坐食形體枯悴又聽病比丘數數食病人無足食法時病比丘得好美食食不能盡與瞻病人足食已不敢食便棄之衆鳥來爭食鳴喚佛言聽瞻病者食病人殘食無餘食法諸比丘清旦受食舉已入村乞食食已還取所舉食與諸比丘諸比丘已足食不敢食便棄之衆鳥爭食鳴喚佛聽取所受食作餘食法食之有一長老多知識比丘入村乞食大得積聚一處共食持餘食來與諸比丘諸比丘足食已不敢食遂棄之衆鳥爭喚又聽比丘從彼持食還當作餘食法而食之當如是作餘食法言大德我足食已知是看是此作餘食法彼應取少許食已當語彼比丘言我止汝取食之起緣人有一比丘貪餮不知足食不足食不知餘食不餘食得便食之諸比丘聞白佛呵責結戒所立戒相若比丘足食竟或時受請不作餘食法而食者波逸提釋義足食者五種食飯乾餅魚及肉於五種食中若食一一食令飽足有五種足食知是飯謂知食體是正食若非正食不名足食知持來謂知男女等持食來授與知威儀謂行住坐臥四威儀中知是行受食非住坐臥也知捨威儀謂行受食今已住坐臥故云捨律攝云食飽足者作遮止言心生棄捨若心未棄捨縱出遮言未成遮足若更食時但得惡作若作了心唱言休足此便成遮足不作餘食法而食者得墮十誦云以二利故聽受殘食法一者看病比丘因緣故二者比丘有因緣食不足故十誦殘食即本律餘食凡足食已得食須作法而食今謂得而便食故云不作餘食法食也犯緣此戒具足三緣方成本罪一足食已捨威儀二不作餘食法三食已入咽定罪此中犯者足食已捨威儀不作餘食法得而食之咽咽波逸提佉闍尼食者根枝葉華果油胡麻黑石蜜磨細末食足食已不作餘食法得而食之咽咽波逸提若足食已為他作餘食法不成餘食法突吉羅若知他足食已作餘食法若自手捉食作餘食法若持食置地作餘食法若使淨人持食作餘食法若淨人前作餘食法以不好食覆好食上作餘食法若受他餘食法盡持去如是一切不成餘食法突吉羅足食足食想波逸提足食疑突吉羅不足食足食想突吉羅不足食疑突吉羅僧祗云聽一人作殘食餘人盡得食若比丘持食來欲作殘食即於鉢上碗中作殘食者正得碗中名作殘食鉢中食不名作若碗中食汁流入鉢中得俱名殘食若並兩鉢作殘食若前人正一鉢中食者正一鉢得名作殘食若二鉢上若餅若菜通覆橫上者二俱得名作殘食餘種種器亦爾若國土少比丘處比丘食已有大檀越持種種飲食至比丘已起去當云何若彼間有直月維那諸知事人未食足者當從彼人邊作殘食若彼已食足若上座未足當於上座邊作殘食若上座羞不能人中作者當合座舉上座至屏處作殘食若上座已足者有客比丘來者當問長老今日自恣足未若客比丘言我未得夏安居云何得自恣足當知是人不知律相更問汝食未若言已食復問檀越自恣與不若言長老何處自恣食水菜不足況餘食當知不足應從彼作殘食若言已足者僧應作方便不應破檀越善心若衆中有大沙彌將至戒場與受具足教作殘食法已然後當食五分亦用此義若一切粥新出釜畫不成字一切果一切菜非別衆食非處處食非足食律攝云有五蒲膳尼即可噉食一飯二麥豆飯三四肉五餅又五珂但尼即可嚼食謂根莖葉華果若先食五嚼食及乳酪菜等後受五噉食無犯若先食五噉食更食五嚼食及乳酪菜等名犯應知有五未足之言謂授食時未即須者應報言且待且去且有且待我食且待我盡若兼且言名曰未足若無且聲便是遮足若未為足意設作足言亦不成足得惡作罪由言不稱法故若得餘食作法食者自身樂住施住得福欲作法時洗手受食持就一未足苾芻或雖已足未離座者對彼作法彼若未遮足應取兩三口食若自足已便不合食應以手按而告之言斯是汝物隨意食之有五不成作餘食法一身在界內對界外人二不相及處善見云二肘外半三在傍邊四在背後五前人離座翻此便成比丘尼等四衆突吉羅是謂為犯開緣不犯者食作非食想不受作餘食法非食不作餘食法自取作餘食法不置地作餘食法乃至手及處作餘食法若與他他與己作餘食法若病不作餘食法病人殘食不作餘食法若已作餘食法無犯律攝云若北方果及天神藕斯等難得之物或復飢年飲食難得不作餘食法食之無犯不犯者最初未制戒等會詳毗尼母云比丘受人施不如法為施所墮有二種一者食他人施不如法修道放心縱逸無善可記二者與施轉施施不如法因此二處當墮三塗應施者若父母貧苦應先受三歸五戒十善然後施與若不貧雖受歸戒不中施與復有施處治塔人奉僧人治僧房人計其功勞當酬作價若過分與為施所墮施病者食當作慈心隨宜與之若錯誤與食為施所墮嬰兒牢獄繫人懷妊者當以慈心施之勿望出入得報詣僧坊乞者當自有糧不須施與若無糧食施之無咎若比丘不坐禪不誦經不營佛法僧事受人施為施所墮若前人無此三業知而轉施與者受者皆為施所墮寧吞鐵丸而死不以無戒食人信施若足食已更強食者不加色力但增其患是故不應無度食也第三十六使他犯餘食法戒總釋此是不共戒尼犯不同大乘同學律攝云欲令他犯返詰過故制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人一比丘貪餮不知足食不足食不知餘食不餘食得而食之異比丘語言未曾有如汝貪餮嗜食者不知足食不足食不知餘食不餘食得而食之彼聞心懷恚恨於異時見彼比丘食已不作餘食法殷勤請與食即受食之貪餮比丘語言未曾有如汝貪餮不知足食不足食不知餘食不餘食得而食之不知厭足報言我雖食而未足彼比丘言汝食先已飽足彼言知我足食耶答言知諸比丘聞白佛呵責結戒時諸比丘未知足食不足食後乃知已足食或有作波逸提懺悔者或有畏慎者佛言不知不犯當如是説戒所立戒相若比丘知他比丘足食已若受請不作餘食法殷勤請與食長老取是食以是因緣非餘欲使他犯波逸提釋義知者若自知或從他聞知或彼自言我已足食故知食者謂正食簡餘非食足者如前釋殷勤請與食長老取是食長老稱呼之辭內懷瞋恚外現殷勤欲報先讐強勸令食以是因緣非餘欲使他犯欲使他犯戒生惱因緣非為餘事犯緣此戒具足四緣方成本罪一心懷瞋恨二知他足食三不作法與四食已入咽定罪此中犯者若彼即受食之咽咽二俱波逸提若與令食彼不食棄之與者突吉羅若與令食彼不食舉置若與令食彼轉與餘人若不作餘食法與彼作餘食法而食之若與病人食欲令他犯持病人殘食與他欲令他犯若作餘食法已與他欲使他犯與者皆突吉羅足食足食想波逸提足食疑突吉羅不足食足食想突吉羅不足食疑突吉羅尼等四衆突吉羅是謂為犯開緣不犯者先不知足食不足食想若與令棄而食之若與舉置而食之若令遣與人取而食之若未作餘食法與令作餘食法食彼不作餘食法而食之若持病人殘食與不令他犯作餘食法與不令他犯無犯不犯者最初未制戒等第三十七非時食戒總釋此是共戒尼亦同結大乘同制律攝云因長貪招譏制斯學處緣起處佛在耆闍崛山起緣人難陀跋難陀入城觀看伎樂向暮方還迦留陀夷日暮入城乞食至一懷妊婦女家婦女持食出門值天雷電暫見其面怖稱言鬼鬼即墮身迦留陀夷言大妹我非鬼我是沙門釋子婦女恚言沙門釋子寧自破腹不應夜行乞食尊者還向諸比丘説少欲者白佛呵責結戒所立戒相若比丘非時受食食者波逸提釋義時者明相出乃至日中按此時為法四天下亦爾謂比丘依四洲住即準彼處日出至日中為受食之時也若東洲日出北洲日中南洲半夜西洲日沒東洲日午南洲日出西洲半夜北洲日沒東洲日沒南洲日中西洲日出北洲半夜東洲半夜南洲日沒西洲日中北洲日出贍部洲僧向餘三洲住但依彼處時而食莫過日中也故云四天下亦爾也非時者從日中乃至明相未出薩婆多云從晨至日中世人營事作飲食故名為時從中至後夜分燕會嬉戲自娛樂時比丘遊行有所觸惱故名非時又比丘從晨至中是乞食時應入聚落往來遊行故名為時從中至後夜分應靜拱端坐誦經坐禪各當所業非是行來入聚落時故名非時也食者有二種佉闍尼食五不正食蒱闍尼食五正食犯緣此戒具足三緣方成本罪一非時受食二非時想三食已入咽定罪此中犯者非時受食食咽咽波逸提若非時過非時波逸提七日過七日波逸提盡形壽藥無因緣服者突吉羅非時非時想波逸提非時疑突吉羅非時時想突吉羅時非時想突吉羅時疑突吉羅比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者時有乞食比丘見他作黑石蜜中有罽尼畏慎不敢非時噉佛言聽噉無犯作法應爾此無正翻義當雜物律云諸比丘入村乞食見作石蜜以雜物和之皆有疑不敢非時食佛言聽非時食作法應爾五分云作石蜜時搗米著中本草云西戎用水牛乳汁米粉和沙糖煎煉而作石蜜根本羯磨云然西國造沙糖時皆安米屑如造石蜜安乳及油佛許非時開其噉食而為防粗相長道資身時有病比丘服吐下藥比煮粥熟頃日時已過應煮麥令皮不破漉汁飲之無犯若喉中哯出還咽無犯不犯者最初未制戒等會詳婆沙論云如來自誕生王宮以至涅槃於中曾無非時之餐謂諸佛性恆處中道不著二邊故離非時食以表中道故制中食而中前得食者表前方便得有證義亦令身心獲現利故中後不食則少眠睡無宿食患身輕安隱易得入定有如是義故令中食舍利弗問經云舍利弗白佛言有諸檀越造僧伽藍厚置資給供來世僧有似出家人非時就典食者索食與者食者得何等罪其本檀越得何等福佛言非時食者是破戒人是犯盜人非時與者亦破戒人亦犯盜人盜檀越物非施主意施主無福以失物故但有發心置立之善舍利弗言時受時食時不盡者非時復食或有時受至非時食復得福不佛言時食淨者是即福田是即出家是即僧伽是即天人良友是即天人導師其不淨者猶為破戒劫盜餓鬼為罪窟宅非時索者以時非時非時輒與是典食者是名退道惡魔名三惡道破器是癩病人壞善果故諸婆羅門不非時食外道梵志亦不邪食況我弟子知法行法而當爾耶凡如此者非我弟子非法之人盜與盜受一團一撮片鹽片醋死墮燋腸地獄吞熱鐵丸從地獄出生豬狗中食諸不淨又生惡鳥人怪其聲後生餓鬼還僧伽藍中處都圊內噉食糞穢並百千萬歲更生人中貧窮下賤所可言説人不信用不如盜一人物其罪尚輕割奪多人福田故斷出世道故毗尼序云病比丘服吐下藥中後心悶佛令與熬稻華汁飲與竟悶猶不止佛令與竹笋汁與竟不瘥佛令囊盛米粥絞汁與飲病猶不瘥佛令將至屏處與米粥根本百一羯磨云有五種果若時非時若病無病並隨意食一訶黎勒此云天主持來其味苦溫無毒固腸泄痢咸安斂肺而喘嗽俱止利咽喉下食積除脹滿二毗醯勒三菴摩勒即嶺南餘甘子形似檳榔食之除風四末粟者即胡椒味辛大熱下氣溫中除風去痰五畢茇利即蒟醬內法傳云牙中食在舌上膩存未將淨水重漱已來涎唾必須外棄若日時過更犯非時觀水觀時是曰律師第三十八殘宿食戒總釋此是共戒尼犯亦同大乘同制此是制罪律攝云由此非法制斯學處緣起處佛在耆闍崛山起緣人尊者迦羅常坐禪思惟時到入城乞食自念日日乞食疲苦我寧可食先得者後得食當持還即如所念為之諸比丘於小食大食上不見迦羅疑命終遠行等後見問知其故白佛訶責結戒所立戒相若比丘殘宿食者波逸提釋義殘宿者今日受已至明日於一切沙門釋子受大戒者皆不清淨十誦云大比丘未手受而共宿者名曰內宿噉者突吉羅若已手受舉共宿者名殘宿食噉者波逸提食者有二種正食非正食犯緣此戒具足三緣方成本罪一殘宿食二作殘宿想三食已入咽定罪此中犯者若舉宿食而食咽咽波逸提非時過非時食者波逸提七日藥過七日食者波逸提盡形壽藥無因緣而服者突吉羅宿作宿想波逸提宿疑突吉羅非宿宿想突吉羅非宿疑突吉羅薩婆多云共食宿有三種若受食已作己有想若共宿若不共宿經宿突吉羅食則波逸提若自手捉食名惡捉捉時突吉羅作己有想經宿亦突吉羅食亦爾若食不受不捉作己有想經宿突吉羅食亦突吉羅不問共宿不共宿但作己有想名內宿若他比丘食共宿無過十誦云先自取果後淨人受而食突吉羅有二種觸食食無罪一清淨比丘誤觸二破戒比丘無慚愧觸天食過中可食以無實體故也可七日受尼陀那云所餘餅果持與求寂明旦還得食之若有希望心與時惡作食時犯墮若總無希望心不犯目得迦云若病者貧設是殘觸酥油服之無罪善見云若衆多比丘共行唯一沙彌比丘各自擔糧至食時各自分分沙彌得分已語比丘言今持沙彌分與大德易得已復與第二座易展轉乃至衆多食皆無犯若沙彌不解法比丘自持食分與沙彌展轉易得食不犯比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者宿受食有餘與父母塔作人作房舍人計價與異時乞食從彼人得鉢有孔罅食入中彼摘洗穿壞如法洗餘不出者無犯若宿受酥油脂用灌鼻若縮鼻時酥油隨唾出應棄之餘無犯不犯者最初未制戒等第三十九自取食戒總釋此是共戒尼犯亦同大乘比丘同制此是制罪律攝云因其非法制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人有一比丘常乞食著糞掃衣時城中諸居士為命過父母兄弟姊妹夫婦男女於四衢道頭或於門下河邊樹下祭祀供養彼比丘自取食之諸居士譏嫌諸比丘白佛呵責結戒諸比丘疑不敢自取水及楊枝佛言聽當如是説戒所立戒相若比丘不受食若藥著口中除水及楊枝波逸提釋義不受者律攝云謂不從授學人苾芻尼式叉摩那求寂男女并諸俗類而受得也受有五種受手與手受或手與持物受或持物授手受若持物授持物受若遙過物與與者受者俱知中無觸礙得墮手中是謂五種受復有五種受食若身與身受若衣與衣受若曲肘與曲肘受若器與器受若有因緣置地與是謂五種受食者佉闍尼食及五正食藥者奢耶尼食此無正翻意取含消為義根本羯磨云奢耶尼者遍檢梵本全無此名謂酥油生酥蜜石蜜犯緣此戒具足三緣方成本罪一不從人受二作不受想三食已入咽定罪此中犯者不與食自取著口中除水及楊枝咽咽波逸提非時過非時食者波逸提七日藥過七日食者波逸提盡形壽藥無因緣不受而食者突吉羅不受不受想波逸提不受疑突吉羅受不受想突吉羅受疑突吉羅五分云除當食但不得咽聽從龍受食天受食鬼受食獼猴受食以施主語受食不得受擲食食律攝云時有施主持諸供養列在衆前本心擬施家中火起棄食往救無人授食時欲將過佛言應作北洲想自取而食若受得食有不受食墮中若有淨人更令其授必無授者撥去食之若汁墮中多却方食若先受得小兒來觸更受方食若是病人無人可受不受無犯問四分遙擲物與便成受五分不得受擲食此義何從答四分謂有因緣遙擲與心非輕慢故成受食五分既無因緣擲過而與心既無敬故制不食比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者取水及楊枝若乞食比丘鳥銜食墮鉢中若風吹墮鉢中除去此食乃至一指爪餘者無犯不犯者最初未制戒等會詳薩婆多云有四人得從受食男女黃門二根非人畜生亦成受食凡受食者一為斷竊盜因緣故二為作證明故從非人受食得成受食不成證明所以聽非人邊受食者曠絶之處無人受食是故聽之若在人中非人畜生及無智小兒一切不聽也又為止誹謗故為少欲知足故生他信敬心故如昔有一比丘與外道共行止一樹下樹上有果外道語比丘上樹取果比丘言我比丘法樹過人不應上又言搖樹取果比丘言我法不得搖樹落果外道上樹取果擲地與之語取果食比丘言我法不得不受而食外道生信敬心知佛法清淨即隨比丘於佛法中出家尋得漏盡第四十無病索好食戒總釋此是不共戒尼制不同大乘同制菩薩縱使有病不得食魚肉梵網云夫食肉者斷大慈悲佛性種子是故一切菩薩不得食一切衆生肉等律攝云因生譏嫌制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人跋難陀有一商主為檀越詣彼言我今欲得雜食商賈問言有何患乃思此食報言無所患但意欲得耳商賈言我曹常賣買生活猶尚不能得雜食況出家人諸比丘聞白佛呵責結戒諸病比丘皆畏慎不敢乞得已不敢食佛言聽當如是説戒所立戒相若比丘若得好美飲食乳酪魚及肉若比丘如此美飲食無病自為己索者波逸提釋義若比丘得好美飲食下不索而得無有過罪下文故索而成犯好美食者乳酪魚及肉薩婆多云所以名美食者以價貴故以難得故以愈病故或美食非美藥乳酪酥等是或美藥非美食生酥油是亦美食亦美藥酥肉魚脯是非美食亦非美藥訶梨勒等是無病自為己索者病者黃爛癰痤痔病不禁黃病瘧病咳嗽消羸風腫水腫如是種種病必須美飲食病可除瘥是故聽乞聽食也自為者二種若自索若使他為己身索也犯緣此戒具足三緣方成本罪一無病緣二是美飲食三得食入咽定罪此中犯者無病自為身乞如此美飲食咽咽波逸提律攝云無病而乞無病而食得波逸底迦及惡作罪無病從乞有病而食乞得小罪食時無犯有病從乞無病而食乞時無犯食時墮罪有病從乞有病而食無犯若乞時欲得餘物者他持食與報言姊妹我飯已足若問更何所須即便隨情所欲從乞無犯若施主言有所須者隨意可索隨乞無犯或從天龍藥叉毗舍乞求皆無犯比丘尼及三小衆突吉羅是謂為犯開緣不犯者病人自乞為病人乞若不乞而得無犯不犯者最初未制戒等第四十一自手與外道食戒總釋此是共戒尼犯亦同大乘同制然觀機宜可與不可律攝云由外道事長物譏嫌制斯學處此戒二緣合結緣起處佛將千二百五十弟子從拘薩羅至舍衛國薩婆多云千二百五十人者優樓頻螺迦葉兄弟門徒千人舍利弗目犍連等二百五十人皆是善來所以常偏稱千二百五十人者是諸人同是婆羅門中出家故又以門徒師衆大故又俱是善來故又皆是阿羅漢故是佛常隨衆也起緣人諸檀越供養大得餅食佛敕阿難與僧分餅分已有餘敕與乞人有一裸形外道女顏貌端正阿難付餅餅黏相著謂是一餅與此女女問傍人得幾餅彼言我得一餅彼即復問汝得幾餅報言我得二餅彼婦女言彼與汝私通何得與汝二餅阿難聞即懷愁憂諸比丘聞亦復不樂有一梵志在此食已向拘薩羅逢一篤信瞻相婆羅門問從何來報言我從舍衛國來復問乞食可得不報言可得問從誰得報言禿頭居士邊得問言何者禿頭居士報言沙門瞿曇是婆羅門言汝是何人食他食已發此惡言諸比丘以此二緣白佛結戒諸外道等皆怨言一二外道有過我曹復有何過而不得食耶比丘白佛佛言欲與食者當置地與若使人與當如是説戒所立戒相若比丘外道男外道女自手與食者波逸提釋義外道男女者裸形異學人在此外道出家者是心不達理心遊理外故名外道薩婆多云佛言除佛五衆餘殘出家人皆名外道此裸形發起因人制戒及餘外道皆不德自手與食也外道有九十六種不出六師門徒一師有十五種教以授弟子為教各異弟子受行各成異見如是一師出十五種異見師別有法與弟子不同師與弟子通為十六種如是六師有九十六種師所用法及其將終必授一弟子如是師師相傳常有六師央掘經云無量阿僧祗劫有佛號拘孫陀羅跋陀羅法欲滅時有一蘭若比丘名佛慧檀越施無價衣因賊劫打破其身裸形懸手繫于樹而去採花婆羅門見之起妄執云沙門必知袈裟非解脫因髮裸形外道因是而起其比丘後得脫取樹皮赤石塗以自障結草作拂用拂蛟蟲出家外道從見是而起比丘暮入水浴以牧牛人所棄弊衣障身即弊衣三日浴外道從見是起比丘以身瘡蟲等唼食以灰塗身塗灰外道因見此起比丘以火炙瘡瘡痛難忍遂投巖而死因此事火投巖外道起也如是九十六種外道皆因是比丘種種形而起效而行之食者五正食五不正食犯緣此戒具足三緣方成本罪一是外道二自手與食三授受已竟定罪此中犯者裸形外道若男若女自手與食者波逸提若與而受波逸提與而不受突吉羅方便欲與而不與還悔者一切突吉羅薩婆多云若自手與一切九十六種異見人食不問在家出家裸形有衣悉波逸提若衆僧與外道食無過正不得自手與五分云若外道來乞應己分一摶別一處使其自取不應持僧分與尼等四衆突吉羅是謂為犯開緣不犯者若捨著地與若使人與若與父母與塔作人別房作人計作食價與若力勢強奪無犯根本云或欲以食因緣除彼惡見與亦無犯十誦云不犯者若彼有病若親里若求出家時與謂四月與波利婆沙之時也未受食不應與他先受已後當與彼若繫閉人急須食人妊身女人應正觀多少與之畜生應與一口不犯者最初未制戒等會詳賢愚經云目連擕福增比丘入海行次見一大樹多蟲圍唼其身乃至技葉無有空處如針頭許大呌震動如地獄聲比丘問目連目連告曰是瀨利吒營事比丘用僧祇物華果飲食送與白衣受此華報後墮地獄唼樹諸蟲即是得物之人也第四十二詣餘家不囑授戒總釋此是共戒尼犯亦同大乘同學律攝云由俗家事過限廢闕煩惱制斯學處此戒六緣合結緣起處佛在給孤獨園有一長者與跋難陀親友作是念若跋難陀來入城者當為彼故飯食衆僧起緣人異時難陀入城長者聞即請比丘食諸比丘到長者家待跋難陀跋難陀小食時詣餘家時垂欲過乃來使諸比丘食不滿足諸比丘白佛結戒不聽先受請小食時至餘家有一大臣是跋難陀親友大得甘果敕人持果語跋難陀分與僧跋難陀後食已詣餘家時過乃還使衆僧不得食新果佛呵責結戒不聽前食後食詣餘家城中大有請處諸比丘皆畏慎不敢入城佛言聽相囑授入城諸比丘不知當囑授誰佛言囑授比丘若獨處一房中當囑授比近住者更加不囑授之句病比丘先語檀越家作羮作粥作飯畏慎不敢入城佛言聽病比丘不囑授復結除病時作衣比丘或有所須皆畏慎不敢入城佛言聽作衣時不囑授復加作衣時後施衣時到或有已得施衣處或有方當求索彼畏慎不敢入城佛言聽布施衣時不囑授入城當如是説戒所立戒相若比丘先受請已前食後食詣餘家不囑授餘比丘除餘時波逸提餘時者病時作衣時施衣時是謂時釋義先受請者謂先受四姓家請食已前食者明相出至食時是後食者從食時至日中是家者有男有女所居也餘家者謂非所請之家不囑授者若比丘囑授欲詣村而中道還失前囑授後若欲去者當更囑授若比丘囑授欲詣不至所囑授處乃更詣餘家失前囑授若欲往應更囑授而去若囑授至白衣家乃更至庫藏處聚落邊房若比丘尼僧伽藍中若即白衣家還出失前囑授應更囑授而往餘比丘者同一界共住也作衣時者如上一月五月乃至衣上作馬齒一縫施衣時者亦如上一月五月及餘時勸化作食并施衣者是也犯緣此戒具足三緣方成本罪一同衆受請二詣餘家不囑三兩足過限定罪此中犯者先受請已前食後食詣餘家不囑授比丘入村除餘時波逸提若一腳在門內一腳在門外方便莊嚴欲去而不去一切突吉羅薩婆多云雖大界內近寺白衣家不白亦犯墮若白而還晚令僧生惱者突吉羅比丘尼波逸提三小衆突吉羅是謂為犯開緣不犯者病時作衣時施衣時不囑授比丘若無比丘不囑授至庫藏聚落邊房若至比丘尼僧伽藍至所囑白衣家若為力勢所持或命難梵行難無犯律攝云若語施主我設不來應與僧食勿廢闕若施主不以此人而為先首並無犯不犯者最初未制戒等
