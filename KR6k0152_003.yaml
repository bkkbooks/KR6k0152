body:
  text: 清金陵寶華山律學沙門德基輯第三殺戒初總釋殺為世間最傷慈之事此是共戒尼結罪同大乘同制梵網經云若自殺教人殺方便殺讚歎殺見作隨喜乃至呪殺等此是性罪釋迦成佛商怨終舒於鐵杙陀夷證聖羊瞋卒泄於凶鋒故經云假使經百劫所作業不亡因緣會遇時果報還自受非空非海中非入山石間無有地方所脫之不受報律攝云凡為殺者並由癡故於事不忍內懷瞋恨斷他命根制斯學處二緣起處佛遊毗舍離獼猴江邊講堂中有獼猴常在此江邊洗浴故云獼猴江根本云獼猴池邊此池在毗舍離宮城外五六里菴羅女園側是昔獼猴羣集為佛穿作此池供養世尊今此講堂或近二處隨稱一處皆可説不淨觀歎不淨觀歎思惟不淨觀亦名九想觀此九種不淨觀法想念純熟心不分散即得三昧成就自然貪欲殄除惑業消滅得證道果此之九想雖是假想作觀然用之能成大事譬如大海中死尸溺人附之即得渡也一肨脹想謂修行之人心想死尸見其肨脹如韋盛風異於本相是名肨脹想二青瘀想既觀肨脹已復觀死尸風吹日𭨃皮肉黃赤瘀黑青黤是為青瘀想三壞想既觀青瘀已復觀死尸風日所變皮肉裂壞六分破碎五臟腐敗臭穢流溢是為壞想四血塗漫想既觀壞已復觀死尸從頭至足遍身膿血流溢汙穢塗漫是為血塗漫想五膿爛想既觀塗漫已復觀死尸身上九孔蠱膿流出皮肉爛壞狼藉在地臭氣轉增是為膿爛想六蠱噉想既觀膿爛已復觀死尸蠱蛆唼食鳥獸咀嚼殘缺剝落是為蟲噉想七散想既觀蟲噉已復觀死尸為禽獸所餐分裂破散筋斷骨離頭足交橫是為散想八骨想既觀散已復觀死尸形骸𭨃露皮肉已盡但見白骨狼藉如貝如珂是為骨想九燒想既觀骨已復觀死尸為火所燒爆裂煙臭白骨俱然薪盡火滅同於灰土是為燒想比丘聞已習不淨觀厭患身命求刀自殺三起緣人時有比丘字勿力伽難提是沙門種出家勿力伽難提此云鹿喜沙門種是姓手執利刀入婆裘園有一比丘語言大德斷我命來我以衣與汝即受雇斷其命於彼江邊洗刀心生悔恨我今無利非善得彼比丘無過而我受雇斷他命根善見律云鹿杖沙門殺比丘血汙手足及刀往婆裘河者世間有人言此河能洗人罪鹿杖沙門念言我當往婆裘河洗除我罪悔過剋責而長歎息故往洗之婆裘河者此云勝慧河有一天魔知彼心念立水勸讚善哉善男子汝今獲大功德度未度者時勿力伽難提悔心即滅復入園中殺諸比丘至六十人園中死尸狼藉臭處不淨狀如冢間居士譏嫌諸比丘猶自相殺況於餘人我等自今勿復承事供養勿復容止往來善見律云如來以天眼觀往昔有五百獵人共入阿蘭若處殺諸羣鹿為業墮三惡道受諸苦惱經久得出昔有微福得生人間出家為道宿殃未盡於半月中更相殺害諸佛所不能救於此五百人中四果聖衆生死有際有餘凡人輪轉無際是故為説不淨觀令離愛欲得生天上本不教死但不可以神力救護是故為説不淨觀已半月入於靜室唯聽一人送食勿使諸人作如是言佛是一切智而不能斷諸弟子相殺以世尊入定無人得往説如此事耳薩婆多云佛一切智何故教諸比丘得如是衰惱若不知者不名一切智答曰佛一切等教爾時不但六十人受不淨觀佛教法無有偏但受得利有多有少佛深知衆生根業始終必以此法因緣後得大利六十比丘迦葉佛時所受不淨觀法不能專修多犯惡行命終入地獄中今佛出世罪畢得生人間墮下賤家出家入道以本緣故應受此法既命終已得生天上於天來下從佛聽法得獲道迹以是因緣佛無偏也毗舍離比丘以小因緣集在一處時佛觀衆減少知而故問阿難具白上事佛告諸比丘有阿那般那三昧寂然快樂諸不善法即能滅之永使不生即十六特勝法門也阿那般那此云遣來遣去遣來入息也遣去出息也十六特勝者一知息入二知息出三知息長短四知息遍身五除諸身行六受喜七受樂八受諸心行九心作喜十心作攝十一心作解脫十二觀無常十三觀出散十四觀離欲十五觀滅十六觀棄捨言特勝者從因緣得名如外道等並能修得四禪四空四無對治觀行故不出生死此十六法有定有觀具足諸禪能發無漏故名特勝也若以十六法橫對四念處每念處有四法共成十六此易可知今約豎對三界以明修證之相一知息入二知息出者對代數息也行者調息綿綿一心依隨於息息入時知從鼻端入至臍息出時知從臍出至鼻如是一心照息依隨不亂爾時知息粗細之相知風喘氣為粗息相為細息有四事一為風二為氣三為息四為喘止觀云有聲曰風守之則散結滯曰氣守之則結出入不盡曰喘守之則勞不聲不滯出入俱盡曰息守之則定粗即調之令細如守門人知人出入亦知好人惡人知好則進知惡則遮復知輕重滑澀冷暖久近復知因入出息則有一切衆苦煩惱生死往來輪轉不息心知驚畏若暗心數息無有觀行正修證時多生愛見慢等諸煩惱病愛者愛著此數息見者謂見我能數慢者謂我能數以此慢他今隨息時即知此息無常命依於息以息為命一息不還即便無命知息無常即不生愛知息非我即不生見悟無常即不生慢此則從初方便已能破諸結使不同數息以一心依息令心不散得入禪定故名亦愛覺悟無常故名亦策與定相應名亦有漏觀行不著名亦無漏也知入知出正依隨息為門三知息長短者對欲界定也外凡證欲界定時都不覺知息中相貌今此中初得定時即覺息中長短之相覺悟無常轉更分明證欲界定故名亦愛觀行覺無常故名亦策也四知息遍身者對未到地定也凡外證未到地直覺身相泯然如虗空爾時實有身息但以眼不開故不覺不見今特勝中發未到地時亦泯然入定即覺漸漸有身如雲影覺出入息遍身毛孔亦知息長短相等見息入無積聚出無分散無常生滅覺身空假不實亦知生滅剎那不住三事和合故有定生三事既空則定無依知空亦空於空不著亦愛亦策如前説也五除諸身行者對初禪覺觀支也言身行者欲界身中發得初禪則色界四大造色觸欲界身欲界身根生識覺此色觸二界色相依共住故名為身身即覺支從此身分生觀知身中之法有所造作故名身行身行即是觀支言除者因覺息遍身發得初禪心眼開明見身三十六物臭穢可惡爾時即知三十六物由四大有頭等六分一一非身四大之中各各非身此即是除欲界身也又於欲界身中求色界四大不可得名除初禪身所以者何若言有色界造色者為從外來為從內出為在中間住如是觀時畢竟不可得但以顛倒憶想故言受色界觸諦觀不得即是除初禪身身除故身行即滅也六受喜者對破初禪喜支也根本禪中喜支從隱沒有垢覺觀後生既無觀慧照了多生煩惱故不應受今於淨禪覺觀支中生喜以有觀行破析達覺觀性空則所生喜亦空於喜不著無諸過罪故説受喜如阿羅漢不著一切供養故名應供也七受樂者對破初禪樂支也根本禪無觀慧樂中多染故不應受今知樂性空不著故無過罪説受樂也八受諸心行者對破初禪一心支若根本禪入一心時心生染著故不應受今知此一心虗誑不實一心非心即不取著既無過罪即是三昧正受故説受諸心行也九心作喜者對二禪內淨喜也根本二禪喜從內淨發以無智慧照了多生受著今觀此喜即知虗誑不生受著名喜覺分從正觀心生真法喜故名心作喜也十心作攝者對二禪一心支也二禪喜動今返觀喜性既知空寂畢竟定心不亂不隨喜動也十一心作解脫者對破三禪樂也三禪有遍身之樂凡夫得之多生愛縛不得解脫今以觀慧破析知此樂從因緣生空無自性虗誑不實觀樂不著心得自在也十二觀無常者對破四禪不動也三禪為樂所動故四禪名不動定凡夫得此多生常想心生愛取今觀此定生滅代謝三相所遷知是破壞不安之相也十三觀出散者對破空處也出者出離色界散者散三種色一可見有對色二不可見有對色三不可見無對色又出離色界心依虗空消散自在不為色法所縛故名出散凡夫得此謂是真空安隱心生取著今觀虗空處定知是四陰和合而有無自性不可取所以者何若言有出散者為虗空是出散為心是出散若心是出散者過去心已謝未來心未生現在心不住何能出耶若空是出散者無知之法有何出散既不得空定則心無受著也十四觀離欲者對識處也一切愛著外境皆名為欲從欲界乃至空處皆是心外之境若虗空為外境識來領受此空即以空為所欲今識處定緣於內識離外空欲故名離欲凡夫得此無慧眼照了謂言心與識法相應真實安隱即生染著今以觀慧破析知三世識皆不與現在心相應故此識定但有名字虗誑不實也十五觀滅者對無所有處也此定緣無為法塵心與無為相應對無為法塵發少分識凡夫謂為心滅深生愛著為其所縛今觀此少識亦有四陰和合無常無我虗誑不實譬如糞穢多少俱臭不染著也十六觀棄捨者對非想非非想也非非想是兩捨之對治從初禪來但有偏捨無有兩捨今此定雙捨有又是捨中之極故名棄捨凡夫得此謂為涅槃無有觀慧覺了不能捨離今知此定亦是四陰二入意入法入三界意界法界意識界及十種細心所等觸作意受想思欲解念定慧和合所成無常苦空無我虗誑不實不應計為涅槃既知空寂即不受著也行者爾時深觀棄捨即便得悟三乘涅槃然未必須皆具十六或得三二特勝即便發悟亦有利根初隨息時覺悟無常即發無漏由其從初俱發根本定故名亦有漏於中觀慧破析不著名亦無漏一往勝六妙門也以無數方便訶責婆裘園中比丘已與諸比丘結戒四所立戒相若比丘故自手斷人命持刀與人歎譽死快勸死咄男子用此惡活為寧死不生作如是心思惟種種方便歎譽死快勸死是比丘波羅夷不共住釋義人者從初識至後識而斷其命此識即第八阿賴耶識名曰藏識以其無法不含無事不攝故又名持業識能持一切善惡種子故瑜伽論云此識最初於母腹托胎之時如磁石吸鐵是名初識乃至命將終時冷觸漸起惟有此識能執持身此識若捨四大分散是名命終識亦名後識所謂去後來先作主也又一切衆生皆以受暖識三色心相連不斷名為命根今使彼色心不能相續名為命斷故者故心行殺顯非錯誤也自手者謂自手行殺或身塠壓令死或手或腳或肘或膝及餘身分若杖若石若磚遙擲殺人皆云自手也持刀與人者根本云若知彼人欲得自殺以大刀剃刀刺刀等而安其前欲令自害歎譽死快勸死根本云言勸死者於三種人勸之令死謂破戒持戒及以病人往破戒人所作如是言具壽知不汝今破戒作諸罪業身語意三常造衆惡具壽汝命長存惡業增多長受地獄苦應可捨身自斷其命云何勸持戒者往彼語言具壽知不汝既持戒修諸善法又能展手施恆常施愛樂施廣大施分布施汝有此福必生天上持戒人問曰具壽我今欲何所作報言應可捨身自斷其命云何勸病比丘死往彼所言具壽知不汝既重病極受苦惱汝若久存病轉增劇常受辛苦汝應捨身自斷其命如是種種歎勸也咄男子咄者乃是警覺之辭男子乃是招呼之語作如是心思惟種種方便歎譽死快勸死作如是心者即歎死勸死之心非為餘事犯緣此戒具足四緣方成本罪若緣有缺罪便結輕一有殺心二是人趣三作人想四命根斷定罪此中犯者若自殺若教殺若遣使殺若往來使殺若重使殺若展轉使殺若求男子殺若殺人求男子殺若求持刀人殺若殺求持刀人殺若身現相若口説若身口俱現相若遣書若教遣使書若坑陷若倚發若與藥若安殺具若自殺者若以手若瓦石刀杖乃至餘物而自殺教殺者殺時自看前人擲水火中若山上推著谷底若使象踏殺若使惡獸噉或使蛇螫及餘種種教殺遣使殺者比丘遣使斷某甲命隨語往斷命往來使者比丘遣使往斷某甲命隨語往欲殺未得殺便還即承前教復往殺重使殺者比丘遣使汝去斷某甲命續復遣使如是乃至四五彼使即往殺展轉使者比丘遣使汝斷某甲命彼使復轉遣使乃至百千往斷其命求男子者是中誰知有如是人能用刀有方便久習學不恐怖不退能斷某甲命彼使即往斷其命教求男子者教人求是中誰知有如是人能用刀有方便久習學不恐怖不退能斷某甲人命彼使即往斷其命求持刀者自求誰勇健能持刀斷某甲命彼即往殺教求持刀亦如是身現相者身作相殺令墮水火中從山上墮谷底令象踏殺令惡獸食毒蛇螫彼因此現身相故自殺或作是説汝所作惡無仁慈懷毒意不作衆善行汝不作救護汝生便受罪多不如死若復作是語汝不作惡暴有仁慈不懷毒意汝已作衆善行汝已作功德汝已作救護汝生便受衆苦若死當生天上若彼因此言故便自殺身口現相亦如是遣使者若使往彼汝所作善惡廣説如上承此使口歎死者遣書殺者執書言汝所作善惡廣説如上遣使書者亦如是坑陷者審知彼所行道必從是來往當於道中鑿深坑著火若刀若毒蛇若尖杙若毒塗刺若墮坑中死倚發者謂做定機關安諸殺具倚著即發也知彼人必當倚發彼處若樹若墻若柵於彼外若著火若刀若杙若毒蛇若毒塗刺機發使墮中死藥者知彼人病與非藥若雜毒或過限與種種藥使死安殺具者先知彼人本來患厭身命惡賤此身即持刀毒若繩及餘死具置之於前如上一一死者波羅夷不死者偷蘭遮若天子若龍子阿修羅子犍闥婆子夜叉餓鬼若畜生中有智解人語若復有能變形者方便求殺殺者偷蘭遮不死者突吉羅畜生不能變形若殺者波逸提不死突吉羅實人人想殺波羅夷人疑偷蘭遮人非人想偷蘭遮非人人想偷蘭遮非人疑偷蘭遮第四分云方便墮他胎波羅夷母死兒活母死無犯但得偷蘭遮謂殺心在兒不在母母死無犯既未遂本心罪結方便衆多比丘遣一人斷他命一切波羅夷五分律云自殺身偷蘭遮入母胎後至四十九日名為似人過此盡名為人若人若似人殺者波羅夷似人者謂托母胎初得二根始處緣時父精母血相合自識處中得身命二根名為似人過七七日六根具足成人形相故名為人若作書令彼殺字字偷蘭遮書至彼因是死波羅夷若作相似語教人殺彼因此死波羅夷凡發殺心時突吉羅作方便時偷蘭遮死者波羅夷有二比丘相瞋後共道行於路相打一人遂死佛言無殺心不犯重瞋打比丘波逸提從今不聽相瞋未悔者共道行犯者突吉羅欲殺彼誤殺此偷蘭遮謂於此人全無殺心但得方便偷蘭遮十誦云若為人作坑桁弶羅等人因是死波羅夷若不即死後因是死亦波羅夷後不因死偷蘭遮若為非人作非人死者偷蘭遮人畜死皆突吉羅謂於人畜無有殺心故若不定一事作諸有來者皆令死人死波羅夷非人死偷蘭遮畜生死波逸提都無死者一偷蘭遮二突吉羅自斷指突吉羅看病久生厭心置令死偷蘭遮令趣得藥食便服死者偷蘭遮摩得勒伽云欲殺凡人誤殺羅漢欲殺羅漢誤殺凡人欲殺父誤殺母欲殺母誤殺父皆偷蘭遮不得重逆問即誤殺生身父母出世聖人何故不失戒耶答殺盜二戒論心不論事今於所欲殺者未遂其心罪結方便所誤殺者實無殺心故不得重逆三途果報寧得免哉薩婆多云若以比丘語故征統異國兼得財寶皆得殺盜二波羅夷若執刀欲殺發足步步輕偷蘭乃至未傷人已還盡輕偷蘭若刀著人不問深淺命未斷已還重偷蘭若死波羅夷若為殺人故作坑未成時突吉羅作竟輕偷蘭若人墮中勇健即能出坑得重偷蘭若墮坑中不死亦重偷蘭作作撥亦爾若遣使殺人當教時得輕偷蘭若殺時得波羅夷若遣使殺人教彼人若來者殺而受使者彼人去時殺者比丘得輕偷蘭若教刀殺而用杖殺若教殺此而殺彼凡不本教更異方便盡輕偷蘭若以刀杖欲打殺人故或杖打刺刀不尋手死十日應死後更異人打即尋杖死打死比丘得波羅夷先打比丘得偷蘭問何以但害人得波羅夷答人中有三歸五戒波羅提木叉戒故又沙門四果多在人得佛與辟支佛必在人中得漏盡故是以害人得波羅夷餘道不得比丘尼波羅夷三小衆突吉羅滅擯是謂為犯開緣不犯者若擲刀杖瓦石誤著彼人身死者若營事作房舍誤墮墼石材木椽柱殺人重病人扶起若扶臥浴時服藥時從涼處至熱處從熱處至涼處入房出房向廁往返一切無害心而死者不犯不犯者最初未制戒等會詳楞嚴經云又諸世界六道衆生其心不殺則不隨其生死相續汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎第四大妄語戒初總釋妄為欺心貪利行不真實此是共戒尼制亦同大乘同制梵網經云而菩薩常生正語亦生一切衆生正語正見而反更起一切衆生邪語邪見邪業等此是性罪律攝云此由癡故因求利事及求利養煩惱制斯學處二緣合結二緣起處爾時佛在毗舍離獼猴江邊高閣講堂時世穀貴人民飢餓乞食難得佛告阿難諸有在毗舍離比丘盡集集已世尊告言汝等當知今時世穀貴乞食難得汝等諸有同和尚同師隨親厚知識各共於毗舍離左石隨所宜安居我亦當於此處安居何以故飲食難得念衆疲苦時諸比丘聞佛教已各隨所安居三起緣人時婆裘河邊僧伽藍中安居比丘向居士自説得上人法等諸居士信樂供養不為飲食所苦顏色光澤和悅氣力充足諸餘比丘在毗舍離安居者顏色憔悴形體枯燥衣服弊壞安居竟往見世尊慰問及此具白上事佛言汝等愚癡人有實尚不應向人説況復無實而向人説時世尊告諸比丘世有二賊一實非淨行自稱淨行二者為口腹故不真實非己有在大衆中故作妄語自稱言得上人法是中為口腹故自稱得上人法最上大賊何以故盜受人飲食故善見問曰此無離本處云何名為賊答曰得名為賊何以故為因虗誑妄語而得大利養故以方便取之故佛告諸比丘盜取人飲食者此名大賊以不實故時世尊以無數方便訶責已與諸比丘結戒若比丘實無所知乃至虗誑妄語等爾時有一增上慢比丘語人言我得道彼於異時精進不懈勤求方便證最上勝法彼作是念將不犯波羅夷耶我今云何尋語諸同意比丘為我白佛時諸比丘往白世尊佛言除增上慢者不犯當如是説戒四所立制相若比丘實無所知自稱言我得上人法我已入聖智勝法我知是我見是彼於異時若問若不問欲自清淨故作是説我實不知不見言知言見虗誑妄語除增上慢是比丘波羅夷不共住釋義實無所知者實無知見自稱者自稱説有信戒施聞智慧辨才人法者人陰五陰人入六入人界十八界上人法者律攝云即勝流法也謂一切凡愚五蓋等法鄙劣惡事是非上法也諸法能出要成就言諸法者即指下文也能出要者謂此諸法是能出三界之要法也成就者即證得也謂此諸法我已證得故曰諸法能出要成就此句總標下文別釋自言念在身自言正憶念自言持戒自言有欲自言不放逸自言精進自言得定自言得正受自言有道自言修自言有慧自言見自言得自言果自言念在身者有念能令人出離狎習親附此法修習增廣如調伏乘守護觀察善得平等已得決定無復艱難而得自在是為自言得身念處身念處者頭等六分四大五根假合故名為身是中觀身智慧為念明見內身五種不淨破淨顛倒即是處也五種不淨者一種子不淨二住處不淨三自體不淨四外相不淨五究竟不淨自言正憶念者有念能令人出離狎習親附此法修習增廣如調伏乘守護觀察善得平等已得決定無復艱難而得自在是為正憶念憶念一切法見法得法其心得定此遍通一切法也自言持戒謂堅持戒律慎守威儀斷一切惡自言有欲自言不放逸自言精進亦爾毗尼母云何名為欲如佛翹勤不倦故名為欲欲為法本以欲求故得一切法故名法本能生諸法大論云佛有時説為欲或時説精進有時説不放逸譬人欲遠行時初欲去是名為欲發行不住是為精進能勸踊不稽留是為不放逸以是故知欲生精進精進故不放逸不放逸故能生諸法乃至得成佛道自言得定有覺有觀三昧無覺有觀三昧無覺無觀三昧有覺有觀者初心在禪名覺行者依未到地發初禪時色界清淨色法觸欲界身根心大驚悟爾時即生身識覺此色觸未曾有功德利益即是覺支細心分別名為觀行者既證初禪功德即以細心分別此禪定中色法諸妙功德境界分明無諸蓋覆如是等功德欲界未有即名觀支智論問有覺有觀為是一法為是二法耶答二法粗心初念是名為覺細心分別是名為觀譬如撞鐘初聲大時名之為覺後聲細時名之為觀問曰如阿毗曇説欲界乃至初禪一心中覺觀相應今云何言粗心初念名為覺細心分別名為觀答曰二法雖在一心二相不俱覺時觀不明了觀時覺不明了譬如日出衆星不現一切心心數法隨時受名覺亦復如是無覺有觀者從初禪趣二禪時以覺知之心已忘分別禪味之念猶在此謂正持中説謂中間禪也大梵六天即中間定力所感無覺無觀者從二禪乃至滅受想定覺知之心分別禪味之念俱忘故名無覺觀定空無相無願三昧即三解脫門此三通名解脫門者解脫即是涅槃門謂能通謂此三法能通行者得入涅槃故名解脫門也亦名三三昧但三昧即是當體得名解脫從能通之用以受稱也證果則變名解脫云何名空解脫門空有六空內空外空內外空空空大空第一義空何謂內空一切內法思惟空知空解空受空以何義空以我空我所亦空常空不變易空何謂為外空一切外法思惟空知空解空受空以何義空以我空我所亦空常空不變易空內外空亦如是何謂空空如比丘成就空定行一切法思惟空空如上説大空亦爾何謂第一義空第一義即涅槃如比丘思惟涅槃空知空解空受空以何義空以我空我所亦空常空不變易空如是不放逸得定心住正住是名第一義空能如是通達是名空解脫門無相解脫門者以聖涅槃為境界名無相定行有相涅槃無相行有三相生住滅涅槃無三相不生不住不滅如是行有相涅槃無相涅槃是寂滅是舍宅是救護是明燈是依止是不終沒是歸趣是無燋熱是無憂惱思惟涅槃得定心住是名無相定無作解脫門者若知一切法無相即都無所作是名無作所以者何若於法有所得者即於三界而有願求因是造作三有之業今一切相皆不可得故則於三界無所願求不造一切三有生死之業無業故無報是無作解脫門自言得正受者想正受九想一肨脹想二青瘀想三壞想四血塗漫想五膿爛想六蟲噉想七散想八骨想九燒想如是想摧破結使由得三乘道十想一無常想二苦想三無我想四食不淨想五一切世間不可樂想六死想七不淨想八斷想九離想十盡想修是法斷諸結使得阿羅漢無想正受由於人中天上秉外道邪説厭患粗相數修習力伏除欲界初二三禪貪染依第四禪滅除前六識心心所法令不現行想滅為首名無想定得此定已不退不失命終即生無想天中六識不行共經四百四十九大劫或先是婆羅門則如先婆羅門坐或先是無聞比丘則如先結跏趺坐隨法正受謂涅槃清淨無纍正行之法八聖道等諸禪觀行能隨順彼圓寂之處故名隨法出於律攝心想正受則一心想息令心不散從一至十不多不少或云先數出息氣則不急身不脹滿身心輕利三昧易成若心輕浮繫心丹田當數入息若心昏沉繫心鼻端當數出息不許俱數恐生病故除色想正受虛空處背捨謂行人於欲界後已除棄自身不淨之色初背捨後又除棄內身白骨之色第二背捨後又除外身一切不淨之色尚餘八種淨色皆依心住厭色質礙不得自在若心捨色色即謝滅得出色籠飄揚無礙一心緣空與空定相應即入無邊虛空處定不除色想正受八背捨者一內有色想外觀色相云云八勝處者一內有色相外觀色少云云如此背捨勝處乃至色界四禪等俱有色相故云不除色想也除入正受若因勝處斷煩惱盡則知虗妄陰入皆滅爾時勝處變名八除入正受出禪波羅蜜十卷十二連一切入正受一青一切處二黃三赤四白五地六水七火八風九空十識是名十一切處行者住第四禪中已成就自在勝色爾時應用念清淨心捨七種色直念青色取少青光焰相如草葉大一心緣中即與少青相應觀心運此少青遍照十方即見光明隨心普照一切世間皆見青相遍滿停住不動如青世界是名青一切處餘七修相亦爾行者即成就入一切處欲入空一切處當入虗空背捨但背捨緣狹未名一切處今更廣緣十方虗空故名空一切處欲入識一切處亦當先入識處背捨於捨定中廣觀此識遍滿十方皆見是識故名識一切處既得一切處成若欲修一切入當以一切處為本然後用善巧觀心於青一切中令黃白等皆入其中不壞青之本相而能於青色中具見餘色餘亦如是是名十一切入成就此法發大神通摧伏天魔破諸外道度脫衆生即是摩訶衍也自言有道者從一支道乃至十一支道謂於十一支道中隨修一法便得道果非謂全修諸法而獲解脫也一支身念處二支定慧三支三三昧三解脫門四支四念處四正斷四如意足四無量心四禪定四空處定四向道四諦四斷五支五根五力五解脫處五出界五觀定五起解脫法六支六念六出界六明分法六悅因法六無喜正覺七支七覺分七想七定因緣法八支八聖道八背捨八勝處九支九滅九次第定十支十想十直十一切入十一支十一解脫關要事義中廣釋狎習親附思惟此道修習增廣如調伏乘守護觀察善得平等已得決定無復艱難而得自在自言修者修戒修定修智修解脫慧修見解脫即修五分法身也分即分齊法者戒定慧諸法也身者聚也聚集諸法以成其身也聚集諸法者謂聚集色受想行識之法也一戒身謂二乘因持無作之戒戒法成就證得此身故名戒身二乘者聲聞緣覺乘也無作戒者不作意持任運無犯名無作戒也二定身謂二乘因修無漏淨禪得證此身故名定身無漏者不漏落生死也淨禪者謂因修禪定能斷諸漏漏即三界煩惱既無煩惱心則清淨故名無漏淨禪也三慧身謂二乘因修無漏智慧得證此身故名慧身無漏智慧者即是觀十二因緣及觀四諦之智慧也修此智慧者即能斷三界煩惱出離有漏生死也四解脫身解縛得脫故名解脫有二種一者有為解脫謂以無漏智慧斷有漏煩惱二者無為解脫謂一切煩惱滅盡無餘煩惱既盡理本無為由此二種解脫得證此身故名解脫身五見解脫身知以智知見以眼見謂二乘因此智眼於一切法知覺照了當體即空悉皆如幻得證此身故名見解脫身自言有智法智比智等智他心智法智者知現在法是名法智現在法謂五陰等各別自相比智者知餘殘法名曰比智餘謂過去未來諸法次現在法後知故名比智所以者何先現知已然後比知等智者亦名世俗智知諸有情修行差別及知諸法名字等異故名等智他心智者知諸衆生心心所法無所滯礙故名他心智狎習親附思惟此智餘如上説自言見者見苦見集見盡見道涅槃經云我昔與汝等不見四真諦是故久流轉生死大苦海又云凡夫有苦而無諦聲聞有苦而有諦凡夫不見苦理故言無諦聲聞能見無常苦空故言有諦若復作如是言天眼清淨觀諸衆生生者死者善色惡色善趣惡趣知有好醜貴賤隨衆生業報如實知之狎習親附此見餘如上説自言得者得須陀洹果斯陀含果阿那含果阿羅漢果餘如上説我已入聖智勝法我知是我見是聖智者即法智等勝法者即如上諸法也彼於異時律攝云異時者過後之時也若先作妄語罪雖不自説者豈不犯重耶何須説此異時等言答但令犯戒設不自説已得本罪餘人於彼但可生疑未得即作不共住事是故須有異時等言方成不共住也若問若不問律攝云有人問言長老汝得聖道果耶從何法師學得此道果汝何處得得時云何待問方自説露不問者不問而自説律攝云以上三罪理無差別何故妄中方陳問等若據前三亦有此事緣起有故惟於此説也虗誑妄語者律攝云虗者顯所陳説無有實義誑者本所業心為求飲食不為勝事作斯妄説妄語者先為妄心方陳所説故云虗誑妄語也除增上慢者慢有七種一單慢謂於劣計己勝於等計已等二過慢謂於勝計己等於等計己勝三慢過慢謂於勝計己勝四增上慢未得謂得五邪慢計無德謂德六我慢執我自高七卑劣慢謂於他勝計己為劣甘為人下不生敬仰也僧祇律云有二比丘在阿蘭若住其一比丘暫成就根力覺道貪恚不起語第二比丘言長老我得阿羅漢後時遊諸聚落放縱諸根廢習止觀言止觀者乃三觀之總名也謂停息諸念曰止如理思惟曰觀內心不動曰定隨緣照了曰慧梵語奢摩他此云止止久曰定梵語三摩提此云觀觀久曰慧梵語禪那此云等該在因曰止觀在果曰定慧便起煩惱覺癡愛生還語其伴比丘言長老妄稱得過人法犯波羅夷是比丘言我非知而妄語謂為實耳以是白佛佛言此是增上慢云何於正法中信家非家捨家出家起增上慢汝當方便除增上慢可得阿羅漢果後時比丘大自慚愧即於佛前進精方便修習止觀除增上慢得阿羅漢果謂其不達法相錯認消息得小輕安自謂究竟乃是如心而説世尊開除故不結罪犯緣此戒具足七緣方成本罪若緣有缺罪結方便一有虗妄心而實無所知三説過人法四所對是人五實作人想六説而了了七前人領解定罪此中犯者如是虗而不實不知不見向人説言我得上人法前人知者波羅夷説而不知者偷蘭遮若遣手印本律手印根本云指印根本雜事云佛聽比丘畜印以為驗記但不聽著指環及寶莊飾聽用鍮石赤銅白銅牙角五種物作又印有二種一是大衆二為私物若大衆印刻轉法輪像兩邊安鹿伏跪而住其下應書元本造寺施主名字若私印刻作骨鎖形像或作髑髏形欲令其見時生厭離故若遣使若書若作知相若知者波羅夷不知者偷蘭遮自在靜處作不靜想口説言我得上人法偷蘭遮不靜處作靜想口説言我得上人法偷蘭遮諸天阿修羅乾達婆夜叉餓鬼畜生能變形有智向説上人法知者偷蘭遮説而不知者突吉羅若手印若遣使若書若作知相使彼知偷蘭遮不知突吉羅畜生不能變形者向説得上人法突吉羅若人實得道向不同意大比丘説得上人法突吉羅若為人説根力覺意解脫三昧正受我得是波羅夷人作人想波羅夷人疑偷蘭遮人非人想偷蘭遮非人人想偷蘭遮非人疑偷蘭遮十誦律云説我是阿羅漢乃至得阿那般那念不實犯波羅夷若言我善持戒淫欲不起不實偷蘭遮若説天來乃至羅剎鬼來互相問答不實者波羅夷若説旋風土鬼來至我所不實者偷蘭遮有人問比丘言汝是阿羅漢否若默然者偷蘭遮應言我非阿羅漢薩婆多論云無所誦習而言我有所誦習悉偷蘭遮如自稱過人法前人不聞不受重偷蘭遮摩得勒迦云若言我不墮三塗偷蘭遮若言我已離結使煩惱波羅夷向聾人啞人啞聾人入定人説偷蘭遮若問得果不答言得而示以手中果偷蘭遮善見律云若有白衣作寺入我寺者是阿羅漢有惡比丘入此寺者犯波羅夷五分律云寧噉燒石吞飲煬銅不以虗妄食人信施世間有五大賊一者作百千人主破城邑聚落害人取物二者有惡比丘將諸比丘遊行人間邪命説法三者有惡比丘於佛所説法自稱是我所造四者有惡比丘不修梵行自言我修梵行五者有惡比丘為利養故空無過人法自稱我得此第五賊名為一切世間天人魔梵沙門婆羅門中之最大賊又云為利養故種種讚歎他戒定慧解脫解脫知見成就而密以自美偷蘭遮為利養故坐起行立言語安庠以此現得道相欲令人知偷蘭遮僧祇律云若作羅漢相或合眼以手自指語優婆夷言汝愚癡人不知其尊譬如優曇華時一出而不知貴作如是相者得越毗尼罪比丘尼波羅夷三小衆突吉羅滅擯是謂為犯開緣不犯者增上慢人自言是業報因緣非修得若向同意大比丘説上人法若向人説根力覺道解脫三昧正受不自稱言我得若戲笑説或疾疾説屏處獨説夢中説欲説此錯説彼不犯不犯者最初未制戒等會詳首楞嚴經云如是世界六道衆生雖則身心無殺盜淫三行已圓若大妄語即三摩提不得清淨成愛見魔失如來種所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果乃至阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養是一顛迦銷滅佛種如人以刀斷多羅木佛記是人永殞善根無復知見沉三苦海不成三昧又云若不斷其大妄語者如刻人糞為旃檀形欲求香氣無有是處我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招紆曲第四分云死人有五不好一不淨二臭三有恐畏四令人恐畏惡鬼得便五惡獸非人所住處犯戒人亦如是一身口意業不淨二惡聲流布三諸善比丘畏避四諸善比丘見之生惡心言我云何乃見如是惡人五不與善人共住破戒人有五過失一自害二為智者所訶三有惡名流布四臨終時生悔恨五死墮惡道復有五事一先所未得物不能得二既得不護三隨所在衆中有愧恥四無數由旬內人稱説其惡五死墮惡道善見律云一切作諸惡法無人不知初作護身神見次知他心天人知如此之人天神俱見是故大呌喚展轉相承傳至梵天置無色界餘者悉聞優婆塞五戒相經云佛告比丘吾有二身生身戒身若善男子為吾生身起七寶塔至於梵天若人虧之其罪尚有可悔虧吾戒身其罪無量梵網經云寧以此口吞熱鐵丸及大流猛火經百千劫終不以此破戒之口食信心檀越百味飲食三結問諸大德我已説四波羅夷法釋律攝云已説四波羅夷法者謂彰其四事了了説竟欲令比丘重審其罪暫舒息故故曰我已説四波羅夷法也若比丘犯一一法不得與諸比丘共住如前後亦如是釋律攝問曰前是俗人無比丘分後時犯戒與前俗人體有別不答如前在俗不是比丘後犯戒時與前俗人體無有異故曰如前後亦如是薩婆多論云初犯一戒已毀破受道器名波羅夷後更殺人得突吉羅實罪雖重無波羅夷名以更無道器可破故是比丘得波羅夷罪不應共住釋薩婆多論云不共住者不共作一切羯磨同於僧事所以不共住者有四義一為生四部天龍鬼神信敬心故若行惡之人與共同事則無由信敬二以顯佛法無私無愛憎若清淨者共住不清淨者不共住三者為止誹謗故若與惡人同事外道邪見及以世人咸生誹謗當言佛法有何可貴不問善惡一切共事四者以持戒者得安樂住增上善根故破戒者生慚愧心折伏惡心故有此四義所以不共住也今問諸大德是中清淨不三問四勸持諸大德是中清淨默然故是事如是持
