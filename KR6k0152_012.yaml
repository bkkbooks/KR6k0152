body:
  text: 清金陵寶華山律學沙門德基輯第四十三食家強坐戒總釋此是共戒尼結亦同大乘同學律攝云由向俗家事為淫煩惱制斯學處緣起處佛在給孤獨園起緣人迦留陀夷與齊優婆私互相繫意乞食至其家就座而坐時齊優婆私洗浴莊嚴夫主心極愛敬夫主問言欲須何等報言須食即使婦出食與之食已坐住不去其夫瞋言猶故不去欲作何等我今捨汝出去隨汝在後欲何所作乞食比丘聞白佛訶責結戒所立戒相若比丘在食家中有寶強安坐者波逸提釋義食者男以女為食女以男為食律攝云謂男女交會更相受用故名食也寶者硨磲碼瑙真珠琥珀金銀此戒在食家強坐妨他男女交會而得罪不從有寶而犯過強安坐者律攝云不問舍主自縱己心不隨他意故云強也違制成犯犯緣此戒具足三緣方成本罪一有食之家二非顯露處三獨身安坐定罪此中犯者在食家中有寶強安坐者波逸提盲而不聾突吉羅聾而不盲突吉羅立而不坐突吉羅十誦云若女人受一日戒男子不受若男子受一日戒女人不受是家中坐突吉羅若二俱受者不犯律攝云若天女及半擇迦等咸得惡罪比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若入食家中有寶舒手及戶處坐若有二比丘為伴若有識別人或有客人在一處不盲不聾或從前過不住或卒病發倒地或為力勢所持或繫閉或命難梵行難無犯十誦云不犯者若斷淫家若受齊家若更有所尊人在坐若是舍多人出入無犯不犯者最初未制戒等第四十四食家屏坐戒總釋此是共戒尼結亦同大乘同制律攝云由詣他家事及淫煩惱制斯學處緣起處佛在給孤獨園起緣人亦由前人與優婆私在戶扇後坐共語乞食比丘至彼家聞迦留陀夷語聲嫌責白佛訶責結戒所立戒相若比丘食家中有寶在屏處坐者波逸提釋義屏處者若樹墻壁籬柵若衣障及餘物障犯緣此戒具足三緣方成本罪一有食家中二獨與女人三屏處共坐定罪開緣如前故不重出第四十五與女人露地坐戒總釋此是共戒尼亦同結大乘同制煩惱如前制斯學處緣起處佛在給孤獨園起緣人亦由前人與齊優婆私在露地共一處坐乞食比丘白佛呵責結戒所立戒相若比丘獨與女人露地坐波逸提釋義女人者有智命根不斷獨者一女人一比丘僧祇云獨一女人更無餘人設有餘人若眠癡狂心亂苦痛嬰兒非人畜生亦名獨也犯緣此戒具足三緣方成本罪一是女人堪行欲境二獨無伴侶三身相近坐定罪此中犯者罪相如前十誦云相去一丈坐波逸提相去丈五坐突吉羅過二丈不犯律攝云若與非人女半擇迦女及未堪行淫境若聾騃等共坐咸得惡作餘不犯等同前第四十六使他不得食戒總釋此是共戒尼犯亦同大乘同學律攝云由伴屬事不忍煩惱制斯學處緣起處佛在給孤獨園起緣人難陀與餘比丘共鬬結恨在心異時語彼比丘隨我到村當與汝食時到與彼入舍衛城將至無食處周回遍行餘有少時跋難陀念言至祇桓中日時已過語彼言未曾有汝是大惡人比丘問言我作何等過今由汝故并使我不得食長老速去我共汝若坐若語不樂我獨坐獨語樂語已便至有食家而食時彼比丘至祇桓中日時已過不得食乏極諸比丘知白佛呵責結戒所立戒相若比丘語餘比丘如是語大德共至聚落當與汝食彼比丘竟不教與是比丘食語言汝去我與汝一處若坐若語不樂獨坐獨語樂以此因緣非餘方便遣去波逸提釋義大德稱呼之詞共至聚落當與汝食誘誑之語食者有五種飯乾餅魚及肉語言汝去此是總標一句下文別出驅遣之語我與汝一處若坐若語不樂獨坐獨語樂根本云語謂讀誦坐謂禪思以此因緣非餘正謂令其絶食而生憂惱因緣非為餘事而驅遣空還也方便遣去假設言詞驅遣言今由汝是大惡人使我不得食設此方便而遣去豈是實事耶犯緣此戒具足三緣方成本罪一心有嫌恨二許食同往三遣離見聞定罪此中犯者若方便遣去捨見聞處波逸提捨見處至聞處突吉羅捨聞處至見處突吉羅方便遣去自捨見聞處波逸提捨見處至聞處捨聞處至見處皆突吉羅五分云作此惱餘四衆突吉羅尼作此惱二衆波逸提惱餘三衆突吉羅十誦云未入城令還突吉羅若入城門令還突吉羅若未入白衣家外門中門內門令還突吉羅若入內門未至聞處令還突吉羅若至聞處令還者波逸提比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者與食遣去若病若無威儀人見不喜者語言汝去我當送食至僧伽藍中彼若破戒見威儀若被舉若被擯若應擯若見命難梵行難方便遣去不以嫌恨故無犯律攝云若隨醫教為病令斷食者無犯不犯者最初未制戒等第四十七過受藥戒總釋此是共戒尼亦同制大乘同學若為衆生故索不犯律攝云由他施事多求煩惱制斯學處此戒六緣合結緣起處佛在釋翅搜迦維羅衛尼拘律園中摩訶男釋種摩訶男此云大名是佛叔之子大佛一月得斯陀含道請衆僧供給藥恭敬上座施與好者起緣人六群自相謂言彼恭敬上座與好者於我等無恭敬心我等當往其家求索難得所無有藥即往語言我等須如是如是藥摩訶男報言家中有者當與若無者詣市買給六羣言汝家中可無如是如是藥而請衆僧與藥汝有愛又復妄語摩訶男言我先有誓要請衆僧家中所有供給若無者當詣市買與汝今云何言我有愛是妄語人耶長老去我今已往不復供給衆僧藥也諸比丘聞白佛訶責結戒受四月請與藥不得過諸病比丘畏慎不敢過受佛言聽病比丘過受藥諸居士常請比丘與藥諸比丘畏慎不敢受佛言聽諸比丘受常請供給藥後摩訶男復作是念不可以一二人故斷衆僧藥更請衆僧供給藥諸比丘各各畏慎不敢受佛言聽受更請與藥諸比丘便計前日數佛言不應計前日數應從斷藥還與已來日從此為數時諸居士請比丘與分藥比丘畏慎不敢受佛言聽諸比丘受分藥又有居士請比丘與盡形壽藥比丘不敢受佛言聽受盡形壽藥當如是說戒所立戒相若比丘受四月請與藥無病比丘應受若過受除常請更請分請盡形壽請波逸提釋義四月者夏四月請與藥僧祇云或夏四月或冬四月或春四月檀越請不必定或四月或一月半月期滿已不得更索若請前食不得索後食請後食不得索前食藥及餘物亦爾若言盡壽受我四事供養爾時隨意索律鈔云報命支持勿過於藥藥名乃通要分為四一時藥從旦至中聖教聽服事順法應不生罪纍二非時藥諸雜漿等對病而設時外開服限分無違三七日藥約能就法盡其分齊從以日限用療深益四盡形壽藥勢力既微故聽久服方能除患形有三種一盡藥形二盡病形三盡報形無病比丘應受者謂病者不局請限病瘥方止無病過則成犯病者醫所教服藥也常請者其人作如是言我常與藥更請者斷已後更請與藥分請者持藥至僧伽藍中分與盡形壽請者其人言我當盡形壽與藥請者有四種或有請夜有限齊藥無限齊或有請藥有限齊夜無限齊或有請藥有眼齊夜有限齊或有請夜無限齊藥無限齊云何夜有限齊藥無限齊彼作夜分齊不作藥分齊我與如許夜藥云何藥有分齊夜無分齊彼作藥分齊不作夜分齊作如是言我與如是藥云何夜有分齊藥有分齊彼作夜分齊藥分齊如是言爾許夜與如是藥云何夜無分齊藥無分齊彼不作夜分齊藥分齊如是言我請汝與藥是中夜有分齊藥無分齊夜有分齊藥有分齊應夏四月受請謂夏必有定期不改移故不言日而言夜者夜必該日故是中藥有分齊夜無分齊夜無分齊藥無分齊應隨時受既無限齊但隨施意不須定於期限也犯緣此戒具足三緣方成本罪一受請藥二過限更受三索得入咽定罪此中犯者若過受咽咽波逸提十誦云索得波逸提不得突吉羅索訶梨勒等苦藥得不得盡突吉羅律攝云四月未竟請粗食更求好者惡作罪食便得墮請好食更索粗者索時惡作食時無犯善見云檀越施藥應作藥用不得作食用與油乞酥犯突吉羅五分云若人施僧藥執事比丘應問為留聚落中為著僧坊內若言留聚落中須時應語我須如是藥為我辦勿使乏若言留僧坊內應白二羯磨差五法比丘不隨愛恚癡畏知藥非藥者作守僧藥人比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者受四月請與藥病者過受常請更請分請盡形壽請不犯無犯者最初未制戒等第四十八觀軍陳戒總釋此是共戒尼亦同犯大乘同制律攝云由觀軍事情亂煩惱制斯學處此戒二緣合結緣起處佛在給孤獨園波斯匿王土境人民反叛時王自領六軍征伐謂萬二千五百人為軍周制天子六軍諸侯大國三軍次國三軍小國一軍起緣人六群往至軍中觀看波斯匿王言諸尊在此欲何所為六群報言我無所作來看軍陳耳王聞不悅復問言今欲何所至耶報言欲詣舍衛見佛王言若至舍衛持我名禮拜問訊世尊持此一褁石蜜奉上以此因緣具白世尊時六羣即往見佛具白上事佛呵責已結戒往觀軍陳婆逸提有大臣兄弟二人兄名黎師達弟名富羅那王使領軍征伐此二人渴仰欲見比丘即遣使往請諸比丘畏慎佛言有請喚者聽往當如是說戒所立戒相若比丘往觀軍陳除時因緣波逸提釋義陳者若戲若鬪律攝云陳有四種一槊刃勢二車轅勢三半月勢四鵬翼勢軍者象軍馬軍車軍步軍西域記云西國戰士驍雄畢選子父傳業遂窮兵衛居則宮廬周衛征則奮旅前鋒象則披以堅甲牙施利距一將安乘授其節度兩卒左右為之駕馭車乃駕以駟馬兵帥車乘列卒周衛扶輪挾穀馬軍散禦逐北奔命步軍輕捍敢勇克選負大摑執長戟或持刀劍前奮行陳凡諸戎器莫不鋒鏡所謂矛盾弓矢刀劍鋮斧戈殳長矟輪索之屬皆世習矣除時因緣薩婆多云因緣者若王王夫人太子大臣諸將如是等遣使喚往者不犯為止誹謗故若喚不往當言比丘有所求時不喚自來無所求時故喚不來為沙門果故若往說法或得須陀洹乃至阿那含又長信敬善根故又以道俗相須長養佛法故是以聽往以歡喜心故得沙門果故犯緣此戒具足三緣方成本罪一是軍陳二有心往觀三見境分明定罪此中犯者往而見者波逸提不見者突吉羅方便莊嚴欲觀而不去一切突吉羅若先在道行軍陳後至比丘應下道避不避者突吉羅薩婆多云若不故往以行來因緣道由中過不犯若住立看壞威儀突吉羅若左右顧看突吉羅僧祇云軍來詣精舍不作意看無罪作意看越毗尼罪不至看人口諍越毗尼罪律攝云若觀天龍阿蘇羅等軍亦得惡作乃至故心觀鶉等鬪並惡作罪若賊軍欲至須往觀望知其遠近不犯根本云若見軍時不應說其好惡尼陀那云有打鬬者不應往看若見諍者急捨而去比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若有事往若彼請去或力勢者將去若先前行軍陳後至下道避若水陸道斷及難緣等不避無犯不犯者最初未制戒等會詳薩婆多云為佛法尊重故為滅誹謗故為息諸惡法增長善法故而結此戒第四十九軍中過三宿戒總釋此是共戒尼亦同結大乘同學律攝云由觀軍事及掉亂心制斯學處緣起處佛在給孤獨園起緣人六群有因緣至軍中宿諸居士見自相謂言我等為恩愛故在此宿耳此沙門復在此何為耶諸比丘白佛呵責結戒所立戒相若比丘有因緣聽至軍中二宿三宿過者波逸提釋義有因緣者若王王夫人太子大臣諸將等請若為僧事塔事私己事有所啓白有因緣至軍中得二宿住第三宿明相未出時應離見聞處謂極止齊三不經明相也犯緣此戒具足二緣方成本罪一自至軍中二無緣過宿定罪此中犯者軍中二宿已至第三宿明相未出不離見聞處明相出波逸提若離見處至聞處離聞處至見處皆突吉羅五分云雖有因緣若書信得了應遣書信若須自往然後往事訖便還勿經宿若不了應一宿一宿不了應再宿復不了應三宿若了不了過三宿波逸提若事即了不應宿而宿突吉羅僧祇云若為塔為僧營事不訖應離軍一宿已得更宿若城邑遠不能往者應離軍見聞處宿宿時應語軍外邏人言我暮欲在其處宿勿謂是異人若軍人來到僧伽藍中住不應捨去雖多宿無罪比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者得二宿已第三宿明相未出離見聞處若水陸道斷及難緣等不離聞見處不犯無犯者最初未制戒等第五十觀軍陳鬬戰戒總釋此是共戒尼結亦同大乘同制梵網云若佛子不得以惡心故觀一切男女等鬬軍陳兵將劫賊等鬬也律攝云令軍懾怖及掉亂心制斯學處緣起處佛在給孤獨園起緣人六群有因緣二宿三宿軍中住彼在軍中觀軍陳鬬戰六群中一人為箭所射同伴比丘以衣褁之輿還諸居士問言此人何所患耶報言無患向觀軍陳鬪戰為箭所射居士譏嫌諸比丘白佛呵結戒所立戒相若比丘二宿三宿軍中住或時觀軍陳鬪戰若觀遊軍象馬力勢者波逸提釋義軍者一種軍乃至四種軍或有王軍居士軍或時觀軍陳鬪戰者若戲鬪若真實鬪陳者四方陳圓陳或半月形陳或張甄陳或函相陳若觀遊軍象馬力勢者第一象力第一馬力第一車力第一步力僧祇云強弱相傾觀其事勢是名力勢犯緣此戒具足三緣方成本罪一兩陳合戰二有心往觀三見其形勢定罪此中犯者往而見者波逸提不見突吉羅方便莊嚴欲往而不往者突吉羅若先在道行軍陳後至應避不避者突吉羅薩婆多云此戒體比丘在軍中二宿時故往看軍著器杖牙旗幢幡兩陳合戰波逸提設不在軍二宿住時故往看乃至軍陳合戰亦波逸提若坐不見故立看者突吉羅乃至見軍幢幡波逸提五分云觀鳥獸鬪突吉羅比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者有因緣若有所白若請喚若為力勢所持去或命難梵行難若先前行軍陳後至下道避若水陸道斷及諸難緣不避無犯不犯者最初未制戒等第五十一飲酒戒總釋此是共戒尼亦同結大乘同制律攝云由乞求事譏嫌煩惱制斯學處緣起處佛在支陀國或云支提又云制地起緣人尊者娑伽陀娑伽陀此云善來根本云初生之日容儀可愛父母歡喜唱言善來因與立名號曰善來具德經云聲聞中能具火界神通修伽陀是為佛作供養人借宿辮髮梵志家毒龍室中結跏趺坐龍放火烟尊者亦放火烟龍恚復放身火尊者亦放身火即滅龍火使無光色降此毒龍盛著鉢中時拘睒彌主是優填王也亦在此宿見是神力更增篤信欲興供養問尊者何所須報言止止此即為供養我已復白言願說所須六群為索黑酒尊者醉飽中路倒地而吐衆鳥亂鳴佛知而故問阿難具白佛呵言癡人如今不能降伏小龍況能降伏大龍佛言飲酒有十過失一者顏色惡二者少力三者眼視不明四者現瞋恚相五者壞田業資生法六者增致疾病七者益鬪訟八者惡名流布九者智慧減少十者身壞命終墮三惡道自今已去以我為師者乃至不得以草木頭內著酒中而入口呵責已結戒所立戒相若比丘飲酒者波逸提釋義酒者木酒粳米酒餘米酒大麥酒若有餘酒法作酒者是木酒者梨汁酒閻浮果酒善見云其形如沉苽大紫色酸甜甘蔗酒舍樓伽果酒藕根是也蕤汁酒音蕊莖間有刺實如耳璫紫赤色本草子啖之止鼻久服輕身益氣不饑葡萄酒梨汁酒者若以蜜石蜜雜作乃至葡萄酒亦如是犯緣此戒具足二緣方成本罪一是酒二貪飲入咽定罪此中犯者若酒酒煮酒和合若食若飲者波逸提若飲甜味酒突吉羅若飲酸味酒突吉羅若食麴若酒糟突吉羅薩婆多云噉麴犯者此麴以麥及藥草以酒和臥之後乾持行和水飲之令人醉也餘麴無犯酒作酒想酒疑酒無酒想皆波逸提無酒有酒想無酒疑並突吉羅律攝云凡作酒色酒香酒味或闕一闕二而飲能令人醉皆得墮罪若不醉人飲得惡作若體非酒而有酒色飲之無犯摩得勒伽云若以酒熏時藥非時藥七日藥無酒性得服善見云若酒煮食煮藥故有酒香味突吉羅無酒香味得食比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若如是病餘藥治不差以酒為藥若以酒塗瘡一切無犯不犯者最初未制戒等會詳薩婆多云若過是罪者此酒極重飲之者能作四逆除破僧逆以破僧要自稱佛故亦能破一切戒及餘衆惡也婆沙論云若不防護離飲酒戒則總毀犯諸餘律儀曾聞有一塢波索迦稟性仁賢受持五戒專精不犯後於一時家屬大小當為賓客彼獨不往留食供之時至取食鹹味多故須臾增渴見一器中有酒如水為渴所逼遂取飲之爾時便犯離飲酒戒時有鄰雞來入其舍盜心捕殺烹煮而食於此復犯離殺盜戒鄰女尋雞來入其室復以威力強逼交通緣此更犯離邪行戒鄰家憤怒將至官司時斷事者訊問所以彼皆拒諱因斯又犯離誑語戒如是五戒皆因酒犯故遮罪中獨制飲酒又酒令失念增無慚愧其過深重故偏制立第五十二水中嬉戲戒總釋此是共戒尼犯亦同大乘同學律攝云因生譏嫌制斯學處緣起處佛在給孤獨園起緣人十七群在阿耆羅婆提河唐言無勝水中嬉戲波斯匿王與末利夫人此云勝鬘又花名此夫人本守末利園善結花鬘故名增一阿含經云我聲聞中第一得證優婆斯篤信堅固所謂末利夫人是在樓觀上遙見語末利夫人言看汝所事者夫人言此諸比丘是年少始出家者在佛法未久或是長老癡無所知夫人即遣使白佛呵責結戒所立戒相若比丘水中嬉戲者波逸提釋義水中戲者放意自恣從此岸至彼岸或順流或逆流或此沒彼出或以手畫水或水相澆灒乃至以鉢盛水戲弄犯緣此戒具二緣方成本罪一是水中二有心戲弄定罪此中犯者水中嬉戲波逸提除水已若酪漿若清酪漿若苦酒若麥汁器中嬉戲突吉羅律攝云若以指彈作聲為戲謂心皆得惡作若學浮者無犯如世尊說苾芻應習浮恐有難緣不能浮渡若以水酒弄他時隨滴多少咸得墮罪為取涼冷水灑無犯五分云摶雪弄草頭露突吉羅十誦云槃上有水若坐牀上有水以指畫之突吉羅善見云水深沒腳背於中戲波逸提若搖船弄水突吉羅比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若道路行渡水從此岸至彼岸或水中牽材木若竹若𥱼順流上下若取石取砂若失物沈入水底此沒彼出或欲學知浮法擢臂畫水灒水一切無犯不犯者最初未制戒等會詳薩婆多云為佛法尊重故為長養敬信故不廢正業故為修正念故而結此戒第五十三相擊攊戒總釋此是共戒尼結亦同大乘同學律攝云以指擊攊因笑過分遂致於死制斯學處緣起處佛在給孤獨園起緣人六群中一人擊櫪十七群中一人乃令命終薩婆多云十七羣擊攊死者是年少小比丘也諸比丘白佛呵責結戒所立戒相若比丘以指相擊攊者波逸提釋義指者手有十腳有十言擊攊者以手指或腳指及以餘物觸彼身癢而取笑故也犯緣此戒具足三緣方成本罪一有心擊攊二是手足指三觸彼人身定罪此中犯者以手腳指相擊攊者一切波逸提除手指腳指已若杖若戶𨷲若拂柄及一切餘物相擊攊者一切突吉羅律攝云若苾芻以一二指乃至十指擊攊他時各獲墮罪若二人身俱頑痺而擊攊者得惡作罪薩婆多云擊攊比丘尼三衆六罪人五法人行調達五法狂心亂心病壞心在家無師僧如是等盡突吉羅盲瞎聾啞波利婆沙摩那埵得戒沙彌不見不作惡邪不除依止等四羯磨人盡波逸提若教人擊攊突吉羅五分云擊攊沙彌乃至畜生突吉羅摩得勒伽云若身根壞指挃突吉羅比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者不故擊攊若眠觸令覺若出入行來若掃地若杖頭誤觸無犯不犯者最初未制戒等第五十四不受諫戒總釋此是共戒尼犯亦同大乘同學律攝云由不忍煩惱制斯學處緣起處佛在拘睒彌國瞿師羅園中起緣人闡陀欲犯戒諸比丘諫言汝莫作此意不應爾闡陀不從即便犯諸比丘白佛訶責結戒所立戒相若比丘不受諫者波逸提釋義不受諫者作攝云若尊人所說不應遮止有所言教不應違逆但默然恭敬而住不嫉不恚除罪惡心恆為敬仰犯緣此戒具足三緣方成本罪一自知所為非法二智人呵諫三諫而不納定罪此中犯者若他遮言莫作是不應爾若自知所作是然故作犯根本不從語突吉羅若自知所作非然故作犯根本不從語波逸提比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若無智人來諫報言汝可問汝二師學問誦經知諫法然後可諫若戲笑語若獨處語若夢中語欲說此錯說彼一切無犯不犯者最初未制戒等會詳毗尼母云不應受五種人諫一無慚愧二不廣學三常覓人過四喜鬬諍五欲捨服還俗第五十五恐怖他戒總釋此是共戒尼結亦同大乘同學或觀機折伏不犯律攝云由戲弄事不寂靜煩惱制斯學處緣起處佛在波羅梨毗國起緣人時尊者那迦波羅比丘此云龍護亦云象護此比丘於現生中亦證淨法增一云我聲聞中第一比丘曉了星宿預知吉凶那伽波羅是侍佛供給所須世尊在經行處經行諸佛常法若經行時供養人在經行道頭立初夜已過請佛入房世尊默然中夜後夜過復請世尊入房時佛默然那迦波羅欲恐怖佛使令入房即反被拘執作非人聲恐怖沙門我是鬼佛言當知此愚人心亦是惡訶責結戒所立戒相若比丘恐怖他比丘者波逸提釋義恐怖者若以色聲香味觸法恐怖人云何色恐怖或作象形馬形鬼形鳥獸形如是等色恐怖人問此是常所見事何以為怖答以非時故令人怖也僧祇云色者在暗地悚耳皺面反眼吐舌乃至曲一指喂喂作恐怖相聲者象聲馬聲驢聲鬼呌聲怪鳥聲如是種種聲作恐怖香者若根香薩羅樹香此云出生若云薩羅計則青膠香也樹膠香梵語村魯此云薰陸狀如桃膠西域記云南印度阿吒𨤲國有薰陸香樹葉似棠梨本草云出天竺邯鄲南方草物狀曰出大秦國樹生海邊沙中盛夏樹膠流沙上形似白膠類如松脂黃白色天竺者色白邯鄲者夾緑色香不甚又云乳香亦其類也凡是樹脂不作香者皆名膠香皮香膚香葉香華香果香美香臭氣以此諸香恐怖人味者若酸若甜若苦若澀若鹹若袈裟味如是種種味令恐怖觸者若以熱若以火炙戶鑰便熱觸彼身言火起若冷若以扇風衣若水酒言雨雪若輕若以輕細衣覆上言雲墮若重持重氈壓上言壁倒若細若粗若滑若優鉢羅華莖若戶鈎觸彼身言是蛇若澀若鉢頭摩華莖觸彼身言是百足若軟若堅如是觸恐怖人法者語前人言我見汝相夢汝當死若失衣鉢若罷道汝和尚阿闍黎亦爾若父母得重病若命終以如是法恐怖人薩婆多云若比丘語餘比丘汝莫於生草中大小便當墮地獄餓鬼畜生是名法恐怖相犯緣此戒具足三緣方成本罪一有心恐怖二用色等六法三說而了了定罪此中犯者若比丘以色聲香味觸法恐怖人若說而了了波逸提不了了突吉羅薩婆多云若比丘自以六事怖若教他怖餘比丘若能令怖若不能令怖皆波逸提除此六事更以餘事怖比丘者突吉羅所謂若以多眠多食多言語當墮地獄餓鬼畜生若怖比丘尼三衆乃至一切在家人盡突吉羅律攝云若以可惡事令人畏惱有怖無怖解其言義便得本罪若以可愛色聲等事畏惱得惡作罪若說地獄傍生餓鬼情存化導彼雖生怖者無犯比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者或暗地坐無燈火或大小便處遙見謂言象若賊若惡獸便恐怖若至暗室中無燈火處大小便處聞行聲若觸草木聲若謦咳聲而怖畏若以色示人不作恐怖意若實有是事若見如是相或夢中見若當死或罷道若失衣鉢二師亦爾若父母重病當死若戲笑語疾疾語獨語夢中語欲說此錯說彼一切無犯不犯者最初未制戒等第五十六過洗浴戒總釋此是共戒尼犯亦同大乘同學律攝云由洗浴事過分煩惱制斯學處此戒六緣合結緣起處佛在羅閲祇迦蘭陀竹園中有池水瓶沙王聽諸比丘浴起緣人六羣於後夜入池浴王與婇女亦至聞洗浴聲問左右知是比丘王言莫大作聲勿使不及浴而去時六羣以種種細末藥更相洗乃至明相出王竟不得浴而去諸臣譏嫌比丘白佛訶責結戒半月應洗浴諸比丘盛熱時身體汗垢臭穢畏甚不敢浴佛言聽熱時數數浴諸病比丘身垢臭穢或大小便污畏甚不敢浴佛言聽病時數數浴諸比丘作時汗垢臭穢佛言聽作時數數浴諸比丘風雨中行塵坌污穢佛言聽風雨時數數浴諸比丘道行身熱汗垢塵坌佛言聽道行時數數浴當如是說戒所立戒相若比丘半月洗浴無病比丘應受不得過除餘時波逸提餘時者熱時病時作時風雨時道行時此是時釋義半月洗浴者僧祇云若十日浴數滿十五日復應浴若十四日乃至一日浴應從浴日數要滿十五日乃更浴是名半月洗浴非謂初一日至十五日名為半月也熱時者春四十五日夏初一月是熱時薩婆多云春殘一月半夏初一月是二月半名熱時以天竺早熱是名天竺熱時如是隨處熱時早晚數取二月半於中浴無犯病時者下至身體臭穢是謂病時僧祇云病時者癬疥瘙癰痤如是種種病須浴得適意聽浴作時者下至掃屋前地僧祇云作時者作泥作治房舍若通水溝若抒井若泥房舍若掃地若洗浴和尚阿闍黎乃至掃塔院僧院下至五六動掃帚得名作時風雨時者下至旋風一滴雨著身薩婆多云風時必有塵土坌身體雨時必使雨水濕衣污染身體或風雨二俱是為風雨時也道行時者下至半由旬若來若往者是如上不得取前後當取現在犯緣此戒具足三緣方成本罪一非開緣二有心洗浴三水已澆身定罪此中犯者半月洗浴除餘時若過一遍澆身波逸提若水澆半身亦波逸提若方便莊嚴欲洗浴不去一切突吉羅薩婆多云若比丘昨日來今日浴明日去今日浴波逸提比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者半月洗浴熱時病時作時風雨時道行時數數浴若為力勢持強使洗浴無犯律攝云若有要緣須渡河㵎若繞灘磧若過橋堤腳跌墮水或時悶絶他以水澆若為學浮若遇天雨並皆無犯若在時內須數洗者應守持心方為洗浴五分云若洗師及病人身體已濕因浴不犯僧祇云若無上諸時當作陶家浴法先浴兩䏶兩腳後洗頭面腰背臂肘𮌎腋無犯不犯者最初未制戒等若禮懺結壇日須洗浴斯出聖言非犯叢林大衆普浴亦應非犯第五十七露地然火戒總釋此是共戒尼犯亦同大乘同學律攝云因掉戲煩惱制斯學處此戒三緣合結緣起處佛在曠野城起緣人六羣自相謂言我等在上座前不得隨意言語即出房外在露地拾諸柴草樹株然火向炙空樹株中有毒蛇火氣熱逼從樹孔出比丘皆驚取所燒薪散擲東西迸火燒佛講堂世尊訶責結戒不聽露地然火病比丘畏慎佛言聽病比丘露地然火諸比丘欲為病比丘煮粥羮飯若熏鉢若染衣若然燈若燒香皆畏慎不敢作佛言如此等事聽作當如是說戒所立戒相若比丘無病自為炙身故在露地然火若教人然除時因緣波逸提釋義病者若癬疥瘙癢黃爛風病知是種種病須火得安樂故開無犯自謂炙身故在露地然火謂戒體必在無覆障處若在溫室厨屋浴堂中然不制若吹令發焰若翻轉柴薪令火熾盛故曰然也除時因緣者若為病人煮粥羮飯若直月若監知食事若次直然火然燈若在厨屋中溫室中浴堂中然火若為和尚阿闍黎然火若熏鉢暖水染衣然火如是等因緣皆聽故曰除時因緣犯緣此戒具足三緣方成本罪一處無覆障二柴薪𦦨火三自然教他定罪此中犯者無病為自炙故在露地然火若然草木枝葉紵麻芻摩若牛糞糠一切波逸提若以火置草木枝葉紵麻牛糞糠中然者一切波逸提若被燒半燋者擲著火中突吉羅若然炭突吉羅若不語前人言汝看是知是者突吉羅五分云為炙然火𦦨高至四指波逸提僧祇云持炬行欲抖擻不得在未燒地當在灰上若瓦上若炬火自落地即在上抖擻無罪律攝云若放野火得窣吐羅罪比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者語前人言看是知是若病人自然教人然有時因緣看病人為病者煮粥羮飯若在厨屋中溫室中浴堂中若熏鉢若煮染衣汁然燈燒香一切無犯薩婆多云若行路盛寒不犯無犯者最初未制戒會詳第四分云向火有五過一令人無顏色二無力三眼暗四令多人閙集五多說俗事僧祇云然火有七事無利益一壞眼二壞色三身羸四衣垢壞五壞牀褥六生犯戒因緣七增世俗言論第五十八戲藏衣鉢戒總釋此是共戒尼犯亦同大乘同學律攝云由調戲事不寂靜煩惱制斯學處緣起處佛在給孤獨園有居士請衆僧明日食十七羣持衣鉢坐具針筒著一面經行望食時到起緣人六羣伺彼背向時取而藏舉時到尋覓六羣在前調弄餘比丘觀察知彼藏舉白佛呵責結戒所立戒相若比丘藏比丘衣鉢坐具針筒若自藏教人藏下至戲笑者波逸提釋義藏比丘衣鉢坐具針筒者此之六物乃沙門要具合畜之物故得本罪不合畜者但得惡作若自藏若教他藏或自或他咸制不應下至戲笑者或為惱他而藏乃至嬉戲取笑而藏並同制斷犯緣此戒具足三緣方成本罪一有心調弄二所藏六物三藏舉已竟定罪此中犯者若自藏教他人藏下至戲笑波逸提僧祇云三衣中若藏一一衣波夜提若僧祇支及餘衣等越毗尼或云僧却崎唐言掩腋衣用覆左肩右開左合少年比丘乞食露現胸腋為女所愛佛制此衣掩其胸腋三種鉢一一藏波夜提若鍵鎡及餘器越毗尼藏尼師壇波夜提藏餘敷具越毗尼若有針合藏波夜提無針越毗尼薩婆多云若覓不得波逸提若不覓得突吉羅若藏石鉢金銀琉璃一切諸寶鉢若覓得不得盡突吉羅若藏五大上色衣及餘雜毛衣盡突吉羅五分云藏餘四衆乃至畜生物突吉羅尼藏二衆物波逸提藏三衆物皆突吉羅比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者相體惜而取舉若在露地為風雨所飄漬取舉若物主為性慢藏所有衣鉢坐具針筒放散狼藉為欲戒敕彼故而取藏之若借彼衣著而不收攝恐失便取舉之若以此衣鉢諸物故有命難梵行難取藏之一切無犯不犯者最初未制戒等第五十九不問主輒著淨施衣戒總釋此是共戒尼結亦同大乘同學律攝云此由衣事及廢闕煩惱制斯學處緣起處佛在給孤獨園起緣人六羣真實施親厚比丘衣已後不語主還取著諸比丘聞白佛訶責結戒所立戒相若比丘與比丘比丘尼式叉摩那沙彌沙彌尼衣後不語主還取著波逸提釋義與衣者淨施衣也淨施衣有二種一者真實淨施二者展轉淨施真實淨施者言此是我長衣未作淨今為淨故與長老作真實淨作此真實淨者善見云正得掌護不得用云何得用若施主語言此是我衣隨長老用若作是語得用無罪展轉淨施者此是我長衣未作淨今為淨故與長老彼應如是語長老聽長老有如是長衣未作淨今與我為淨故我便受受已當問言欲與誰耶應報言與某甲彼應作如是語長老有是長衣未作淨今與我為淨故我便受受已與某甲此衣是某甲所有汝為某甲故守護持隨意用是中真實淨施者應問主然後取著展轉淨施者語以不語隨意取著式叉摩那此云學戒女律云十八童女二歲學戒又云小年曾嫁十歲者與六法十誦云六法練心能持六法方與受具二年練身可知有胎無胎事鈔云式叉尼具學三法一學根本謂四重是二學六法所謂染心相觸盜四錢斷畜生命小妄語非時食飲酒也三學行法一切大尼戒並須學之若六法中隨一犯者更與二年羯磨僧祇云在大尼下沙彌尼上坐沙彌沙彌尼南山別行篇云沙彌此翻息慈謂息世染之情以慈濟羣生也又云初入佛法多存俗情故須息惡行慈也後不語主還取著此謂真實淨施衣著用必須問主不同展轉淨施隨意著用也犯緣此戒具足二緣方成本罪一真實淨施衣二不語主取著定罪此中犯者真實施衣不語主而取著波逸提薩婆多云此戒體本與他衣作誑心與欲使役故令作己有想作已便奪波逸提所以不與重者不根本與故比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若真實淨施語主取著展轉淨施語以不語取著無犯不犯者最初未制戒等第六十著不壞色衣戒總釋比是共戒尼犯亦同大乘同制梵網云應教身所著袈裟皆使壞色等律攝云由衣服事譏嫌煩惱制斯學處緣起處佛在給孤獨園起緣人六羣著白色衣居士譏嫌似王大臣諸比丘聞白佛呵責結戒所立戒相若比丘得新衣應三種壞色一一色中隨意壞若青若黑若木蘭若不壞色著餘新衣波逸提釋義新者若是新衣若初從人得壞色者染作青黑木蘭也青律攝云取訶黎勒或研或搗和水成泥塗鐵器中停經一宿和以暖水染物成青非真青也黑僧祇云名字泥不名字泥名字泥者呵黎勒𨡕醯勒阿摩勒合鐵一器中不名字泥者實泥若池井泥如是一切泥即染物成皂色也木蘭僧祇云若呵黎勒𨡕醯勒阿摩勒如是比生鐵上磨取汁染衣是名木蘭即紫絳色十誦云若得青衣應泥茜淨泥謂黑色茜乃草名亦作蒨即木蘭色也得泥衣應青茜淨得茜衣應青泥淨得黃赤白衣應青泥茜三種淨此謂如法壞色若不壞色下違制成犯犯緣此戒具足二緣方成本罪一堪守持衣二不壞色著用定罪此中犯者若比丘不壞色著餘新衣波逸提若重衣若輕衣不作淨而畜突吉羅若非衣鉢囊革屣囊針線囊禪帶帽襪鑷熱巾褁革屣巾不作淨畜突吉羅若以未染衣寄白衣家突吉羅僧祇云僧伽黎多羅僧安陀會雨浴衣覆瘡衣尼師壇作淨者善不作淨者彼夜提薩婆多云凡五大色若自染突吉羅若作衣不成受應量不應量一切不得著若先得五大色衣後更改作如法色則成受持若先作如法色後以五大色壞者不成受持若作三點淨者得一切處著若非純青淺青及碧作點淨得作衣裏舍勒應法師譯為內衣似今短裙也外若不現得著若作現處衣盡不得著若亦黃白色色不純大者亦如是除富羅革屣餘一切衣臥具物乃至腰帶盡應三點淨一切如法色衣不如法色衣不作淨著者皆波逸提若衣故點滅猶是淨衣不須更點淨若先點淨衣更以新物段補十處五處但一處作淨不須一一淨也若革屣若得靴應令白衣著行五六七步即是作淨若先衣財時作點淨後染作色成已若更不點淨無咎以先淨故僧祇云作淨時不得大不得小極大齊四指極小如豌豆或一或三或五或七或九不得如華形若浣㲲時有泥墮上若烏鳥泥足蹈上即名為淨若作僧伽黎趣一角作淨若一條若半條補者亦作淨多羅僧安陀會亦爾五分云應三種色作志若不作志著著波逸提若不著宿宿波逸提比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者若得白色衣染作青黑木蘭若重衣若輕衣亦作淨畜若非衣鉢囊乃至褁革屣巾皆作淨畜若衣染已寄白衣家若衣色脫更染無犯不犯者最初未制戒等辨訛今人不間律典或點淨已更不說淨謂點淨即說淨也不知二種淨法戒制各別罪結兩途說淨乃離畜長之愆點淨而免新衣之過烏可混淆即如一切漿以水作淨得飲一切果菜作淨已聽食一切新衣作淨聽著何得點淨而為說淨耶達者詳之第六十一殺畜生命戒總釋此是共戒尼犯亦同大乘同制犯重梵網云乃至一切有命者不得故殺此是性罪律攝云由生命事無悲煩惱制斯學處此戒二緣合結緣起處佛在給孤獨園起緣人迦留陀夷不喜見烏竹弓射之遂成大𧂐居士譏嫌諸比丘白佛訶責結戒不聽斷畜生命諸比丘坐起行來多殺細蟲或有作波逸提懺者或有畏慎者佛言不知不犯當如是說戒所立戒相若比丘故殺畜生命者波逸提釋義故者有心行殺表非錯誤畜生者不能變化者梵語底栗車此云畜生由因諂曲業故於中受生又梵云帝利耶瞿榆泥伽此云旁行又云旁生其形旁故因行不正受果報旁負天而行故曰旁行遍於五趣皆有地獄有無足者如娘矩吒蟲等有二足者如鐵嘴鳥等有四足者如黑狡狗等有多足者如百足等鬼趣中有無足者如毒蛇等有二足者如鳥鴟等有四足者如狐狸象馬等有多足者如六足百足等人趣三洲中有無足者如一切腹行蟲等有二足者如鴻雁等有四足者如象馬等有多足者如百足等北洲中有二足者如鴻雁等有四足者如象馬等餘者無四王及三十三天中有二足者如妙色鳥等有四足者如象馬等有多足者如寶蜂等餘皆無也上四天中唯有二足如色鳥等餘皆無也有水陸空行三類具胎卵濕化四生殺法如波羅夷戒中此不繁録犯緣此戒具足三緣方成本罪一有心故殺二命根已斷三是旁生不能變形者定罪此中犯者故殺畜生命波逸提方便欲殺而不殺突吉羅律攝云使癲狂者行殺害時彼雖無犯教者本罪五分云畜生者除龍餘畜生是龍雖是畜而能變化具神力守護國土保綏正法其功用與諸天相類故殺者犯偷蘭遮摩得勒伽云欲斫藤誤斫蛇不犯欲斫蛇誤斫藤惡作罪欲斫蟲誤斫地欲搦蟲而搦土皆得惡作罪比丘尼波逸提小三衆突吉羅是謂為犯開緣不犯者不故殺或以瓦石刀杖擲餘處而誤斷生命若經勞作房舍手失瓦石而誤殺若土墼杖木若柱櫨棟椽如是手捉不禁墮而殺者作如是衆事無有害心而死者無犯不犯者最初未制戒等會詳地持經云殺生之罪能令衆生墮三惡道若生人中得二種果報一者短命二者多病如是十惡一一皆備一者殺生何故受地獄苦以其殺生苦衆生故所以身壞命終地獄衆苦皆來切己二者殺生何故出為畜生以其殺生無有慈惻行乖人倫故地獄罪畢受畜生身三者殺生何故復為餓鬼以其殺生必緣慳心貪著滋味故復為餓鬼四者殺生何故生人而得短壽以其殺生殘害物命故得短壽五者殺生何故兼得多病以殺生違適衆患競集故得多病當知殺生過惡如是薩婆多云為憐愍故為斷罪惡故為長敬信心故而結此戒
